date redundant tools to keep the toolchain coherent."], "issues": ["Without a strategy, the team builds disconnected one-offs that never compound into leverage.", "Support work crowds out durable tooling, so the team is perpetually reactive.", "Tools that ignore studio standards create an island that can't share or be reused.", "Tool sprawl makes the toolchain confusing and expensive to maintain."]}, {"title": "8. Cross-Project & Engineering Alignment", "label": "Issues if Tech Art Drifts from Engineering", "resp": ["Align the project's rendering and pipeline direction with engineering and other projects' tech to avoid divergence.", "Partner with engine programming leadership on the renderer and content systems the project depends on.", "Feed project learnings back into shared platforms so other projects benefit.", "Represent the project's technical needs in cross-project tech decisions.", "Maintain credibility with both art and engineering so the TAD's calls carry weight on both sides."], "issues": ["The project's tech drifts from engineering, and integration costs explode late.", "Project learnings stay siloed instead of strengthening shared platforms.", "The TAD becomes an engineering manager in disguise and loses art-side credibility.", "Without alignment, the project ends up on a divergent tech island that's costly to support."]}], "topConsequences": ["A vision that outruns technical reach, or a TAD who says no too often, makes the game look smaller than it should.", "Performance owned reactively forces brutal late cuts that compromise the art at the worst possible time.", "A pipeline that can't scale to AAA volume turns artists into pipeline-fighters and throttles production.", "Bad build-vs-buy and platform-readiness calls create lock-in, divergent tech, and cert scrambles near ship.", "Drift between the project's tech art and engineering explodes integration costs and isolates the project."], "bottomLine": "The Technical Art Director owns the project's rendering, pipeline, and tooling strategy and is the partner who makes the Art Director's vision achievable at frame rate, at AAA volume, on every platform. Success is an ambitious game that ships performant and on schedule because the technical path was found early; failure is a project crippled by late performance cuts, a pipeline that can't scale, and a vision the team had to design around."}, "director-of-technical-art-head-of-tech-art": {"sections": [{"title": "1. Tech Art Org Design", "label": "Issues if the Org Is Mis-Structured", "resp": ["Design the tech art organization across projects so coverage, ownership, and escalation paths are clear.", "Decide the balance between embedded (project) and central (platform) tech art and adjust it as the studio evolves.", "Define roles, levels, and career ladders for tech art so growth paths are explicit.", "Ensure every project has the TA leadership and capacity it needs without over- or under-staffing.", "Build the leadership bench so the org can scale and survive departures."], "issues": ["A mis-structured org leaves projects under-covered or duplicates effort across them.", "Wrong embedded/central balance either starves shared platforms or detaches TA from production.", "Without explicit ladders, top talent sees no growth path and leaves.", "A thin leadership bench means the org can't scale and breaks when a leader departs."]}, {"title": "2. Long-Horizon Technical Strategy", "label": "Issues if There's No Long-Horizon Strategy", "resp": ["Own the multi-year technical strategy for tech art across the studio's project portfolio.", "Anticipate where rendering, tooling, and content tech are heading and position the studio ahead of it.", "Sequence strategic bets so foundational investments land before the projects that depend on them.", "Balance near-term project needs against long-horizon platform investment.", "Keep the strategy legible to leadership and connected to business goals."], "issues": ["Without a long-horizon strategy, the studio lurches reactively from project to project.", "Foundational investments arrive too late to help the projects that needed them.", "Near-term firefighting crowds out the platform work that would prevent future fires.", "A strategy disconnected from business goals fails to win the investment it needs."]}, {"title": "3. Tool & Middleware Portfolio", "label": "Issues if the Portfolio Fragments", "resp": ["Own the studio's portfolio of tools and middleware so investment is coordinated, not duplicated per project.", "Make studio-level build-vs-buy and standardization decisions that hold across the portfolio.", "Drive shared-platform investment so common needs are solved once and reused everywhere.", "Manage middleware vendor relationships, licensing, and lifecycle at the studio level.", "Sunset and consolidate redundant tools to keep the portfolio coherent and affordable."], "issues": ["Without portfolio ownership, tech art fragments across projects and teams hand-roll everything.", "Strategic tool investments never happen, so common problems are re-solved on every project.", "Uncoordinated middleware licensing wastes money and creates inconsistent capability.", "Tool sprawl across projects makes the portfolio unmaintainable and expensive."]}, {"title": "4. Engine Programming Partnership", "label": "Issues if Engineering and Tech Art Diverge", "resp": ["Partner with engine programming leadership as a peer on the renderer, content pipeline, and tooling platform.", "Co-own the long-horizon roadmap where engine and art tech meet so they evolve together.", "Represent art-side technical needs at the studio's technical leadership table.", "Negotiate ownership of the seams (DCC integration, runtime content systems) to avoid gaps and overlaps.", "Align tech art and engine investment so the studio builds one coherent platform, not two."], "issues": ["Engine and art tech drift apart and integration costs explode across the portfolio.", "Art-side needs go unrepresented and tech art becomes a downstream afterthought.", "Unclear ownership of seams leaves gaps that each side assumes the other covers.", "Divergent engine and art-tech investment yields two half-platforms instead of one strong one."]}, {"title": "5. Talent Strategy & Retention", "label": "Issues if Talent Strategy Fails", "resp": ["Own the studio's tech art talent strategy: hiring bar, sourcing, leveling, and retention.", "Build growth paths (both IC and management) so senior talent has a future without leaving.", "Develop leads and principals into the studio's next tech art leadership layer.", "Set compensation and recognition norms competitive enough to retain scarce TA specialists.", "Protect culture and craft so the org remains a place strong tech artists want to be."], "issues": ["Top tech art talent leaves because there's no growth path, and hard-won expertise walks out.", "Without a leadership bench, the org can't promote from within and stalls.", "Uncompetitive comp and recognition bleed scarce specialists to rivals.", "A degraded craft culture makes recruiting and retaining strong TAs progressively harder."]}, {"title": "6. Standards, Platform & Shared Pipeline", "label": "Issues if There's No Shared Platform", "resp": ["Drive a shared tech art platform and standards that projects build on rather than reinventing.", "Govern cross-project standards (validation, CI, data contracts, conventions) so projects interoperate.", "Invest in the shared pipeline so onboarding and cross-project staffing are smooth.", "Balance standardization against each project's legitimate need to differentiate.", "Measure platform adoption and the leverage it actually delivers."], "issues": ["Without a shared platform, every project hand-rolls its pipeline and nothing transfers.", "Divergent standards make cross-project staffing and tool reuse impossible.", "Over-standardization stifles projects that genuinely need to differentiate.", "Unmeasured platform investment can't prove its value and loses funding."]}, {"title": "7. Credibility & Hands-On Connection", "label": "Issues if the Director Loses Technical Credibility", "resp": ["Stay technically credible enough to make sound calls and earn the respect of working tech artists and engineers.", "Stay connected to production reality through reviews, deep-dives, and direct contact with the work.", "Make decisions enabling project teams rather than building a personal empire.", "Keep R&D tied to production need so the org's investment ships.", "Sponsor and unblock the org's hardest technical problems personally when needed."], "issues": ["Pure org work erodes technical credibility until the director's calls aren't trusted.", "Empire-building displaces enabling project teams, and the org grows without delivering.", "Pet-project R&D that production never uses wastes investment and signals disconnection.", "A director detached from the work makes decisions that feel ivory-tower and get resisted."]}, {"title": "8. R&D Portfolio & Emerging Tech Governance", "label": "Issues if R&D Isn't Governed", "resp": ["Govern the studio's tech art R&D portfolio (Nanite-class geometry, real-time GI, ML-assisted authoring, procedural pipelines) for shipping outcomes.", "Sequence emerging-tech bets so de-risking happens before projects commit to them.", "Set the bar for graduating R&D from prototype to production-supported platform.", "Allocate R&D capacity deliberately against strategic priorities, not whoever lobbies hardest.", "Kill R&D that isn't earning its keep to protect the portfolio's overall return."], "issues": ["Ungoverned R&D produces demos that never ship and burns the org's credibility.", "Emerging tech is adopted by projects before it's de-risked, destabilizing production.", "Without a graduation bar, prototypes linger unsupported and rot.", "R&D capacity goes to the loudest voice instead of the highest strategic value."]}], "topConsequences": ["Without a shared platform and portfolio ownership, tech art fragments across projects and every team hand-rolls everything.", "No long-horizon strategy leaves the studio reacting project to project, with foundational investments always arriving too late.", "Divergence between engine programming and art tech explodes integration costs across the entire portfolio.", "A failing talent strategy bleeds scarce senior tech artists and leaves no leadership bench to scale the org.", "A director who loses technical credibility or builds an empire makes ivory-tower calls the org quietly resists."], "bottomLine": "The Director / Head of Technical Art owns the tech art organization, its long-horizon strategy, and the shared platform that lets every project stand on common ground instead of reinventing the pipeline. Success is a coherent, well-staffed org with a roadmap that anticipates where tech is heading; failure is fragmentation across projects, late strategic investment, departing talent, and a leader who has drifted out of touch with the work."}, "vp-of-technical-art-vp-of-art-technology": {"sections": [{"title": "1. Company-Wide Art Technology Strategy", "label": "Issues if There's No Company Art-Tech Strategy", "resp": ["Own the multi-studio strategy for art technology: rendering, content pipeline, tools, and ML/AI direction.", "Set the company's position on where art tech is heading and ensure studios move coherently rather than independently.", "Sequence company-level technology bets so foundational platforms precede the titles that depend on them.", "Define which capabilities are differentiators to invest in versus commodities to standardize or buy.", "Tie the art-tech strategy to the company's product and business strategy so it earns sustained investment."], "issues": ["Without a company strategy, studios diverge technologically and the company falls behind competitors.", "Foundational platform bets arrive too late to help the titles that needed them.", "Investment scatters across commodity problems instead of concentrating on differentiators.", "A strategy unconnected to the business fails to win the capital it requires."]}, {"title": "2. CTO & Engineering Leadership Partnership", "label": "Issues if Art Tech and Engineering Misalign at the Top", "resp": ["Partner with the CTO and VP of Engineering as a peer on engine direction and the company's technical platform.", "Co-own the boundary between engine technology and art technology so they evolve as one platform.", "Represent art technology's needs and constraints in company-level technical and capital decisions.", "Negotiate shared roadmaps and ownership so engine and art-tech investment reinforce each other.", "Translate art-tech strategy into terms the executive technical leadership can fund and act on."], "issues": ["Engine and art tech drift at the top, and integration costs explode across every studio.", "Art technology is treated as downstream of engineering and chronically under-resourced.", "Without a shared roadmap, the company funds two half-platforms instead of one strong one.", "The VP becomes a CTO-shadow with no clear lane, and art-tech decisions get made without them."]}, {"title": "3. Capital Allocation for Art-Tech R&D", "label": "Issues if Capital Is Mis-Allocated", "resp": ["Own the capital allocation for art-tech R&D and platform investment across the company.", "Build the business case for major bets and defend the portfolio's return at the executive table.", "Balance near-term title needs against multi-year platform and R&D investment.", "Set funding gates so bets graduate, scale, or are killed based on evidence.", "Concentrate investment where it compounds across studios rather than spreading it thin."], "issues": ["Mis-allocated capital starves the platform work that would prevent future crises.", "R&D vanity projects with no shipping outcome consume budget and burn executive trust.", "Spread-thin investment never reaches the critical mass needed to deliver leverage.", "Without funding gates, failing bets persist and crowd out promising ones."]}, {"title": "4. ML/AI & Next-Gen Authoring Strategy", "label": "Issues if the Company Lacks an ML/AI Strategy", "resp": ["Set the company's strategy for ML/AI in content creation (assisted authoring, generative tooling, automation) as the field shifts.", "Decide where ML/AI is adopted, built, partnered on, or deferred, with a clear-eyed view of maturity and risk.", "Govern the legal, ethical, and IP dimensions of generative and ML tooling at the company level.", "Pilot emerging ML capability on real production problems before company-wide commitment.", "Position the company's talent and pipeline to absorb ML-driven changes to how art is made."], "issues": ["No coherent ML/AI strategy leaves the company exposed as the field reshapes content creation.", "Ad-hoc ML adoption creates legal, IP, and ethical risk with no governance.", "Late or absent ML strategy cedes a structural cost-and-speed advantage to competitors.", "Pipelines and talent aren't prepared, so ML disruption hits as crisis rather than opportunity."]}, {"title": "5. Long-Horizon Platform Readiness", "label": "Issues if the Company Isn't Platform-Ready", "resp": ["Own long-horizon readiness for next-gen consoles, cloud, streaming, and XR across the portfolio.", "Anticipate platform shifts and position the company's tech and content pipelines to meet them early.", "Drive the foundational work (scalability, data, streaming, performance) that future platforms will demand.", "Maintain relationships with platform holders to anticipate requirements and influence direction.", "Ensure the company's titles can target emerging platforms without per-title reinvention."], "issues": ["The company is caught flat-footed by platform shifts and scrambles to retrofit titles.", "Foundational readiness work is deferred and surfaces as crises near each platform launch.", "Weak platform-holder relationships mean requirements are learned late and reacted to.", "Each title reinvents platform support because no company-level readiness was built."]}, {"title": "6. Multi-Studio Org & Talent Strategy", "label": "Issues if the Multi-Studio Org Fragments", "resp": ["Own the multi-studio art-tech org design, leveling, and leadership pipeline across the company.", "Set the company-wide hiring bar and growth paths for tech art so quality and retention hold across studios.", "Develop the directors and principals who lead tech art at each studio.", "Allocate scarce specialist talent to the company's highest-leverage problems.", "Build a craft culture across studios that attracts and retains the best tech art talent."], "issues": ["Without company-wide org strategy, studios diverge in quality and can't share talent.", "No leadership pipeline means studios can't fill director-level roles from within.", "Scarce specialists are trapped in single studios instead of serving company priorities.", "Inconsistent bar and culture make the company a weaker draw for top tech artists."]}, {"title": "7. Build-vs-Buy & Vendor Strategy at Scale", "label": "Issues if Vendor Strategy Is Incoherent", "resp": ["Set the company-wide build-vs-buy posture and major middleware and vendor strategy.", "Negotiate enterprise-level licensing and partnerships that serve the whole portfolio.", "Decide which core capabilities the company owns to differentiate versus sources externally.", "Manage vendor lock-in, lifecycle, and contingency at the company scale.", "Align studios on shared vendors and standards where it creates leverage."], "issues": ["Incoherent vendor strategy leaves studios on conflicting middleware with duplicated licensing cost.", "Building commodity capability wastes company R&D that should fund differentiators.", "Buying core differentiators creates lock-in that constrains the company's titles.", "Unmanaged vendor lock-in becomes a strategic risk with no contingency."]}, {"title": "8. Executive Representation & Connection to the Craft", "label": "Issues if the VP Becomes Ivory-Tower", "resp": ["Represent art technology credibly at the executive table and in industry forums.", "Translate between the executive/business world and the working tech art community in both directions.", "Stay connected to working tech artists so strategy stays grounded in production reality.", "Build the company's external reputation in rendering, pipeline, and art-tech to aid recruiting and influence.", "Hold the line that art-tech R&D must connect to shipping outcomes, not vanity."], "issues": ["Disconnected from working tech artists, the VP's decisions feel ivory-tower and get resisted.", "R&D vanity projects with no shipping outcome erode executive and team trust alike.", "Without executive credibility, art technology loses the seat and the funding it needs.", "A weak external reputation hampers recruiting and the company's industry influence."]}], "topConsequences": ["Without a coherent company strategy, studios diverge technologically and the company's tech competitiveness erodes.", "Misalignment with the CTO and engineering at the top explodes integration costs across every studio.", "Mis-allocated capital and vanity R&D starve the foundational platform work while burning executive trust.", "An absent ML/AI and platform-readiness strategy cedes structural cost, speed, and capability advantages to competitors.", "A fragmented multi-studio org bleeds scarce talent and leaves no pipeline to lead tech art across the company.", "A VP disconnected from the craft makes ivory-tower calls that teams resist and that miss production reality."], "bottomLine": "The VP of Technical Art / Art Technology is the executive owner of the company's art-tech direction, partnering with the CTO on platform strategy, allocating capital across multi-studio R&D, and setting the ML/AI and next-gen-platform course that keeps the company technically competitive. Success is a company whose studios stand on a coherent, forward-looking art-tech platform and lead on capability; failure is technological drift, exploding integration costs, vanity R&D, and a strategy too disconnected from both the business and the craft to land."}}, "masked": true}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const ROLES = DATA.roles, DEEP = DATA.deepDives, MASKED = DATA.masked;
const TRACK_ORDER = ["IC / Craft","Management","Creative / Vision","Production / Ops","Technical Art","Discipline Director"];
const TRACK_COLOR = {
  "IC / Craft":"#5b9dff","Management":"#9d7be0","Creative / Vision":"#e0a83d",
  "Production / Ops":"#3fae7a","Technical Art":"#e2685f","Discipline Director":"#d8b53d","Executive":"#9aa3b2"};
const TRACK_DESC = {
  "IC / Craft":"The <b>individual-contributor craft ladder</b> - the artists who actually build the game: models, textures, environments, characters, effects. It is the foundation every other track rests on, and it advances by deepening craft, influence, and quality bar rather than by managing people. ICs take their visual marching orders from <b>Creative / Vision</b>, build to the standards and tools set by <b>Technical Art</b>, and are scheduled by <b>Production / Ops</b>; the strongest of them become the talent pool that feeds the <b>Management</b> and <b>Discipline Director</b> tracks.",
  "Management":"The <b>people-leadership ladder</b> - it owns the humans, not the pixels and not the vision. This is the studio's career, hiring, leveling, and org-health spine, running in parallel to craft so that artists have a growth path that isn't 'become an art director.' It grows and protects the <b>IC / Craft</b> talent, partners with <b>Creative / Vision</b> (who owns the look) and <b>Production / Ops</b> (who owns delivery), and is deliberately distinct from <b>Discipline Directors</b>, who own craft quality rather than people.",
  "Creative / Vision":"The <b>aesthetic-authority spine</b> - the Art Director line that decides what the game looks like and defends that vision end to end. It sits at the top of art decision-making, translating the Game/Creative Director's intent into a concrete visual language and signing off on the bar. It directs the <b>IC / Craft</b> and <b>Discipline Director</b> tracks, partners with <b>Production / Ops</b> as the vision-vs-execution counterweight and with <b>Technical Art</b> as the vision-vs-feasibility one, and culminates at the top of this track in VP of Art / Chief Art Officer.",
  "Production / Ops":"The <b>art delivery and operations ladder</b> - it owns how art gets made on time, on budget, and at quality, not how it looks. This is the project-management counterpart to Creative: schedules, dependencies, risk, capacity, outsourcing, and the quality gates that keep rework from exploding late. Its Development Director sits as a peer to the <b>Creative / Vision</b> Art Director (vision vs execution), it coordinates <b>IC / Craft</b> throughput and <b>Technical Art</b> tooling investment, and at the top owns art P&L and delivery at the studio level.",
  "Technical Art":"The <b>bridge between art and engineering</b> - it owns the shaders, rigs, tools, pipeline, and performance that let artists hit the vision inside a real engine. It sits between the art department and programming, turning ambition into something that ships at frame-rate. It force-multiplies the <b>IC / Craft</b> artists, enables the <b>Creative / Vision</b> look technically (the Tech Art Director ↔ Art Director partnership), and partners with engineering leadership; when this track is weak, art ambition quietly outruns what the engine can deliver.",
  "Discipline Director":"The <b>specialist craft directors</b> - Character, Environment, VFX, Lighting, Animation, UI, Concept, Visual Dev, Cinematics, and Outsource - each owning the visual <i>and</i> technical quality of one domain. They sit under the Art Director and above their discipline's leads and ICs, providing deep authority where a single AD can't be expert in everything. They report into <b>Creative / Vision</b> (the AD owns the whole; they own their slice), are staffed via <b>Management</b>, supported by <b>Technical Art</b>, and scheduled by <b>Production / Ops</b>.",
  "Executive":"The <b>studio and company leadership tier</b> - where art is one input among many alongside design, engineering, and business. It owns the P&L, the portfolio, the culture, and the greenlights, setting the budget, headcount, and strategy envelope that every other hierarchy operates inside. All of the art tracks ultimately ladder up to this table (VP of Art and the CAO live at its edge), and it is where creative ambition is reconciled with the realities of running a business that ships games."
};
const slug = s => s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
ROLES.forEach(r => r.id = slug(r.title));
const byId = id => ROLES.find(r => r.id === id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const bullets = txt => txt.split('\n').map(l=>l.replace(/^[•\-\s]+/,'').trim()).filter(Boolean);

// everything starts collapsed on load; user expands manually. Re-renders keep the state.
const collapsedTracks = new Set(TRACK_ORDER);
document.addEventListener('toggle', e=>{
  const d = e.target;
  if(d.classList && d.classList.contains('track') && d.dataset.track){
    if(d.open) collapsedTracks.delete(d.dataset.track);
    else collapsedTracks.add(d.dataset.track);
  }
}, true);

// roles that fork into other tracks -> shown as branch chips on the role page + a badge on the card
const BRANCHES = {
  'senior-artist': [
    {id:'staff-artist', note:'stay IC / Craft'},
    {id:'lead-artist', note:'into Management'},
    {id:'associate-art-director', note:'into Creative / Vision'}
  ]
};
function indexView(filter){
  const f = (filter||'').trim().toLowerCase();
  let html = `<div class="hero"><div class="wrap">
    <h1>Game Art - Career Hierarchy</h1>
    <p>Every role across seven parallel tracks: scope, what it owns, what breaks when it’s missing, the pitfalls, and indicative comp. Open any role, then hit <b style="color:var(--good)">◆ in-depth breakdown</b> for the full manual-style detail - responsibilities and consequences, domain by domain.</p>
    <div class="legend">${TRACK_ORDER.map(t=>`<span class="chip"><span class="swatch" style="background:${TRACK_COLOR[t]}"></span>${esc(t)}</span>`).join('')}</div>
  </div></div><div class="wrap">`;
  const allExpanded = collapsedTracks.size === 0;
  html += `<div class="toolbar">
    <button class="btn-all" id="toggleAll" title="Collapse or expand every track at once">
      <span class="all-ico">${allExpanded?'▼':'▶'}</span>${allExpanded?'Collapse all tracks':'Expand all tracks'}</button>
    <span class="hint">All tracks start collapsed - open any to read its overview, roles &amp; profile.</span></div>`;
  let any=false;
  for(const track of TRACK_ORDER){
    let rs = ROLES.filter(r=>r.stream===track).sort((a,b)=>a.level-b.level);
    if(f) rs = rs.filter(r => (r.title+' '+r.scope).toLowerCase().includes(f));
    if(!rs.length) continue;
    any=true;
    const c = TRACK_COLOR[track];
    const openAttr = (f || !collapsedTracks.has(track)) ? ' open' : '';
    html += `<details class="track" data-track="${esc(track)}"${openAttr}>
      <summary class="track-head"><div class="th-row"><span class="chev">▸</span><span class="bar" style="background:${c}"></span>
      <h2>${esc(track)}</h2><span class="count">${rs.length} role${rs.length>1?'s':''}</span></div></summary>
      ${TRACK_DESC[track]?`<p class="track-desc" style="border-left-color:${c}">${TRACK_DESC[track]}</p>`:''}
      <div class="grid">`;
    for(const r of rs){
      const deep = DEEP[r.id];
      html += `<a class="card" style="border-left-color:${c}" href="#/role/${r.id}">
        <div class="lv">Level ${r.level}</div>
        <h3>${esc(r.title)} <span class="arrow">→</span></h3>
        <p class="scope">${esc(r.scope)}</p>
        <div class="meta">
          ${MASKED ? '' : `<span class="tag"><b>${esc(r.compUSD)}</b> USD</span><span class="tag">${esc(r.compINR)}</span>`}
          ${deep?'<span class="tag deep">◆ in-depth</span>':''}
          ${BRANCHES[r.id]?'<span class="tag branch">⋔ Branch out</span>':''}
        </div></a>`;
    }
    html += `</div></details>`;
  }
  if(!any) html += `<div class="empty">No roles match “${esc(filter)}”.</div>`;
  html += FOOTER + `</div>`;
  return html;
}

function detailView(r, showDeep){
  const c = TRACK_COLOR[r.stream];
  const deep = DEEP[r.id];
  const pill = deep
    ? `<a class="indepth-pill ${showDeep?'open':''}" href="#/role/${r.id}${showDeep?'':'/indepth'}">${showDeep?'▴ hide in-depth':'◆ in-depth breakdown'}</a>`
    : '';
  let html = `<div class="wrap detail">
    <a class="back" href="#/">← All roles</a>
    <div class="rhead">
      <span class="track-pill"><span class="swatch" style="background:${c}"></span>${esc(r.stream)} · Level ${r.level}</span>
      <h1>${esc(r.title)} ${pill}</h1>
      <p class="scope">${esc(r.scope)}</p>
      ${MASKED ? '' : `<div class="compbar">
        <div class="compcard"><div class="k">Comp - US AAA (base)</div><div class="v">${esc(r.compUSD)}</div></div>
        <div class="compcard"><div class="k">Comp - India AAA (base)</div><div class="v">${esc(r.compINR)}</div></div>
      </div>`}
    </div>

    ${BRANCHES[r.id]?`<div class="branchbox"><div class="bh"><span class="fork">⋔</span>Branch out</div><div class="branchrow">${BRANCHES[r.id].map(b=>{const tr=byId(b.id);const bc=TRACK_COLOR[tr.stream];return `<span class="branchchip" style="border-left-color:${bc}"><span class="bt">→ ${esc(tr.title)}</span><span class="bn">${esc(b.note)}</span></span>`;}).join('')}</div></div>`:''}

    ${(r.experience||(r.skills&&r.skills.length)||(r.trackRecord&&r.trackRecord.length))?`
    <div class="sec"><h2><span class="ic" style="background:#56c2c2"></span>Profile - Experience, Skills &amp; Track Record</h2>
      ${r.experience?`<div class="reqbox exp"><h4>Experience Required</h4><p>${esc(r.experience)}</p></div>`:''}
      <div class="reqcols">
        ${(r.skills&&r.skills.length)?`<div class="reqbox"><h4>Skills &amp; Level</h4>${ul(r.skills,'b-skill')}</div>`:''}
        ${(r.trackRecord&&r.trackRecord.length)?`<div class="reqbox"><h4>Proven Track Record</h4>${ul(r.trackRecord,'b-track')}</div>`:''}
      </div></div>`:''}

    <div class="sec"><h2><span class="ic" style="background:var(--accent)"></span>Core Responsibilities</h2>
      <div class="panelbox">${ul(bullets(r.responsibilities),'b-resp')}</div></div>

    <div class="sec"><h2><span class="ic" style="background:var(--bad)"></span>What Breaks If This Isn’t Done</h2>
      <div class="panelbox bad">${ul(bullets(r.concerns),'b-bad')}</div></div>

    <div class="sec"><h2><span class="ic" style="background:var(--warn)"></span>Common Pitfalls</h2>
      <div class="panelbox warn">${ul(bullets(r.pitfalls),'b-warn')}</div></div>

    <div class="sec"><h2><span class="ic" style="background:var(--promo)"></span>Promotion Criteria - What’s Required To Reach This Role</h2>
      <div class="panelbox promo">${ul(bullets(r.promo),'b-promo')}</div></div>`;

  if(deep){
    const src = deep.source ? ` Source: <i>${esc(deep.source)}</i>.` : '';
    html += `<section id="indepth" class="deepwrap"${showDeep?'':' hidden'}>`;
    html += `<div class="dd-banner"><h2>◆ In-Depth Breakdown - ${esc(r.title)}</h2>
      <p>The role’s responsibilities broken out domain by domain, with the specific consequences when each is handled poorly.${src}</p></div>`;
    for(const s of deep.sections){
      html += `<div class="dd-sec"><h3>${esc(s.title)}</h3><div class="dd-body">
        <div class="col"><h4>Responsibilities</h4>${ul(s.resp,'b-resp')}</div>
        <div class="col"><h4 class="bad">${esc(s.label)}</h4>${ul(s.issues,'b-bad')}</div>
      </div></div>`;
    }
    if(deep.topConsequences && deep.topConsequences.length)
      html += `<div class="dd-final"><h3>If This Role Has No Direction - The Compounding Cost</h3>${ul(deep.topConsequences,'b-bad')}</div>`;
    if(deep.bottomLine)
      html += `<div class="bottomline"><b>Bottom line:</b> ${esc(deep.bottomLine)}</div>`;
    html += `<a class="back" href="#/role/${r.id}" style="margin-top:24px">▴ Collapse in-depth</a>`;
    html += `</section>`;
  }
  html += FOOTER + `</div>`;
  return html;
}

});

function repCard(r){
  const c = TRACK_COLOR[r.stream] || '#5b9dff';
  return `<a class="rep2-card" style="border-left-color:${c}" href="#/role/${r.id}"><div class="l">Level ${r.level}</div><div class="t">${esc(r.title)}</div></a>`;
}
function reportingView(){
  const exclude = new Set([...REP_TOP, REP_APEX]);
  const apex = byId(REP_APEX);
  const topRoles = REP_TOP.map(byId).filter(Boolean);
  let cols='';
  for(const track of TRACK_ORDER){
    const rs = ROLES.filter(r=>r.stream===track && !exclude.has(r.id)).sort((a,b)=>b.level-a.level);
    if(!rs.length) continue;
    const c = TRACK_COLOR[track];
    cols += `<div class="rep2-col"><div class="rep2-head" style="background:${c}">${esc(track)}</div>${rs.map(repCard).join('')}</div>`;
  }
  return `<div class="wrap detail">
    <a class="back" href="#/">← All roles</a>
    <div class="rhead"><h1>Reporting Structure</h1>
      <p class="scope">How the parallel art career tracks coexist under a single studio leader. Multi-studio / company leadership (the VP+ and chief roles) sits in the band above; the VP of Art heads the studio art org; each track below runs as its own ladder, from its studio-level Director/Head down to entry level - so no VP reports to another VP.</p></div>
    <div class="rep-band"><span class="k">Company / multi-studio leadership</span>${topRoles.map(r=>`<a href="#/role/${r.id}">${esc(r.title)}</a>`).join('')}</div>
    <div class="rep2-apex"><a class="rep2-apexnode" href="#/role/${apex.id}">${esc(apex.title)}<span class="sub">Head of Studio Art</span></a><div class="rep2-stem"></div></div>
    <div class="rep2-cols">${cols}</div>
    <div class="rep-legend"><b>How to read it.</b> Each column is a parallel career track and the rows are its levels, most senior at the top; everything rolls up to the VP of Art. In practice the org is matrixed - <b>Art Directors and Discipline Directors set creative and craft direction</b> for artists who report to a Lead or Manager for growth. A reference model - adjust to how Liquidnitro organizes.</div>
    ${FOOTER}
  </div>`;
}
function alignmentView(){
  const LB={8:'Executive',7:'Senior Exec',6:'VP',5:'Director',4:'Lead / Principal',3:'Senior',2:'Established',1:'Entry'};
  const head=`<th class="tcell">Tier</th>`+TRACK_ORDER.map(t=>`<th style="background:${TRACK_COLOR[t]}">${esc(t)}</th>`).join('');
  let rows='';
  for(let tier=8;tier>=1;tier--){
    const cells=TRACK_ORDER.map(t=>{
      const rs=ROLES.filter(r=>r.stream===t && r.tier===tier).sort((a,b)=>b.level-a.level);
      return `<td>${rs.map(r=>`<a class="acell" style="border-left-color:${TRACK_COLOR[t]}" href="#/role/${r.id}">${esc(r.title)}</a>`).join('')}</td>`;
    }).join('');
    rows+=`<tr><th class="tlabel">T${tier}<small>${LB[tier]}</small></th>${cells}</tr>`;
  }
  return `<div class="wrap detail">
    <a class="back" href="#/">← All roles</a>
    <div class="rhead"><h1>Cross-Track Level Alignment</h1>
    <p class="scope">The per-track "Level N" numbers are ranks WITHIN a track - they do not line up across tracks. This grid places every role on one shared seniority scale so you can compare. Read across a row to see rough peers; e.g. Associate Art Director sits one tier above a first-line Lead Artist, and a Distinguished Artist aligns with the Director tier.</p></div>
    <div class="alignwrap"><table class="aligntable"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    ${FOOTER}
  </div>`;
}
function render(){
  const app = document.getElementById('app');
  const hash = location.hash || '#/';
  if(hash === '#/alignment'){
    app.innerHTML = alignmentView(); setCrumbs({title:'Level Alignment'});
    document.getElementById('search').value=''; window.scrollTo(0,0); return;
  }
  const m = hash.match(/^#\/role\/([^\/]+)(\/indepth)?$/);
  if(m){
    const r = byId(m[1]);
    if(r){ const showDeep = !!m[2];
      app.innerHTML = detailView(r, showDeep); setCrumbs(r);
      document.getElementById('search').value='';
      if(showDeep){ const el = document.getElementById('indepth');
        if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }
      else window.scrollTo(0,0);
      return; }
  }
  mountIndex(document.getElementById('search').value);
}
document.getElementById('search').addEventListener('input', e=>{
  if(location.hash && location.hash!=='#/'){ history.replaceState(null,'','#/'); }
  mountIndex(e.target.value);
});
window.addEventListener('hashchange', render);
render();
</script>
