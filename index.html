nd strand paid capacity idle.", "Unforecast risk converts predictable problems into surprises that hit leadership without warning.", "Scope creep overloads the team until quality, the date, or the people give way.", "Schedule theater destroys credibility, and once trust is gone every honest report is discounted.", "Policing artists instead of partnering with them cuts production out of the conversations where slips are still fixable."], "bottomLine": "The Art Producer owns the schedule and the web of dependencies for a feature or team, turning creative direction into a credible, trackable plan and surfacing risk while it's still cheap to address. Success is a feature that hits its dates because problems were seen early and tradeoffs were made on purpose; failure is silent slippage, broken dependencies, and a producer reduced to either a scope-cop everyone resents or a green-dashboard apologist nobody believes."}, "senior-art-production-coordinator": {"sections": [{"title": "1. Multi-Pod Tracking & Roll-Up", "label": "Issues if the Area View Doesn't Reconcile", "resp": ["Maintain accurate trackers and dashboards across every pod in your area so each asset has a clear owner, status, and date that reflects reality.", "Roll the pods' data up into one coherent area view the producer and leads can plan against without reconciling versions by hand.", "Standardize tagging by discipline, asset type, and milestone across pods so the roll-up is clean rather than a patchwork.", "Reconcile each pod's board against what artists actually report so the area view isn't built on stale or optimistic data.", "Keep the dashboards a working tool across teams by grooming stale tickets and archiving completed work consistently.", "Spot where one pod's status contradicts another's and resolve the gap before it reaches the producer as confusion."], "issues": ["If pods track differently, the area roll-up never reconciles and leadership sees conflicting versions of the truth.", "Mis-tagged work across pods corrupts the aggregate, so the producer's view of the whole area lies.", "A roll-up built on stale pod data gives confident answers that reality contradicts at the milestone.", "When the area view can't be trusted, producers go back to checking each pod by hand and the coordination layer loses its purpose."]}, {"title": "2. Cross-Pod Coordination Rhythm", "label": "Issues if Adjacent Teams Fall Out of Sync", "resp": ["Run the standups, syncs, and check-ins that keep adjacent pods aligned on what each is doing and what they owe each other.", "Capture cross-pod decisions and action items in writing so alignment doesn't rely on someone remembering a hallway exchange.", "Distribute concise cross-pod notes so every team knows what changed elsewhere without attending every meeting.", "Keep the coordination rhythm tight and purposeful so it earns the time it takes from multiple teams.", "Track cross-pod follow-ups to closure so the same misalignment doesn't resurface week after week."], "issues": ["Adjacent pods that fall out of sync duplicate work or step on each other's in-flight assets.", "Cross-pod decisions made verbally and never recorded get relitigated, wasting several teams' time.", "A coordination rhythm that drifts or bloats trains busy teams to skip it, and alignment decays.", "Unclosed cross-pod follow-ups let the same friction recur until teams stop expecting it to be fixed."]}, {"title": "3. Cross-Pod Dependency & Handoff Ownership", "label": "Issues if the Seams Between Pods Drop", "resp": ["Own the handoffs in the seams between pods so assets move cleanly from one team to the next and nothing sits unowned.", "Map which pods owe what to which, and when, so cross-team handoffs are scheduled rather than surprises.", "Confirm handed-off assets meet the agreed checklist before they cross pod boundaries, preventing bounce-backs between teams.", "Flag an upstream pod's slip early so downstream pods can resequence instead of sitting idle.", "Keep a shared cross-pod handoff view so no asset stalls in the gap between two teams that neither owns."], "issues": ["Assets stall in the seams between pods when no coordinator owns the cross-team handoff, invisible until a milestone exposes it.", "Incomplete cross-pod handoffs bounce between teams, doubling coordination cost and souring relations.", "Idle downstream pods waste capacity the project pays for while waiting on an unflagged upstream slip.", "Unmapped cross-pod dependencies create circular waits where two teams each think the other is moving."]}, {"title": "4. Blocker & Risk Surfacing at Area Scale", "label": "Issues if Area-Wide Problems Stay Hidden", "resp": ["Surface blockers and bottlenecks across pods the same day they appear rather than batching bad news area-wide.", "Distinguish a routine hiccup from a cross-pod risk that threatens the area's schedule and escalate the latter promptly.", "Bring problems with enough cross-pod context that the producer can act, not just a vague flag that something is wrong somewhere.", "Follow each escalation through to resolution and close the loop with the pods involved.", "Watch throughput trends across pods so you can warn that a bottleneck is forming in one team before it blocks the area."], "issues": ["A cross-pod blocker held quietly for days becomes an area-wide milestone miss that could have been a same-day fix.", "Escalating every cross-pod hiccup as a crisis trains the producer to ignore you; escalating nothing leaves the area blind.", "Without resolution follow-through, the same cross-pod blocker recurs and teams lose faith that raising it helps.", "Bottlenecks spotted only after they bite force expensive reactive resequencing across multiple pods at once."]}, {"title": "5. Mentoring Junior Coordinators", "label": "Issues if the Coordinator Bench Doesn't Develop", "resp": ["Onboard and coach junior coordinators on tracker hygiene, escalation judgment, and note discipline until they can own a pod alone.", "Set and model the standard for what a trustworthy tracker and a useful escalation look like.", "Review junior coordinators' boards and notes early on, giving specific feedback rather than silently fixing their work.", "Delegate pod ownership as juniors are ready so your time scales to the area rather than staying stuck on one pod.", "Build the bench so the area has coverage and the next coordinators are ready to step up."], "issues": ["Without a senior setting the standard, junior coordinators develop bad habits that corrupt the area's data.", "Silently fixing juniors' work instead of coaching them keeps you doing two jobs and grows no one.", "A coordinator who can't delegate stays stuck on one pod while the area scope goes uncovered.", "No bench means the area is fragile: one departure and the tracking layer collapses."]}, {"title": "6. Convention & Process Standardization", "label": "Issues if Each Pod Keeps Its Own System", "resp": ["Standardize tracking conventions, tagging, and reporting across pods so data rolls up consistently and travels between teams.", "Define what is standardized across the area versus what a pod can tailor to its own work.", "Propagate what works in one pod's tracking to the others so the area improves as a whole.", "Keep conventions documented and current so new coordinators inherit them instead of inventing their own.", "Balance consistency against pod autonomy so standards enable the roll-up rather than burdening the teams."], "issues": ["If each pod keeps its own system, the roll-up never reconciles and every report needs hand-stitching.", "Undocumented conventions die with the coordinator who held them in their head.", "Standards imposed without regard for how a pod works breed quiet noncompliance.", "Lessons that don't propagate mean each pod relearns the same tracking mistakes."]}, {"title": "7. Protecting Producer & Lead Time", "label": "Issues if Coordination Bleeds Upward", "resp": ["Absorb the cross-pod tracking, status, and reporting load so producers and leads stay on planning and mentorship.", "Answer routine where-is-this and what's-the-status questions across pods yourself instead of routing them up.", "Prepare clean area status summaries so the producer isn't reconstructing it from raw pod boards.", "Triage which cross-pod questions truly need a producer or lead and which you can resolve.", "Shield teams' focus by batching coordination touches across pods rather than interrupting throughout the day."], "issues": ["If cross-pod coordination bleeds upward, producers do tracking work instead of the planning only they can do.", "Constant status interruptions across pods fragment leads' focus and drain the area's real output.", "A senior coordinator who can't triage becomes an expensive relay rather than a filter.", "Producers forced to reconstruct area status by hand lose the time the coordination layer exists to give them."]}, {"title": "8. Staying Current on Production Tools & Workflows", "label": "Issues if the Toolset Stagnates", "resp": ["Keep current on evolving production tools, dashboards, and coordination workflows, including AI-assisted ones, as they mature.", "Evaluate new tooling against whether it actually improves tracking accuracy or throughput across pods, not novelty.", "Pilot a promising tool or workflow on a contained slice before rolling it across the area.", "Share what genuinely works with junior coordinators so the whole area's practice levels up.", "Retire tools and steps that no longer earn their overhead rather than carrying them out of habit."], "issues": ["A coordinator whose toolset stagnates slowly falls behind on accuracy and effort the rest of the area could save.", "Chasing every new tool churns conventions and confuses the pods that depend on stable tracking.", "Adopting a tool without piloting it risks corrupting live trackers mid-milestone.", "Improvements kept to oneself instead of shared with juniors leave the area's overall practice flat."]}], "topConsequences": ["The area loses a single coherent view of throughput because pods track inconsistently and the roll-up never reconciles.", "Cross-pod handoffs drop in the seams no single coordinator owns, stalling assets the project is paying to keep moving.", "Junior coordinators develop bad habits without a senior setting the standard, corrupting the area's data over time.", "Cross-pod dependency risks stay invisible until a milestone exposes them as an area-wide miss.", "Producers get pulled back into low-level tracking because the coordination layer isn't trusted to roll up.", "Escalating every cross-pod hiccup as a crisis trains the area to tune the coordinator out exactly when it matters."], "bottomLine": "The Senior Art Production Coordinator is the nervous system for a whole area, not one pod: keeping multiple trackers honest, the cross-team handoffs flowing, and the roll-up trustworthy, while growing the coordinators beneath them. Success looks like an area that always knows its real status, never loses an asset in the seams between pods, and has a bench of coordinators trained to the same bar; failure looks like irreconcilable roll-ups, dropped cross-pod handoffs, and producers dragged back into tracking work the coordination layer was supposed to own."}, "associate-director-of-production": {"sections": [{"title": "1. End-to-End Production Ownership of the Area", "label": "Issues if No One Owns Delivery Whole", "resp": ["Own the art production for your substantial area or smaller project end-to-end: schedule, dependencies, risk, and delivery as one whole.", "Integrate the producers' feature and team plans into a single area-level plan that holds together against real throughput.", "Sequence the area's work so foundational systems and shared assets land before the content that depends on them.", "Maintain an area-level burndown and re-baseline it honestly when scope, staffing, or schedule shifts.", "Reconcile the area's plan against the broader project so it isn't optimizing toward a stale target.", "Carry accountability for the area's delivery as a director would, not as a producer waiting for direction."], "issues": ["An area with no production director owning delivery whole slips silently between the producers' individual plans.", "Feature plans that don't integrate into an area plan leave the gaps between them unowned.", "A burndown nobody re-baselines turns the area's plan into comfortable fiction.", "An area planning against a stale project target finishes to the wrong date."]}, {"title": "2. Deliberate Scope, Quality & Schedule Tradeoffs", "label": "Issues if Tradeoffs Happen by Accident", "resp": ["Make scope, quality, and schedule tradeoffs for the area deliberately with the art director and project leadership.", "Frame each tradeoff as a choice with named costs so leadership can decide what gives rather than discovering it later.", "Protect a clear quality bar so cuts land against scope, not silently against craft.", "Run scenarios that show the area-wide impact of a slip or scope change before it's committed.", "Be the person who says the hard thing in the room so the area's tradeoffs are chosen, not stumbled into.", "Bring the biggest tradeoffs up early, while there is still room to choose, rather than deferring until the gate forces a panic."], "issues": ["Scope-versus-quality tradeoffs made by accident hollow out the area's work in ways nobody chose.", "Tradeoffs presented without named costs are decisions leadership can't actually make.", "When quality erodes silently instead of scope being cut openly, the area ships below its bar.", "Deferring every hard tradeoff upward until the gate removes the window when it could have been chosen well."]}, {"title": "3. Risk Register & Mitigation", "label": "Issues if Risk Goes Unowned", "resp": ["Maintain a live risk register for the area that names threats, likelihood, impact, and a concrete mitigation owner.", "Forecast where the area is most likely to break and drive mitigations before the break happens.", "Convert vague worries into tracked risks with triggers so the team acts on the early sign, not the impact.", "Bring the area's biggest risks to leadership with options attached, not just alarms.", "Retire risks that have passed and add new ones as the area evolves so the register stays live.", "Watch for risks that span the area's producers, where one event threatens several teams at once."], "issues": ["Unowned risk turns predictable area problems into gate surprises that hit with no time to react.", "Raising alarms without mitigations makes you a source of anxiety instead of solutions.", "A stale register gives false comfort while the real area threats sit untracked.", "Without triggers, the area reacts to impact rather than to the cheap early-warning sign."]}, {"title": "4. Developing Producers", "label": "Issues if the Producer Bench Stays Tactical", "resp": ["Develop the producers beneath you, growing their judgment and ownership until they can run their own scope with little oversight.", "Delegate real ownership rather than tasks, so producers learn to carry delivery, not just execute a plan.", "Coach producers through their hard tradeoffs instead of making the calls for them.", "Give specific, timely feedback on how producers handle risk, scope, and stakeholders.", "Build the bench so the area has depth and the next directors are growing under you.", "Set the standard for what good production looks like and hold producers to it."], "issues": ["Producers stay tactical when no one deliberately grows their judgment and ownership.", "Making producers' hard calls for them keeps them dependent and grows no successors.", "Without a developed bench, the area is fragile and the director becomes the bottleneck.", "Treating development as something that happens on its own leaves the producer layer flat."]}, {"title": "5. Outsource & Vendor Management for the Area", "label": "Issues if Outsourcing Isn't Managed", "resp": ["Own the area's outsource decisions: what to send out, to which vendors, and against what quality bar.", "Scope, brief, and run external partners to a fixed cost and quality bar, including ramp and QC loops.", "Build the documentation, style guides, and feedback loops vendors need to hit the bar without endless revision.", "Track outsource cost against the area's budget and forecast overruns before they balloon.", "Manage the review and integration pipeline so external assets don't pile up unmerged.", "Keep a vendor bench so the area isn't hostage to a single supplier."], "issues": ["Area outsource costs balloon when revisions aren't controlled and every batch needs rework.", "Vendors without clear specs and feedback loops deliver off-bar work that costs more to fix than to make.", "Unmanaged acceptance criteria let bad batches through, surfacing as a quality problem downstream.", "Dependence on a single vendor with no bench leaves the area exposed if that supplier slips."]}, {"title": "6. Team Health & Crunch Prevention", "label": "Issues if Dates Are Bought With the Team", "resp": ["Own team health and crunch prevention for the area, planning capacity so dates aren't bought on overtime.", "Model the area's capacity against real availability, ramp, and support load so the plan isn't built on heroics.", "Track team-health signals across the area and intervene structurally before overload becomes attrition.", "Resequence and rescope early so the team doesn't pay for planning failures with their weekends.", "Surface to leadership when hitting a date would require damaging the team, and force the real tradeoff.", "Plan decompression after intense phases so the area can sustain across the project."], "issues": ["An area whose dates are bought with crunch spikes attrition after the milestone, taking knowledge out the door.", "Plans secretly built on heroics look fine until the heroics run out.", "Ignored team-health signals compound into attrition that pulls capacity out when it's scarcest.", "No decompression turns one hard phase into chronic burnout across the area."]}, {"title": "7. Partnering With the Art Director", "label": "Issues if Production and Art Become Adversaries", "resp": ["Partner with the art director as the delivery ally who makes the vision producible, not the adversary who cuts it.", "Translate the art director's quality ambition into a plan, and plan constraints back into honest creative tradeoffs.", "Carry bad news upward early and with options so leadership is never blindsided.", "Hold the line on honesty in both directions, advocating the team to leadership and reality to the team.", "Align with project leadership so the area's plan, risks, and milestones integrate with the whole.", "Build the trust that lets the art director rely on you to run delivery so they can steer the vision."], "issues": ["Becoming the art director's adversary turns scope into a fight and replaces problem-solving with conflict.", "Hiding bad news until it's too late removes the one window when the problem was still fixable.", "Misalignment with project leadership leaves the area planning in its own bubble.", "If you carry only the schedule's voice, the art director stops trusting you and routes around production."]}, {"title": "8. Tooling, Workflow & Team Upskilling", "label": "Issues if the Team Falls Behind", "resp": ["Keep the area's production tools and workflows current, including AI-assisted ones, adopting durably what improves predictability or throughput.", "Evaluate new tooling against real gains in accuracy, throughput, or risk visibility rather than novelty, and pilot before rolling out.", "Own the continuous upskilling of the producers and coordinators beneath you so the team keeps pace with how production evolves.", "Create the time and structure for the team to learn, rather than expecting upskilling to happen in the gaps.", "Retire tools and steps that no longer earn their overhead rather than carrying them out of habit.", "Share what genuinely works across the area's producers so improvement compounds team-wide."], "issues": ["A team that falls behind on tools and workflows quietly loses predictability and effort it could have saved.", "Chasing every new tool churns the area's conventions and erodes the stability producers depend on.", "Upskilling left to chance means the team's skills stagnate while the craft of production moves on.", "Improvements kept to one producer instead of shared leave the area's overall capability flat."]}], "topConsequences": ["A substantial area or smaller project slips silently because no production director owns its delivery as one whole.", "Scope-versus-quality tradeoffs get made by accident rather than chosen deliberately with the art director.", "Producers stay tactical and the bench stays thin because no one is deliberately developing their judgment.", "Area outsourcing balloons in cost or arrives off-bar without a director managing it to a bar.", "The area's dates get bought with crunch because capacity was never modeled honestly, and attrition follows.", "Deferring every hard tradeoff upward removes the window when it could have been chosen well and lands as a gate miss."], "bottomLine": "The Associate Director of Production is the first production-director step: owning art delivery for a substantial area or a smaller project end-to-end, partnering with the art director on the real tradeoffs, and growing the producers who will run delivery next. Success is an area that hits its gates on a plan everyone trusted, with tradeoffs chosen on purpose, vendors held to a bar, a team intact at launch, and producers visibly leveling up; failure is silent area slippage, accidental quality erosion, a tactical bench that never grows, and dates quietly bought on the team's health."}, "director-of-art-production": {"sections": [{"title": "1. Whole-Project Production System", "label": "Issues if Delivery Isn't Owned as One System", "resp": ["Own the project's art production as one system: master schedule, budget, risk, quality gates, outsourcing, and team health together.", "Integrate every area, pod, and discipline into one coherent project plan that holds against real throughput.", "Phase the project's art plan against pre-production, production, and polish so effort matches how a game matures.", "Sequence foundational systems and shared assets before the content that depends on them.", "Maintain a project-wide burndown and re-baseline it honestly when scope, staffing, or schedule shifts.", "Reconcile the art plan against the broader project plan so art isn't optimizing toward a stale company target."], "issues": ["If delivery isn't owned as one system, schedule, budget, and quality drift apart and each fails on its own timetable.", "Area plans that don't integrate leave the gaps between them unowned across the project.", "A plan that ignores foundation-before-content forces expensive rework when shared systems land late.", "Art planning against a stale project target means the whole project finishes to the wrong date."]}, {"title": "2. Budget Ownership & Variance Reporting", "label": "Issues if Cost Drifts Untracked", "resp": ["Own the project art budget end-to-end, tracking internal labor and external spend against the plan.", "Forecast spend so leadership sees overruns coming with time to act, not after the money is gone.", "Tie cost to deliverables so the project knows what it's getting for its art dollars.", "Flag when scope growth implies budget growth and force that conversation early.", "Reconcile actuals against forecast regularly so the budget stays a live control, not a launch-day post-mortem.", "Explain variance in numbers leadership trusts, so the art budget is a managed line rather than a black box."], "issues": ["Cost that drifts untracked becomes an overrun discovered only when the budget is already blown.", "Scope growth not tied to budget means the project quietly commits to spending it never approved.", "Without deliverable-linked cost, leadership can't tell whether art spend is buying value or waste.", "A budget reconciled only at the end is a post-mortem, not a control, and the variance is unexplainable."]}, {"title": "3. Quality Gates & Review Cadence", "label": "Issues if Gates Are Inconsistent", "resp": ["Define and run the project's quality gates so assets are checked against the bar at the right points, not just at the end.", "Establish a predictable review cadence so feedback is timely and artists aren't blocked waiting on sign-off.", "Make gate criteria explicit and consistent so pass or fail doesn't depend on who happens to review.", "Catch quality problems early in the gate sequence, when fixing them is cheap, rather than late as rework.", "Track rework rates and gate failures to find systemic quality problems, not just individual misses.", "Balance gate rigor against throughput so quality control protects the bar without becoming a bottleneck."], "issues": ["Inconsistent gates let rework explode late, when fixes are most expensive and the schedule has least slack.", "Reviews without a predictable cadence block artists waiting on sign-off and stall the whole flow.", "Gate criteria that depend on the reviewer produce arbitrary pass/fail and erode trust in the process.", "Gates too heavy become a bottleneck; too light and off-bar work floods downstream undetected."]}, {"title": "4. Project-Level Tradeoffs With the Art Director", "label": "Issues if Tradeoffs Happen by Accident", "resp": ["Make the project's scope, quality, and schedule tradeoffs deliberately as the art director's peer partner.", "Frame every tradeoff as a choice with named costs so leadership can decide what gives.", "Protect a clear quality bar so cuts land against scope, not silently against craft.", "Run scenarios that show the project-wide impact of a slip or scope change before it's committed.", "Be the person who says the hard thing in the room so the project's tradeoffs are chosen, not stumbled into.", "Carry the biggest tradeoffs up early, while there's still room to choose well."], "issues": ["Tradeoffs made by accident hollow out the game in ways nobody chose.", "Tradeoffs presented without named costs are decisions leadership can't actually make.", "When quality erodes silently instead of scope being cut openly, the project ships below its bar.", "Deferring the hard tradeoffs until the gate removes the window when they could have been chosen well."]}, {"title": "5. Outsource & Vendor Strategy", "label": "Issues if Outsourcing Isn't Managed", "resp": ["Own the project's outsource strategy: what to build versus send out, to which vendors, and against what bar.", "Negotiate and manage vendor SLAs, deliverable schedules, and acceptance criteria so external work arrives usable.", "Build the documentation, style guides, and feedback loops vendors need to hit the bar without endless revision.", "Hold vendors to cost, quality, security, and IP standards, and track performance against them.", "Manage the review and integration pipeline so external assets don't pile up unmerged.", "Keep a vendor bench so the project isn't hostage to a single supplier."], "issues": ["Outsource costs balloon when revisions aren't controlled and every batch comes back needing rework.", "Vendors without clear specs and feedback loops deliver off-bar work that costs more to fix than to make.", "Using outsourcing as a pure cost-control reflex hollows out the project's quality bar.", "Dependence on a single vendor with no bench leaves the project exposed if that supplier slips or folds."]}, {"title": "6. Team Health & Crunch Prevention", "label": "Issues if the Team Burns Out", "resp": ["Treat crunch prevention as a deliverable, planning project capacity so dates don't default to overtime.", "Track team-health metrics across the project and act on sustained overtime, leave, and morale signals.", "Resequence and rescope early so the team doesn't pay for planning failures with their weekends.", "Protect realistic capacity assumptions so the plan isn't secretly built on heroics.", "Surface to leadership when hitting a date would damage the team, and force the real tradeoff.", "Plan recovery and decompression after intense phases so the team sustains across a long project."], "issues": ["A project that burns out the team spikes attrition right after launch, taking institutional knowledge out the door.", "Optimizing for delivery at all costs while ignoring team damage borrows against the studio's future.", "Plans secretly built on heroics look fine until the heroics run out.", "No decompression after crunch turns one hard phase into chronic burnout across the project."]}, {"title": "7. Peer Partnership With the Art Director", "label": "Issues if You Drift Into Shadow-AD Territory", "resp": ["Operate as a true peer to the art director on the clear split: the AD owns vision and craft, you own delivery.", "Free the AD from operational load so vision work gets the focus it needs.", "Translate the AD's quality ambition into a plan, gates, and budget that can actually produce it.", "Bring execution reality back to the AD as honest tradeoffs, never as unilateral creative decisions.", "Carry bad news upward early and with options so leadership and the AD are never blindsided.", "Build the trust that lets the AD rely on you to run the machine while they steer the vision."], "issues": ["Drifting into shadow-AD territory creates a turf war and confuses the team about who owns vision.", "If the AD stays buried in ops, vision work suffers and the project loses creative leadership.", "Running green dashboards and hiding bad news removes the window when the problem was still fixable.", "Without trust between AD and director, the two leadership roles work against each other instead of in tandem."]}, {"title": "8. Tooling, Workflow & Team Upskilling", "label": "Issues if the Project Falls Behind", "resp": ["Keep the project's production tools and workflows current, including AI-assisted ones, adopting durably what improves predictability, throughput, or cost.", "Evaluate new tooling against real gains rather than novelty, and pilot on a contained slice before rolling it project-wide.", "Own the project team's continuous upskilling so its producers and coordinators grow and keep pace with how production evolves.", "Create the time and structure for the team to learn rather than expecting upskilling to happen in the gaps.", "Retire tools and steps that no longer earn their overhead rather than carrying them by inertia.", "Propagate what genuinely works across the project so improvement compounds rather than staying siloed."], "issues": ["A project that falls behind on tools and workflows loses predictability and cost savings the team could have captured.", "Chasing every new tool mid-project churns conventions and destabilizes the team that depends on them.", "Upskilling left to chance lets the team's skills stagnate while the craft of production moves on.", "Improvements kept siloed instead of propagated leave the project's overall capability flat."]}], "topConsequences": ["The whole project's art production fragments because no one owns schedule, budget, risk, and quality as one system.", "Project-level tradeoffs get made by accident and the game ships below its own bar without anyone choosing it.", "The art budget drifts untracked into an overrun discovered only when the money is already gone.", "Inconsistent quality gates let rework explode late, blowing the schedule when it has the least slack.", "The project burns out its team and attrition spikes after launch, draining institutional knowledge.", "Drifting into shadow-AD territory turns the peer partnership into a turf war that fractures art leadership."], "bottomLine": "The Director of Art Production owns a whole project's art production as one system - schedule, budget, risk, quality gates, outsourcing, and team health - standing as the art director's peer so the AD owns vision while the director owns delivery. Success is a project that hits its gates on a budget leadership trusted, with quality caught early, vendors held to a bar, tradeoffs chosen on purpose, and a team intact at launch; failure is fragmented delivery, an unexplained overrun, late rework, a burned-out team, and a director who slid into a turf war with the AD instead of partnering with them."}, "senior-director-of-art-production": {"sections": [{"title": "1. Multi-Project Delivery Ownership", "label": "Issues if There's No Coherent Delivery Model", "resp": ["Own how art is delivered across multiple projects or studio-wide, setting the operating model the projects plug into.", "Define which delivery practices are standardized across projects versus tailored to each project's needs.", "Maintain a coherent, comparable view of delivery across all projects rather than a patchwork of project-local systems.", "Set the metrics and operating rhythm by which art delivery is steered across the projects you own.", "Drive the long arc of how the studio's art-delivery capability grows across projects and titles.", "Carry accountability for delivery across the projects as the top of the production ladder, reporting to the VP."], "issues": ["Without a coherent delivery model, each project optimizes locally and there's no comparable view of art delivery.", "Unclear standardized-versus-tailored boundaries duplicate effort in some projects and leave gaps in others.", "No common operating rhythm means delivery problems surface as surprises rather than tracked signals.", "Delivery owned project-by-project with no top-level view lets cross-project problems fall between the cracks."]}, {"title": "2. Cross-Project Capacity & Resource Balancing", "label": "Issues if Resource Conflicts Go Unresolved", "resp": ["Maintain a multi-project view of art capacity and demand across all the projects you own.", "Balance people, priorities, and ramps across projects against strategic value, not the loudest voice.", "Resolve cross-project resource conflicts deliberately so the weakest or quietest project doesn't lose by default.", "Forecast aggregate capacity so the studio doesn't over-commit across projects in parallel.", "Plan the ramp and wind-down of projects so artists flow between them rather than being stranded.", "Balance short-term project needs against long-term capability when allocating people."], "issues": ["Unresolved resource conflicts mean the weakest or quietest project loses by default, regardless of strategic value.", "No aggregate capacity view lets the studio over-commit across parallel projects and fail several at once.", "Poorly planned ramp and wind-down strand artists between projects, wasting capacity in the gaps.", "Reactive shifting that ignores priority sends people to whoever shouts loudest, not where they matter most."]}, {"title": "3. Multi-Project Risk Visibility", "label": "Issues if There's No Cross-Project Risk View", "resp": ["Maintain a multi-project view of art delivery risk, not just per-project registers.", "Identify correlated risks where one event, a vendor failure or a tool migration, threatens several projects at once.", "Forecast where projects will collide for the same scarce capacity and resolve it before the collision.", "Surface multi-project art risk to the VP and art leadership with mitigation options, not after the slip.", "Track leading indicators across projects so leadership sees trouble forming before it's a crisis.", "Distinguish a single project's local risk from a systemic threat that needs cross-project intervention."], "issues": ["No cross-project risk view lets correlated failures hit several projects simultaneously with no warning.", "Capacity collisions discovered late force a scramble that damages all sides.", "Risk surfaced only per-project hides the multi-project threats that are the studio's real exposure.", "Without leading indicators, leadership reacts to crises instead of preventing them."]}, {"title": "4. Studio-Wide Standards Stewardship", "label": "Issues if Every Project Reinvents Process", "resp": ["Set studio-wide standards for quality gates, milestones, and reporting that projects inherit instead of reinventing.", "Define what is standardized across projects versus what each project tailors to its own needs.", "Capture and propagate what works from one project so the next doesn't relearn it from scratch.", "Maintain a baseline of production practice new projects start from rather than building scaffolding from zero.", "Balance consistency against project autonomy so standards enable rather than constrain.", "Drive continuous improvement of studio practice based on patterns seen across projects."], "issues": ["When every project reinvents process inconsistently, the studio pays the learning cost over and over.", "Without shared standards, talent and data can't move between projects without friction and retraining.", "Lessons that don't propagate mean each project repeats the last one's avoidable mistakes.", "No inherited baseline forces every new project to spend its first months building production scaffolding."]}, {"title": "5. Multi-Project Budget & Vendor Strategy", "label": "Issues if Cost and Vendors Are Fragmented", "resp": ["Own the multi-project art budget, tracking aggregate internal labor and external spend against plan in finance-grade terms.", "Set a vendor strategy across projects so combined volume earns real pricing power.", "Maintain a vetted vendor bench by capability so projects can scale external capacity quickly and safely.", "Standardize vendor onboarding, specs, security, and quality bars so external work is consistent across projects.", "Track vendor performance across projects so strong partners get more work and weak ones are managed out.", "Forecast aggregate spend so the studio sees overruns coming with time to act."], "issues": ["Fragmented vendor strategy erodes pricing power as each project negotiates alone against the same suppliers.", "No vetted bench leaves projects scrambling for unknown vendors under deadline pressure.", "Inconsistent specs and bars across projects produce uneven external quality and repeated onboarding cost.", "A multi-project budget reconciled only late becomes an unexplained aggregate overrun."]}, {"title": "6. Crunch Prevention Across Projects", "label": "Issues if Crunch Becomes Cultural", "resp": ["Own crunch-prevention and sustainability standards across the projects you run, not just on one.", "Track sustainability metrics across all projects and intervene where overload is becoming chronic.", "Sequence projects' demanding phases so the studio isn't crunching everything at once.", "Plan decompression and rotation so artists recover between intense phases across their project arc.", "Hold project directors accountable for team health, making it a standard rather than an option.", "Protect long-term capability against short-term delivery pressure on any single project."], "issues": ["If crunch becomes cultural, attrition spikes across projects and takes institutional knowledge with it.", "Overlapping demanding phases crunch the whole studio at once with no relief valve.", "No rotation or decompression turns a series of hard phases into chronic, compounding burnout.", "Team health left optional per-project means the worst-managed project sets the studio's reputation."]}, {"title": "7. Building the Production Leadership Bench", "label": "Issues if the Bench Stays Thin", "resp": ["Build and develop the director and associate-director bench beneath you across projects.", "Grow directors' judgment and ownership so they can run a whole project's delivery without close oversight.", "Delegate real project ownership rather than tasks, so directors learn to carry delivery whole.", "Coach directors through their hardest cross-project and stakeholder calls instead of making them yourself.", "Set the standard for what production leadership looks like and hold the bench to it.", "Build depth so the production org isn't dependent on any single person, including you."], "issues": ["A thin bench leaves the studio's delivery dependent on a few people and fragile to any departure.", "Making directors' hard calls for them keeps them dependent and grows no successors.", "Without delegation, the senior director becomes the bottleneck for every project at once.", "Failing to build successors keeps the production org dependent on the senior director personally."]}, {"title": "8. Tooling, Workflow & Org-Wide Upskilling", "label": "Issues if the Production Org Falls Behind", "resp": ["Keep production tools and workflows current across projects, including AI-assisted ones, adopting durably what improves predictability, throughput, or cost.", "Evaluate new tooling by its leverage across projects rather than one project's pain, and pilot before rolling it studio-wide.", "Own continuous upskilling across the production org so directors, producers, and coordinators keep pace with how production evolves.", "Create the structure and expectation for ongoing learning rather than leaving it to chance.", "Retire tools and standards that no longer earn their overhead rather than carrying them by inertia.", "Propagate what genuinely works across projects so capability compounds studio-wide."], "issues": ["A production org that falls behind on tools and workflows loses predictability and cost savings across every project.", "Adopting tooling for one project's pain over cross-project leverage spends scarce effort on the wrong fix.", "Upskilling left to chance lets the org's skills stagnate while the craft of production moves on.", "Improvements kept to one project instead of propagated leave the whole production org's capability flat."]}], "topConsequences": ["Projects reinvent production process inconsistently and the studio pays the same learning cost over and over.", "Unresolved cross-project resource conflicts let the weakest project lose by default regardless of strategic value.", "No multi-project risk view lets correlated failures hit several projects at once with no warning to the VP.", "A fragmented vendor and budget strategy erodes pricing power and surfaces as an unexplained aggregate overrun.", "A thin production leadership bench leaves the studio's delivery fragile and dependent on a few people.", "Cultural crunch spreads across projects, spiking studio-wide attrition and hollowing out long-term capability."], "bottomLine": "The Senior Director of Art Production tops the production ladder, owning art delivery across multiple projects or studio-wide, setting the standards projects inherit, balancing capacity and risk across them, and building the director bench beneath, all reporting to the org-wide VP. Success is a studio where projects share a strong delivery backbone, capacity flows to where it matters most, multi-project risk is seen before it bites, vendors are wielded at scale, and a deep leadership bench ships under the senior director; failure is reinvented process, unresolved resource fights, blind correlated risk, a thin bench, and a crunch culture that bleeds talent across every project at once."}, "technical-artist": {"sections": [{"title": "1. Shader & Material Authoring", "label": "Issues if Shader Work Is Sloppy", "resp": ["Build and debug material graphs (Unreal Material Editor, Unity Shader Graph, or HLSL) to deliver the looks artists request without hand-holding from rendering engineers.", "Author reusable master materials and material instances so artists tune parameters instead of forking new shaders for every asset.", "Profile shader complexity in-editor (shader instruction counts, texture sampler counts, overdraw views) and flag materials that exceed the team's budget.", "Translate art direction references into technical shading approaches (e.g., layered weathering, parallax, subsurface) that hit on the target platform.", "Fix broken or platform-divergent materials reported by artists, including mobile/console feature-level fallbacks.", "Document shader parameters and intended usage so artists understand what each input controls."], "issues": ["Artists fork bespoke one-off shaders, fragmenting the material library and ballooning shader permutation counts.", "Unbudgeted instruction counts and sampler bloat tank GPU frame time on the lowest target hardware.", "Materials look correct on the TA's machine but break on console feature levels, surfacing only in cert builds.", "Undocumented parameters force artists to guess, producing inconsistent surfaces across the level."]}, {"title": "2. Rigging & Skinning Support", "label": "Issues if Rigs Are Fragile", "resp": ["Build and maintain character, prop, and facial rigs that animators can pose without fighting the controls.", "Diagnose and repair skinning artifacts (candy-wrapping, volume loss, collapsing joints) reported during animation.", "Set up skeleton hierarchies and naming that match the engine's retargeting and animation systems.", "Implement helper joints, corrective shapes, or driven keys to preserve deformation quality at extreme poses.", "Support the export path so rigs round-trip cleanly from the DCC (Maya/Blender) into the engine."], "issues": ["Animators lose hours fighting unstable controls or re-skinning meshes the TA should have fixed.", "Skinning artifacts ship into cinematics because deformation was never tested at extreme poses.", "Mismatched skeletons break engine retargeting, forcing per-character animation rework.", "Broken export paths corrupt rigs on round-trip, eroding animator trust in the pipeline."]}, {"title": "3. Tools & Automation", "label": "Issues if Tooling Is Ad-Hoc", "resp": ["Write small Python/MaxScript/Blueprint tools that remove repetitive manual steps from artists' daily work (batch renamers, exporters, importers, LOD setup).", "Talk to the artists who will use a tool before building it, so it solves the real bottleneck rather than an imagined one.", "Add basic error handling and clear messages so tools fail gracefully instead of leaving artists with corrupted files.", "Maintain and patch existing team tools as DCC versions and engine APIs change.", "Share tools through the team's standard distribution path rather than passing scripts around informally."], "issues": ["The TA becomes a request-queue worker, churning tickets and never doing higher-leverage work.", "Tools built without talking to users go unused, wasting the time invested in them.", "Brittle scripts with no error handling silently corrupt scene files and erode trust.", "Informally shared scripts drift across machines, so 'it works for me' becomes a recurring support drain."]}, {"title": "4. Performance & Optimization Support", "label": "Issues if Performance Is Ignored Until Late", "resp": ["Run basic in-engine profiling (stat unit, GPU/CPU timing, draw-call counts) to locate art-driven performance regressions.", "Check texel density, texture sizes, and LOD chains on assets before they reach a milestone build.", "Help artists hit per-scene budgets for triangles, draw calls, and material count without sacrificing the intended look.", "Flag overdraw, transparency stacking, and unbudgeted dynamic lights to the artists responsible.", "Set up and verify LODs (or Nanite settings where applicable) so distant assets cost what they should."], "issues": ["Performance problems surface late at milestone, forcing rushed art cuts instead of measured optimization.", "Inconsistent texel density and oversized textures blow the memory budget on the target platform.", "Missing or wrong LODs leave distant geometry rendering at full cost, dragging frame rate down.", "Overdraw from stacked transparency tanks fill rate in exactly the scenes meant to look best."]}, {"title": "5. Art\u2013Engineering Bridging", "label": "Issues if the Bridge Breaks Down", "resp": ["Translate artist problems into precise, reproducible bug reports that engineers can act on.", "Explain engine constraints back to artists in art terms so they design within what is achievable.", "Sit between disciplines on small integration issues so neither side stalls waiting on the other.", "Stay current on the team's engine features and pipeline conventions to give artists accurate answers.", "Escalate the right issues to senior TAs or engineers instead of silently absorbing them."], "issues": ["Vague bug reports bounce back and forth, doubling the time to resolve pipeline issues.", "Artists design against engine limits no one explained, then have to redo the work.", "The TA drifts fully into engineering and loses the art context that made them useful.", "Issues that needed escalation get quietly absorbed until they become production blockers."]}, {"title": "6. Standards & Self-Documentation", "label": "Issues if Knowledge Stays in One Head", "resp": ["Follow the team's naming, folder, and asset conventions and gently correct artists who drift from them.", "Write quick how-to notes for the tools and shaders they build so usage isn't tribal knowledge.", "Keep personal scripts and fixes in version control rather than on a local drive.", "Capture recurring pipeline gotchas so the same question isn't answered ten times."], "issues": ["Undocumented tools and fixes create a bus-factor of one around the TA.", "Convention drift accumulates until validators and downstream tools start failing.", "Local-only scripts are lost when a machine is reimaged or the TA is out.", "The same recurring questions consume the TA's time that should go to real work."]}], "topConsequences": ["Artists repeatedly hit pipeline walls they can't clear, so production velocity drops across the whole team.", "Performance debt accumulates invisibly and detonates at milestones, forcing reactive art cuts.", "Manual, undocumented processes fail to scale as the team grows, multiplying support load.", "The TA becomes a pure ticket-queue worker, so no foundational tooling or standard ever gets built.", "Bus-factor-of-one tools and tribal fixes leave the team exposed when the TA is unavailable."], "bottomLine": "The Technical Artist is the team's first line of defense between art ambition and engine reality, building the shaders, rigs, and small tools that keep artists moving. Success looks like artists who rarely get stuck and a pipeline that quietly works; failure looks like a perpetual ticket queue, late-surfacing performance, and fixes that live only in one person's head."}, "senior-tech-artist": {"sections": [{"title": "1. Domain Ownership & Standards", "label": "Issues if the Domain Has No Owner", "resp": ["Own one technical domain end to end (shaders, rigging, tools, or performance) and set the standards everyone in it follows.", "Define the patterns, naming, and architecture for the domain so work is consistent across pods rather than ad-hoc.", "Make and document the load-bearing technical decisions in the domain (e.g., the master-material hierarchy, the rig template, the export contract).", "Review domain work from other TAs and artists against the standard and give actionable feedback.", "Anticipate where the domain will be stressed at AAA scale and shape decisions to hold up there."], "issues": ["Domain decisions get made ad-hoc by whoever touches the system last, so consistency erodes.", "Tools and assets fragment into incompatible variants that all need separate maintenance.", "Juniors have no reference model and reinvent solutions that conflict with each other.", "Standards exist only in the senior's head, so they break the moment the senior is unavailable."]}, {"title": "2. Domain-Level Tools & Systems", "label": "Issues if Systems Are Over- or Under-Built", "resp": ["Build and maintain the durable tools and systems that define the domain, not just one-off scripts.", "Design tools to be adopted across multiple pods, with stable APIs and predictable behavior.", "Version, test, and support domain tools so teams can rely on them through a production cycle.", "Refactor accumulated one-off fixes into a coherent system before they become unmaintainable.", "Balance feature scope against real production need rather than building for hypotheticals."], "issues": ["Over-engineered systems solve problems that don't exist yet while real bottlenecks go untouched.", "Under-built tools force every pod to hand-roll the missing pieces, fragmenting the domain.", "Unversioned, untested systems break mid-production when a DCC or engine update lands.", "Accumulated one-off fixes calcify into a system nobody else can safely modify."]}, {"title": "3. Shaders & Materials Depth (Domain Example)", "label": "Issues if Shading Standards Slip", "resp": ["Establish the master-material architecture and the rules for when to instance versus author new.", "Set shader complexity budgets per platform and build the in-editor tooling that surfaces violations.", "Own advanced shading techniques in the domain (layered materials, virtual texturing, custom lighting models) and prove them out before adoption.", "Define the material validation that runs before assets are accepted into the build."], "issues": ["Without an enforced architecture, shader permutations explode and compile times balloon.", "Unbudgeted complexity ships to the lowest target and is only caught in performance passes.", "Advanced techniques get adopted unproven and destabilize the lighting across a project.", "Missing material validation lets broken or over-budget materials into milestone builds."]}, {"title": "4. Rigging & Deformation Depth (Domain Example)", "label": "Issues if Deformation Standards Slip", "resp": ["Define the rig template and skeleton conventions that all characters in the project conform to.", "Own the deformation-quality bar (corrective systems, helper joints, secondary motion) and the tests that verify it.", "Build modular auto-rigging tooling so rigs are produced consistently rather than artisanally.", "Maintain the export contract so rigs and skin weights round-trip cleanly into the engine and animation systems."], "issues": ["Inconsistent skeletons break retargeting and force per-character animation rework.", "An unenforced deformation bar lets artifacts ship into cinematics and hero shots.", "Hand-built rigs vary in quality and structure, so animators relearn every character.", "A broken export contract corrupts weights on round-trip and stalls the animation team."]}, {"title": "5. Engineering Partnership & Integration", "label": "Issues if Art and Engineering Talk Past Each Other", "resp": ["Partner directly with engine and gameplay engineers on integrating the domain into the build.", "Translate domain needs into engineering requirements and engineering constraints back into domain decisions.", "Co-own the seams where the domain meets engine code (export formats, runtime systems, data contracts).", "Represent the domain credibly in technical design discussions so art needs are not designed around.", "Drive resolution on cross-discipline issues instead of letting them stall between teams."], "issues": ["Engineering and art talk past each other on the domain, so integration work churns and slips.", "Domain needs get deprioritized because no one translated them into engineering terms.", "Data contracts at the seams drift, causing silent breakage between DCC and runtime.", "Cross-discipline issues sit unowned until they become milestone blockers."]}, {"title": "6. Mentorship & Knowledge Transfer", "label": "Issues if Knowledge Stays Siloed", "resp": ["Mentor junior and mid-level tech artists, giving them a model for how the domain should work.", "Document the domain's architecture, conventions, and gotchas so it survives any one person.", "Pair on hard problems to transfer technique rather than just handing back a fix.", "Grow domain coverage so the team isn't dependent on a single expert."], "issues": ["The senior becomes a domain silo nobody else can replace, creating a critical bus-factor.", "Refusal to document leaves the domain undocumented and fragile when the senior leaves.", "Juniors stall without a model and produce inconsistent work that needs rework.", "Knowledge concentrates instead of spreading, so the domain can't scale with the team."]}, {"title": "7. Performance Stewardship in the Domain", "label": "Issues if Domain Performance Is Unmanaged", "resp": ["Set and publish the performance budgets that apply to the domain across pods.", "Build profiling and reporting tooling that surfaces domain-specific cost (shader time, rig eval cost, tool runtime).", "Drive optimization passes in the domain proactively rather than waiting for milestone fire drills.", "Define the platform fallbacks the domain needs so it scales from the lowest to the highest target."], "issues": ["Without published budgets, every pod sets its own ceiling and the domain regresses unevenly.", "Lack of domain profiling means cost accumulates invisibly until it shows up in frame time.", "Reactive optimization at milestones forces compromises that proactive work would have avoided.", "Missing platform fallbacks break the domain on lower-spec targets at cert time."]}], "topConsequences": ["Without an owner, the domain fragments into incompatible variants that each cost separate maintenance.", "Juniors lacking a model produce inconsistent work, compounding rework across pods.", "Art and engineering keep talking past each other in the domain, so integration churns and slips.", "Undocumented expertise concentrates in one person, leaving a critical bus-factor at the domain level.", "Unmanaged domain performance regresses unevenly and surfaces as late milestone fire drills."], "bottomLine": "The Senior Tech Artist owns a technical domain outright, turning ad-hoc fixes into durable standards, systems, and engineering partnerships that hold up across pods. Success is a domain that is consistent, well-documented, and adopted everywhere; failure is a brittle silo that depends entirely on one expert and fragments the moment they step away."}, "lead-tech-artist": {"sections": [{"title": "1. Pod Leadership & Direction", "label": "Issues if the Pod Lacks Direction", "resp": ["Lead a tech art pod day to day, setting clear ownership so each TA knows what they're responsible for.", "Translate production goals into a concrete pod plan that balances support work against foundational work.", "Run the pod's cadences (standups, reviews, planning) so work stays visible and unblocked.", "Set technical direction for the pod's shared tools and systems within the studio's standards.", "Shield the pod from churn and context-switching so deep work can actually happen."], "issues": ["Without clear ownership, work falls through the cracks or is duplicated across the pod.", "Production goals never translate into a plan, so the pod drifts reactively.", "Constant context-switching destroys the focus needed for foundational tooling.", "The pod feels overworked and underprioritized, and morale slides."]}, {"title": "2. Prioritization & Intake", "label": "Issues if Everything Is 'Urgent'", "resp": ["Own the pod's intake queue and triage requests against real production impact, not volume or volume of complaints.", "Say no, or not now, to requests that don't fit the plan, and explain the tradeoff to requesters.", "Carve out protected time for long-horizon work so the pod isn't purely reactive.", "Negotiate scope and timing with production and discipline leads when requests collide.", "Make the queue and its priorities visible so stakeholders see the tradeoffs being made."], "issues": ["Saying yes to everything means nothing gets done well and the queue never shrinks.", "Everything is flagged 'urgent' because there's no triage, so real fires get buried.", "Purely reactive operation means foundational work never starts and debt compounds.", "Invisible prioritization breeds resentment when requesters don't see why they're waiting."]}, {"title": "3. Cross-Discipline Coordination", "label": "Issues if the Pod Operates in Isolation", "resp": ["Coordinate the pod's work with art, animation, design, and engineering leads so tooling lands when it's needed.", "Represent tech art in production planning so TA dependencies are scheduled, not assumed.", "Broker decisions where the pod's work intersects other disciplines' pipelines.", "Surface cross-team risks (a tool a milestone depends on, an integration that's slipping) early.", "Keep the pod's roadmap aligned with where the project's art and tech are actually heading."], "issues": ["Production blocks waiting on tools because TA dependencies were never scheduled.", "The pod builds the wrong thing because it wasn't aligned with where the project is going.", "Cross-team risks surface too late to mitigate, becoming milestone slips.", "Other disciplines route around the pod, fragmenting the pipeline."]}, {"title": "4. Mentorship & Growth", "label": "Issues if People Don't Grow", "resp": ["Coach each TA on the pod, setting growth goals and giving regular, specific feedback.", "Match people to work that stretches them while still serving production needs.", "Build a review culture where TAs learn from each other's tools and shaders.", "Identify and develop the pod's next senior and lead candidates.", "Keep TAs anchored in art context so they don't drift into being general engineers."], "issues": ["TAs stagnate without growth goals and the strongest people leave for development elsewhere.", "Pod members drift into pure engineering and lose the art fluency that defines tech art.", "No bench of future seniors or leads forms, capping the pod's ceiling.", "Without a review culture, quality varies widely and lessons aren't shared."]}, {"title": "5. Tooling Roadmap & Technical Health", "label": "Issues if Technical Debt Is Ignored", "resp": ["Maintain a roadmap for the pod's shared tools and systems, not just a ticket backlog.", "Budget time for maintenance, refactoring, and migration to keep the pod's tools healthy.", "Track recurring support load and invest to eliminate its root causes.", "Ensure the pod's tools follow studio-wide standards so they integrate with the broader pipeline.", "Decide when to retire or consolidate tools that have outlived their usefulness."], "issues": ["Without a roadmap the pod ships disconnected one-offs that never cohere into a platform.", "Ignored maintenance debt eventually breaks tools mid-production at the worst time.", "Recurring support load is treated as normal instead of being engineered away.", "Tool sprawl accumulates until nobody knows which tool is canonical."]}, {"title": "6. Performance & Production Readiness", "label": "Issues if Readiness Is an Afterthought", "resp": ["Make sure the pod bakes performance budgets and validation into the pipelines it owns.", "Drive proactive performance passes on the project's art systems rather than milestone fire drills.", "Coordinate platform-readiness work (LODs, scalability settings, memory budgets) with the relevant disciplines.", "Keep the team's profiling and reporting tooling current so regressions are caught early.", "Escalate systemic performance risks to studio tech art leadership with data."], "issues": ["Performance is treated as an afterthought, so milestones turn into reactive cut sessions.", "Without validation in the pipeline, regressions slip in unnoticed until they're expensive.", "Platform readiness lags and surfaces as cert blockers near ship.", "Systemic risks aren't escalated with data, so leadership can't act on them."]}], "topConsequences": ["An unprioritized pod drowns in 'urgent' requests, so foundational work never starts and debt compounds.", "Production repeatedly blocks waiting on tools because TA dependencies were never scheduled or coordinated.", "Stagnant, ungrown TAs leave or drift into pure engineering, hollowing out the pod's capability.", "Tool sprawl and ignored maintenance debt eventually break the pipeline mid-production.", "Performance and platform readiness treated as afterthoughts turn every milestone into a fire drill."], "bottomLine": "The Lead Tech Artist runs a pod, turning a flood of requests into a prioritized plan while growing people and protecting time for the foundational work that actually moves production. Success is a pod that ships the right tools on time with people who are leveling up; failure is a perpetually reactive team buried in 'urgent' tickets, losing its best talent and its art fluency."}, "principal-tech-artist-tech-art-manager": {"sections": [{"title": "1. Studio-Wide Technique Authority", "label": "Issues if No One Owns Technique", "resp": ["Set the studio-wide standards for how core techniques are done (shading, deformation, procedural authoring, optimization) and keep them current.", "Serve as the final technical authority pods consult when a hard or novel problem exceeds their depth.", "Establish the reference implementations and patterns that pods build on rather than reinventing.", "Audit how techniques are actually applied across projects and close the gaps between standard and practice.", "Resolve cross-pod technical disputes with a decision that holds for the whole studio."], "issues": ["Without a technique authority, each pod invents its own approach and the studio fragments.", "Hard problems stall because there's no one with the depth and mandate to resolve them.", "Pods reinvent reference implementations, wasting effort and diverging on quality.", "The studio falls behind competitors on technique because no one is accountable for the bar."]}, {"title": "2. R&D into Emerging Tech (Nanite, ML, Procedural)", "label": "Issues if R&D Is Reactive", "resp": ["Run anticipatory R&D into emerging technology (Nanite/virtualized geometry, Lumen/GI, ML-assisted authoring, procedural pipelines) ahead of production need.", "Prototype and de-risk new techniques against the studio's real content before recommending adoption.", "Produce clear adoption guidance (when to use, when not to, migration cost) so pods don't gamble on unproven tech.", "Track the rendering and tooling landscape so the studio anticipates shifts rather than reacting to them.", "Kill prototypes that don't earn their place instead of letting R&D run open-ended."], "issues": ["R&D is reactive rather than anticipatory, so the studio is always catching up after competitors ship.", "Unproven techniques get adopted under deadline pressure and destabilize production.", "R&D-for-R&D's-sake produces demos that never ship and burns credibility with production.", "No adoption guidance means each pod gambles independently on emerging tech."]}, {"title": "3. Tech Art Hiring Bar", "label": "Issues if the Hiring Bar Drifts", "resp": ["Define and own the hiring bar for tech art across the studio, including leveling rubrics and interview content.", "Calibrate interviewers so assessments are consistent across pods and projects.", "Design the technical evaluation to test both art fluency and engineering ability, not just one.", "Partner with recruiting on sourcing and pipeline for hard-to-fill TA specializations.", "Periodically recalibrate the bar against the studio's evolving technical needs."], "issues": ["The hiring bar drifts pod to pod, so TA quality becomes inconsistent across the studio.", "Tests that skew to one side hire engineers who can't do art or artists who can't code.", "Uncalibrated interviewers produce noisy, unfair decisions and miss strong candidates.", "Specialist roles stay unfilled because there's no deliberate sourcing strategy."]}, {"title": "4. Cross-Pod Leadership (Management Facet)", "label": "Issues if Cross-Pod Coordination Fails", "resp": ["When in the management track, lead multiple tech art pods or leads, setting shared priorities across them.", "Allocate TA capacity across projects so the highest-leverage work gets staffed.", "Develop leads and seniors into the studio's next layer of tech art leadership.", "Own cross-pod planning so shared platforms get built once and reused, not rebuilt per project.", "Run the people processes (growth, performance, retention) for the tech art group."], "issues": ["Pods optimize locally and the studio rebuilds the same platform multiple times.", "TA capacity is misallocated, starving high-leverage work while low-value work is staffed.", "No leadership bench forms, so the org can't scale beyond its current leads.", "Weak people processes drive attrition of senior tech art talent."]}, {"title": "5. Engine & Renderer Strategy Partnership", "label": "Issues if Engine Strategy Excludes Tech Art", "resp": ["Partner with engineering leadership as a peer on engine and renderer strategy decisions.", "Represent art-side technical needs in engine roadmap discussions so tooling and content aren't an afterthought.", "Evaluate engine features (rendering paths, content pipelines, tooling APIs) for studio fit before commitment.", "Co-own the seams between art content and engine systems at a studio level.", "Influence build-vs-extend decisions on engine capability with art-production data."], "issues": ["Engine strategy gets set without tech art, and content pipelines become a costly afterthought.", "Engineering treats the principal as a consumer rather than a peer, so art needs are deprioritized.", "Engine features are adopted that don't fit the studio's content, forcing expensive workarounds.", "Seams between content and engine drift, multiplying integration cost across projects."]}, {"title": "6. Procedural Systems & Pipeline Architecture", "label": "Issues if Procedural Strategy Is Absent", "resp": ["Set the studio's approach to procedural content (Houdini-based pipelines, HDAs, procedural placement, world-building tooling).", "Decide where procedural generation pays off versus where hand-authoring is correct.", "Architect reusable procedural systems that pods can adopt rather than building bespoke graphs.", "Define the data and asset contracts that let procedural and authored content coexist cleanly.", "Govern procedural tool sprawl so the studio has a coherent, maintainable procedural stack."], "issues": ["Without a procedural strategy, pods build bespoke Houdini graphs nobody else can maintain.", "Procedural generation gets applied where hand-authoring was correct, wasting effort.", "Incompatible procedural and authored data contracts cause integration breakage.", "Procedural tool sprawl makes the stack unmaintainable and fragile across projects."]}, {"title": "7. Pipeline, Validators & CI", "label": "Issues if Quality Isn't Enforced Automatically", "resp": ["Establish studio-wide validation and CI for art content (naming, budgets, material rules, rig conformance) so quality is enforced automatically.", "Set the policy for what blocks a commit or build versus what only warns.", "Ensure validators run early in the artist's workflow, not just at build time.", "Drive adoption so pods actually run the validators rather than bypassing them.", "Keep the validation suite maintained as standards and content evolve."], "issues": ["Without enforced validation, broken and over-budget content reaches builds and milestones.", "Validators that only run at build time catch problems too late and frustrate artists.", "Inconsistent commit/build gates let pods bypass quality checks under deadline.", "An unmaintained validation suite drifts out of sync with standards and gets ignored."]}, {"title": "8. Standards, Documentation & Adoption", "label": "Issues if Standards Don't Get Adopted", "resp": ["Document the studio's tech art standards, reference implementations, and decision rationale so they're discoverable and durable.", "Drive adoption actively rather than publishing standards and assuming they'll be followed.", "Avoid becoming a gatekeeper; make the right way the easy way so adoption is voluntary.", "Keep documentation current as techniques and tools evolve, retiring stale guidance.", "Measure adoption and close gaps where practice diverges from the standard."], "issues": ["Published-but-unadopted standards create the illusion of consistency without the reality.", "The principal becomes a gatekeeper, slowing adoption of new techniques to a crawl.", "Stale documentation actively misleads pods and erodes trust in the standards.", "Without measuring adoption, divergence between standard and practice grows unseen."]}], "topConsequences": ["Without a studio-wide technique authority, projects fragment and quality diverges across the studio.", "Reactive rather than anticipatory R&D leaves the studio perpetually behind competitors on technique.", "A drifting hiring bar degrades the whole tech art talent base over time.", "Excluded from engine strategy, tech art becomes an afterthought and integration cost compounds across projects.", "Standards that are published but not adopted, or gatekept, give the illusion of coherence without the reality.", "Procedural and pipeline sprawl with no governance makes the studio's tech stack unmaintainable."], "bottomLine": "The Principal Tech Artist / Tech Art Manager is the studio's top technique authority on the IC track or its cross-pod leader on the management track, responsible for keeping the studio ahead on technique through anticipatory R&D, a durable hiring bar, and standards that actually get adopted. Success is a studio that leads on technique with a coherent, well-governed tech stack; failure is fragmented pods, vanity R&D that never ships, and a slowly eroding talent base."}, "technical-art-director": {"sections": [{"title": "1. Rendering & Tech Art Direction", "label": "Issues if There's No Technical Direction", "resp": ["Define the project's rendering and tech art direction so every discipline builds toward one coherent technical target.", "Set the visual-technical pillars (lighting model, material strategy, rendering features) that realize the art direction within budget.", "Make the load-bearing rendering decisions (deferred vs. forward, GI approach, Nanite/Lumen adoption) and stand behind them.", "Keep the direction grounded in what the target hardware can actually deliver at frame rate.", "Communicate the direction so artists and engineers make consistent local decisions."], "issues": ["Without direction, disciplines build toward incompatible technical targets that don't compose.", "Rendering decisions get made implicitly and reversed late at great cost.", "The visual target outruns the hardware and the project stalls on performance.", "Inconsistent local decisions accumulate into a fragmented, unstable rendering picture."]}, {"title": "2. Enabling the Art Director's Vision", "label": "Issues if the TAD\u2013AD Partnership Breaks", "resp": ["Partner closely with the Art Director, translating the creative vision into an achievable technical plan.", "Find the technical path to the AD's intent rather than reflexively saying no to ambitious looks.", "Surface the real cost of vision elements early so the AD can make informed creative tradeoffs.", "Prototype the riskiest visual ambitions to prove or disprove feasibility before the team commits.", "Push the technical envelope where the vision demands it instead of forcing the AD to design around limits."], "issues": ["Saying no too often, the AD designs around limitations instead of being pushed past them, and the game looks smaller than it could.", "Saying yes to everything, performance collapses and forces brutal late cuts.", "Cost surfaces too late, so the AD makes creative tradeoffs under crisis instead of by choice.", "Untested ambitions are committed to and then can't be delivered, derailing the schedule."]}, {"title": "3. Build-vs-Buy & Middleware", "label": "Issues if Build-vs-Buy Is Decided Badly", "resp": ["Own the build-vs-buy decisions on tools, middleware, and engine capability for the project.", "Evaluate middleware (vegetation, crowds, hair, destruction, capture) against build cost, fit, and long-term maintenance.", "Factor licensing, lock-in, and integration cost into every decision, not just upfront feature fit.", "Decide deliberately what is core to differentiate on (and thus build) versus commodity (and thus buy).", "Revisit decisions as the project and the middleware landscape evolve."], "issues": ["Building what should have been bought wastes scarce TA capacity on commodity problems.", "Buying what should have been built creates lock-in and limits on the project's differentiators.", "Ignoring integration and maintenance cost makes 'cheap' middleware expensive over the project's life.", "Decisions made once and never revisited leave the project on the wrong tooling as it evolves."]}, {"title": "4. Performance & Frame-Budget Ownership", "label": "Issues if Performance Isn't Owned", "resp": ["Own the project's performance and frame budget end to end across CPU, GPU, and memory.", "Set and publish per-system budgets (draw calls, shader cost, memory, streaming) and hold disciplines to them.", "Build the profiling and reporting discipline that surfaces regressions continuously, not at milestones.", "Drive performance as a design constraint from preproduction rather than a cleanup phase.", "Make the hard cuts and tradeoff calls when budgets are exceeded, with data behind them."], "issues": ["Performance issues hit late and force forced cuts that compromise the art at the worst time.", "Without published budgets, every system overspends and the total blows the frame budget.", "Treated as a cleanup phase, performance debt compounds until it's unrecoverable in schedule.", "Cuts made without data damage the wrong things and erode trust in the TAD's calls."]}, {"title": "5. Pipeline Scalability for AAA Volume", "label": "Issues if the Pipeline Can't Scale", "resp": ["Architect the content pipeline to absorb AAA production volume without bottlenecking artists.", "Ensure ingestion, validation, build, and iteration times stay fast as content and team size scale.", "Identify and eliminate pipeline bottlenecks before they throttle the production ramp.", "Standardize the cross-discipline pipeline so handoffs between teams don't break at scale.", "Invest in automation and CI so quality scales with volume instead of degrading."], "issues": ["The pipeline can't scale to AAA volume, and artists spend more time fighting it than creating.", "Iteration and build times balloon as content grows, slowing the whole production.", "Cross-discipline handoffs break at scale, fragmenting the pipeline mid-production.", "Quality degrades as volume rises because validation never scaled with it."]}, {"title": "6. Platform & Scalability Readiness", "label": "Issues if Platform Readiness Lags", "resp": ["Own readiness across all shipping platforms, from the lowest target to the highest, plus any next-gen targets.", "Define the scalability system (quality tiers, LOD strategy, dynamic resolution) so one content set serves all platforms.", "Drive platform-specific work (memory, thermal, cert requirements) on a schedule, not as a ship-time scramble.", "Validate the experience on real target hardware early and continuously.", "Coordinate with platform and engine teams on certification and platform feature adoption."], "issues": ["Platform readiness lags and surfaces as cert blockers and emergency optimization near ship.", "Without a scalability system, lower platforms require separate content and double the work.", "Testing only on dev hardware hides problems that detonate on real target devices.", "Cert requirements discovered late force scrambles that risk the ship date."]}, {"title": "7. Tooling Strategy & Automation", "label": "Issues if Tooling Strategy Is Absent", "resp": ["Set the project's tooling strategy so investment goes to the highest-leverage automation.", "Prioritize tooling that compounds (iteration speed, validation, batch operations) over one-off conveniences.", "Ensure tools follow studio standards so the project's pipeline integrates with the broader org.", "Balance the TA team's time between production support and durable tooling investment.", "Sunset and consoli
