chronic burnout across the project."]}, {"title": "7. Partnering With the Art Director & PM Leadership", "label": "Issues if Production and Art Become Adversaries", "resp": ["Partner with the AD as an ally who protects the vision by making it deliverable, not as a scope-cutting adversary.", "Translate the AD's quality ambitions into a plan, and translate plan constraints back into honest creative tradeoffs.", "Align with PM leadership so art's plan, risks, and milestones integrate with the whole project's.", "Carry bad news upward early and with options so leadership is never blindsided.", "Hold the line on honesty in both directions, advocating the team to leadership and reality to the team."], "issues": ["Becoming the AD's adversary instead of partner means scope fights replace problem-solving and both lose.", "Hiding bad news from leadership until it's too late removes the one window when the problem was still fixable.", "Misalignment with PM leadership leaves art planning in its own bubble, out of step with the project.", "If you only carry the schedule's voice, the AD stops trusting you and routes around production."]}], "topConsequences": ["The project burns out the team and attrition spikes after launch, draining institutional knowledge.", "Scope-versus-quality tradeoffs made by accident hollow out the game in ways nobody chose.", "Outsource costs balloon and off-bar external work piles up needing rework the budget didn't plan for.", "Milestones get declared met while real art work is still missing, deferring the reckoning to Gold.", "Hidden bad news denies leadership the one window when the problem was still cheap to fix.", "Adversarial relations with the AD turn every decision into a scope fight instead of a shared solution."], "bottomLine": "The Senior Art Producer owns the entire project's art production, the master schedule, the budget, the outsource pipeline, the milestone plan, and the team's sustainability, making the AD's vision deliverable without breaking the people who build it. Success is a project that hits content-complete on a plan everyone trusted, with tradeoffs chosen deliberately and a team intact at launch; failure is accidental quality erosion, ballooning vendor cost, and a post-launch attrition wave that proves the dates were bought on the team's health."}, "development-director-art": {"sections": [{"title": "1. Owning How Art Gets Made (Process & Pipeline)", "label": "Issues if the Production System Is Broken", "resp": ["Own the end-to-end system by which art is made on the project: the process, the tools, the gates, and the workflow.", "Define how an asset moves from request through production, review, integration, and bug-fix so the path is clear to everyone.", "Ensure the pipeline and tooling support the project's throughput needs and fix friction that taxes every artist daily.", "Standardize naming, versioning, and handoff conventions so the project's art doesn't fragment into incompatible practices.", "Partner with tech-art and engineering to keep the art pipeline healthy as the project scales.", "Continuously improve process based on where work actually stalls, treating the production system as a product you own."], "issues": ["A broken or undefined production system taxes every artist with friction that compounds across the whole team.", "Without a clear asset path, work stalls in undefined gaps and nobody owns the handoff.", "Fragmented conventions make assets incompatible and turn integration into constant firefighting.", "Pipeline debt left unaddressed slows throughput more every month as the project grows."]}, {"title": "2. Quality Gates & Review Cadence", "label": "Issues if Quality Gates Are Inconsistent", "resp": ["Define and run the project's quality gates so assets are checked against the bar at the right points, not just at the end.", "Establish a predictable review cadence so feedback is timely and artists aren't blocked waiting on sign-off.", "Make gate criteria explicit and consistent so an asset's pass or fail doesn't depend on who happens to review it.", "Catch quality problems early in the gate sequence, when fixing them is cheap, rather than late when it's rework.", "Track rework rates and gate failures to find systemic quality problems, not just individual misses.", "Balance gate rigor against throughput so quality control protects the bar without becoming a bottleneck."], "issues": ["Inconsistent quality gates let rework explode late, when fixes are most expensive and the schedule has least slack.", "Reviews without a predictable cadence block artists waiting on sign-off and stall the whole flow.", "Gate criteria that depend on the reviewer produce arbitrary pass/fail and erode trust in the process.", "Gates too heavy become a bottleneck; too light and off-bar work floods downstream undetected."]}, {"title": "3. Capacity Planning & Team Health", "label": "Issues if Capacity Is Mis-Modeled", "resp": ["Model the project's art capacity against real availability, ramp time, support load, and the true shape of the work.", "Match committed scope to modeled capacity and surface the gap when the two don't reconcile.", "Own team-health metrics at the project level and intervene before sustained overload becomes attrition.", "Plan capacity so the project's default mode is steady delivery, not perpetual firefighting.", "Forecast capacity needs across phases so staffing arrives ahead of the work, not after the crunch.", "Protect realistic assumptions so the project's plan isn't quietly underwritten by overtime."], "issues": ["Mis-modeled capacity makes firefighting the default mode, where the team only ever reacts and never gets ahead.", "Scope committed beyond real capacity guarantees the team pays the difference in crunch.", "Ignored team-health signals compound into attrition that pulls capacity out exactly when it's scarcest.", "Staffing that arrives after the work, not before, means new hires ramp during the crisis they were meant to prevent."]}, {"title": "4. Hiring Partnership & Onboarding", "label": "Issues if Staffing Lags the Work", "resp": ["Partner with leads and the AD to define hiring needs by discipline and seniority against the project's forecast.", "Sequence hiring so capacity lands ahead of the phases that need it, accounting for time-to-hire and ramp.", "Own onboarding so new artists become productive on the project's pipeline and conventions quickly.", "Balance internal hiring, contract, and outsource as levers against the same capacity gap.", "Track ramp curves so capacity forecasts reflect that a new hire is not a full artist on day one."], "issues": ["Staffing that lags the work means the project is always short exactly when it's busiest.", "Weak onboarding leaves new hires unproductive for months and drags down the seniors who must cover them.", "Treating a new hire as instant full capacity overstates the plan and sets up a predictable miss.", "Pulling only one staffing lever leaves the project rigid when the capacity gap shifts shape."]}, {"title": "5. Cross-Discipline Coordination at Project Scale", "label": "Issues if Disciplines Drift Out of Sync", "resp": ["Coordinate art's production against design, engineering, audio, and QA at the project level so disciplines stay in lockstep.", "Own the cross-discipline dependency map so art isn't blindsided by a design lock or engineering feature slipping.", "Represent art's production reality in project-wide planning so commitments are made with art's constraints visible.", "Resolve cross-discipline conflicts over sequencing and shared dependencies before they deadlock teams.", "Keep a shared project-level view so every discipline can resequence when another's date moves."], "issues": ["Disciplines that drift out of sync block each other, and the blocks surface only when integration breaks.", "An unowned cross-discipline dependency map lets a slipped design lock blindside the whole art team.", "If art's constraints aren't represented in planning, the project commits to dates art can't actually hit.", "Unresolved sequencing conflicts deadlock teams who each wait on the other."]}, {"title": "6. Partnering With the Art Director", "label": "Issues if You Drift Into Shadow-AD Territory", "resp": ["Operate as a true peer to the AD on the clear split: the AD owns vision and craft, you own execution and delivery.", "Free the AD from operational load so vision work gets the focus it needs.", "Translate the AD's quality ambition into a process and plan that can actually produce it.", "Bring execution reality back to the AD as honest tradeoffs, never as unilateral creative decisions.", "Defend the division of labor so production decisions are yours and creative decisions stay the AD's.", "Build the trust that lets the AD rely on you to run the machine so they can steer the vision."], "issues": ["Drifting into shadow-AD territory creates conflict with the AD and confuses the team about who owns the vision.", "If the AD stays buried in ops, vision work suffers and the project loses creative leadership.", "Making creative calls under the cover of execution erodes the AD's authority and the division of labor.", "Without trust between AD and DD, the two leadership roles work against each other instead of in tandem."]}, {"title": "7. Keeping Artist Trust While Owning Process", "label": "Issues if You Become Pure Process", "resp": ["Own process in service of artists' ability to do great work, not as bureaucracy imposed on them.", "Justify every gate and standard by the friction it removes or the quality it protects, and retire ones that don't.", "Stay close enough to the floor to know where process actually helps and where it just adds overhead.", "Be the art partner who removes obstacles, so production is experienced as enablement, not surveillance.", "Listen to artists about where the system fails them and fix it, building the credibility the role depends on."], "issues": ["Pure process focus loses artist trust, and once lost, the team routes around the system you own.", "Standards that can't justify themselves are felt as bureaucracy and breed quiet noncompliance.", "A DD too far from the floor optimizes a process that doesn't match how the work really happens.", "If production feels like surveillance, artists hide problems and the early signal disappears."]}, {"title": "8. Milestone & Throughput Ownership", "label": "Issues if Throughput Isn't Owned", "resp": ["Own the project's art throughput, knowing the real production rate and whether it will hit content-complete on time.", "Drive the project through Alpha, Beta, and Content Complete with a clear view of what's done, in-flight, and at risk.", "Stage polish and stabilization capacity so the team isn't building content during bug-fix phases.", "Use throughput data to forecast the landing date and intervene early when the trend points the wrong way.", "Report milestone health honestly so leadership and the AD are never surprised at the gate."], "issues": ["Throughput nobody owns means the project discovers its real production rate only when it misses content-complete.", "No staged stabilization capacity leaves the team building content when it should be fixing bugs.", "Forecasting only on gut, not throughput data, blinds the project to a slip it could have corrected.", "A milestone that surprises leadership at the gate proves throughput went untracked for weeks."]}], "topConsequences": ["Inconsistent quality gates let rework explode late, blowing the schedule when it has the least slack.", "Mis-modeled capacity makes firefighting the project's permanent default mode instead of steady delivery.", "A broken production system taxes every artist with friction that compounds across the whole team.", "Drifting into shadow-AD territory fractures art leadership and confuses who owns vision versus execution.", "Lost artist trust means the team routes around the very system the DD is responsible for.", "Untracked throughput surfaces a content-complete miss too late to recover, taking the milestone with it."], "bottomLine": "The Development Director, Art is the execution counterpart to the Art Director, owning how art actually gets made on the project, the process, the tools, the quality gates, the capacity, while the AD owns what gets made. Success is a project where art is produced on a healthy, predictable system that the team trusts and that hits its milestones without firefighting; failure is exploding late rework, perpetual crisis mode, and a DD who either drowns in process or drifts into a turf war with the AD."}, "head-of-art-production-executive-producer-art": {"sections": [{"title": "1. Studio-Wide Art Process Standards", "label": "Issues if Every Project Reinvents Process", "resp": ["Set studio-wide art production standards so projects share a common language for process, gates, and reporting.", "Define what is standardized across the studio versus what each project tailors to its own needs.", "Capture and propagate what works from one project so the next doesn't relearn it from scratch.", "Maintain a baseline of production practice that new projects inherit instead of inventing.", "Balance consistency against project autonomy so standards enable rather than constrain.", "Drive continuous improvement of studio practice based on patterns seen across the portfolio."], "issues": ["When every project reinvents process inconsistently, the studio pays the learning cost over and over.", "Without shared standards, talent and data can't move between projects without friction and retraining.", "Lessons that don't propagate mean each project repeats the last one's avoidable mistakes.", "No inherited baseline forces every new project to spend its first months building production scaffolding."]}, {"title": "2. Multi-Project Capacity & Resource Shifting", "label": "Issues if Resource Conflicts Go Unresolved", "resp": ["Maintain a studio-wide view of art capacity and demand across all active projects.", "Shift resources between projects to match where capacity is most needed against the portfolio's priorities.", "Resolve cross-project resource conflicts deliberately rather than letting the loudest or weakest project decide by default.", "Forecast aggregate capacity so the studio doesn't over-commit across projects in parallel.", "Plan the ramp and wind-down of projects so artists flow smoothly between them rather than being stranded.", "Balance short-term project needs against long-term studio capability when allocating people."], "issues": ["Unresolved resource conflicts mean the weakest or quietest project loses by default, regardless of strategic value.", "No aggregate capacity view lets the studio over-commit across parallel projects and fail several at once.", "Poorly planned ramp and wind-down strand artists between projects, wasting capacity in the gaps.", "Reactive shifting that ignores priority sends people to whoever shouts loudest, not where they matter most."]}, {"title": "3. Tool & Pipeline Investment", "label": "Issues if Pipeline Debt Accumulates", "resp": ["Own studio-level decisions on tool and pipeline investment so production capability scales across projects.", "Prioritize pipeline investment by its leverage across the portfolio, not just one project's pain.", "Fund and steer shared tooling so projects build on common infrastructure instead of bespoke one-offs.", "Track pipeline debt across the studio and invest to pay it down before it throttles throughput.", "Partner with tech-art and engineering leadership to align pipeline roadmaps with production needs.", "Justify pipeline investment to leadership in terms of throughput, quality, and cost across the portfolio."], "issues": ["Pipeline debt left to accumulate studio-wide slows every project's throughput more each year.", "Investment driven by one project's pain over portfolio leverage spends scarce budget on the wrong fix.", "Bespoke per-project tooling fragments the studio and multiplies maintenance cost.", "Pipeline investment that can't be justified in throughput and cost terms loses the budget fight to features."]}, {"title": "4. Vendor & Outsource Strategy", "label": "Issues if Vendor Strategy Is Fragmented", "resp": ["Set the studio's vendor and outsource strategy so projects draw on a coordinated, vetted partner network.", "Negotiate studio-level vendor relationships and rates so the portfolio's combined volume earns pricing power.", "Maintain a vetted vendor bench by capability so projects can scale external capacity quickly and safely.", "Standardize vendor onboarding, specs, and quality bars so external work is consistent across projects.", "Track vendor performance across the studio so good partners get more work and weak ones are managed out.", "Balance the build-versus-buy decision at the studio level against capability and cost."], "issues": ["Fragmented vendor strategy erodes pricing power as each project negotiates alone against the same suppliers.", "No vetted bench leaves projects scrambling for unknown vendors under deadline pressure.", "Inconsistent specs and bars across projects produce uneven external quality and repeated onboarding cost.", "Without studio-wide performance tracking, weak vendors keep getting work that should go to strong ones."]}, {"title": "5. Portfolio Risk & Forecasting", "label": "Issues if There's No Cross-Project Risk View", "resp": ["Maintain a studio-level view of art production risk across all projects, not just per-project registers.", "Identify correlated risks where one event, a vendor failure or a tool migration, threatens multiple projects at once.", "Forecast where projects will collide for the same scarce capacity and resolve it before the collision.", "Surface portfolio-level art risk to studio and art leadership with mitigation options.", "Track leading indicators across projects so studio leadership sees trouble forming before it's a crisis."], "issues": ["No cross-project risk view lets correlated failures hit several projects simultaneously with no warning.", "Capacity collisions between projects discovered late force a scramble that damages all sides.", "Risk surfaced only per-project hides the portfolio-level threats that are the studio's real exposure.", "Without leading indicators, studio leadership reacts to crises instead of preventing them."]}, {"title": "6. Studio-Wide Team Health & Sustainability", "label": "Issues if Crunch Becomes Cultural", "resp": ["Own art team-health and crunch-prevention standards across the studio, not just on one project.", "Track sustainability metrics across all projects and intervene where overload is becoming chronic.", "Sequence projects' demanding phases so the studio isn't crunching everything at once.", "Plan decompression and rotation so artists recover between intense phases across their project arc.", "Hold project leadership accountable for team health, making it a studio standard rather than a project's option.", "Protect long-term studio capability against short-term delivery pressure on any single project."], "issues": ["If crunch becomes cultural, attrition spikes studio-wide and takes institutional knowledge with it.", "Overlapping demanding phases across projects crunch the whole studio at once with no relief valve.", "No rotation or decompression turns a series of hard phases into chronic, compounding burnout.", "Team health left optional per-project means the worst-managed project sets the studio's reputation."]}, {"title": "7. Scaling Production Through Major Phases", "label": "Issues if Scale-Up Isn't Managed", "resp": ["Lead the scale-up of art production as projects move from pre-production into full production and toward launch.", "Ensure process, pipeline, and capacity scale together so growth doesn't outrun the system that supports it.", "Onboard large waves of internal and external capacity without diluting quality or conventions.", "Stage the studio's investment so scaling capacity is matched by scaling the infrastructure to manage it.", "Apply lessons from prior scale-ups so each project's ramp is smoother than the last."], "issues": ["Scale-up where headcount outruns process produces chaos that more people only amplify.", "Large capacity waves onboarded without conventions dilute quality faster than they add throughput.", "Pipeline that doesn't scale with the team becomes the bottleneck that chokes the whole ramp.", "Repeating prior scale-up mistakes wastes the studio's hardest-won operational lessons."]}, {"title": "8. Partnering With the VP of Art", "label": "Issues if Ops and Art Leadership Drift Apart", "resp": ["Partner with the VP of Art as the operational counterpart, owning delivery while they own creative direction studio-wide.", "Align studio production standards with the art organization's quality ambitions and career structures.", "Translate art leadership's vision into the production capacity and pipeline that can deliver it.", "Bring portfolio-level production reality to art leadership as honest, options-based tradeoffs.", "Keep ops and art leadership moving in lockstep so the studio doesn't fracture along an ops-versus-art line."], "issues": ["If ops and art leadership drift apart, the studio fractures into competing process and creative agendas.", "Production standards misaligned with the art org's ambitions deliver throughput at the cost of the bar.", "Carrying only the delivery voice loses the art organization's trust in the production function.", "Without lockstep partnership, every studio-wide decision becomes an ops-versus-art negotiation."]}], "topConsequences": ["Projects reinvent process inconsistently and the studio pays the same learning cost over and over.", "Unresolved cross-project resource conflicts let the weakest project lose by default regardless of strategic value.", "Pipeline debt accumulates studio-wide and throttles throughput on every project a little more each year.", "A fragmented vendor strategy erodes the studio's pricing power and leaves projects scrambling for capacity.", "No portfolio risk view lets correlated failures hit several projects at once with no warning to leadership.", "Cultural crunch spikes studio-wide attrition and hollows out long-term capability for short-term dates."], "bottomLine": "The Head of Art Production / EP (Art) runs art operations at the studio level, setting the standards, shifting capacity between projects, investing in pipeline and vendors, and protecting team health across the whole portfolio. Success is a studio where projects share a strong production backbone, capacity flows to where it matters, and pipeline and partners scale ahead of need; failure is reinvented process, unresolved resource fights, accumulating pipeline debt, and a crunch culture that bleeds talent out the door."}, "vp-of-production-art-svp-art-delivery": {"sections": [{"title": "1. Multi-Studio Art Delivery Strategy", "label": "Issues if There's No Unified Delivery Strategy", "resp": ["Own the strategy for how art is delivered across all studios and projects in the portfolio.", "Set the operating model for art production so every studio plugs into a coherent, comparable system.", "Align art delivery strategy with the company's portfolio plan, slate timing, and platform commitments.", "Define which capabilities are built centrally versus owned by each studio across the portfolio.", "Drive the long arc of how the company's art-production capability grows over multiple years and titles.", "Set the metrics and operating rhythm by which art delivery is measured and steered company-wide."], "issues": ["Without a unified delivery strategy, each studio optimizes locally and the portfolio has no comparable view of art delivery.", "Art delivery misaligned with the slate means titles compete for the same capacity at the worst possible time.", "Unclear central-versus-studio ownership duplicates capability in some places and leaves gaps in others.", "No company-wide operating rhythm means art delivery problems surface as board-level surprises."]}, {"title": "2. Portfolio Capacity & Resource Allocation", "label": "Issues if Capacity Is Managed Reactively", "resp": ["Maintain a portfolio-wide model of art capacity and demand across every studio and title.", "Allocate and rebalance capacity across studios against portfolio priorities and strategic value.", "Forecast aggregate art capacity years out so the company staffs to the slate rather than to last quarter's crisis.", "Resolve cross-studio capacity collisions at the executive level before they force value-destroying scrambles.", "Plan the macro flow of talent across the project lifecycle so studios ramp and wind down without stranding people.", "Balance flexing capacity through hiring, internal mobility, and outsource against cost and capability."], "issues": ["Studios that over- or under-staff art reactively drive cost overruns the portfolio absorbs.", "Capacity managed quarter-to-quarter can't staff to a multi-year slate and is always fighting the last fire.", "Cross-studio collisions resolved late force scrambles that destroy value across multiple titles at once.", "Poorly planned macro talent flow strands experienced artists between projects, wasting the portfolio's scarcest asset."]}, {"title": "3. Art P&L Partnership With CFO & CAO", "label": "Issues if Art Economics Aren't Owned", "resp": ["Partner with the CFO and CAO to own the economics of art delivery across the portfolio as a managed P&L.", "Build art-cost models that tie spend to deliverables and let the company forecast art cost per title credibly.", "Bring the executive table a clear view of where art dollars go and what return they buy in quality and throughput.", "Defend art investment in capability and pipeline against pure cost-cutting with a long-term economic case.", "Forecast art cost across the slate so finance can plan, and flag overruns at the portfolio level early.", "Translate fluently between creative ambition and financial reality so neither side dominates by default."], "issues": ["If art economics aren't owned, art cost is the line item finance cuts blindly because nobody can defend its value.", "Without deliverable-linked cost models, the company can't forecast art spend and is repeatedly surprised by it.", "Failing to make the long-term capability case lets cost-cutting hollow out the very ability to deliver.", "An exec who can't translate creative value into financial terms loses every budget argument to those who can."]}, {"title": "4. Portfolio Risk Visibility & Board Reporting", "label": "Issues if Risk Doesn't Reach the Board", "resp": ["Maintain a portfolio-level view of art delivery risk so leadership and the board see it before it becomes a surprise.", "Identify systemic and correlated risks that threaten multiple titles, such as a key vendor or a platform shift.", "Forecast which titles are most likely to miss on art and surface it with mitigation options early.", "Report art delivery health to the executive team and board in terms they can act on, not just status.", "Establish leading indicators across the portfolio so risk is managed proactively, not narrated after the fact."], "issues": ["With no portfolio view of art risk, surprises hit the board, the worst possible place for a problem to first appear.", "Correlated risks unseen at the portfolio level can take down several titles in the slate at once.", "Risk reported as status rather than action leaves leadership informed but unable to intervene.", "Without leading indicators, the company is always reacting to art delivery crises instead of preventing them."]}, {"title": "5. External Partner & Outsource Strategy", "label": "Issues if Vendor Strategy Is Fragmented", "resp": ["Set the company's external partner and outsource strategy across all studios as a single coordinated function.", "Consolidate vendor relationships and negotiate at portfolio scale so combined volume builds real pricing power.", "Build a strategic partner network with vetted, scalable suppliers across capabilities and regions.", "Set portfolio-wide standards for vendor quality, security, and IP protection that every studio applies.", "Make the strategic build-versus-buy and onshore-versus-offshore decisions at the company level.", "Manage concentration risk so the portfolio isn't hostage to any single partner or region."], "issues": ["Fragmented vendor strategy across studios erodes pricing power as the company negotiates against itself.", "No portfolio partner network leaves studios sourcing external capacity reactively at premium rates.", "Inconsistent vendor standards expose the company to quality, security, and IP risk across the slate.", "Unmanaged concentration risk makes the portfolio hostage to one partner or region's failure."]}, {"title": "6. Crunch Prevention & Sustainability Across Art", "label": "Issues if Sustainability Is Sacrificed for Dates", "resp": ["Own crunch-prevention and sustainability metrics across all of art as a company-level commitment, not a project option.", "Track sustainability across the portfolio and hold studio leadership accountable for art team health.", "Sequence the slate so studios aren't all in punishing phases simultaneously with no relief.", "Protect long-term studio capability and reputation against short-term delivery pressure on any single title.", "Set the cultural expectation, backed by metrics and accountability, that the company delivers without burning people.", "Tie sustainability outcomes to leadership accountability so team health is treated as a delivery metric."], "issues": ["Sacrificing sustainability for dates drives portfolio-wide attrition that erodes the company's ability to ship at all.", "A slate that crunches every studio at once has no relief valve and compounds burnout across the company.", "Team health treated as optional per-studio lets the worst case define the company's industry reputation.", "Hollowing out long-term capability for short-term dates mortgages the company's future slate."]}, {"title": "7. Keeping Creative Trust as a Delivery Exec", "label": "Issues if You Become Pure Finance/Ops", "resp": ["Lead art delivery as a partner to creative leadership, not as a finance function imposed on the art organization.", "Keep throughput and cost KPIs in service of shipping great art, never as ends that override the creative bar.", "Maintain deep creative literacy so delivery decisions respect what makes the art good, not just cheap or fast.", "Earn the trust of the CAO and creative directors so art delivery is seen as enabling the vision, not constraining it.", "Resist reducing every decision to a throughput number, weighing capability and quality alongside cost.", "Be the executive who can hold both the financial and the creative case in the same conversation."], "issues": ["Becoming pure finance/ops loses creative trust, and the art organization routes around delivery to protect its work.", "Reducing every decision to throughput KPIs optimizes for numbers while the art quietly gets worse.", "Letting cost-cutting hollow out long-term capability trades the company's future for this quarter's margin.", "An exec without creative literacy makes delivery calls that damage the very thing the company sells."]}, {"title": "8. Pipeline & Tooling Investment at Portfolio Scale", "label": "Issues if Capability Investment Is Underfunded", "resp": ["Own portfolio-level investment in the pipeline and tooling that scales art delivery across all studios.", "Prioritize capability investment by its leverage across the whole portfolio, not any single title's pain.", "Fund shared infrastructure so studios build on common platforms rather than fragmenting into bespoke tools.", "Make the multi-year case for capability investment to the executive table against near-term feature pressure.", "Track aggregate pipeline debt and fund paying it down before it throttles delivery across the slate.", "Align tooling investment with the company's long-term technology and platform strategy."], "issues": ["Underfunded capability investment leaves the whole portfolio's delivery throttled by aging, fragmented pipelines.", "Investment driven by one title's pain over portfolio leverage spends scarce capital on the wrong problem.", "Bespoke per-studio tooling multiplies cost and prevents talent and assets from moving across the company.", "Pipeline debt left unfunded compounds until it becomes the binding constraint on the entire slate."]}], "topConsequences": ["Studios over- or under-staff art reactively and the resulting cost overruns hit the portfolio's bottom line.", "No portfolio view of art risk means problems first appear as surprises at the board, where they're costliest.", "A fragmented vendor strategy erodes the company's pricing power as studios negotiate against themselves.", "Sacrificing sustainability for dates drives portfolio-wide attrition that erodes the ability to ship at all.", "Becoming pure finance and ops loses creative trust, and the art organization routes around delivery.", "Cost-cutting that hollows out capability and pipeline trades the company's future slate for this quarter's margin."], "bottomLine": "The VP of Production (Art) / SVP Art Delivery is the executive owner of art delivery across every studio, partnering with the CFO and CAO to run art as a managed P&L while protecting capability, sustainability, and the creative bar at portfolio scale. Success is a company that staffs to its slate, sees its art risk before the board does, wields real vendor pricing power, and ships great art without burning its people; failure is reactive staffing, surprise overruns, eroded creative trust, and a hollowed-out capability that mortgages the future for the current quarter."}, "technical-artist": {"sections": [{"title": "1. Shader & Material Authoring", "label": "Issues if Shader Work Is Sloppy", "resp": ["Build and debug material graphs (Unreal Material Editor, Unity Shader Graph, or HLSL) to deliver the looks artists request without hand-holding from rendering engineers.", "Author reusable master materials and material instances so artists tune parameters instead of forking new shaders for every asset.", "Profile shader complexity in-editor (shader instruction counts, texture sampler counts, overdraw views) and flag materials that exceed the team's budget.", "Translate art direction references into technical shading approaches (e.g., layered weathering, parallax, subsurface) that hit on the target platform.", "Fix broken or platform-divergent materials reported by artists, including mobile/console feature-level fallbacks.", "Document shader parameters and intended usage so artists understand what each input controls."], "issues": ["Artists fork bespoke one-off shaders, fragmenting the material library and ballooning shader permutation counts.", "Unbudgeted instruction counts and sampler bloat tank GPU frame time on the lowest target hardware.", "Materials look correct on the TA's machine but break on console feature levels, surfacing only in cert builds.", "Undocumented parameters force artists to guess, producing inconsistent surfaces across the level."]}, {"title": "2. Rigging & Skinning Support", "label": "Issues if Rigs Are Fragile", "resp": ["Build and maintain character, prop, and facial rigs that animators can pose without fighting the controls.", "Diagnose and repair skinning artifacts (candy-wrapping, volume loss, collapsing joints) reported during animation.", "Set up skeleton hierarchies and naming that match the engine's retargeting and animation systems.", "Implement helper joints, corrective shapes, or driven keys to preserve deformation quality at extreme poses.", "Support the export path so rigs round-trip cleanly from the DCC (Maya/Blender) into the engine."], "issues": ["Animators lose hours fighting unstable controls or re-skinning meshes the TA should have fixed.", "Skinning artifacts ship into cinematics because deformation was never tested at extreme poses.", "Mismatched skeletons break engine retargeting, forcing per-character animation rework.", "Broken export paths corrupt rigs on round-trip, eroding animator trust in the pipeline."]}, {"title": "3. Tools & Automation", "label": "Issues if Tooling Is Ad-Hoc", "resp": ["Write small Python/MaxScript/Blueprint tools that remove repetitive manual steps from artists' daily work (batch renamers, exporters, importers, LOD setup).", "Talk to the artists who will use a tool before building it, so it solves the real bottleneck rather than an imagined one.", "Add basic error handling and clear messages so tools fail gracefully instead of leaving artists with corrupted files.", "Maintain and patch existing team tools as DCC versions and engine APIs change.", "Share tools through the team's standard distribution path rather than passing scripts around informally."], "issues": ["The TA becomes a request-queue worker, churning tickets and never doing higher-leverage work.", "Tools built without talking to users go unused, wasting the time invested in them.", "Brittle scripts with no error handling silently corrupt scene files and erode trust.", "Informally shared scripts drift across machines, so 'it works for me' becomes a recurring support drain."]}, {"title": "4. Performance & Optimization Support", "label": "Issues if Performance Is Ignored Until Late", "resp": ["Run basic in-engine profiling (stat unit, GPU/CPU timing, draw-call counts) to locate art-driven performance regressions.", "Check texel density, texture sizes, and LOD chains on assets before they reach a milestone build.", "Help artists hit per-scene budgets for triangles, draw calls, and material count without sacrificing the intended look.", "Flag overdraw, transparency stacking, and unbudgeted dynamic lights to the artists responsible.", "Set up and verify LODs (or Nanite settings where applicable) so distant assets cost what they should."], "issues": ["Performance problems surface late at milestone, forcing rushed art cuts instead of measured optimization.", "Inconsistent texel density and oversized textures blow the memory budget on the target platform.", "Missing or wrong LODs leave distant geometry rendering at full cost, dragging frame rate down.", "Overdraw from stacked transparency tanks fill rate in exactly the scenes meant to look best."]}, {"title": "5. Art\u2013Engineering Bridging", "label": "Issues if the Bridge Breaks Down", "resp": ["Translate artist problems into precise, reproducible bug reports that engineers can act on.", "Explain engine constraints back to artists in art terms so they design within what is achievable.", "Sit between disciplines on small integration issues so neither side stalls waiting on the other.", "Stay current on the team's engine features and pipeline conventions to give artists accurate answers.", "Escalate the right issues to senior TAs or engineers instead of silently absorbing them."], "issues": ["Vague bug reports bounce back and forth, doubling the time to resolve pipeline issues.", "Artists design against engine limits no one explained, then have to redo the work.", "The TA drifts fully into engineering and loses the art context that made them useful.", "Issues that needed escalation get quietly absorbed until they become production blockers."]}, {"title": "6. Standards & Self-Documentation", "label": "Issues if Knowledge Stays in One Head", "resp": ["Follow the team's naming, folder, and asset conventions and gently correct artists who drift from them.", "Write quick how-to notes for the tools and shaders they build so usage isn't tribal knowledge.", "Keep personal scripts and fixes in version control rather than on a local drive.", "Capture recurring pipeline gotchas so the same question isn't answered ten times."], "issues": ["Undocumented tools and fixes create a bus-factor of one around the TA.", "Convention drift accumulates until validators and downstream tools start failing.", "Local-only scripts are lost when a machine is reimaged or the TA is out.", "The same recurring questions consume the TA's time that should go to real work."]}], "topConsequences": ["Artists repeatedly hit pipeline walls they can't clear, so production velocity drops across the whole team.", "Performance debt accumulates invisibly and detonates at milestones, forcing reactive art cuts.", "Manual, undocumented processes fail to scale as the team grows, multiplying support load.", "The TA becomes a pure ticket-queue worker, so no foundational tooling or standard ever gets built.", "Bus-factor-of-one tools and tribal fixes leave the team exposed when the TA is unavailable."], "bottomLine": "The Technical Artist is the team's first line of defense between art ambition and engine reality, building the shaders, rigs, and small tools that keep artists moving. Success looks like artists who rarely get stuck and a pipeline that quietly works; failure looks like a perpetual ticket queue, late-surfacing performance, and fixes that live only in one person's head."}, "senior-tech-artist": {"sections": [{"title": "1. Domain Ownership & Standards", "label": "Issues if the Domain Has No Owner", "resp": ["Own one technical domain end to end (shaders, rigging, tools, or performance) and set the standards everyone in it follows.", "Define the patterns, naming, and architecture for the domain so work is consistent across pods rather than ad-hoc.", "Make and document the load-bearing technical decisions in the domain (e.g., the master-material hierarchy, the rig template, the export contract).", "Review domain work from other TAs and artists against the standard and give actionable feedback.", "Anticipate where the domain will be stressed at AAA scale and shape decisions to hold up there."], "issues": ["Domain decisions get made ad-hoc by whoever touches the system last, so consistency erodes.", "Tools and assets fragment into incompatible variants that all need separate maintenance.", "Juniors have no reference model and reinvent solutions that conflict with each other.", "Standards exist only in the senior's head, so they break the moment the senior is unavailable."]}, {"title": "2. Domain-Level Tools & Systems", "label": "Issues if Systems Are Over- or Under-Built", "resp": ["Build and maintain the durable tools and systems that define the domain, not just one-off scripts.", "Design tools to be adopted across multiple pods, with stable APIs and predictable behavior.", "Version, test, and support domain tools so teams can rely on them through a production cycle.", "Refactor accumulated one-off fixes into a coherent system before they become unmaintainable.", "Balance feature scope against real production need rather than building for hypotheticals."], "issues": ["Over-engineered systems solve problems that don't exist yet while real bottlenecks go untouched.", "Under-built tools force every pod to hand-roll the missing pieces, fragmenting the domain.", "Unversioned, untested systems break mid-production when a DCC or engine update lands.", "Accumulated one-off fixes calcify into a system nobody else can safely modify."]}, {"title": "3. Shaders & Materials Depth (Domain Example)", "label": "Issues if Shading Standards Slip", "resp": ["Establish the master-material architecture and the rules for when to instance versus author new.", "Set shader complexity budgets per platform and build the in-editor tooling that surfaces violations.", "Own advanced shading techniques in the domain (layered materials, virtual texturing, custom lighting models) and prove them out before adoption.", "Define the material validation that runs before assets are accepted into the build."], "issues": ["Without an enforced architecture, shader permutations explode and compile times balloon.", "Unbudgeted complexity ships to the lowest target and is only caught in performance passes.", "Advanced techniques get adopted unproven and destabilize the lighting across a project.", "Missing material validation lets broken or over-budget materials into milestone builds."]}, {"title": "4. Rigging & Deformation Depth (Domain Example)", "label": "Issues if Deformation Standards Slip", "resp": ["Define the rig template and skeleton conventions that all characters in the project conform to.", "Own the deformation-quality bar (corrective systems, helper joints, secondary motion) and the tests that verify it.", "Build modular auto-rigging tooling so rigs are produced consistently rather than artisanally.", "Maintain the export contract so rigs and skin weights round-trip cleanly into the engine and animation systems."], "issues": ["Inconsistent skeletons break retargeting and force per-character animation rework.", "An unenforced deformation bar lets artifacts ship into cinematics and hero shots.", "Hand-built rigs vary in quality and structure, so animators relearn every character.", "A broken export contract corrupts weights on round-trip and stalls the animation team."]}, {"title": "5. Engineering Partnership & Integration", "label": "Issues if Art and Engineering Talk Past Each Other", "resp": ["Partner directly with engine and gameplay engineers on integrating the domain into the build.", "Translate domain needs into engineering requirements and engineering constraints back into domain decisions.", "Co-own the seams where the domain meets engine code (export formats, runtime systems, data contracts).", "Represent the domain credibly in technical design discussions so art needs are not designed around.", "Drive resolution on cross-discipline issues instead of letting them stall between teams."], "issues": ["Engineering and art talk past each other on the domain, so integration work churns and slips.", "Domain needs get deprioritized because no one translated them into engineering terms.", "Data contracts at the seams drift, causing silent breakage between DCC and runtime.", "Cross-discipline issues sit unowned until they become milestone blockers."]}, {"title": "6. Mentorship & Knowledge Transfer", "label": "Issues if Knowledge Stays Siloed", "resp": ["Mentor junior and mid-level tech artists, giving them a model for how the domain should work.", "Document the domain's architecture, conventions, and gotchas so it survives any one person.", "Pair on hard problems to transfer technique rather than just handing back a fix.", "Grow domain coverage so the team isn't dependent on a single expert."], "issues": ["The senior becomes a domain silo nobody else can replace, creating a critical bus-factor.", "Refusal to document leaves the domain undocumented and fragile when the senior leaves.", "Juniors stall without a model and produce inconsistent work that needs rework.", "Knowledge concentrates instead of spreading, so the domain can't scale with the team."]}, {"title": "7. Performance Stewardship in the Domain", "label": "Issues if Domain Performance Is Unmanaged", "resp": ["Set and publish the performance budgets that apply to the domain across pods.", "Build profiling and reporting tooling that surfaces domain-specific cost (shader time, rig eval cost, tool runtime).", "Drive optimization passes in the domain proactively rather than waiting for milestone fire drills.", "Define the platform fallbacks the domain needs so it scales from the lowest to the highest target."], "issues": ["Without published budgets, every pod sets its own ceiling and the domain regresses unevenly.", "Lack of domain profiling means cost accumulates invisibly until it shows up in frame time.", "Reactive optimization at milestones forces compromises that proactive work would have avoided.", "Missing platform fallbacks break the domain on lower-spec targets at cert time."]}], "topConsequences": ["Without an owner, the domain fragments into incompatible variants that each cost separate maintenance.", "Juniors lacking a model produce inconsistent work, compounding rework across pods.", "Art and engineering keep talking past each other in the domain, so integration churns and slips.", "Undocumented expertise concentrates in one person, leaving a critical bus-factor at the domain level.", "Unmanaged domain performance regresses unevenly and surfaces as late milestone fire drills."], "bottomLine": "The Senior Tech Artist owns a technical domain outright, turning ad-hoc fixes into durable standards, systems, and engineering partnerships that hold up across pods. Success is a domain that is consistent, well-documented, and adopted everywhere; failure is a brittle silo that depends entirely on one expert and fragments the moment they step away."}, "lead-tech-artist": {"sections": [{"title": "1. Pod Leadership & Direction", "label": "Issues if the Pod Lacks Direction", "resp": ["Lead a tech art pod day to day, setting clear ownership so each TA knows what they're responsible for.", "Translate production goals into a concrete pod plan that balances support work against foundational work.", "Run the pod's cadences (standups, reviews, planning) so work stays visible and unblocked.", "Set technical direction for the pod's shared tools and systems within the studio's standards.", "Shield the pod from churn and context-switching so deep work can actually happen."], "issues": ["Without clear ownership, work falls through the cracks or is duplicated across the pod.", "Production goals never translate into a plan, so the pod drifts reactively.", "Constant context-switching destroys the focus needed for foundational tooling.", "The pod feels overworked and underprioritized, and morale slides."]}, {"title": "2. Prioritization & Intake", "label": "Issues if Everything Is 'Urgent'", "resp": ["Own the pod's intake queue and triage requests against real production impact, not volume or volume of complaints.", "Say no, or not now, to requests that don't fit the plan, and explain the tradeoff to requesters.", "Carve out protected time for long-horizon work so the pod isn't purely reactive.", "Negotiate scope and timing with production and discipline leads when requests collide.", "Make the queue and its priorities visible so stakeholders see the tradeoffs being made."], "issues": ["Saying yes to everything means nothing gets done well and the queue never shrinks.", "Everything is flagged 'urgent' because there's no triage, so real fires get buried.", "Purely reactive operation means foundational work never starts and debt compounds.", "Invisible prioritization breeds resentment when requesters don't see why they're waiting."]}, {"title": "3. Cross-Discipline Coordination", "label": "Issues if the Pod Operates in Isolation", "resp": ["Coordinate the pod's work with art, animation, design, and engineering leads so tooling lands when it's needed.", "Represent tech art in production planning so TA dependencies are scheduled, not assumed.", "Broker decisions where the pod's work intersects other disciplines' pipelines.", "Surface cross-team risks (a tool a milestone depends on, an integration that's slipping) early.", "Keep the pod's roadmap aligned with where the project's art and tech are actually heading."], "issues": ["Production blocks waiting on tools because TA dependencies were never scheduled.", "The pod builds the wrong thing because it wasn't aligned with where the project is going.", "Cross-team risks surface too late to mitigate, becoming milestone slips.", "Other disciplines route around the pod, fragmenting the pipeline."]}, {"title": "4. Mentorship & Growth", "label": "Issues if People Don't Grow", "resp": ["Coach each TA on the pod, setting growth goals and giving regular, specific feedback.", "Match people to work that stretches them while still serving production needs.", "Build a review culture where TAs learn from each other's tools and shaders.", "Identify and develop the pod's next senior and lead candidates.", "Keep TAs anchored in art context so they don't drift into being general engineers."], "issues": ["TAs stagnate without growth goals and the strongest people leave for development elsewhere.", "Pod members drift into pure engineering and lose the art fluency that defines tech art.", "No bench of future seniors or leads forms, capping the pod's ceiling.", "Without a review culture, quality varies widely and lessons aren't shared."]}, {"title": "5. Tooling Roadmap & Technical Health", "label": "Issues if Technical Debt Is Ignored", "resp": ["Maintain a roadmap for the pod's shared tools and systems, not just a ticket backlog.", "Budget time for maintenance, refactoring, and migration to keep the pod's tools healthy.", "Track recurring support load and invest to eliminate its root causes.", "Ensure the pod's tools follow studio-wide standards so they integrate with the broader pipeline.", "Decide when to retire or consolidate tools that have outlived their usefulness."], "issues": ["Without a roadmap the pod ships disconnected one-offs that never cohere into a platform.", "Ignored maintenance debt eventually breaks tools mid-production at the worst time.", "Recurring support load is treated as normal instead of being engineered away.", "Tool sprawl accumulates until nobody knows which tool is canonical."]}, {"title": "6. Performance & Production Readiness", "label": "Issues if Readiness Is an Afterthought", "resp": ["Make sure the pod bakes performance budgets and validation into the pipelines it owns.", "Drive proactive performance passes on the project's art systems rather than milestone fire drills.", "Coordinate platform-readiness work (LODs, scalability settings, memory budgets) with the relevant disciplines.", "Keep the team's profiling and reporting tooling current so regressions are caught early.", "Escalate systemic performance risks to studio tech art leadership with data."], "issues": ["Performance is treated as an afterthought, so milestones turn into reactive cut sessions.", "Without validation in the pipeline, regressions slip in unnoticed until they're expensive.", "Platform readiness lags and surfaces as cert blockers near ship.", "Systemic risks aren't escalated with data, so leadership can't act on them."]}], "topConsequences": ["An unprioritized pod drowns in 'urgent' requests, so foundational work never starts and debt compounds.", "Production repeatedly blocks waiting on tools because TA dependencies were never scheduled or coordinated.", "Stagnant, ungrown TAs leave or drift into pure engineering, hollowing out the pod's capability.", "Tool sprawl and ignored maintenance debt eventually break the pipeline mid-production.", "Performance and platform readiness treated as afterthoughts turn every milestone into a fire drill."], "bottomLine": "The Lead Tech Artist runs a pod, turning a flood of requests into a prioritized plan while growing people and protecting time for the foundational work that actually moves production. Success is a pod that ships the right tools on time with people who are leveling up; failure is a perpetually reactive team buried in 'urgent' tickets, losing its best talent and its art fluency."}, "principal-tech-artist-tech-art-manager": {"sections": [{"title": "1. Studio-Wide Technique Authority", "label": "Issues if No One Owns Technique", "resp": ["Set the studio-wide standards for how core techniques are done (shading, deformation, procedural authoring, optimization) and keep them current.", "Serve as the final technical authority pods consult when a hard or novel problem exceeds their depth.", "Establish the reference implementations and patterns that pods build on rather than reinventing.", "Audit how techniques are actually applied across projects and close the gaps between standard and practice.", "Resolve cross-pod technical disputes with a decision that holds for the whole studio."], "issues": ["Without a technique authority, each pod invents its own approach and the studio fragments.", "Hard problems stall because there's no one with the depth and mandate to resolve them.", "Pods reinvent reference implementations, wasting effort and diverging on quality.", "The studio falls behind competitors on technique because no one is accountable for the bar."]}, {"title": "2. R&D into Emerging Tech (Nanite, ML, Procedural)", "label": "Issues if R&D Is Reactive", "resp": ["Run anticipatory R&D into emerging technology (Nanite/virtualized geometry, Lumen/GI, ML-assisted authoring, procedural pipelines) ahead of production need.", "Prototype and de-risk new techniques against the studio's real content before recommending adoption.", "Produce clear adoption guidance (when to use, when not to, migration cost) so pods don't gamble on unproven tech.", "Track the rendering and tooling landscape so the studio anticipates shifts rather than reacting to them.", "Kill prototypes that don't earn their place instead of letting R&D run open-ended."], "issues": ["R&D is reactive rather than anticipatory, so the studio is always catching up after competitors ship.", "Unproven techniques get adopted under deadline pressure and destabilize production.", "R&D-for-R&D's-sake produces demos that never ship and burns credibility with production.", "No adoption guidance means each pod gambles independently on emerging tech."]}, {"title": "3. Tech Art Hiring Bar", "label": "Issues if the Hiring Bar Drifts", "resp": ["Define and own the hiring bar for tech art across the studio, including leveling rubrics and interview content.", "Calibrate interviewers so assessments are consistent across pods and projects.", "Design the technical evaluation to test both art fluency and engineering ability, not just one.", "Partner with recruiting on sourcing and pipeline for hard-to-fill TA specializations.", "Periodically recalibrate the bar against the studio's evolving technical needs."], "issues": ["The hiring bar drifts pod to pod, so TA quality becomes inconsistent across the studio.", "Tests that skew to one side hire engineers who can't do art or artists who can't code.", "Uncalibrated interviewers produce noisy, unfair decisions and miss strong candidates.", "Specialist roles stay unfilled because there's no deliberate sourcing strategy."]}, {"title": "4. Cross-Pod Leadership (Management Facet)", "label": "Issues if Cross-Pod Coordination Fails", "resp": ["When in the management track, lead multiple tech art pods or leads, setting shared priorities across them.", "Allocate TA capacity across projects so the highest-leverage work gets staffed.", "Develop leads and seniors into the studio's next layer of tech art leadership.", "Own cross-pod planning so shared platforms get built once and reused, not rebuilt per project.", "Run the people processes (growth, performance, retention) for the tech art group."], "issues": ["Pods optimize locally and the studio rebuilds the same platform multiple times.", "TA capacity is misallocated, starving high-leverage work while low-value work is staffed.", "No leadership bench forms, so the org can't scale beyond its current leads.", "Weak people processes drive attrition of senior tech art talent."]}, {"title": "5. Engine & Renderer Strategy Partnership", "label": "Issues if Engine Strategy Excludes Tech Art", "resp": ["Partner with engineering leadership as a peer on engine and renderer strategy decisions.", "Represent art-side technical needs in engine roadmap discussions so tooling and content aren't an afterthought.", "Evaluate engine features (rendering paths, content pipelines, tooling APIs) for studio fit before commitment.", "Co-own the seams between art content and engine systems at a studio level.", "Influence build-vs-extend decisions on engine capability with art-production data."], "issues": ["Engine strategy gets set without tech art, and content pipelines become a costly afterthought.", "Engineering treats the principal as a consumer rather than a peer, so art needs are deprioritized.", "Engine features are adopted that don't fit the studio's content, forcing expensive workarounds.", "Seams between content and engine drift, multiplying integration cost across projects."]}, {"title": "6. Procedural Systems & Pipeline Architecture", "label": "Issues if Procedural Strategy Is Absent", "resp": ["Set the studio's approach to procedural content (Houdini-based pipelines, HDAs, procedural placement, world-building tooling).", "Decide where procedural generation pays off versus where hand-authoring is correct.", "Architect reusable procedural systems that pods can adopt rather than building bespoke graphs.", "Define the data and asset contracts that let procedural and authored content coexist cleanly.", "Govern procedural tool sprawl so the studio has a coherent, maintainable procedural stack."], "issues": ["Without a procedural strategy, pods build bespoke Houdini graphs nobody else can maintain.", "Procedural generation gets applied where hand-authoring was correct, wasting effort.", "Incompatible procedural and authored data contracts cause integration breakage.", "Procedural tool sprawl makes the stack unmaintainable and fragile across projects."]}, {"title": "7. Pipeline, Validators & CI", "label": "Issues if Quality Isn't Enforced Automatically", "resp": ["Establish studio-wide validation and CI for art content (naming, budgets, material rules, rig conformance) so quality is enforced automatically.", "Set the policy for what blocks a commit or build versus what only warns.", "Ensure validators run early in the artist's workflow, not just at build time.", "Drive adoption so pods actually run the validators rather than bypassing them.", "Keep the validation suite maintained as standards and content evolve."], "issues": ["Without enforced validation, broken and over-budget content reaches builds and milestones.", "Validators that only run at build time catch problems too late and frustrate artists.", "Inconsistent commit/build gates let pods bypass quality checks under deadline.", "An unmaintained validation suite drifts out of sync with standards and gets ignored."]}, {"title": "8. Standards, Documentation & Adoption", "label": "Issues if Standards Don't Get Adopted", "resp": ["Document the studio's tech art standards, reference implementations, and decision rationale so they're discoverable and durable.", "Drive adoption actively rather than publishing standards and assuming they'll be followed.", "Avoid becoming a gatekeeper; make the right way the easy way so adoption is voluntary.", "Keep documentation current as techniques and tools evolve, retiring stale guidance.", "Measure adoption and close gaps where practice diverges from the standard."], "issues": ["Published-but-unadopted standards create the illusion of consistency without the reality.", "The principal becomes a gatekeeper, slowing adoption of new techniques to a crawl.", "Stale documentation actively misleads pods and erodes trust in the standards.", "Without measuring adoption, divergence between standard and practice grows unseen."]}], "topConsequences": ["Without a studio-wide technique authority, projects fragment and quality diverges across the studio.", "Reactive rather than anticipatory R&D leaves the studio perpetually behind competitors on technique.", "A drifting hiring bar degrades the whole tech art talent base over time.", "Excluded from engine strategy, tech art becomes an afterthought and integration cost compounds across projects.", "Standards that are published but not adopted, or gatekept, give the illusion of coherence without the reality.", "Procedural and pipeline sprawl with no governance makes the studio's tech stack unmaintainable."], "bottomLine": "The Principal Tech Artist / Tech Art Manager is the studio's top technique authority on the IC track or its cross-pod leader on the management track, responsible for keeping the studio ahead on technique through anticipatory R&D, a durable hiring bar, and standards that actually get adopted. Success is a studio that leads on technique with a coherent, well-governed tech stack; failure is fragmented pods, vanity R&D that never ships, and a slowly eroding talent base."}, "technical-art-director": {"sections": [{"title": "1. Rendering & Tech Art Direction", "label": "Issues if There's No Technical Direction", "resp": ["Define the project's rendering and tech art direction so every discipline builds toward one coherent technical target.", "Set the visual-technical pillars (lighting model, material strategy, rendering features) that realize the art direction within budget.", "Make the load-bearing rendering decisions (deferred vs. forward, GI approach, Nanite/Lumen adoption) and stand behind them.", "Keep the direction grounded in what the target hardware can actually deliver at frame rate.", "Communicate the direction so artists and engineers make consistent local decisions."], "issues": ["Without direction, disciplines build toward incompatible technical targets that don't compose.", "Rendering decisions get made implicitly and reversed late at great cost.", "The visual target outruns the hardware and the project stalls on performance.", "Inconsistent local decisions accumulate into a fragmented, unstable rendering picture."]}, {"title": "2. Enabling the Art Director's Vision", "label": "Issues if the TAD\u2013AD Partnership Breaks", "resp": ["Partner closely with the Art Director, translating the creative vision into an achievable technical plan.", "Find the technical path to the AD's intent rather than reflexively saying no to ambitious looks.", "Surface the real cost of vision elements early so the AD can make informed creative tradeoffs.", "Prototype the riskiest visual ambitions to prove or disprove feasibility before the team commits.", "Push the technical envelope where the vision demands it instead of forcing the AD to design around limits."], "issues": ["Saying no too often, the AD designs around limitations instead of being pushed past them, and the game looks smaller than it could.", "Saying yes to everything, performance collapses and forces brutal late cuts.", "Cost surfaces too late, so the AD makes creative tradeoffs under crisis instead of by choice.", "Untested ambitions are committed to and then can't be delivered, derailing the schedule."]}, {"title": "3. Build-vs-Buy & Middleware", "label": "Issues if Build-vs-Buy Is Decided Badly", "resp": ["Own the build-vs-buy decisions on tools, middleware, and engine capability for the project.", "Evaluate middleware (vegetation, crowds, hair, destruction, capture) against build cost, fit, and long-term maintenance.", "Factor licensing, lock-in, and integration cost into every decision, not just upfront feature fit.", "Decide deliberately what is core to differentiate on (and thus build) versus commodity (and thus buy).", "Revisit decisions as the project and the middleware landscape evolve."], "issues": ["Building what should have been bought wastes scarce TA capacity on commodity problems.", "Buying what should have been built creates lock-in and limits on the project's differentiators.", "Ignoring integration and maintenance cost makes 'cheap' middleware expensive over the project's life.", "Decisions made once and never revisited leave the project on the wrong tooling as it evolves."]}, {"title": "4. Performance & Frame-Budget Ownership", "label": "Issues if Performance Isn't Owned", "resp": ["Own the project's performance and frame budget end to end across CPU, GPU, and memory.", "Set and publish per-system budgets (draw calls, shader cost, memory, streaming) and hold disciplines to them.", "Build the profiling and reporting discipline that surfaces regressions continuously, not at milestones.", "Drive performance as a design constraint from preproduction rather than a cleanup phase.", "Make the hard cuts and tradeoff calls when budgets are exceeded, with data behind them."], "issues": ["Performance issues hit late and force forced cuts that compromise the art at the worst time.", "Without published budgets, every system overspends and the total blows the frame budget.", "Treated as a cleanup phase, performance debt compounds until it's unrecoverable in schedule.", "Cuts made without data damage the wrong things and erode trust in the TAD's calls."]}, {"title": "5. Pipeline Scalability for AAA Volume", "label": "Issues if the Pipeline Can't Scale", "resp": ["Architect the content pipeline to absorb AAA production volume without bottlenecking artists.", "Ensure ingestion, validation, build, and iteration times stay fast as content and team size scale.", "Identify and eliminate pipeline bottlenecks before they throttle the production ramp.", "Standardize the cross-discipline pipeline so handoffs between teams don't break at scale.", "Invest in automation and CI so quality scales with volume instead of degrading."], "issues": ["The pipeline can't scale to AAA volume, and artists spend more time fighting it than creating.", "Iteration and build times balloon as content grows, slowing the whole production.", "Cross-discipline handoffs break at scale, fragmenting the pipeline mid-production.", "Quality degrades as volume rises because validation never scaled with it."]}, {"title": "6. Platform & Scalability Readiness", "label": "Issues if Platform Readiness Lags", "resp": ["Own readiness across all shipping platforms, from the lowest target to the highest, plus any next-gen targets.", "Define the scalability system (quality tiers, LOD strategy, dynamic resolution) so one content set serves all platforms.", "Drive platform-specific work (memory, thermal, cert requirements) on a schedule, not as a ship-time scramble.", "Validate the experience on real target hardware early and continuously.", "Coordinate with platform and engine teams on certification and platform feature adoption."], "issues": ["Platform readiness lags and surfaces as cert blockers and emergency optimization near ship.", "Without a scalability system, lower platforms require separate content and double the work.", "Testing only on dev hardware hides problems that detonate on real target devices.", "Cert requirements discovered late force scrambles that risk the ship date."]}, {"title": "7. Tooling Strategy & Automation", "label": "Issues if Tooling Strategy Is Absent", "resp": ["Set the project's tooling strategy so investment goes to the highest-leverage automation.", "Prioritize tooling that compounds (iteration speed, validation, batch operations) over one-off conveniences.", "Ensure tools follow studio standards so the project's pipeline integrates with the broader org.", "Balance the TA team's time between production support and durable tooling investment.", "Sunset and consolidate redundant tools to keep the toolchain coherent."], "issues": ["Without a strategy, the team builds disconnected one-offs that never compound into leverage.", "Support work crowds out durable tooling, so the team is perpetually reactive.", "Tools that ignore studio standards create an island that can't share or be reused.", "Tool sprawl makes the toolchain confusing and expensive to maintain."]}, {"title": "8. Cross-Project & Engineering Alignment", "label": "Issues if Tech Art Drifts from Engineering", "resp": ["Align the project's rendering and pipeline direction with engineering and other projects' tech to avoid divergence.", "Partner with engine programming leadership on the renderer and content systems the project depends on.", "Feed project learnings back into shared platforms so other projects benefit.", "Represent the project's technical needs in cross-project tech decisions.", "Maintain credibility with both art and engineering so the TAD's calls carry weight on both sides."], "issues": ["The project's tech drifts from engineering, and integration costs explode late.", "Project learnings stay siloed instead of strengthening shared platforms.", "The TAD becomes an engineering manager in disguise and loses art-side credibility.", "Without alignment, the project ends up on a divergent tech island that's costly to support."]}], "topConsequences": ["A vision that outruns technical reach, or a TAD who says no too often, makes the game look smaller than it should.", "Performance owned reactively forces brutal late cuts that compromise the art at the worst possible time.", "A pipeline that can't scale to AAA volume turns artists into pipeline-fighters and throttles production.", "Bad build-vs-buy and platform-readiness calls create lock-in, divergent tech, and cert scrambles near ship.", "Drift between the project's tech art and engineering explodes integration costs and isolates the project."], "bottomLine": "The Technical Art Director owns the project's rendering, pipeline, and tooling strategy and is the partner who makes the Art Director's vision achievable at frame rate, at AAA volume, on every platform. Success is an ambitious game that ships performant and on schedule because the technical path was found early; failure is a project crippled by late performance cuts, a pipeline that can't scale, and a vision the team had to design around."}, "director-of-technical-art-head-of-tech-art": {"sections": [{"title": "1. Tech Art Org Design", "label": "Issues if the Org Is Mis-Structured", "resp": ["Design the tech art organization across projects so coverage, ownership, and escalation paths are clear.", "Decide the balance between embedded (project) and central (platform) tech art and adjust it as the studio evolves.", "Define roles, levels, and career ladders for tech art so growth paths are explicit.", "Ensure every project has the TA leadership and capacity it needs without over- or under-staffing.", "Build the leadership bench so the org can scale and survive departures."], "issues": ["A mis-structured org leaves projects under-covered or duplicates effort across them.", "Wrong embedded/central balance either starves shared platforms or detaches TA from production.", "Without explicit ladders, top talent sees no growth path and leaves.", "A thin leadership bench means the org can't scale and breaks when a leader departs."]}, {"title": "2. Long-Horizon Technical Strategy", "label": "Issues if There's No Long-Horizon Strategy", "resp": ["Own the multi-year technical strategy for tech art across the studio's project portfolio.", "Anticipate where rendering, tooling, and content tech are heading and position the studio ahead of it.", "Sequence strategic bets so foundational investments land before the projects that depend on them.", "Balance near-term project needs against long-horizon platform investment.", "Keep the strategy legible to leadership and connected to business goals."], "issues": ["Without a long-horizon strategy, the studio lurches reactively from project to project.", "Foundational investments arrive too late to help the projects that needed them.", "Near-term firefighting crowds out the platform work that would prevent future fires.", "A strategy disconnected from business goals fails to win the investment it needs."]}, {"title": "3. Tool & Middleware Portfolio", "label": "Issues if the Portfolio Fragments", "resp": ["Own the studio's portfolio of tools and middleware so investment is coordinated, not duplicated per project.", "Make studio-level build-vs-buy and standardization decisions that hold across the portfolio.", "Drive shared-platform investment so common needs are solved once and reused everywhere.", "Manage middleware vendor relationships, licensing, and lifecycle at the studio level.", "Sunset and consolidate redundant tools to keep the portfolio coherent and affordable."], "issues": ["Without portfolio ownership, tech art fragments across projects and teams hand-roll everything.", "Strategic tool investments never happen, so common problems are re-solved on every project.", "Uncoordinated middleware licensing wastes money and creates inconsistent capability.", "Tool sprawl across projects makes the portfolio unmaintainable and expensive."]}, {"title": "4. Engine Programming Partnership", "label": "Issues if Engineering and Tech Art Diverge", "resp": ["Partner with engine programming leadership as a peer on the renderer, content pipeline, and tooling platform.", "Co-own the long-horizon roadmap where engine and art tech meet so they evolve together.", "Represent art-side technical needs at the studio's technical leadership table.", "Negotiate ownership of the seams (DCC integration, runtime content systems) to avoid gaps and overlaps.", "Align tech art and engine investment so the studio builds one coherent platform, not two."], "issues": ["Engine and art tech drift apart and integration costs explode across the portfolio.", "Art-side needs go unrepresented and tech art becomes a downstream afterthought.", "Unclear ownership of seams leaves gaps that each side assumes the other covers.", "Divergent engine and art-tech investment yields two half-platforms instead of one strong one."]}, {"title": "5. Talent Strategy & Retention", "label": "Issues if Talent Strategy Fails", "resp": ["Own the studio's tech art talent strategy: hiring bar, sourcing, leveling, and retention.", "Build growth paths (both IC and management) so senior talent has a future without leaving.", "Develop leads and principals into the studio's next tech art leadership layer.", "Set compensation and recognition norms competitive enough to retain scarce TA specialists.", "Protect culture and craft so the org remains a place strong tech artists want to be."], "issues": ["Top tech art talent leaves because there's no growth path, and hard-won expertise walks out.", "Without a leadership bench, the org can't promote from within and stalls.", "Uncompetitive comp and recognition bleed scarce specialists to rivals.", "A degraded craft culture makes recruiting and retaining strong TAs progressively harder."]}, {"title": "6. Standards, Platform & Shared Pipeline", "label": "Issues if There's No Shared Platform", "resp": ["Drive a shared tech art platform and standards that projects build on rather than reinventing.", "Govern cross-project standards (validation, CI, data contracts, conventions) so projects interoperate.", "Invest in the shared pipeline so onboarding and cross-project staffing are smooth.", "Balance standardization against each project's legitimate need to differentiate.", "Measure platform adoption and the leverage it actually delivers."], "issues": ["Without a shared platform, every project hand-rolls its pipeline and nothing transfers.", "Divergent standards make cross-project staffing and tool reuse impossible.", "Over-standardization stifles projects that genuinely need to differentiate.", "Unmeasured platform investment can't prove its value and loses funding."]}, {"title": "7. Credibility & Hands-On Connection", "label": "Issues if the Director Loses Technical Credibility", "resp": ["Stay technically credible enough to make sound calls and earn the respect of working tech artists and engineers.", "Stay connected to production reality through reviews, deep-dives, and direct contact with the work.", "Make decisions enabling project teams rather than building a personal empire.", "Keep R&D tied to production need so the org's investment ships.", "Sponsor and unblock the org's hardest technical problems personally when needed."], "issues": ["Pure org work erodes technical credibility until the director's calls aren't trusted.", "Empire-building displaces enabling project teams, and the org grows without delivering.", "Pet-project R&D that production never uses wastes investment and signals disconnection.", "A director detached from the work makes decisions that feel ivory-tower and get resisted."]}, {"title": "8. R&D Portfolio & Emerging Tech Governance", "label": "Issues if R&D Isn't Governed", "resp": ["Govern the studio's tech art R&D portfolio (Nanite-class geometry, real-time GI, ML-assisted authoring, procedural pipelines) for shipping outcomes.", "Sequence emerging-tech bets so de-risking happens before projects commit to them.", "Set the bar for graduating R&D from prototype to production-supp
