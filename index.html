visual coherence.", "Without reference setups, the same lighting notes are repeated endlessly.", "The shipped game's image quality varies visibly depending on who lit each space."]}], "topConsequences": ["On the project, the game lacks a recognizable image identity and emotional beats fall flat where light should carry them.", "Lighting fights gameplay, hiding objectives and threats and forcing players to compromise the intended look just to play.", "Performance and image-pipeline failures flatten the picture or force crude late downgrades after huge lighting effort.", "Hero scenes and cinematic transitions disappoint, robbing the game of its visual and emotional peaks.", "Across a studio, the absence of a lighting philosophy and rendering partnership means every project re-derives its look and tooling.", "Lighting talent leaves for studios with stronger rendering investment and clearer direction, weakening future visual ambition.", "Across multiple studios, image quality becomes inconsistent per project, undermining the publisher's reputation for visually distinctive games."], "bottomLine": "The Lighting Director owns the final image: whether the game has a distinctive, emotionally resonant, readable look or a flat, generic, hard-to-play picture. Success is a clear lighting philosophy, mood that tracks the story, an image pipeline under control, and light that guides players while ships within budget. Failure is beautiful-but-unreadable scenes, jarring cinematic transitions, and performance collapses that flatten the picture, because lighting is the lens through which every other discipline's work is finally seen."}, "animation-director": {"sections": [{"title": "1. Motion Language (Weight, Snappiness, Personality)", "label": "Issues if Motion Language Is Undefined", "resp": ["Define the project's core motion language: weight, timing, snappiness, and the personality that animates every character.", "Establish the spacing and timing conventions that make movement feel grounded or stylized as the project intends.", "Set the rules for how personality is expressed through motion so the cast feels alive and distinct.", "Approve the signature movement style that all animators, in-house and outsourced, work toward.", "Document the motion language so it is teachable and consistent across a large animation team."], "issues": ["Movement feels generic and characterless, with no recognizable signature.", "Weight and timing vary animator to animator, fracturing the sense of one authored motion style.", "Characters move without personality, making the cast feel hollow regardless of model quality.", "Without a documented language, every animator re-derives the style and consistency suffers."]}, {"title": "2. Gameplay Feel & Responsiveness", "label": "Issues if the Game Feels Floaty or Stiff", "resp": ["Co-own gameplay feel with Design, tuning responsiveness, animation cancel windows, and input-to-motion latency.", "Balance animation quality against responsiveness so motion never makes controls feel sluggish.", "Define how locomotion, transitions, and combat animations serve game feel, not just visual polish.", "Tune blends, root motion, and recovery frames so movement feels both fluid and controllable.", "Validate gameplay animation under real input and competitive conditions, not in isolated playback."], "issues": ["The game feels floaty or stiff and players cannot articulate why, but they feel it constantly.", "Animation quality is bought at the cost of responsiveness, making controls feel unresponsive.", "Long, uncancellable animations frustrate players and break the core action loop.", "Feel problems surface only in live play, after animation work is already locked."]}, {"title": "3. Gameplay vs. Cinematic Animation", "label": "Issues if the Two Modes Disconnect", "resp": ["Define how gameplay and cinematic animation share a motion language so transitions feel seamless.", "Set standards that keep cinematic ambition within what gameplay systems and performance can support.", "Coordinate transitions between gameplay and cinematic control so they do not jar the player.", "Bridge gameplay-feel goals and emotional cinematic beats so neither is sacrificed for the other.", "Validate that characters feel like the same beings whether under player control or in cutscene."], "issues": ["Gameplay and cinematic animation feel disconnected, breaking the sense of a single character.", "Cinematic ambitions exceed what gameplay can support, forcing awkward compromises.", "Jarring transitions between control and cutscene shatter immersion.", "Effort splits poorly, leaving either gameplay feel or cinematic emotion underserved."]}, {"title": "4. Rigs & Deformation", "label": "Issues if Rigs and Deformation Fail", "resp": ["Own rig standards and deformation quality jointly with Character Art and Tech Art.", "Approve facial and body rigs that support the full required range of gameplay and cinematic performance.", "Set deformation quality bars so joints, faces, and muscles read correctly under extreme motion.", "Ensure rigs are consistent and reusable so animation scales across a large cast.", "Validate rigs against actual performance demands before animation production ramps."], "issues": ["Models deform poorly under motion, exposing collapsing joints and broken faces.", "Rigs cannot support the required performances, capping emotional and gameplay range.", "Inconsistent rigs force per-character animation rework, blowing the schedule.", "Rig problems discovered mid-production trigger costly remodel-and-rerig loops."]}, {"title": "5. Emotional & Cinematic Performance", "label": "Issues if Cinematic Beats Don't Land", "resp": ["Define the performance bar for facial and body acting in cinematic and narrative moments.", "Direct or approve key cinematic performances so emotional beats land as written.", "Coordinate performance with Narrative, Cinematics, and Audio so acting, framing, and sound unify.", "Set standards for mocap cleanup, keyframe polish, and facial performance quality.", "Validate that emotional beats read clearly to players, not just to the team that authored them."], "issues": ["Cinematic beats fall flat because performances lack the emotional clarity the story needs.", "Faces and bodies fail to act convincingly, undermining narrative investment.", "Performance, dialogue, and framing fall out of sync, draining scenes of impact.", "Inconsistent performance polish makes some scenes feel AAA and others amateur."]}, {"title": "6. Animation Production Scale & Tax", "label": "Issues if the Animation Tax Explodes", "resp": ["Manage the 'animation tax' so every new system does not demand unaffordable bespoke animation.", "Define reuse, layering, and procedural strategies that scale animation across the game's content volume.", "Set realistic animation budgets per system and feature so scope stays achievable.", "Champion tooling (retargeting, procedural, motion matching) that multiplies animator productivity.", "Prioritize bespoke effort where it matters most and standardize the long tail."], "issues": ["Every system needs custom animation and production cannot scale, forcing cuts or crunch.", "Without reuse strategy, animation becomes the bottleneck that gates all other features.", "Under-budgeted systems ship with thin, repetitive animation that feels cheap.", "Lack of tooling investment forces the team to grind volume by hand."]}, {"title": "7. Partnering with Design", "label": "Issues if the Design Partnership Becomes Tribal", "resp": ["Treat input feel as a shared mandate with Design rather than a turf war over frames and cancel windows.", "Establish a joint process for tuning the animation-design boundary of game feel.", "Embed in combat and systems design early so animation needs are planned, not bolted on.", "Resolve quality-versus-responsiveness tradeoffs collaboratively and explicitly.", "Build shared metrics and reviews so both disciplines evaluate feel together."], "issues": ["Tribal warfare with Design over input feel poisons collaboration and stalls tuning.", "Animation and Design optimize separately, producing motion that is either pretty or responsive but not both.", "Late-added systems force reactive animation that compromises feel.", "Game feel becomes a battleground rather than a shared, iteratively refined goal."]}, {"title": "8. Partnering with Character Art & Tech Art", "label": "Issues if the Pipeline Partnership Breaks", "resp": ["Align topology, rig, and pipeline standards with Character Art and Tech Art before production ramps.", "Co-own deformation results, treating the animated character as the joint deliverable.", "Champion animation tooling and pipeline robustness with Tech Art so production scales reliably.", "Resolve modeling-rigging-animation tradeoffs jointly to avoid local optimization.", "Validate the full character-to-animation pipeline end to end before committing to volume."], "issues": ["Misaligned topology and rigs cause deformation failures and costly remodel loops.", "Character, Animation, and Tech Art blame each other for pipeline problems.", "Without tooling investment, the pipeline is fragile and animation throughput stalls.", "Local optimization by each discipline produces a brittle, integration-bug-ridden pipeline."]}], "topConsequences": ["On the project, the game feels floaty, stiff, or lifeless, undermining game feel and the emotional weight of cinematics.", "The animation tax balloons and production cannot scale, gating features and forcing cuts or crunch.", "Rig and deformation failures trigger expensive remodel-and-rerig loops late in production.", "Gameplay and cinematic animation disconnect, breaking the sense of coherent, believable characters.", "Across a studio, the lack of a motion language and animation tooling means every project re-derives feel and rebuilds pipelines.", "Top animators leave for studios with clearer motion direction and better tooling, thinning a scarce talent pool.", "Across multiple studios, animation quality and feel vary per project, undermining the publisher's reputation for satisfying, expressive games."], "bottomLine": "The Animation Director owns whether characters feel alive, responsive, and emotionally convincing, or floaty, stiff, and hollow. Success is a clear motion language, gameplay that feels great in the hands, cinematics that land emotionally, and a production that scales within the animation tax. Failure is movement players sense is wrong but cannot name, a pipeline that cannot keep up, and cinematics that fall flat, because animation is what turns static art into a living world."}, "ui-art-director": {"sections": [{"title": "1. UI Visual Language (Typography & Iconography)", "label": "Issues if the UI Language Is Inconsistent", "resp": ["Define the UI visual system: typography hierarchy, iconography style, color, spacing, and component grammar.", "Ensure the UI language reinforces the game's brand and tone, not a generic off-the-shelf look.", "Establish a component and style library so menus, HUD, and panels feel like one designed system.", "Set typographic hierarchy rules so information priority is clear at every screen size.", "Curate an icon set with consistent metaphor, weight, and silhouette so symbols read instantly."], "issues": ["The UI feels off-brand or generic, disconnected from the world it frames.", "Inconsistent typography and icons make the interface feel assembled from mismatched parts.", "Information hierarchy is muddy, so players cannot tell what matters on a screen.", "Icons are ambiguous, forcing players to read labels they should grasp at a glance."]}, {"title": "2. HUD Readability & Information Hierarchy", "label": "Issues if HUD Readability Fails", "resp": ["Design the HUD so critical information is instantly readable amid gameplay and over varied backgrounds.", "Establish a clear priority hierarchy so essential elements dominate and secondary ones recede.", "Define contrast, scale, and placement rules that keep the HUD legible across all environments.", "Balance information density against clarity so the screen never overwhelms the player.", "Validate HUD readability in real gameplay, including chaotic combat and busy scenes."], "issues": ["Players miss critical information because the HUD competes with the game behind it.", "An overloaded HUD overwhelms players, while a sparse one leaves them under-informed.", "Poor contrast makes the HUD vanish over certain backgrounds.", "Readability problems surface only in real play, after layouts are locked."]}, {"title": "3. Diegetic vs. Non-Diegetic UI", "label": "Issues if the Diegetic Strategy Is Muddled", "resp": ["Define where the UI lives in the fiction (diegetic, spatial, meta, non-diegetic) and apply it consistently.", "Decide how much UI is embedded in the world versus overlaid, balancing immersion and clarity.", "Ensure diegetic choices serve readability and accessibility, not immersion at the cost of usability.", "Coordinate in-world UI with Environment and Character so it integrates believably.", "Validate that the chosen approach holds up across all platforms and play conditions."], "issues": ["An inconsistent mix of diegetic and overlay UI feels arbitrary and confusing.", "Immersion-first choices sacrifice the readability players need to function.", "In-world UI integrates poorly with the environment, looking pasted on.", "The diegetic approach breaks down on some platforms or in some conditions."]}, {"title": "4. Motion & Feedback", "label": "Issues if UI Motion Misfires", "resp": ["Define UI motion language: transitions, feedback, and juice that make the interface feel responsive and alive.", "Ensure motion reinforces feedback and state changes without slowing players down.", "Set timing standards so animations feel snappy, not sluggish or gratuitous.", "Coordinate UI feedback with VFX and Audio so interactions land as unified moments.", "Provide options to reduce motion for accessibility and player preference."], "issues": ["Sluggish or excessive UI animation makes navigation feel slow and frustrating.", "Lack of feedback leaves players unsure their inputs registered.", "UI motion clashes with the game's feel, breaking cohesion.", "No reduced-motion option alienates players sensitive to animation."]}, {"title": "5. Localization & Internationalization", "label": "Issues if Localization Is an Afterthought", "resp": ["Design layouts that gracefully accommodate text expansion, contraction, and bidirectional scripts.", "Establish typography and spacing rules that hold across all shipping languages.", "Coordinate with localization early so UI is built for global release from the start.", "Validate critical screens in the longest and most complex languages, not just English.", "Ensure iconography and color choices read correctly across cultures."], "issues": ["Text overflows, truncates, or breaks layouts in languages other than the source.", "Bidirectional and complex scripts render incorrectly because they were not planned for.", "Last-minute localization forces emergency UI rework across every screen.", "Culturally inappropriate icons or colors cause confusion or offense in some markets."]}, {"title": "6. Accessibility Standards", "label": "Issues if Accessibility Is Neglected", "resp": ["Drive accessibility standards: color-blind support, scalable text, contrast, and reduced motion.", "Ensure the UI meets readability and operability needs across a wide range of player abilities.", "Build accessibility into the component system so it is default, not bolted on per screen.", "Coordinate with UX on input and navigation accessibility across control schemes.", "Validate accessibility features with real configurations and, where possible, real users."], "issues": ["Color-blind and low-vision players cannot read critical UI, drawing public criticism.", "Fixed small text excludes players and generates accessibility complaints.", "Accessibility bolted on late is incomplete and inconsistent across screens.", "Poor accessibility damages reception and increasingly fails platform requirements."]}, {"title": "7. Partnering with UX", "label": "Issues if the UX Partnership Conflicts", "resp": ["Treat UI Art and UX as one product, balancing visual identity with usability rather than competing.", "Establish a shared process so form and function are designed together from the start.", "Resolve beauty-versus-usability tradeoffs collaboratively and explicitly.", "Align on flows, wireframes, and visual design so handoffs are clean, not contested.", "Run joint reviews so UI and UX evaluate screens against both criteria together."], "issues": ["UI Art and UX teams clash constantly, slowing delivery and souring collaboration.", "Form-over-function produces beautiful but unusable UI; function-over-form produces usable but tonally wrong UI.", "Contested handoffs cause screens to churn between disciplines.", "The interface ends up serving one discipline's goals at the expense of the player."]}, {"title": "8. Scalability Across Platforms & Resolutions", "label": "Issues if UI Doesn't Scale", "resp": ["Design UI that scales across resolutions, aspect ratios, and platforms from handheld to large TV.", "Establish responsive layout and safe-area rules so screens hold up everywhere.", "Account for input differences (controller, touch, keyboard/mouse) in layout and navigation.", "Coordinate with engineering on a UI framework that supports the required scalability.", "Validate UI on the full matrix of target devices and input methods."], "issues": ["UI breaks or becomes unreadable on some resolutions or aspect ratios.", "Layouts designed for one input method are clumsy on others.", "Safe-area violations clip UI on TVs or notched displays.", "Per-platform UI fixes proliferate late, inflating cost and risk."]}], "topConsequences": ["On the project, the UI feels off-brand and hard to read, hurting usability, immersion, and first impressions.", "Accessibility and localization gaps damage reception, fail platform requirements, and force costly late rework.", "Constant UI-UX conflict slows delivery and yields an interface that serves neither beauty nor usability.", "UI that fails to scale across platforms breaks late, inflating risk near ship.", "Across a studio, the absence of a UI system and accessibility standard means every project rebuilds components from scratch.", "UI talent leaves for studios that respect the craft and partner UI with UX, thinning a specialized bench.", "Across multiple studios, UI quality and accessibility vary per project, exposing the publisher to reputational and compliance risk."], "bottomLine": "The UI Art Director owns the player's primary point of contact with the game's systems: whether the interface is on-brand, readable, accessible, and usable, or beautiful-but-unusable or usable-but-tonally-wrong. Success is a coherent UI system that reads instantly, scales across platforms and languages, meets accessibility standards, and partners cleanly with UX. Failure is an off-brand, hard-to-read interface that excludes players and breaks under localization and platform pressure, the first thing players judge and the last thing teams budget for."}, "concept-art-director": {"sections": [{"title": "1. Exploration Scope & Finish Level", "label": "Issues if Scope and Finish Are Mismanaged", "resp": ["Define what gets explored and to what level of finish, matching effort to the decision each concept must inform.", "Set finish-level tiers (thumbnail, rough, polished, paintover) so the team never over-renders an unproven idea.", "Prioritize exploration toward the questions production actually needs answered.", "Time-box exploration so the team converges rather than polishing options indefinitely.", "Balance breadth of options against depth of finish appropriate to each pre-production phase."], "issues": ["The team over-renders unproven ideas, wasting effort on concepts that get cut.", "Under-explored areas leave production guessing, causing downstream thrash.", "Effort is spread evenly instead of focused on the highest-stakes decisions.", "Polishing options indefinitely delays the convergence production depends on."]}, {"title": "2. Concept-to-3D Producibility", "label": "Issues if Concepts Don't Translate to Production", "resp": ["Ensure concepts are producible in 3D within the project's budgets, tools, and timeline.", "Build producibility checks into approval so beautiful but unbuildable concepts do not enter production.", "Partner with modeling, environment, and tech leads to validate feasibility before sign-off.", "Provide orthographics, callouts, and material notes that production can actually build from.", "Reconcile artistic ambition with the realities of topology, modularity, and performance."], "issues": ["Beautiful concepts cannot be built in 3D, forcing production to reinterpret or abandon them.", "Fidelity is lost in the handoff because concepts lacked the detail production needed.", "Infeasible designs reach production and trigger expensive redesign loops.", "Production builds compromised versions that disappoint against the concept."]}, {"title": "3. Convergence over Endless Exploration", "label": "Issues if the Team Never Converges", "resp": ["Drive exploration toward decisions, narrowing options and locking direction on a schedule.", "Recognize when enough has been explored and force a call rather than chasing more options.", "Structure exploration as funnels that converge, not open-ended idea generation.", "Protect the team from leadership thrash by getting and holding decisions.", "Balance creative openness against the production need for committed, buildable direction."], "issues": ["Endless exploration never converges, leaving production without a direction to build.", "Indecision and re-exploration churn the team and burn pre-production budget.", "Production starts on shifting ground because direction was never locked.", "The concept team is busy but the project cannot move forward."]}, {"title": "4. Reference Library & Visual Research", "label": "Issues if the Reference Foundation Is Weak", "resp": ["Build and curate the project's reference library so exploration is grounded in research, not guesswork.", "Organize references by subject, mood, and material so the whole team can self-serve.", "Establish research standards so concepts are informed by real-world logic and credible inspiration.", "Maintain the library as a living resource that production and outsourcers also draw from.", "Ensure references support authenticity and avoid inadvertent over-similarity to existing IP."], "issues": ["Concepts feel ungrounded and arbitrary without a strong research foundation.", "A disorganized library means the team wastes time re-gathering references.", "Production and vendors lack the reference context to interpret concepts correctly.", "Inadequate research leads to authenticity errors or unintended IP similarity."]}, {"title": "5. Quality Bar & Approval Gates", "label": "Issues if the Concept Gate Slips", "resp": ["Set the quality bar for concept output and gate work before it enters production.", "Approve concepts against feasibility, on-direction fit, and completeness, not just visual appeal.", "Establish review cadence and gates so problems are caught before production commits resources.", "Ensure approved concepts carry the documentation production needs to execute faithfully.", "Hold the line on the bar even under schedule pressure to push work downstream prematurely."], "issues": ["Production builds the wrong things beautifully because concepts were not properly gated.", "Incomplete concepts pass through, leaving production to fill gaps inconsistently.", "Without gates, off-direction work reaches production and propagates.", "Schedule pressure pushes unvetted concepts downstream, multiplying rework."]}, {"title": "6. Partnering Across Directors on Early Exploration", "label": "Issues if Cross-Director Alignment Fails", "resp": ["Partner with all art directors so concept exploration serves their disciplines' real needs.", "Align exploration with the overall art direction so concepts reinforce one identity.", "Coordinate hand-offs so each discipline receives concepts it can act on.", "Translate the art director's vision into explorable, decidable visual options.", "Facilitate early cross-discipline alignment so production starts unified."], "issues": ["Concept exploration drifts from what disciplines actually need, wasting effort.", "Concepts conflict with the overall direction, fragmenting the visual identity.", "Poor hand-offs leave each discipline interpreting concepts in isolation.", "Disciplines start production from misaligned concepts, causing later collisions."]}, {"title": "7. Concept Team Health & Anti-Service-Desk", "label": "Issues if the Team Becomes a Service Desk", "resp": ["Protect the concept team from becoming a reactive 'service desk' churning out disconnected requests.", "Prioritize and shield the team so they do creative exploration, not just on-demand illustration.", "Set expectations with stakeholders so requests are scoped, briefed, and purposeful.", "Invest in team growth and morale so the studio retains scarce concept talent.", "Balance responsiveness to production needs against the team's exploratory mandate."], "issues": ["Treated as a service desk, the concept team's quality and morale decline.", "Reactive request-churn crowds out the exploration that defines the role's value.", "Unscoped requests waste capacity and produce disconnected output.", "Talented concept artists leave when reduced to on-demand illustration."]}], "topConsequences": ["On the project, production builds the wrong things beautifully or thrashes because exploration was incomplete or never converged.", "Infeasible concepts force redesign loops and lost fidelity in the concept-to-3D handoff.", "A weak reference foundation and slipping gates let off-direction, ungrounded work propagate into production.", "The concept team degrades into a reactive service desk, losing the exploratory value it exists to provide.", "Across a studio, the absence of producibility discipline and a reference library means every project re-learns the handoff the hard way.", "Scarce concept talent leaves for studios that protect exploration, weakening pre-production capability.", "Across multiple studios, inconsistent concept-to-production discipline makes pre-production unreliable and inflates downstream rework portfolio-wide."], "bottomLine": "The Concept Art Director owns whether pre-production exploration converges on buildable, on-direction visuals or generates beautiful work that production cannot use. Success is right-sized exploration that converges, concepts that translate faithfully to 3D, a strong reference foundation, and a protected, exploratory team. Failure is endless exploration, infeasible designs, and a service-desk team, all of which mean production builds the wrong things beautifully, the most expensive mistake a game can make early."}, "visual-development-director": {"sections": [{"title": "1. Identity Discovery in Pre-Production", "label": "Issues if Identity Is Never Discovered", "resp": ["Lead the discovery of the project's visual identity: mood, palette, silhouette language, and world tone.", "Explore and converge on a distinctive look that differentiates the project in the market.", "Frame identity exploration around the project's pillars, fantasy, and emotional goals.", "Drive toward a locked, articulable identity rather than a loose mood board.", "Balance bold differentiation against feasibility and market readability."], "issues": ["The project enters production without a clear identity, so everyone interprets the look differently.", "Exploration produces mood boards but no decided, articulable direction.", "The look is generic or derivative, failing to differentiate the project.", "An identity too bold to build or too obscure to read sets production up to fail."]}, {"title": "2. Target Art & Pitch Visuals", "label": "Issues if Target Visuals Mislead", "resp": ["Produce target art and pitch visuals that sell the vision to greenlight and align the team.", "Ensure target images represent an achievable production reality, not an unattainable ideal.", "Craft pitch visuals that communicate the emotional and visual promise of the game.", "Annotate target art with the intent behind it so production understands the goal, not just the picture.", "Coordinate target visuals with the AD so they embody the agreed direction."], "issues": ["Pitch visuals are undercooked, weakening greenlight and stakeholder confidence.", "Target images depict a look production literally cannot achieve, guaranteeing disappointment.", "The team chases a misleading target, then blames itself for missing an impossible bar.", "Without intent annotations, production copies the surface and misses the point."]}, {"title": "3. Bridging Concept, Environment & Art Direction", "label": "Issues if the Disciplines Don't Cohere", "resp": ["Bridge concept, environment, character, and the AD so the emerging identity is unified across disciplines.", "Ensure character, environment, and effects exploration all express one coherent visual language.", "Facilitate alignment so disciplines converge on a shared identity rather than separate visions.", "Translate the AD's vision into concrete VisDev that disciplines can rally around.", "Resolve cross-discipline visual tensions before they harden into production silos."], "issues": ["Disciplines develop divergent looks that do not cohere into one identity.", "Character, environment, and effects feel like different games in pre-production.", "Lack of bridging leaves the AD's vision interpreted inconsistently.", "Cross-discipline tensions calcify and carry into production as silos."]}, {"title": "4. Hand-Off to Production", "label": "Issues if the Hand-Off Fails", "resp": ["Hand off a coherent, documented visual identity that production teams can execute against.", "Produce style guides, bibles, and reference packages that encode the identity for the whole team.", "Ensure the hand-off includes feasibility-validated direction, not just inspirational art.", "Coordinate with discipline directors so each inherits a clear, actionable foundation.", "Validate that production can actually start building from the materials provided."], "issues": ["Production starts before identity is locked, causing expensive rework.", "An undocumented identity erodes as different leads interpret it their own way.", "Inspirational-only hand-offs leave production without actionable direction.", "Discipline teams inherit ambiguity and diverge from the intended look."]}, {"title": "5. Knowing When to Step Back", "label": "Issues if VisDev Lingers into Production", "resp": ["Recognize when VisDev's job is done and transition ownership cleanly to production directors.", "Avoid letting VisDev linger and bloat pre-production beyond what the project needs.", "Time-box the discovery phase so the project moves into production on schedule.", "Empower discipline directors to own execution rather than holding the reins too long.", "Stay available as a consultant on identity without blocking production's momentum."], "issues": ["VisDev lingers into production, bloating pre-prod and delaying the build.", "Holding ownership too long disempowers the directors who must execute.", "An over-extended discovery phase burns budget without proportional value.", "The project cannot gain production momentum while identity is still being relitigated."]}, {"title": "6. Sustaining Identity through Production", "label": "Issues if Identity Erodes After Hand-Off", "resp": ["Stay engaged enough after hand-off that the identity does not erode as production scales.", "Provide periodic identity guardianship so drift is caught while still correctable.", "Support discipline directors in defending the look against pressure and compromise.", "Help reconcile production realities with the identity rather than abandoning it.", "Ensure the original intent remains legible as new hands join the project."], "issues": ["Disappearing after hand-off lets the identity erode through production drift.", "Without periodic guardianship, the shipped look diverges from the discovered identity.", "Discipline directors defend the look alone and lose ground under schedule pressure.", "New team members never absorb the original intent and dilute it."]}, {"title": "7. Differentiation & Market Positioning", "label": "Issues if the Look Fails to Differentiate", "resp": ["Ensure the discovered identity is distinctive enough to stand out in a crowded market.", "Balance originality against readability so the look is fresh but not alienating.", "Ground differentiation in the project's fantasy so distinctiveness feels intentional.", "Pressure-test the identity against competitors and market expectations.", "Make the look ownable, so it becomes recognizable brand equity."], "issues": ["The look blends in with competitors, surrendering marketing differentiation.", "Over-reaching for originality produces a look players find off-putting.", "Differentiation feels arbitrary because it is not rooted in the fantasy.", "A forgettable identity yields no brand equity for the franchise."]}, {"title": "8. Feasibility & Production Reality", "label": "Issues if Feasibility Is Ignored", "resp": ["Validate the identity against production budgets, tools, and timeline before locking it.", "Partner with tech and production leads so the discovered look is buildable at scale.", "Right-size ambition so the identity elevates the game without breaking the schedule.", "Identify the hard-to-build aspects early and plan how production will achieve them.", "Reconcile artistic ambition with the realities of the team and engine."], "issues": ["An infeasible identity forces production into compromises that betray the vision.", "Unbuildable target looks set up the team for disappointment and rework.", "Over-ambitious identity breaks the schedule before features are even built.", "Hard-to-build aspects discovered late derail production planning."]}], "topConsequences": ["On the project, production starts without a locked, buildable identity, causing expensive rework and a generic or incoherent look.", "Misleading target art sets an unattainable bar, guaranteeing disappointment and demoralizing the team.", "VisDev either lingers and bloats pre-production or disappears and lets the identity erode through production drift.", "The shipped look fails to differentiate, surrendering marketing and brand equity.", "Across a studio, weak VisDev discipline means projects repeatedly enter production on shaky visual foundations.", "Rare VisDev talent leaves for studios that value pre-production identity work, weakening the studio's ability to start projects well.", "Across multiple studios, inconsistent identity discovery makes greenlights riskier and franchises less visually ownable portfolio-wide."], "bottomLine": "The Visual Development Director owns the riskiest, highest-leverage moment of a project: discovering a distinctive, buildable visual identity and handing it cleanly to production. Success is a locked, documented, feasible identity that differentiates the game and survives the transition into production. Failure is undercooked pitches, misleading target art, and either lingering too long or vanishing too soon, because a project that enters production without a real identity pays for it in rework and a forgettable final look."}, "cinematics-director": {"sections": [{"title": "1. Shot Grammar & Cinematic Language", "label": "Issues if Shot Grammar Is Weak", "resp": ["Define the project's cinematic language: shot grammar, framing, camera movement, and editing conventions.", "Establish a consistent visual vocabulary so cinematics feel authored, not improvised scene to scene.", "Set conventions for coverage, eyelines, and continuity so scenes read clearly.", "Approve the cinematic style that all sequences and contributors work toward.", "Ground the cinematic language in film craft while respecting the realities of in-engine production."], "issues": ["Cinematics feel amateurish or inconsistent without a coherent shot grammar.", "Poor framing and continuity confuse viewers and break immersion.", "Each sequence looks directed by a different hand, fracturing the cinematic identity.", "Weak camera language undercuts even strong performances and writing."]}, {"title": "2. Pacing & Edit", "label": "Issues if Pacing Drags or Rushes", "resp": ["Own the pacing and edit of cinematics so scenes hold attention and land their beats.", "Control scene length and rhythm so cinematics never overstay or rush their welcome.", "Edit for clarity and emotional impact, cutting what does not serve the beat.", "Balance cinematic ambition against the player's appetite for non-interactive time.", "Validate pacing with fresh eyes, not only with the team immersed in the material."], "issues": ["Cinematics drag, and players disengage or skip them.", "Rushed edits muddle the story and rob beats of their weight.", "Bloated runtimes pull players out of the interactive experience.", "Pacing problems invisible to the team surface immediately with real players."]}, {"title": "3. Performance Bar", "label": "Issues if Performances Don't Land", "resp": ["Define and hold the performance bar for acting, facial animation, and emotional delivery.", "Direct or approve key performances so emotional beats land as the story intends.", "Coordinate performance with Animation and Audio so acting, voice, and motion unify.", "Set standards for mocap, facial capture, and keyframe polish across all cinematics.", "Validate that performances read emotionally to players, not just to the authoring team."], "issues": ["Cinematics fall flat because performances lack emotional clarity.", "Story beats that depend on acting fail to move players.", "Performance, voice, and motion fall out of sync, draining scenes of impact.", "Inconsistent performance polish makes some scenes feel premium and others cheap."]}, {"title": "4. In-Engine Cinematics Pipeline", "label": "Issues if the Cinematic Pipeline Misfires", "resp": ["Manage the in-engine cinematics pipeline so sequences are produced efficiently and integrate cleanly.", "Define tooling, sequencer, and asset standards specific to cinematic production.", "Ensure in-engine cinematics use the real game assets and world so they match gameplay.", "Coordinate the pipeline so cinematics do not block other disciplines' work.", "Champion cinematic tooling investment that scales the volume of scenes affordably."], "issues": ["Pipeline conflicts cause cinematics to block animation, environment, and other disciplines.", "Cinematics drift from gameplay assets and look like a different game.", "Without tooling, cinematic production cannot scale to the required scene count.", "Integration problems surface late, jeopardizing the schedule."]}, {"title": "5. Performance Budget Discipline", "label": "Issues if Performance Debt Explodes", "resp": ["Hold cinematics to a real performance budget rather than excusing cost because 'it's cinematics.'", "Define what is achievable for in-engine cinematics within the project's performance targets.", "Prevent cinematic ambitions from hijacking the budget gameplay depends on.", "Make deliberate quality-versus-cost decisions early, not in a late panic.", "Validate cinematics on target hardware, not only on high-end authoring machines."], "issues": ["Performance budget is hijacked by cinematic ambitions, hurting gameplay.", "Performance debt explodes under the excuse that cinematics are special.", "Cinematics that run only on dev machines force crude late downgrades.", "Late performance cuts gut cinematics after enormous effort."]}, {"title": "6. Partnering with Narrative & Audio", "label": "Issues if the Narrative/Audio Partnership Fails", "resp": ["Partner with Narrative so cinematics serve the story and characters as written.", "Coordinate with Audio so dialogue, score, and sound design unify with the visuals.", "Align on script, beats, and intent early so cinematics realize the narrative goals.", "Synchronize timing across performance, voice, and music so scenes land as one.", "Resolve story-versus-spectacle tradeoffs collaboratively with Narrative."], "issues": ["Cinematics drift from the narrative intent, undermining the story.", "Visuals and audio fall out of sync, draining emotional impact.", "Misalignment with Narrative causes rework as scenes are reshot.", "Spectacle overrides story, or story is staged without cinematic craft."]}, {"title": "7. Integration with the Main Project", "label": "Issues if Cinematics Become a Parallel Studio", "resp": ["Keep cinematics integrated with the main project rather than operating as an isolated parallel studio.", "Use shared assets, standards, and pipelines so cinematics and gameplay reinforce each other.", "Coordinate scheduling and dependencies so cinematics fit the overall production plan.", "Avoid pulling unscalable production-art standards into cinematics-only that the rest cannot match.", "Ensure cinematics and gameplay feel like one continuous, coherent experience."], "issues": ["Cinematics operate in isolation, drifting from the main project's look and standards.", "An isolated cinematics team duplicates effort and creates integration friction.", "Cinematics-only standards become unscalable and disconnected from the game.", "Players feel a jarring divide between cinematics and gameplay."]}, {"title": "8. Partnering with Lighting & Animation", "label": "Issues if Lighting/Animation Partnership Breaks", "resp": ["Coordinate with Lighting so cinematic lighting elevates scenes while staying shippable.", "Partner with Animation on performance, blocking, and the shared motion language.", "Align cinematic and gameplay lighting and animation so transitions feel seamless.", "Resolve feasibility tradeoffs jointly so cinematic ambition matches what can ship.", "Run joint reviews so lighting, animation, and direction evaluate scenes together."], "issues": ["Cinematic lighting is unshippable or clashes with gameplay lighting at transitions.", "Animation and direction misalign, producing performances that miss the staging.", "Jarring lighting and motion shifts between cinematics and gameplay break immersion.", "Feasibility disputes stall cinematic delivery and quality."]}], "topConsequences": ["On the project, cinematics fall flat emotionally, weakening the story and the moments meant to define the game.", "Pipeline conflicts let cinematics block other disciplines and drift from the gameplay look.", "Performance debt from cinematic ambition hijacks the budget and forces crude late downgrades.", "Cinematics operating as a parallel studio create a jarring divide between cutscene and gameplay.", "Across a studio, the absence of cinematic craft and pipeline discipline means every narrative project reinvents the approach.", "Cinematic talent leaves for studios with stronger film-language leadership, thinning a specialized bench.", "Across multiple studios, cinematic quality and integration vary per project, undermining the publisher's reputation for narrative spectacle."], "bottomLine": "The Cinematics Director owns whether the game's story moments land with film-grade craft or fall flat as expensive, skippable interruptions. Success is strong shot grammar, disciplined pacing, performances that move players, and cinematics that integrate with the project within a real performance budget. Failure is amateurish, dragging, off-budget cinematics that block other disciplines and feel like a different game, the difference between scenes players remember and scenes they skip."}, "outsource-art-director": {"sections": [{"title": "1. Vendor Selection & Onboarding", "label": "Issues if Vendor Selection Misfires", "resp": ["Select vendors matched to the project's style, discipline needs, scale, and quality bar.", "Run art tests and capability assessments before committing significant work.", "Onboard vendors thoroughly on the project's tools, pipeline, and standards.", "Build a vendor portfolio that balances capacity, specialization, and risk.", "Establish clear contracts and expectations on quality, scale, and timeline up front."], "issues": ["Poorly matched vendors deliver off-bar work that requires extensive rework.", "Skipping art tests means capability gaps surface only after work is committed.", "Weak onboarding leaves vendors guessing at pipeline and standards.", "An unbalanced vendor portfolio creates capacity or risk problems."]}, {"title": "2. Briefs & Style Guides for External Use", "label": "Issues if Briefs Are Too Vague", "resp": ["Author style guides and briefs precise enough for external teams to match the in-house bar without daily supervision.", "Include reference, examples, do/don't comparisons, and acceptance criteria in every brief.", "Translate in-house tacit knowledge into explicit documentation vendors can follow.", "Provide context (lighting setups, neighboring assets) so vendors build into the real game.", "Maintain living guides updated as the project's standards evolve."], "issues": ["Vague style guides mean everything comes back wrong and needs rework.", "Missing acceptance criteria make reviews subjective and contentious.", "Tacit in-house knowledge never reaches vendors, so they cannot hit the bar.", "Without context, vendor assets do not fit the real game environment."]}, {"title": "3. Quality Gates & Feedback Loops", "label": "Issues if Quality Control Lapses", "resp": ["Establish staged quality gates (blockout, first pass, final) so divergence is caught early and cheaply.", "Run consistent, actionable feedback loops so vendors improve over the engagement.", "Define clear acceptance criteria so reviews are objective and efficient.", "Catch off-bar work before it integrates and propagates through the build.", "Track vendor quality trends and intervene before problems compound."], "issues": ["Without staged gates, problems are caught only at final, when rework is most expensive.", "Inconsistent feedback leaves vendors repeating the same mistakes.", "Subjective reviews create friction and unpredictable outcomes.", "Off-bar work integrates and propagates before anyone notices."]}, {"title": "4. Cost / Quality / Scale Tradeoffs", "label": "Issues if the Tradeoff Is Mismanaged", "resp": ["Manage the balance of cost, quality, and scale to deliver the volume the project needs affordably.", "Match vendor tiers to asset tiers so spend aligns with the quality each asset warrants.", "Forecast capacity needs so outsourcing scales with production demand.", "Quantify the true cost of rework so cheap vendors are not falsely economical.", "Make deliberate tradeoff decisions with production and finance, not ad hoc."], "issues": ["Chasing low cost yields rework that erases the savings and blows the schedule.", "Mismatched vendor and asset tiers waste money or undershoot quality.", "Capacity misforecasts cause production stalls or idle vendor commitments.", "Hidden rework costs make outsourcing look cheaper than it really is."]}, {"title": "5. Vendor Relationships & Partnership", "label": "Issues if Vendors Are Treated as Adversaries", "resp": ["Treat vendors as partners, building durable relationships that improve quality over time.", "Communicate respectfully and clearly so vendors are invested in the project's success.", "Share context and intent, not just task lists, so vendors can exercise judgment.", "Resolve issues collaboratively rather than punitively to protect the relationship.", "Cultivate trusted long-term vendors who internalize the studio's standards."], "issues": ["Treating vendors as adversaries erodes goodwill, quality, and priority.", "Transactional relationships mean vendors do the minimum and improve little.", "Without shared intent, vendors cannot exercise the judgment quality requires.", "Punitive handling drives good vendors to prioritize other clients."]}, {"title": "6. Concentration Risk & Capacity Stability", "label": "Issues if Capacity Becomes Unstable", "resp": ["Avoid over-reliance on a single vendor by maintaining a resilient, diversified vendor base.", "Monitor vendor capacity and health so production is not blindsided by a partner's problems.", "Build contingency so a vendor's disruption does not stall production.", "Balance the efficiency of consolidation against the risk of concentration.", "Plan ramp-up and ramp-down so capacity tracks the production schedule."], "issues": ["Over-reliance on one vendor creates a single point of failure for production.", "Unstable vendor capacity stalls production unexpectedly.", "No contingency means a vendor's disruption directly hits the schedule.", "Poor ramp planning leaves the team over- or under-supplied at key moments."]}, {"title": "7. IP Security & Asset Management", "label": "Issues if IP Security Is Weak", "resp": ["Enforce IP and asset security across all vendor engagements to prevent leaks.", "Establish secure asset transfer, access control, and confidentiality standards.", "Vet vendors' own security practices before sharing sensitive material.", "Control what unreleased content vendors can access, limiting exposure.", "Maintain clear contractual and procedural protections for the studio's IP."], "issues": ["Weak vendor management leads to IP and asset leaks of unreleased content.", "Insecure transfer and access expose sensitive material.", "Unvetted vendor security practices create breach risk.", "Over-broad access multiplies the surface area for leaks."]}, {"title": "8. Integration & In-House Coherence", "label": "Issues if Vendor Work Doesn't Cohere In-House", "resp": ["Ensure outsourced assets integrate coherently with in-house work in the live build.", "Coordinate with discipline directors so vendor work meets their specific bars.", "Define integration ownership so assets land correctly in context, lighting, and pipeline.", "Audit the assembled result for vendor-versus-in-house divergence.", "Close the loop so integration feedback flows back into vendor briefs."], "issues": ["Vendor work reads as visibly different, breaking the game's coherence.", "Assets that pass review in isolation fail when integrated in context.", "Unclear integration ownership leaves vendor assets poorly assembled.", "Integration lessons never reach vendors, so the same divergence recurs."]}], "topConsequences": ["On the project, off-bar vendor work and rework costs explode, eroding savings and threatening the schedule.", "Vague briefs and lapsed quality gates let divergent assets propagate into the build.", "Concentration risk and unstable capacity stall production when a vendor falters.", "Weak IP security risks leaks of unreleased content, a reputational and legal hazard.", "Across a studio, the absence of vendor standards and relationships means every project rebuilds outsourcing from scratch.", "Skilled outsource leaders leave for studios with mature vendor programs, weakening the studio's ability to scale.", "Across multiple studios, inconsistent outsourcing discipline makes external capacity unreliable and inflates cost and risk portfolio-wide."], "bottomLine": "The Outsource Art Director owns whether external capacity multiplies the team's output at the in-house bar or becomes a source of rework, delay, and risk. Success is well-matched vendors, briefs precise enough to hit the bar unsupervised, staged quality gates, durable partnerships, and secure, coherent integration. Failure is vague guides, adversarial relationships, concentration risk, and assets that come back wrong, turning a cost-saving strategy into a money pit that drags down the whole production."}, "senior-discipline-director": {"sections": [{"title": "1. Cross-Project Quality Bar", "label": "Issues if Sister Projects Diverge", "resp": ["Own a consistent quality bar for the discipline across two or more concurrent titles.", "Define shared standards and reference benchmarks that sister projects measure against.", "Calibrate quality across projects so the publisher's titles read as a coherent caliber.", "Audit each project's discipline output against the shared bar and intervene on drift.", "Balance per-project creative autonomy against cross-project consistency."], "issues": ["Sister projects diverge in discipline quality, with one carrying the bar and others lagging.", "Without shared benchmarks, each project defines quality differently.", "Inconsistent caliber across titles weakens the publisher's discipline reputation.", "Quality drift goes uncorrected until it is visible in shipped products."]}, {"title": "2. Mentoring Project-Level Discipline Directors", "label": "Issues if Directors Operate Without Coaching", "resp": ["Coach and develop the project-level discipline directors who report into or align with this role.", "Provide the guidance, feedback, and growth that build a strong bench of discipline leaders.", "Help directors navigate cross-discipline conflict, scope, and leadership challenges.", "Transfer hard-won judgment and technique so directors mature faster.", "Identify and develop successors so the discipline's leadership is resilient."], "issues": ["Discipline directors operate without coaching, and bench depth stays thin.", "Directors repeat avoidable mistakes that mentorship would have prevented.", "Leadership challenges go unsupported, and directors burn out or stall.", "No succession pipeline leaves the discipline fragile to departures."]}, {"title": "3. Technique Evolution & Pipeline Upgrades", "label": "Issues if Upgrades Happen Project-by-Project", "resp": ["Drive technique and pipeline evolution for the discipline strategically across projects.", "Identify upgrades worth investing in once and propagating to all projects.", "Pilot new techniques on one project and roll the proven ones out broadly.", "Prevent each project from re-solving the same discipline problems in isolation.", "Champion shared tooling that raises the discipline's ceiling across titles."], "issues": ["Pipeline upgrades happen project-by-project rather than strategically, duplicating effort.", "Proven techniques on one project never propagate to the others.", "Each project re-solves the same problems, wasting time and money.", "The discipline's overall capability stagnates without coordinated investment."]}, {"title": "4. Execution Authority, Not Roving Critique", "label": "Issues if the Role Becomes a Roving Critic", "resp": ["Maintain real execution authority and accountability, not just opinions from the sidelines.", "Engage deeply enough in projects to be a partner in outcomes, not a drive-by reviewer.", "Balance cross-project oversight with hands-on involvement where it matters.", "Earn credibility through impact on shipped quality, not title alone.", "Define clear authority boundaries with project directors to avoid undermining them."], "issues": ["The role devolves into a roving critic with opinions but no accountability.", "Drive-by reviews frustrate project teams without improving outcomes.", "Lack of real authority means feedback is ignored.", "Ambiguous authority undermines the project directors it is meant to support."]}, {"title": "5. Fair Attention Across Projects", "label": "Issues if the Tentpole Gets All the Attention", "resp": ["Allocate attention across all projects in the portfolio, not just the highest-profile one.", "Ensure smaller or less glamorous titles still receive discipline leadership.", "Prioritize attention by need and risk, not just visibility.", "Protect the quality of every title under the role's scope.", "Balance the tentpole's demands against the rest of the portfolio's needs."], "issues": ["Favoring the tentpole leaves other projects' discipline quality neglected.", "Less visible titles ship below the bar due to thin leadership.", "Attention follows prestige rather than risk, and risky projects suffer.", "Portfolio quality becomes uneven, with predictable weak spots."]}, {"title": "6. Partnering with Head of Production on Capacity", "label": "Issues if Capacity Is Not Coordinated", "resp": ["Partner with Head of Production on cross-project capacity and resourcing for the discipline.", "Forecast discipline staffing needs across projects and align with production planning.", "Help balance specialists across titles so no project is starved or oversupplied.", "Coordinate shared and outsourced capacity at the portfolio level.", "Surface capability gaps that hiring or tooling must close."], "issues": ["Uncoordinated capacity leaves some projects under-resourced in the discipline.", "Specialists are misallocated, starving some titles and idling others.", "Portfolio-level outsourcing is duplicated or conflicting across projects.", "Capability gaps go unidentified until they hit a project's schedule."]}, {"title": "7. Avoiding Title Inflation", "label": "Issues if the Role Is Just a Longer-Tenured Director", "resp": ["Define and deliver genuine multi-project scope that justifies the senior title.", "Demonstrate impact beyond a single project's discipline leadership.", "Build cross-project standards, mentorship, and capability that a project director could not.", "Avoid occupying the title without exercising its broader mandate.", "Continuously prove the role's value through portfolio-level outcomes."], "issues": ["The role becomes title inflation: same scope as a project director, just longer-tenured.", "No cross-project impact materializes, and the seniority is nominal.", "Mentorship and standards work is neglected in favor of single-project firefighting.", "The organization questions the value of the senior layer."]}], "topConsequences": ["Across the portfolio, discipline quality diverges between titles, with weak projects dragging down the publisher's reputation in that craft.", "Without mentorship, the bench of project-level discipline directors stays thin and fragile to departures.", "Pipeline and technique improvements stay siloed per project, wasting investment and stalling the discipline's overall capability.", "The role risks becoming either a powerless roving critic or mere title inflation, eroding its credibility.", "Uneven attention and uncoordinated capacity leave predictable weak spots across the portfolio.", "Top discipline leaders leave when senior leadership adds no real value, accelerating capability decline.", "The discipline fails to mature into a portfolio-wide strength, leaving the studio reliant on heroics per project."], "bottomLine": "The Senior Discipline Director owns a single craft across multiple titles, holding the cross-project quality bar and growing the next generation of discipline directors. Success is consistent caliber across the portfolio, a deep mentored bench, and pipeline improvements that propagate rather than repeat. Failure is divergent sister projects, a powerless roving-critic posture, and title inflation, because the role only earns its seniority by lifting the whole portfolio's discipline beyond what any single project director could."}, "head-of-discipline": {"sections": [{"title": "1. Studio-Wide Capability Roadmap", "label": "Issues if Capability Falls Behind", "resp": ["Own the long-range capability roadmap for the discipline across the entire studio.", "Define where the discipline must be in skills, tools, and techniques over multiple years.", "Benchmark the discipline against the industry and close gaps deliberately.", "Sequence capability investments so they compound rather than scatter.", "Align the roadmap with the studio's future project ambitions."], "issues": ["The discipline under-invests in capability and falls behind the industry.", "Without a roadmap, capability grows reactively and unevenly.", "Industry gaps widen unnoticed until projects cannot deliver expected quality.", "Capability investments scatter without compounding into real advantage."]}, {"title": "2. Hiring, Leveling & Org Design", "label": "Issues if Hiring Stays Reactive", "resp": ["Own long-range hiring, leveling, and org design for the discipline studio-wide.", "Build leveling frameworks and career paths that retain and grow discipline talent.", "Plan hiring proactively against the project pipeline rather than reacting to crises.", "Define the discipline's org structure so leadership and bench depth are resilient.", "Calibrate leveling fairly and consistently across projects."], "issues": ["Hiring is reactive, and key seats stay empty too long, hurting projects.", "Without clear leveling, talent stalls and leaves for clearer paths elsewhere.", "Crisis hiring yields poor fits and inflated cost.", "Inconsistent leveling breeds inequity and discontent across the discipline."]}, {"title": "3. Tool & Pipeline Investment", "label": "Issues if Tooling Is Underfunded", "resp": ["Drive tool and pipeline investment that raises the discipline's productivity and ceiling studio-wide.", "Prioritize tooling bets by impact across projects, not by the loudest immediate need.", "Partner with engineering and tech art to build and maintain discipline tooling.", "Ensure tooling investments are adopted, supported, and sustained, not abandoned.", "Measure tooling ROI in quality, throughput, and reduced crunch."], "issues": ["Underfunded tooling caps the discipline's productivity and quality ceiling.", "Tooling bets are made ad hoc and fail to deliver cross-project value.", "Built tools go unsupported and unadopted, wasting the investment.", "Without tooling, projects rely on crunch to hit quality and volume."]}, {"title": "4. Partnering with VP of Art on Tradeoffs", "label": "Issues if the Discipline Is Politically Isolated", "resp": ["Partner with the VP of Art on cross-discipline tradeoffs and shared studio priorities.", "Represent the discipline constructively in the broader art organization's decisions.", "Negotiate resourcing and standards in service of the whole, not just the discipline.", "Build relationships across disciplines so the discipline is integrated, not siloed.", "Translate discipline needs into the language of studio-level priorities."], "issues": ["The discipline becomes politically isolated from the rest of art.", "Cross-discipline tradeoffs go against the discipline because it lacks a constructive voice.", "Siloed posture breeds friction and excludes the discipline from key decisions.", "Discipline needs are dismissed because they are not framed at the studio level."]}, {"title": "5. Avoiding Empire-Building", "label": "Issues if the Discipline Optimizes for Itself", "resp": ["Optimize for the studio's overall success, not for the discipline's headcount or prestige.", "Make tradeoffs that serve projects even when they constrain the discipline.", "Resist the temptation to grow the discipline beyond what the studio needs.", "Align discipline goals with studio outcomes transparently.", "Build trust by being a good citizen of the broader organization."], "issues": ["Empire-building optimizes the discipline at the studio's expense.", "Over-growth saddles the studio with cost it does not need.", "Self-serving tradeoffs erode trust with other leaders.", "The discipline is seen as a fiefdom rather than a partner."]}, {"title": "6. Project-Level Credibility", "label": "Issues if the Role Is Seen as 'Corporate'", "resp": ["Stay close enough to projects to retain craft and execution credibility.", "Engage with real production problems so the role is not seen as detached.", "Balance strategic work with visible support for project teams.", "Maintain hands-on judgment so directors respect the role's guidance.", "Demonstrate that studio-level decisions improve, not burden, project work."], "issues": ["The role loses project-level credibility and is treated as 'corporate.'", "Detachment from production makes guidance feel out of touch.", "Project teams route around a leader they do not respect.", "Strategic decisions are resisted because they seem disconnected from reality."]}, {"title": "7. Head vs. Creative Director of the Discipline", "label": "Issues if the Two Roles Are Confused", "resp": ["Distinguish leading a discipline's organization from being its creative director.", "Focus on capability, people, and tools rather than dictating creative direction on every project.", "Empower project-level directors to own their titles' creative discipline decisions.", "Provide creative guidance through standards and mentorship, not override.", "Clarify the role's mandate so creative ownership stays with the right people."], "issues": ["Confusing head-of-discipline with creative-director-of-discipline causes overreach.", "Dictating creative on every project disempowers project directors.", "Creative bottlenecks form around one person's taste.", "The organizational mandate is neglected while the leader chases creative control."]}, {"title": "8. Long-Range Capability vs. Project Demands", "label": "Issues if Strategy Yields Entirely to Firefighting", "resp": ["Protect long-range capability investment against the constant pull of project firefighting.", "Reserve capacity and budget for strategic work that pays off across future projects.", "Balance responsiveness to current projects with building for the future.", "Make the case to leadership for sustained capability investment.", "Avoid letting every quarter be consumed by the nearest deadline."], "issues": ["Strategy yields entirely to firefighting, and capability never advances.", "Future-facing investment is repeatedly raided to plug current gaps.", "The discipline stays in perpetual reactive mode.", "Long-term competitiveness erodes while short-term fires are fought."]}], "topConsequences": ["Studio-wide, the discipline under-invests and falls behind the industry, capping the quality every project can reach.", "Reactive hiring and weak leveling leave key seats empty and drive talent away, thinning the discipline's bench.", "Underfunded, ad hoc tooling caps productivity and forces projects to rely on crunch.", "Political isolation or empire-building damages the discipline's standing in the broader art organization.", "Loss of project credibility or confusion with creative-director scope makes the role ineffective or obstructive.", "Long-range capability never advances because strategy is perpetually sacrificed to firefighting.", "The studio cannot reliably deliver the discipline at a competitive level, weakening its ability to win and ship ambitious projects."], "bottomLine": "The Head of Discipline owns a single craft across the whole studio: its capability roadmap, people, leveling, and tooling. Success is a discipline that keeps pace with the industry, hires and grows talent proactively, invests in tooling that lifts every project, and integrates well across art. Failure is falling behind, reactive hiring, underfunded tools, political isolation, and empire-building, because this role builds the durable capability that decides whether the studio can ship the discipline at a competitive bar, project after project."}, "vp-of-discipline-e-g-vp-of-character-art": {"sections": [{"title": "1. Multi-Studio Discipline Strategy", "label": "Issues if Multi-Studio Efforts Conflict", "resp": ["Own the strategy for the discipline across multiple studios in the portfolio.", "Align studios on where to share standards and where to preserve local autonomy.", "Coordinate so multi-studio discipline efforts complement rather than duplicate or conflict.", "Set portfolio-level direction for where the discipline must lead the market.", "Sequence investments so studios benefit from each other's advances."], "issues": ["Multi-studio discipline efforts duplicate or conflict, wasting investment.", "Studios pull in different directions without portfolio-level alignment.", "Advances in one studio never benefit the others.", "The discipline lacks a coherent strategic direction across the portfolio."]}, {"title": "2. Centralized R&D & Tooling", "label": "Issues if R&D Is Fragmented", "resp": ["Drive centralized R&D and tooling investment for the discipline at portfolio scale.", "Identify discipline bets worth funding once and deploying across studios.", "Build shared tooling and pipelines that raise the bar everywhere.", "Ensure central R&D is adopted by studios, not rejected as imposed.", "Measure R&D impact across the portfolio in quality and efficiency."], "issues": ["Fragmented R&D means every studio re-solves the same discipline problems.", "Central tooling is built but not adopted, wasting the investment.", "No shared advances accrue, so the portfolio's discipline stagnates.", "Studios duplicate expensive R&D in isolation."]}, {"title": "3. Talent Strategy at Industry Scale", "label": "Issues if Talent Goes to Competitors", "resp": ["Own talent strategy for the discipline at industry scale across all studios.", "Attract and retain industry-leading discipline talent the portfolio needs.", "Build pipelines, leveling, and mobility that develop talent across studios.", "Position the portfolio as a destination for the best in the discipline.", "Plan succession for the discipline's most critical leadership seats."], "issues": ["Industry-leading talent goes to competitors with named, credible discipline VPs.", "Without a talent strategy, studios compete with each other for the same people.", "Talent stalls and leaves for lack of cross-studio mobility and growth.", "Critical leadership seats lack credible succession."]}, {"title": "4. Representing the Discipline at Portfolio Level", "label": "Issues if the Discipline's Voice Is Missing", "resp": ["Represent the discipline in executive and portfolio-level decisions.", "Ensure the discipline's strategic needs inform greenlights and investment.", "Translate the discipline's value into portfolio and business terms.", "Advocate for the discipline where it can differentiate the portfolio.", "Bring the discipline's perspective to multi-studio planning."], "issues": ["The discipline's strategic voice is missing in portfolio decisions.", "Greenlights and investments ignore the discipline's needs and risks.", "The discipline is undervalued because its case is never made in business terms.", "Opportunities to differentiate through the discipline are missed."]}, {"title": "5. Standardization vs. Studio Autonomy", "label": "Issues if Standardization Hurts Studios", "resp": ["Balance portfolio standardization against the autonomy studios need to do their best work.", "Standardize where shared value is real and leave creative latitude where it matters.", "Roll out shared standards collaboratively so studios buy in rather than resist.", "Tailor the degree of standardization to each studio's context.", "Protect the local creative identity that makes each studio's output distinctive."], "issues": ["Forced standardization hurts studio autonomy and the quality it enables.", "Top-down mandates breed resistance and undermine adoption.", "One-size-fits-all standards ignore real differences between studios.", "Local creative identity is flattened, weakening distinctive output."]}, {"title": "6. Craft Trust vs. Pure Politics", "label": "Issues if the Role Becomes Purely Political", "resp": ["Maintain genuine craft credibility so the role is respected, not merely tolerated.", "Stay close enough to the work to make informed, trusted decisions.", "Balance executive politics with demonstrable expertise in the discipline.", "Earn influence through impact on quality, not position alone.", "Avoid becoming detached from the craft the role is meant to champion."], "issues": ["The role becomes purely political and loses craft trust.", "Detachment from the work makes decisions feel uninformed.", "Studios route around a VP they do not respect on craft.", "Influence rests on title alone and evaporates under pressure."]}, {"title": "7. Real Authority vs. Title on Paper", "label": "Issues if the Title Has No Real Authority", "resp": ["Secure real authority and mandate, not a title that exists only on paper.", "Establish clear decision rights relative to studio heads and the broader org.", "Convert the role's strategy into actual portfolio commitments and budget.", "Build the executive relationships that give the role genuine influence.", "Avoid a powerless figurehead position with no leverage over studios."], "issues": ["The title exists only on paper, with no real authority over studio heads.", "Strategy never converts into commitments because the role lacks leverage.", "Studio heads ignore a VP with no decision rights.", "The role becomes a figurehead, neither strategic nor operational."]}, {"title": "8. Rare-Role Realities & External Hiring", "label": "Issues if the Rare-Role Realities Are Misjudged", "resp": ["Acknowledge that the role is rare and exists only at very large publishers with real multi-studio scope.", "Define a mandate that justifies an exec-tier, almost-always-externally-hired discipline leader.", "Set realistic expectations for what one person can drive across many studios.", "Bring an industry-recognized name and network that the role's scarcity demands.", "Ensure the role is created for genuine portfolio need, not prestige or imitation."], "issues": ["The role is created without the multi-studio scope that would justify it.", "Expectations exceed what any individual can drive across many studios.", "A leader without industry stature cannot exercise the role's influence.", "The role exists for prestige, not need, and delivers little."]}], "topConsequences": ["Across the portfolio, multi-studio discipline efforts duplicate, conflict, or stagnate without coherent strategy and shared R&D.", "Industry-leading talent flows to competitors with credible discipline VPs, eroding the portfolio's edge in the craft.", "The discipline's strategic voice is absent from portfolio decisions, so greenlights and investment ignore its needs.", "Forced standardization or its opposite damages studio autonomy or surrenders shared value.", "Loss of craft trust or lack of real authority reduces the role to a political figurehead.", "Misjudging the rare-role realities creates an expensive position that delivers no portfolio impact.", "The publisher fails to make the discipline a portfolio-wide competitive advantage, despite the cost of an exec-tier leader."], "bottomLine": "The VP of Discipline is a rare, exec-tier owner of one craft across multiple studios, existing only at the largest publishers. Success is coherent multi-studio strategy, shared R&D and tooling, industry-leading talent, and a credible strategic voice that balances standardization against studio autonomy. Failure is duplicated effort, lost talent, a missing strategic voice, and a politically powerful but craft-detached figurehead, because a role this scarce and expensive is only justified when it turns the discipline into a genuine portfolio-wide advantage."}, "studio-head-gm": {"sections": [{"title": "1. Studio P&L & Business Health", "label": "Issues if Studio P&L Is Mismanaged", "resp": ["Owns the full studio profit-and-loss statement, accountable for revenue, cost of development, operating margin, and the burn rate against the funding or budget envelope agreed with the publisher or parent company.", "Builds and defends the annual operating plan and multi-year financial model, forecasting development spend, live-service revenue, royalties or recoup, and headcount cost across all active and incubating projects.", "Manages cash and runway discipline, ensuring the studio does not outspend its milestone or recoupment schedule and that committed projects remain funded to completion.", "Sets and tracks the unit economics that matter for the studio's business model - development cost per title for premium, or CAC, LTV, retention, and ARPDAU for live-service and free-to-play products.", "Reviews financial performance with finance and the publisher monthly or quarterly, explaining variances, re-forecasting honestly, and flagging risk early rather than at the milestone wall.", "Balances near-term profitability against the reinvestment needed for the next title, tooling, and talent so the studio is not strip-mined for margin at the expense of its future."], "issues": ["Runaway burn or a missed re-forecast forces emergency cost cuts, layoffs, or a project cancellation that could have been avoided with earlier honesty.", "A studio that consistently misses its financial plan loses the trust of the publisher or board and sees its funding, autonomy, and greenlight authority curtailed.", "Chasing short-term margin starves the next title and tooling, and the studio enters a slow decline that is invisible until two projects later.", "Misunderstanding the title's unit economics (especially for live-service) means the studio ships something that can never be profitable no matter how well it is made."]}, {"title": "2. Portfolio & Greenlight Strategy", "label": "Issues if Portfolio Strategy Is Weak", "resp": ["Decides what the studio works on - which concepts advance through incubation, which earn a full greenlight, which are killed, and how many bets the studio can responsibly carry at once.", "Shapes a portfolio that balances risk: proven IP or sequels for reliable revenue alongside new IP or genre bets that create future upside and keep the studio creatively alive.", "Sequences projects against studio capacity and the release calendar so teams transition cleanly between titles without idle benches or crushing overlap.", "Sets the bar for what 'greenlight-ready' means - a defensible creative vision, a credible business case, a realistic budget and schedule, and a team capable of delivering it.", "Makes the hard kill decisions on projects that have lost their creative or commercial case, redeploying talent before more capital is sunk.", "Aligns the portfolio with the parent or publisher's strategy (platform priorities, genre focus, live-service vs premium mix) without surrendering the studio's identity."], "issues": ["Greenlighting the wrong project - or too many at once - commits years of the studio's capacity and capital to an outcome that cannot succeed.", "An over-concentrated portfolio (one big bet, no hedge) turns a single slip or miss into an existential event for the whole studio.", "Refusing to kill a failing project drains money and morale and blocks the talent trapped on it from doing better work.", "A portfolio with no new bets becomes a sequel factory that loses its best creative talent and its relevance over time."]}, {"title": "3. Culture & Talent at Scale", "label": "Issues if Studio Culture Erodes", "resp": ["Owns the health and identity of the studio's culture - its values, working norms, sustainability of hours, and the felt sense of whether this is a place great people want to build careers.", "Sets the studio's stance on crunch, work-life sustainability, and production discipline, and holds leaders accountable for protecting teams rather than burning them to hit dates.", "Drives diversity, equity, inclusion, and safety as real operational commitments - hiring, advancement, pay equity, and a credible path for reporting and resolving harassment or misconduct.", "Monitors the leading indicators of cultural health - attrition, internal mobility, engagement survey results, exit-interview themes - and acts on them before they become public.", "Models the behavior the studio claims to value, since at scale the culture is what leaders tolerate, not what the values poster says.", "Protects the studio's culture during growth, acquisition, or remote/hybrid transitions when the things that made it special are most easily diluted."], "issues": ["Tolerated crunch or toxic leadership produces burnout, regretted attrition, and eventually a public reputation crisis that poisons recruiting for years.", "Unaddressed harassment or safety failures become legal liabilit
