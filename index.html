ies, press stories, and a permanent stain on the studio's and parent company's brand.", "High attrition drains institutional knowledge mid-project, forcing the studio to rebuild teams and slipping every schedule that depended on them.", "A culture that quietly rots is invisible on the P&L until the best people have already left and the next project underperforms."]}, {"title": "4. Hiring & Developing Department Heads", "label": "Issues if the Leadership Bench Is Weak", "resp": ["Hires, develops, and when necessary replaces the studio's department heads and discipline directors - art, design, engineering, production, and the studio's senior business functions.", "Builds a leadership team that is aligned on vision and strategy yet diverse enough in perspective to challenge each other and avoid groupthink.", "Coaches department heads into genuine general leaders who own outcomes across disciplines, rather than senior specialists defending their own craft turf.", "Sets clear ownership, decision rights, and accountability so leaders operate with autonomy inside a shared frame instead of escalating every conflict upward.", "Plans succession and depth for every critical leadership seat so the studio is not held hostage by the departure of any single person.", "Resolves leadership-team conflict decisively, because unaddressed friction at the top cascades into confusion and politics throughout the studio."], "issues": ["Weak or misaligned department heads let teams drift, and the studio head ends up doing their jobs instead of leading the studio.", "A leadership team that cannot resolve its own conflicts pushes politics and ambiguity down into every team below it.", "No succession depth means a single resignation creates a leadership vacuum that destabilizes a whole discipline mid-project.", "Promoting strong craftspeople into leadership without developing them produces leaders who hoard work and cannot scale their teams."]}, {"title": "5. Publisher, Platform & Partner Relations", "label": "Issues if Partner Relationships Sour", "resp": ["Serves as the studio's primary relationship owner with the publisher or parent company, negotiating funding, milestones, scope, and the terms of creative and operational autonomy.", "Manages first-party platform relationships (console makers, storefronts, distribution partners), securing marketing support, feature placement, hardware partnerships, and timely certification.", "Negotiates and stewards external partnerships - co-development, outsourcing, licensing, IP and brand deals - that extend the studio's capacity or reach.", "Translates between the creative reality of the teams and the commercial expectations of partners, defending the work without losing the partner's confidence.", "Manages up to the publisher or board: communicating risk honestly, setting realistic expectations, and never letting a partner be surprised by bad news.", "Protects the studio's negotiating leverage by delivering on commitments, since credibility earned over shipped milestones is the studio's real bargaining currency."], "issues": ["A broken publisher relationship leads to lost funding, tightened oversight, scope dictated from outside, or the project being moved or shelved.", "Neglected platform relationships cost the studio marketing beats, feature placement, and launch-window support that no amount of quality can recover.", "Surprising a partner with bad news at the milestone wall destroys trust permanently and converts a solvable problem into a relationship crisis.", "Over-promising to keep partners happy sets the teams up to fail and burns the studio's credibility on the next negotiation."]}, {"title": "6. Creative Bets & Risk Management", "label": "Issues if Creative Risk Is Misjudged", "resp": ["Decides how much creative and commercial risk the studio takes on, balancing safe execution against the ambitious bets that differentiate the studio and create breakout upside.", "Backs the creative leadership's vision when conviction is warranted, while applying the business discipline to test whether the bet is fundable, deliverable, and matched to a real market.", "Establishes the milestone, prototype, and kill-gate structure that lets the studio learn whether a risky idea is working before the full budget is committed.", "Owns the trade-off between innovation and predictability across the portfolio, ensuring at least some bets are de-risked enough to keep the lights on.", "Reads the market and platform trends to judge which risks are timely (a rising genre, a new platform) versus which are vanity bets disconnected from demand.", "Holds the line against scope creep and feature ambition that quietly converts a manageable risk into an unfundable one."], "issues": ["Backing a high-risk bet with no kill gates means the studio discovers it does not work only after the budget is spent.", "Reflexively avoiding all risk produces derivative products that never break out, and the studio is slowly out-competed by bolder rivals.", "Misreading the market times a big bet wrong - right idea, wrong moment - and the title launches into indifference.", "Unchecked scope ambition turns a calculated risk into a runaway project that consumes the capital meant for the studio's next two titles."]}, {"title": "7. Production, Delivery & Quality", "label": "Issues if Delivery Discipline Slips", "resp": ["Holds ultimate accountability for the studio shipping its titles on a defensible quality bar, within a realistic schedule, and without destroying the team to get there.", "Ensures production leadership has the milestone structure, risk tracking, and dependency management to deliver predictably, and intervenes when a project is silently slipping.", "Sets the studio's quality bar and the criteria for 'good enough to ship,' arbitrating the inevitable late-stage trade-offs between scope, polish, schedule, and cost.", "Owns the live-service operating reality where it applies - release cadence, content pipeline, server and ops reliability, and the post-launch support commitment.", "Makes the call to delay, descope, or ship, weighing the commercial cost of a slip against the brand cost of shipping something unfinished.", "Ensures post-mortems happen and that their lessons actually change how the next project is run."], "issues": ["A studio that repeatedly slips or ships broken erodes its commercial results and its reputation with players, press, and partners.", "Shipping under-baked to hit a date can do more lasting brand damage than a delay would have, especially for a new IP with one chance at a first impression.", "Live-service titles that miss their content cadence or suffer launch instability bleed players faster than any later fix can win them back.", "Without honest post-mortems the studio repeats the same production mistakes title after title."]}, {"title": "8. Studio Operations & Scale", "label": "Issues if Operations Don't Scale", "resp": ["Owns the operational machinery of the studio - facilities, IT and infrastructure, security, legal, HR, and the support functions that let creative teams focus on the work.", "Manages headcount planning and the build-vs-outsource-vs-contract mix so the studio scales capacity to its portfolio without over-hiring into a future cliff.", "Sets the working model (in-office, hybrid, remote, distributed) and the tooling and process to make it actually function across time zones and locations.", "Ensures the studio's central technology, pipelines, and shared services are funded and maintained so each project is not reinventing infrastructure.", "Manages compliance, data privacy, security, and the legal and regulatory obligations that scale with the studio's size and territories.", "Plans the operational implications of growth - new locations, satellite teams, or co-dev partners - before the scale outruns the systems that support it."], "issues": ["Over-hiring into a portfolio that contracts forces layoffs that damage morale, reputation, and the studio's ability to rehire later.", "Under-investing in shared tech and pipelines makes every project slower and more expensive than it needed to be.", "A security, privacy, or compliance failure at scale becomes a legal and reputational crisis that dwarfs any single project's stakes.", "Scaling headcount faster than operations and culture can absorb dilutes both and degrades the studio's output quality."]}, {"title": "9. Long-Term Vision & Studio Identity", "label": "Issues if the Studio Loses Its Identity", "resp": ["Defines and protects what the studio stands for - its creative identity, the kinds of games it is known for, and the long-term thesis that distinguishes it from every other studio.", "Sets a multi-year strategy that connects the current portfolio to where the studio intends to be in five years, in genre, platform, and capability.", "Builds the durable capabilities - technology, IP, talent, and brand - that outlast any single title and compound into the studio's long-term value.", "Decides which IP the studio invests in owning and building versus what it takes on as work-for-hire or licensed, shaping the studio's long-term equity in its own creations.", "Communicates the vision credibly enough that talent, partners, and the parent company stay bought into the long game even through a weak release.", "Resists the pressure to chase every trend, anchoring the studio's bets in a coherent identity rather than a scattershot reaction to the market."], "issues": ["A studio with no clear identity becomes interchangeable, unable to attract distinctive talent or command partner interest.", "Optimizing only for the current title builds no durable capability, IP, or brand, leaving nothing to compound into long-term value.", "Chasing trends without a thesis produces a confused portfolio and a studio that is always two years late to whatever it copies.", "Letting the parent company define the studio purely as a delivery vehicle erodes the creative identity that made it worth acquiring or funding."]}], "topConsequences": ["The studio misses its financial plan repeatedly, loses the confidence of the publisher or board, and sees its funding, autonomy, and greenlight authority stripped away.", "A concentrated bet on the wrong project commits years of capacity and capital to a title that cannot succeed, threatening the studio's survival.", "Culture rots quietly - crunch, toxicity, or unaddressed misconduct - until regretted attrition, a press crisis, and poisoned recruiting set the studio back for years.", "A weak leadership bench leaves the studio head doing department heads' jobs, with politics and ambiguity cascading into every team below.", "Broken publisher and platform relationships cost funding, launch support, and autonomy, converting solvable problems into existential ones.", "The studio ships late or under-baked one too many times, and its commercial results and reputation with players and partners enter a decline that is hard to reverse.", "No durable IP, tech, or brand is built, so even a hit leaves nothing that compounds, and the studio is only ever as healthy as its last title.", "The studio loses its creative identity and becomes an interchangeable delivery vehicle that cannot attract distinctive talent or command partner interest."], "bottomLine": "The Studio Head / GM runs a business that happens to make games - accountable for the P&L, the portfolio, the culture, the leadership bench, and the relationships that keep the studio funded and free, with art as one input among design, engineering, production, and business. Success looks like a financially healthy studio with a clear identity, a strong leadership team, durable capabilities, and the trust of its partners; failure looks like a studio that drifts financially or culturally, greenlights the wrong bets, burns out its people, and slowly loses the autonomy and relevance it once had. The job is won or lost not on any single title but on whether the studio is stronger, more capable, and more trusted at the end of each cycle than it was at the start."}, "chief-creative-officer": {"sections": [{"title": "1. Cross-Studio Creative Strategy", "label": "Issues if There Is No Creative Throughline", "resp": ["Sets the company-wide creative strategy that connects multiple independent studios into a coherent portfolio with a recognizable creative point of view.", "Defines what the company stands for creatively - the standards of quality, originality, and player experience that every studio's work is expected to reflect.", "Decides where studios should specialize, complement, or deliberately differ, so the portfolio covers the right genres and audiences without studios redundantly chasing the same space.", "Provides each studio's creative leadership a shared frame for ambition and quality while preserving the autonomy that makes individual studios distinctive.", "Aligns creative strategy with the company's business and platform strategy without letting commercial pressure flatten the creative ambition into safe sameness.", "Adjudicates when two studios' creative directions collide, conflict over shared IP, or compete for the same audience and positioning."], "issues": ["Without a throughline the portfolio drifts into a disconnected set of titles with no shared identity or compounding brand value.", "Studios reinvent creative strategy in parallel, duplicating effort and sometimes competing against each other for the same players.", "A company that stands for nothing creatively cannot build a reputation that attracts the best talent or earns the benefit of the doubt from players.", "Letting commercial pressure override every creative call produces a portfolio of safe, derivative products that never breaks out."]}, {"title": "2. Approving Major Creative Bets", "label": "Issues if Creative Bets Are Misjudged", "resp": ["Acts as the senior creative authority on the company's biggest greenlights - the new IP, genre shifts, and ambitious bets that carry the most creative and commercial risk.", "Judges whether a studio's creative vision is distinctive, deliverable, and matched to a real audience before the company commits major capital behind it.", "Establishes the creative gates and review checkpoints that let the company learn whether a big bet is working before its full budget is spent.", "Balances the portfolio of bets across the company - ensuring there are bold new swings as well as reliable franchise extensions, rather than all of one or the other.", "Provides candid, high-altitude creative feedback that strengthens a studio's vision without dictating it or undermining the studio's ownership.", "Knows when to back a studio's conviction against the data and when to overrule a beloved idea that the evidence says will not land."], "issues": ["Approving a major bet with no creative gates means the company discovers it does not work only after years and tens of millions are committed.", "Reflexively favoring legacy IP over new bets (or the reverse) starves half the portfolio and leaves the company exposed when the favored side cools.", "Overruling studios too readily teaches them to bring safe ideas, and the company stops generating the bold bets that create breakouts.", "A pattern of misjudged greenlights destroys the CCO's credibility with both the studios and the board and erodes their authority over future bets."]}, {"title": "3. Developing Studio Creative Leaders", "label": "Issues if Creative Leadership Doesn't Develop", "resp": ["Identifies, develops, and mentors the creative directors and studio creative leaders across the company, building the bench of people capable of carrying major creative bets.", "Coaches studio creative leaders to grow from strong individual visionaries into leaders who can scale a vision across large teams and multiple projects.", "Plans creative-leadership succession across studios so no studio's creative future depends on a single irreplaceable person.", "Calibrates the creative bar across studios so 'great' means the same thing company-wide, and shares what works between studios without homogenizing them.", "Recruits top external creative leadership when a studio needs vision it cannot grow internally, and integrates them without alienating the existing team.", "Creates the conditions - autonomy, trust, air cover, and access - that make the company a place where the industry's best creative leaders want to work."], "issues": ["Top creative talent leaves for competitors when the top of the house provides no mentorship, growth, or credible creative leadership to work under.", "No creative-leadership succession leaves a studio rudderless the moment its creative director departs.", "An inconsistent creative bar across studios means some ship excellence and others ship mediocrity under the same company brand.", "Failing to develop internal creative leaders forces expensive, risky external hires that often clash with established studio cultures."]}, {"title": "4. Cross-Studio Synergy & Knowledge Sharing", "label": "Issues if Studios Operate in Silos", "resp": ["Builds the mechanisms - creative reviews, shared learnings, internal showcases, communities of practice - that let studios learn from each other's successes and failures.", "Identifies where studios can share technology, tools, creative R&D, or proven approaches rather than each solving the same problem in isolation.", "Protects each studio's autonomy and distinctiveness while still capturing the upside that only a multi-studio company can realize.", "Facilitates talent mobility and collaboration across studios so people and ideas flow to where they create the most value.", "Spreads best practices in production, creative process, and quality without imposing a single rigid playbook that kills studio identity.", "Curates which cross-studio initiatives are genuinely worth the coordination cost and kills the ones that create more overhead than value."], "issues": ["Studios in silos repeatedly relearn the same expensive lessons and rebuild the same tools the company already owns.", "Failing to capture cross-studio synergy means the company is worth no more than the sum of its independent studios, undermining the rationale for owning them together.", "Heavy-handed standardization in the name of synergy erodes the autonomy and identity that made each studio worth acquiring.", "Mandated coordination with no real value adds overhead and meetings that slow every studio down."]}, {"title": "5. External Creative Representation", "label": "Issues if External Creative Stature Is Weak", "resp": ["Serves as the public creative face of the company - at industry events, in press and investor narratives, and in the eyes of the talent the company wants to attract.", "Articulates the company's creative vision and ambition in a way that excites players, recruits talent, and gives partners and investors confidence in the slate.", "Builds and leverages relationships across the industry - platform holders, partners, press, and the broader creative community - on behalf of the company's creative reputation.", "Represents the company's creative interests in major partnerships, IP deals, and platform negotiations where creative judgment must inform the terms.", "Stewards the company's creative brand and reputation, ensuring the external narrative matches the quality the studios actually deliver.", "Uses personal industry stature to open doors - to talent, partners, and opportunities - that the company could not access otherwise."], "issues": ["A weak or absent creative voice at the top leaves the company's reputation defined by others and makes it harder to attract marquee talent.", "An external narrative that overstates what the studios deliver erodes credibility with players and partners when the work does not match the promise.", "Neglecting industry relationships costs the company access to talent, partnerships, and platform support that stature would have unlocked.", "Without a credible creative figurehead, investors and partners discount the company's creative slate and the value of its IP."]}, {"title": "6. Portfolio Coherence & IP Strategy", "label": "Issues if the IP Portfolio Lacks Coherence", "resp": ["Shapes the company-wide IP strategy - which franchises to invest in, extend, rest, or retire, and where new IP must be created to refresh the portfolio.", "Ensures the portfolio balances dependable franchises against new bets so the company is neither over-reliant on aging IP nor starved of proven revenue.", "Guards the creative integrity and brand of major IP across the studios, sequels, spin-offs, and adaptations that draw on it.", "Decides how IP is leveraged across media, platforms, and studios without diluting or contradicting what made it valuable.", "Aligns the long-term IP roadmap with the company's business strategy and the realities of studio capacity and creative bandwidth.", "Champions the creation of genuinely new IP even when proven franchises are the easier near-term bet, protecting the company's future relevance."], "issues": ["Over-reliance on legacy IP leaves the company exposed when its core franchises age out and nothing new has been built to replace them.", "Diluting major IP across too many studios or inconsistent entries erodes the brand value that took years to build.", "A portfolio with no creative coherence confuses players about what the company stands for and weakens cross-title loyalty.", "Failing to fund new IP means the company is one franchise fatigue cycle away from a revenue cliff."]}, {"title": "7. Quality Bar & Creative Standards", "label": "Issues if Standards Drift Across Studios", "resp": ["Defines and defends a company-wide creative quality bar so the brand means the same level of excellence regardless of which studio shipped the title.", "Reviews work at major milestones across the portfolio with enough altitude to catch quality risk early without smothering studio ownership.", "Calibrates expectations so that a struggling project gets honest intervention while a strong one gets the freedom and trust it has earned.", "Establishes shared definitions of creative excellence - what 'great' looks like in vision, polish, and player experience - that travel across studios.", "Decides when a title is not meeting the bar and must be delayed, descoped, or in extreme cases cancelled to protect the company's reputation.", "Ensures lessons from both hits and misses feed back into the company's creative standards rather than being lost with each project."], "issues": ["An inconsistent quality bar means players never know what to expect from the company brand, undermining trust across the whole portfolio.", "Failing to intervene early on a quality-troubled title leaves the company shipping something that damages the brand for everyone.", "Smothering studios with quality oversight erodes the ownership and autonomy that produce the best work.", "A single high-profile quality failure under the company brand can taint the reception of every other studio's release."]}, {"title": "8. Balancing Autonomy & Alignment", "label": "Issues if the Autonomy Balance Is Wrong", "resp": ["Calibrates the central tension of the role - how much creative freedom each studio gets versus how much company-wide alignment is required.", "Gives studios real ownership of their visions while holding them to shared standards of quality, ambition, and strategic fit.", "Intervenes decisively when a studio is genuinely off course, and stays out of the way when it is delivering, reading the difference correctly.", "Defines clearly which creative decisions belong to the studio and which require company-level approval, so the boundaries are predictable rather than arbitrary.", "Builds trust with studio leadership so that company-level guidance is received as support rather than interference.", "Resists the temptation to make every studio's work reflect personal creative taste, distinguishing the company's standards from individual preference."], "issues": ["Micromanaging studios erodes their autonomy, demoralizes their leaders, and produces work that reflects the CCO's taste rather than the studio's strength.", "Being so hands-off as to be irrelevant lets struggling projects drift until it is too late to save them.", "Unclear decision rights create constant friction over who gets to make which creative call.", "Imposing personal creative preference across studios homogenizes the portfolio and alienates the distinctive creative leaders the company needs."]}, {"title": "9. Board, CEO & Investor Creative Representation", "label": "Issues if Creative Is Misrepresented Upward", "resp": ["Translates creative strategy and risk into terms the CEO, board, and investors can act on, connecting creative bets to business outcomes and timelines.", "Defends the time, capital, and risk tolerance that ambitious creative work genuinely requires against pressure for faster, safer, cheaper output.", "Gives leadership honest read-outs on the creative health of the slate - what is working, what is at risk, and what may need to slip or be cut.", "Builds the board's and CEO's confidence in the company's creative leadership and the long-term value of its IP and talent.", "Advocates for investment in new IP, talent, and creative R&D whose payoff is multi-year and therefore easy for short-term thinking to cut.", "Manages expectations so leadership is never surprised by a creative slip and understands the difference between recoverable risk and a real miss."], "issues": ["Failing to defend the realities of creative work lets the board impose timelines and budgets that guarantee compromised products.", "Overstating the creative health of the slate to leadership turns inevitable bad news into a credibility-destroying surprise.", "Unable to connect creative bets to business outcomes, the CCO loses the argument for the investment that ambitious work requires.", "If the board loses confidence in creative leadership, capital flows to safe extensions and the company's creative future is starved."]}], "topConsequences": ["The portfolio drifts with no creative throughline, the company stands for nothing distinctive, and its brand stops compounding value across titles.", "Major creative bets are misjudged at scale, with no gates to catch them, and tens of millions are committed to titles that cannot land.", "Top creative leaders leave for competitors because the top of the house provides no mentorship, no growth, and no credible vision to work under.", "Studios operate as disconnected silos, the company captures none of the synergy that justifies owning them together, and is worth no more than its parts.", "An inconsistent quality bar means a single high-profile failure taints the reception of every studio's work under the shared brand.", "Over-reliance on legacy IP with no new bets funded leaves the company one franchise-fatigue cycle from a revenue cliff.", "The wrong autonomy balance either smothers studios into homogenized mediocrity or lets troubled projects drift until they are unsalvageable.", "The board loses confidence in creative leadership, capital retreats to safe extensions, and the company's creative future is quietly starved."], "bottomLine": "The Chief Creative Officer is the company's senior creative conscience across many studios - setting the throughline, approving the biggest bets, developing the creative leaders, and representing the company's creative ambition to the industry and the board, all while protecting the autonomy that makes each studio distinctive. Success looks like a coherent, ambitious portfolio with a consistent quality bar, a deep bench of creative leaders, a healthy mix of franchises and new IP, and a creative reputation that attracts the best talent; failure looks like a directionless portfolio, misjudged bets, departed talent, and a company whose brand means nothing in particular. The role lives on the knife-edge between too much control and too little, and is judged over years on whether the company's collective creative output is greater, more distinctive, and more valuable than the studios could ever have produced alone."}, "president-head-of-studios": {"sections": [{"title": "1. Studio Portfolio Performance & Health", "label": "Issues if Portfolio Outcomes Are Uneven", "resp": ["Owns the performance of a portfolio of studios - their financial results, quality of output, cultural health, and strategic contribution to the company.", "Sets the performance expectations and operating rhythm for each Studio Head, reviewing financials, slate progress, and leading indicators of health on a regular cadence.", "Reads the portfolio as a portfolio - knowing which studios are reliable engines, which are high-upside bets, which are turnarounds, and allocating attention accordingly.", "Diagnoses underperformance early, distinguishing a temporary slip from a structural problem and prescribing the right intervention rather than a blanket one.", "Balances the portfolio's risk and return so the development organization as a whole delivers, even when individual studios miss.", "Holds Studio Heads accountable for outcomes while giving them the autonomy and air cover to run their studios as the businesses they are."], "issues": ["Studios drift in quality and culture and portfolio outcomes become uneven, with a few hits masking systemic weakness across the rest.", "Failing to diagnose underperformance early lets a fixable studio decline into a turnaround or a closure.", "Treating every studio the same - same metrics, same attention, same playbook - mismanages both the reliable engines and the fragile bets.", "An over-concentrated dependence on one or two studios turns any single miss into a problem for the whole development organization."]}, {"title": "2. Hiring & Developing Studio Heads", "label": "Issues if Studio Leadership Is Weak", "resp": ["Hires, develops, evaluates, and when necessary replaces the Studio Heads and GMs who run each studio, owning the single most consequential set of leadership decisions in the org.", "Serves as the peer and manager Studio Heads otherwise lack - someone who genuinely understands game development, P&L ownership, and the loneliness of the studio-leader seat.", "Coaches Studio Heads to grow as business leaders, not just as the discipline experts many of them were promoted from, and builds their judgment on portfolio, talent, and partner decisions.", "Builds a succession pipeline of future Studio Heads across the org so no studio is left leaderless and the company is not forced into risky external searches.", "Calibrates how each Studio Head is performing against the genuine difficulty of their situation, separating a hard hand well played from an easy hand played poorly.", "Makes the hard call to replace a Studio Head decisively when needed, since a wrong leader at the top of a studio compounds damage every quarter they remain."], "issues": ["Studio Heads with no peer or manager who understands development operate in isolation, and their blind spots go unchallenged until they cost a project or a culture.", "Hiring the wrong Studio Head puts an entire studio's people, P&L, and slate under flawed leadership for years.", "No succession pipeline forces risky, expensive external searches every time a Studio Head departs.", "Tolerating a failing Studio Head out of loyalty or inertia lets a whole studio decline before the inevitable change is finally made."]}, {"title": "3. M&A, Studio Openings & Closures", "label": "Issues if Studio Operations Are Mishandled", "resp": ["Leads the development organization's inorganic strategy - identifying, evaluating, and integrating studio acquisitions that add capability, IP, or talent.", "Decides when and where to open new studios, in which markets and for which strategic purpose, and staffs them with leadership capable of building from scratch.", "Makes and executes the hardest decisions in the role - winding down or closing studios that no longer fit the strategy or cannot be made viable - as humanely and responsibly as possible.", "Owns the integration of acquired studios: preserving the culture and talent that made them worth buying while connecting them to the company's systems, standards, and strategy.", "Conducts the due diligence that judges whether a target's talent, culture, IP, and pipeline are real and durable before the company commits the capital.", "Sequences openings, acquisitions, and closures against the company's capital plan and integration capacity so the org does not over-extend."], "issues": ["Acquisitions are made on a spreadsheet thesis, and the talent and culture that justified the price walk out the door within a year.", "M&A integrations stall - neither truly autonomous nor truly integrated - and the acquired studio stagnates while the company captures none of the value.", "Studio closures handled clumsily inflict needless human harm, destroy the company's reputation as an employer, and chill every future acquisition.", "Opening studios faster than the org can lead and integrate them spreads leadership thin and dilutes the culture across all of them."]}, {"title": "4. Capital Allocation Across Studios", "label": "Issues if Capital Is Misallocated", "resp": ["Allocates capital, headcount, and investment across the studio portfolio, deciding which studios and which bets get funded, scaled, sustained, or starved.", "Treats capital allocation as the core lever of the role - directing the company's limited investment toward the highest-return, best-led, most strategic opportunities.", "Funds new IP, tooling, and capability-building whose returns are multi-year, protecting them from being cut in favor of near-term certainty.", "Sets and enforces the bar for funding decisions - vision, business case, leadership, and strategic fit - so capital follows merit rather than internal politics.", "Reallocates from declining or over-funded studios to rising ones, killing or right-sizing bets that no longer justify their investment.", "Aligns capital allocation with the company's overall strategy and the CEO's and board's risk appetite, defending the development org's needs in that conversation."], "issues": ["Over-rotating to favorite studios while others wither starves viable opportunities and concentrates risk in a few bets.", "Funding by politics or inertia rather than merit sends capital to declining studios and starves the rising ones.", "Cutting multi-year investments in IP and capability for near-term margin leaves the portfolio with no future engines.", "Spreading capital too thinly across too many studios means none is funded to win and the whole portfolio underperforms."]}, {"title": "5. Portfolio & Greenlight Strategy", "label": "Issues if the Slate Strategy Is Weak", "resp": ["Shapes the development organization's overall slate - the mix of genres, platforms, business models, and risk levels across all studios' projects.", "Ensures the slate balances reliable revenue from proven franchises against the new bets that create the company's future upside.", "Sequences major releases across studios to avoid self-cannibalization, calendar collisions, and capacity conflicts over shared resources.", "Sets the bar and the gates for which projects across the portfolio advance to full production, and which are killed before more is sunk into them.", "Aligns the slate with platform and market trends and the company's strategic priorities without surrendering the studios' creative independence.", "Makes the portfolio-level kill and reprioritization calls that individual Studio Heads cannot make from inside their own studios."], "issues": ["A slate over-weighted to one genre, platform, or business model leaves the whole org exposed when that segment cools.", "Releases stacked into the same window cannibalize each other and waste marketing leverage.", "Weak greenlight discipline across studios commits capital to too many projects that should have been killed at the gate.", "A slate with no new bets leaves the org dependent on aging franchises with nothing in the pipeline to replace them."]}, {"title": "6. Culture & Talent at Scale", "label": "Issues if Culture Erodes Across Studios", "resp": ["Owns the health of culture across the entire development organization - its values, sustainability, safety, and reputation as a place the industry's best want to work.", "Sets the org-wide expectations on crunch, work-life sustainability, diversity, and conduct, and holds Studio Heads accountable for upholding them.", "Monitors the leading indicators of cultural health across studios - attrition, engagement, mobility, exit themes - and intervenes where a studio is drifting.", "Builds the talent strategy for the whole org - pipelines, mobility between studios, leadership development, and competitive, equitable compensation.", "Protects studio cultures during acquisition, growth, and reorganization, when the things that made them special are most easily lost.", "Establishes credible, org-wide mechanisms for reporting and resolving harassment and misconduct, and ensures they are actually trusted and used."], "issues": ["A toxic culture or misconduct scandal at one studio becomes a press and legal crisis that taints the whole development organization's reputation.", "High regretted attrition across studios drains institutional knowledge and slips every dependent schedule.", "Allowing studios to compete destructively for the same talent inflates costs and pits the org against itself.", "Cultural erosion is invisible on the financials until the best people have already left and outcomes start to slip."]}, {"title": "7. Board & CEO Representation", "label": "Issues if the Dev Org Is Misrepresented Upward", "resp": ["Represents the entire development organization to the CEO and board - its strategy, performance, risks, capital needs, and the realities of how games actually get made.", "Translates the messy, multi-year, creative truth of development into the financial and strategic terms the board can act on, without dumbing it down or sugar-coating it.", "Defends the time, capital, and risk tolerance that quality game development genuinely requires against pressure for faster, cheaper, safer output.", "Gives the board honest read-outs on portfolio health, slipping projects, and at-risk studios so leadership is never surprised by bad news.", "Secures the investment, headcount, and strategic patience the development org needs by connecting its plans credibly to business outcomes.", "Builds the board's and CEO's confidence in the development organization as a durable engine of value rather than a recurring source of cost and risk."], "issues": ["Failing to defend development's realities lets the board impose budgets and timelines that guarantee compromised products and burned-out teams.", "Overstating portfolio health to leadership turns an inevitable miss into a trust-destroying surprise.", "Unable to connect the dev org's needs to business outcomes, the President loses the argument for the investment quality requires.", "If the board comes to see studios as cost centers rather than capabilities, the whole development org is managed for cost-cutting rather than value-building."]}, {"title": "8. Studios as Capability, Not Cost Centers", "label": "Issues if Studios Are Treated as Cost Centers", "resp": ["Frames and defends studios as durable, value-creating capabilities - talent, IP, technology, and culture - rather than as fungible cost lines on a budget.", "Invests in the long-term capabilities of each studio - its proprietary tech, its IP ownership, its leadership bench - that outlast any single title.", "Resists the short-term pressure to strip studios for margin in ways that mortgage their future productivity and value.", "Maintains personal creative and development credibility so decisions about studios are made with understanding of how value is actually created, not just spreadsheet logic.", "Builds the case that a well-run studio compounds in value over time and deserves to be invested in, not just milked.", "Ensures that even cost discipline is applied surgically, protecting the core capabilities that make each studio worth owning."], "issues": ["Becoming a pure financial steward who loses creative and development credibility leads to decisions that look right on a spreadsheet and destroy value in reality.", "Treating studios as cost centers strips the long-term capability that made them valuable in the first place.", "Short-term margin extraction mortgages the next title's quality and the studio's ability to attract and keep talent.", "Losing development credibility means Studio Heads stop trusting the President's judgment and the relationship that makes the org function breaks down."]}, {"title": "9. Crisis, Reputation & Risk Management", "label": "Issues if Crises Are Mishandled", "resp": ["Owns the development organization's response to crises that cross studio lines - a failed major launch, a public misconduct scandal, a security breach, or layoffs.", "Manages the reputational stakes for the whole company's development brand, since a crisis at one studio reflects on every studio under the org.", "Maintains the organizational and financial resilience to absorb the inevitable misses without a single failure cascading across the portfolio.", "Leads decisively and humanely through the hardest moments - closures, restructurings, and cancellations - protecting people and reputation as far as possible.", "Builds the early-warning systems and honest reporting culture that surface problems while they are still solvable rather than after they explode.", "Coordinates with communications, legal, HR, and the CEO so the org speaks and acts coherently in a crisis rather than studio-by-studio."], "issues": ["A mishandled crisis at one studio metastasizes into a reputational and financial problem for the entire development organization.", "Without resilience, a single major miss or scandal cascades into layoffs, cancellations, and a loss of confidence across the portfolio.", "A culture that hides problems means crises surface only when they are already too large to contain.", "Clumsy, inhumane handling of layoffs or closures inflicts lasting reputational damage that suppresses recruiting and M&A for years."]}], "topConsequences": ["Portfolio outcomes turn uneven as studios drift in quality and culture, with a few hits masking systemic decline across the rest.", "The wrong Studio Heads - hired, kept too long, or left without a manager who understands development - put whole studios under flawed leadership for years.", "M&A integrations stall and acquired talent walks, so the company pays premium prices for value it never captures.", "Capital is allocated by politics and favoritism rather than merit, starving rising studios while declining ones consume investment.", "A culture or misconduct crisis at one studio becomes a press and legal event that taints the entire development organization's reputation.", "The board comes to see studios as cost centers, the whole org is managed for cost-cutting, and the capabilities that create long-term value are stripped away.", "Multi-year investments in new IP and capability are sacrificed for near-term margin, leaving the portfolio with aging franchises and no future engines.", "Loss of development credibility breaks the trust with Studio Heads and the board alike, and the President becomes a financial intermediary instead of a leader of the development org."], "bottomLine": "The President / Head of Studios runs a portfolio of studios as businesses and capabilities - accountable for their performance, their leaders, the capital that flows between them, and the inorganic moves that grow or reshape the org, while representing all of development to the CEO and board. Success looks like a healthy portfolio of well-led studios, capital flowing to merit, acquisitions that retain their value, new IP funded alongside reliable franchises, and a board that trusts development as a durable engine of value; failure looks like uneven studios under weak leaders, stalled integrations, capital chasing favorites, eroded culture, and an org managed as a cost center. The role is judged over years on whether the development organization as a whole is more capable, better led, more resilient, and more valuable than the studios would ever be apart."}, "principal-artist": {"sections": [{"title": "1. Establishing Studio-Wide Craft Standards", "label": "Issues if Studio Standards Fragment", "resp": ["Establish and own craft standards that hold across the entire studio and multiple projects, not just one team or feature.", "Define the through-lines of quality and technique that make the studio's output recognizably world-class.", "Reconcile differing standards between projects into a coherent studio identity where it matters.", "Set the long-horizon direction for where the studio's craft needs to be in two to three years.", "Make standards durable enough to survive leadership churn and project transitions."], "issues": ["Without studio-wide standards, each project drifts and the studio has no recognizable craft identity.", "Quality becomes a lottery depending on which team a player or candidate encounters.", "The studio falls behind competitors who do have a coherent, escalating craft bar.", "Every new project relitigates fundamentals instead of standing on a shared foundation."]}, {"title": "2. Technique & Tools R&D", "label": "Issues if R&D Stalls", "resp": ["Research, prototype, and validate new tools, techniques, and workflows before they hit production.", "Track the state of the art across the industry and decide what the studio should adopt, build, or ignore.", "Run real proofs of concept that de-risk new approaches with evidence, not enthusiasm.", "Kill promising-but-wrong directions early so production isn't betting on unproven tech.", "Translate research into adoptable, documented practice rather than leaving it as a demo."], "issues": ["The studio falls behind on technique relative to competitors who invest in R&D.", "Production teams gamble on unvalidated approaches that blow up mid-project.", "Promising research dies on the vine because it never gets translated into usable practice.", "The studio reacts to industry shifts late instead of being positioned ahead of them."]}, {"title": "3. Setting the Hiring & Portfolio Bar", "label": "Issues if the Hiring Bar Drifts", "resp": ["Define and calibrate the portfolio and craft bar used to hire artists across the studio.", "Anchor interview and portfolio review so standards stay consistent across teams and recruiters.", "Train hiring panels so they evaluate craft against a shared, defensible standard.", "Protect the bar against pressure to lower it during aggressive ramp-ups.", "Calibrate the bar to the studio's actual quality ambitions, not to whoever is available."], "issues": ["An inconsistent hiring bar lets quality vary wildly between teams from the moment people are hired.", "Lowering the bar under hiring pressure seeds long-term quality and mentorship debt.", "Untrained panels make idiosyncratic calls, and great candidates slip through while weak ones pass.", "The overall craft ceiling of the studio erodes one mis-hire at a time."]}, {"title": "4. Pipeline R&D with Tech Art", "label": "Issues if Pipeline Innovation Lags", "resp": ["Partner with tech art on pipeline and tooling R&D that raises quality or throughput studio-wide.", "Bridge the artist and tech-art worlds, framing craft needs as solvable tooling problems.", "Co-design workflows that scale across projects rather than one-off pipelines per team.", "Validate new pipelines on real content before they are rolled out broadly.", "Champion the investment case for tooling work to leadership when it's worth it."], "issues": ["Without principal-level partnership, pipeline investment chases the wrong problems.", "Per-project pipelines proliferate, fragmenting tooling and multiplying maintenance cost.", "Quality-limiting bottlenecks persist because no one bridges craft intent and tooling reality.", "Tech art and art talk past each other, and neither side's investment pays off."]}, {"title": "5. Mentoring Leads & Staff Artists", "label": "Issues if the Senior Bench Doesn't Develop", "resp": ["Mentor leads and staff artists, developing the studio's next layer of craft authority.", "Coach senior ICs on converting mastery into studio-wide influence.", "Model how to set standards, run R&D, and exercise authority without title.", "Create a clear North Star so high-end ICs can see a path that isn't management.", "Sponsor and grow the people who will eventually carry the principal-level load."], "issues": ["Without a North Star for IC growth, top talent caps out or leaves for management or other studios.", "The senior bench stays thin, concentrating studio-wide authority dangerously in one person.", "Staff artists lack a model to grow toward and stall.", "Succession risk mounts: if the principal leaves, the craft leadership vacuum is severe."]}, {"title": "6. Balancing Standards Against Shipping Reality", "label": "Issues if the Role Loses Production Grounding", "resp": ["Hold a high bar while staying connected to the realities and constraints of actually shipping games.", "Distinguish where excellence is non-negotiable from where pragmatic good-enough is correct.", "Time interventions so they raise quality without becoming a schedule-killing gate.", "Validate standards against live production rather than an idealized vision.", "Make trade-off calls that respect both craft and the ship date."], "issues": ["Becoming a perfectionist gatekeeper slows projects and breeds resentment toward the craft org.", "Disconnection from production reality produces standards teams can't actually meet.", "Ill-timed interventions turn quality into a bottleneck instead of a multiplier.", "Teams start routing around the principal, defeating the purpose of the role."]}, {"title": "7. Recruiting Pull & Studio Reputation", "label": "Issues if Recruiting Pull Weakens", "resp": ["Build enough credibility and named work that strong candidates want to work with or near you.", "Lend gravity to recruiting for senior and specialist roles.", "Strengthen the studio's craft reputation through the visible quality of its standards and output.", "Help convert top candidates by representing the depth of the studio's craft culture."], "issues": ["Weak recruiting pull means top-tier candidates choose competitors with named heroes.", "Senior and specialist roles stay unfilled or settle for weaker hires.", "The studio's craft reputation stagnates, compounding the hiring disadvantage over time.", "Without a draw at the top, the talent pipeline thins from the most important end."]}, {"title": "7b. Career-Path Ownership & IC Identity", "label": "Issues if There's No IC North Star", "resp": ["Embody and protect a genuine high-end IC path so craft mastery is a valid long-term career, not a consolation for not managing.", "Resolve, rather than resent, the personal choice to stay IC over moving to management.", "Advocate for IC comp, recognition, and influence to be on par with the management ladder.", "Demonstrate that an IC can shape the studio as profoundly as any manager."], "issues": ["Refusing management and then resenting peers who took it poisons relationships and credibility.", "Without a credible IC North Star, ambitious artists assume management is the only way up.", "The IC ladder loses legitimacy and the studio bleeds senior craft talent.", "The principal's own influence erodes if framed as a grudge rather than a chosen path."]}], "topConsequences": ["The studio falls behind competitors on technique because no one owns studio-wide standards and R&D.", "Hiring bar drifts inconsistently across teams, eroding the craft ceiling one mis-hire at a time.", "There's no North Star for IC growth, so top talent caps out, moves to management, or leaves.", "Top-tier candidates choose competitors with named heroes when recruiting pull is weak.", "Becoming a perfectionist gatekeeper or disconnecting from production makes the role a brake instead of a multiplier."], "bottomLine": "The Principal Artist job is 30% personal craft and 70% leverage: setting standards, running R&D, calibrating the hiring bar, and growing the next layer of craft leaders so the whole studio gets better. The role only works if the high bar stays grounded in shipping reality; the principal who becomes a perfectionist gatekeeper or loses touch with production turns into a brake the teams route around. At this level you are the studio's craft North Star, and that means making others great matters far more than what you personally model."}, "distinguished-fellow-artist": {"sections": [{"title": "1. External Representation & Industry Presence", "label": "Issues if the Studio Loses Visibility", "resp": ["Represent the studio externally through conference talks, articles, books, panels, and jury work.", "Shape the broader conversation in the discipline, not just internal practice.", "Convert the studio's craft achievements into public, citable industry contributions.", "Maintain a reputation that lends the studio credibility and gravity in the field.", "Choose external commitments that genuinely advance the studio's standing, not just personal brand."], "issues": ["Without external presence, the studio loses industry visibility and pull.", "The studio's craft achievements stay invisible outside its own walls.", "Competitors with public-facing heroes dominate the conversation and the talent market.", "If the public profile grows bigger than the actual studio contribution, the relationship becomes parasitic rather than symbiotic."]}, {"title": "2. Multi-Year Craft Initiatives", "label": "Issues if Long-Horizon Bets Are Missing", "resp": ["Drive craft initiatives that span multiple years and multiple projects.", "Set ambitious long-horizon goals for where the studio's art needs to be a generation of hardware or tooling from now.", "Sustain initiatives across the inevitable churn of projects, priorities, and people.", "Sequence big bets so they compound rather than scatter effort.", "Hold the line on initiatives whose payoff is years out against short-term pressure."], "issues": ["Without long-horizon initiatives, the studio optimizes only for the current project and stagnates.", "Big craft bets never mature because nothing sustains them past a single milestone.", "The studio is repeatedly caught flat-footed by industry shifts it could have prepared for.", "Effort scatters across disconnected experiments with no compounding payoff."]}, {"title": "3. Advising Leadership on Art Strategy", "label": "Issues if Strategy Lacks a Craft Voice", "resp": ["Advise studio and executive leadership on long-term art strategy and craft investment.", "Translate craft realities into terms leadership can weigh against business and schedule.", "Inform decisions on technology bets, studio positioning, and quality ambition.", "Give leadership honest counsel even when it's unwelcome, as a trusted craft conscience.", "Connect art strategy to recruiting, reputation, and the studio's long-term competitiveness."], "issues": ["Without a craft voice at the strategy table, leadership makes art-shaping decisions blind.", "Technology and positioning bets misfire because no one frames their craft implications.", "Quality ambition gets set by schedule and budget alone, with no long-term craft counterweight.", "If honest feedback stops flowing because the fellow has become untouchable, the counsel loses its value."]}, {"title": "4. Anchoring Top-Tier Recruiting", "label": "Issues if Elite Talent Goes Elsewhere", "resp": ["Act as the named draw that attracts elite, generation-defining talent to the studio.", "Personally engage top-tier candidates and convert them where ordinary recruiting can't.", "Lend the studio's recruiting the gravity of a recognized industry name.", "Help position the studio as the place ambitious craftspeople want to build their careers.", "Mentor incoming elite talent so they choose to stay and compound."], "issues": ["Top-tier candidates choose competitors that have named heroes the field recognizes.", "The studio can't close the most senior, most impactful hires.", "The talent pipeline thins at the very top, where one great hire matters most.", "Elite hires who do come don't stay because there's no one of stature to grow under."]}, {"title": "5. Defining the Studio or Franchise Craft Legacy", "label": "Issues if the Legacy Isn't Stewarded", "resp": ["Steward the craft identity that defines a studio or a franchise across titles and years.", "Author the through-lines that make the studio's work unmistakably its own.", "Protect the legacy work and standards that earned the studio its reputation.", "Ensure the craft identity evolves rather than ossifies as the field moves.", "Embed the identity deeply enough that it survives the fellow's eventual absence."], "issues": ["Without stewardship, the studio's defining craft identity dilutes across projects and leadership changes.", "A franchise loses the through-line that made it recognizable and beloved.", "Legacy standards either ossify into irrelevance or get abandoned under pressure.", "The identity stays personal to the fellow and evaporates the moment they leave."]}, {"title": "6. Developing the Next Generation of Craft Leaders", "label": "Issues if Succession Isn't Built", "resp": ["Develop principals, staff artists, and leads into the studio's enduring craft leadership.", "Transfer hard-won judgment and standards so they outlive any one person.", "Build a deep bench so studio-wide craft authority isn't concentrated in a single name.", "Create the conditions for the next distinguished-level talent to emerge from within.", "Make the studio's craft excellence a system, not a dependency on one legend."], "issues": ["Without succession, the studio's craft leadership is one departure away from a crisis.", "Judgment and standards stay locked in one person and don't propagate.", "Concentrating authority in a single legend creates extreme key-person and burnout risk.", "No next-generation leader emerges, and the studio's craft ceiling falls when the fellow eventually steps back."]}, {"title": "7. Sustaining Influence Without Becoming Untouchable", "label": "Issues if Feedback Stops Flowing", "resp": ["Stay genuinely connected to the work and the people rather than floating above them as a figurehead.", "Actively invite honest feedback and challenge so blind spots don't calcify.", "Guard against burnout from being the perpetual public face of the studio's art.", "Keep contributing real craft and judgment, not just a name and a presence.", "Balance external commitments against the internal work that earned the standing in the first place."], "issues": ["Becoming untouchable cuts off honest feedback, and the fellow's judgment quietly drifts.", "Burnout from being the perpetual face of art degrades both output and well-being.", "A public profile that outgrows real contribution makes the role hollow and the studio resentful.", "Disconnection from the actual work erodes the credibility the entire role depends on."]}], "topConsequences": ["The studio loses external visibility and industry pull, ceding the conversation to competitors.", "Top-tier, generation-defining candidates choose rival studios with named heroes.", "No long-horizon craft strategy exists, so the studio stagnates and gets caught flat-footed by industry shifts.", "The defining craft legacy of the studio or franchise dilutes and fails to outlive the people who built it.", "If the fellow becomes untouchable or burns out, honest feedback stops, judgment drifts, and the role goes hollow."], "bottomLine": "The Distinguished / Fellow Artist job is barely about personal asset output at all; it's about being the studio's craft conscience to leadership, its named draw in the talent market, and the steward of a legacy that must outlive you. The role is earned, not appointed, and the gravest failures are quiet ones: letting the public profile outgrow the real contribution, or becoming so untouchable that honest feedback stops flowing. You succeed when the studio's craft excellence becomes a durable system rather than a dependency on your name."}, "associate-artist": {"sections": [{"title": "1. Asset Production & Craft Execution", "label": "Issues if Execution Quality Slips", "resp": ["Produce assets that match the provided spec, concept, or callout sheet exactly, hitting the assigned poly/texel budgets and naming conventions.", "Work within established deadlines on clearly scoped, well-defined tasks such as kit pieces, props, trim sheets, or background set dressing.", "Match the visual target set by leads and senior artists rather than introducing personal stylistic choices.", "Keep files clean and pipeline-ready: correct pivots, UVs, scale, named materials, and organized scene hierarchy before handoff.", "Self-check work against the reference and the style guide before flagging it as ready for review."], "issues": ["Off-spec or sloppy assets bounce back through review, consuming senior time that should go to hero work.", "Minor props and set dressing quietly degrade scene quality because nobody scrutinizes them until it is too late.", "Broken pivots, bad UVs, or wrong scale cause downstream breakage in lighting, animation, or engine import.", "Missed budgets force a tech-art or optimization pass late in production."]}, {"title": "2. Pipeline & Tools Fluency", "label": "Issues if the Pipeline Isn't Learned", "resp": ["Actively learn the studio's DCC tools (Maya, ZBrush, Substance, Photoshop, the in-house engine) and the asset workflow end to end.", "Follow the export, import, and version-control process precisely so assets land correctly in engine.", "Absorb the studio's folder structure, naming conventions, and submission checklist until they are second nature.", "Ask for documentation or a walkthrough when a step in the pipeline is unclear instead of guessing.", "Build speed over time so routine tasks stop requiring constant reference."], "issues": ["Repeated pipeline mistakes create cleanup work and erode trust in the artist's handoffs.", "Slow tool ramp-up keeps onboarding cost high and delays the point where the artist is net-positive to the team.", "Version-control or export errors can corrupt shared files or break a build for others.", "Leads hesitate to assign anything non-trivial until basic pipeline reliability is proven."]}, {"title": "3. Feedback & Iteration", "label": "Issues if Feedback Isn't Absorbed", "resp": ["Take craft feedback iteratively and without ego, treating notes as information about the work rather than judgment of the person.", "Apply notes accurately on the first revision and carry the same lessons forward to future assets.", "Ask clarifying questions when a note is ambiguous instead of guessing at the reviewer's intent.", "Distinguish between subjective preference and craft-level corrections, and prioritize the latter.", "Show measurable improvement review over review as fundamentals tighten up."], "issues": ["Ignoring or misreading feedback forces reviewers to repeat the same note across multiple assets.", "Treating craft notes as personal slows the artist's growth and strains the mentoring relationship.", "The same mistakes recurring asset after asset signal a coachability problem that blocks promotion.", "Review cycles balloon, consuming the bandwidth of the very seniors meant to be producing hero content."]}, {"title": "4. Communication & Blocker Surfacing", "label": "Issues if Blockers Stay Hidden", "resp": ["Communicate blockers, confusion, and at-risk deadlines early, before they become schedule problems.", "Give honest status updates so leads have an accurate picture of what is actually done versus in progress.", "Ask questions openly rather than hiding uncertainty to appear competent.", "Confirm task understanding up front so work doesn't go far down the wrong path."], "issues": ["Hidden confusion leads to large amounts of work done wrong and thrown away.", "Late blocker surfacing turns small problems into missed milestones for the pod.", "Inaccurate status reporting undermines the lead's ability to plan and forecast.", "A pattern of silence makes the artist hard to manage and slows their ramp."]}, {"title": "5. Professionalism & Prioritization", "label": "Issues if Priorities Drift", "resp": ["Respect the priority order set by the lead and resist the urge to over-polish low-priority assets.", "Spend effort proportional to an asset's importance and screen time.", "Show up reliably, hit committed dates, and maintain basic professional consistency.", "Stay coachable and demonstrate visible willingness to learn the discipline's fundamentals."], "issues": ["Over-polishing background assets burns the schedule that hero and gameplay-critical work needs.", "Misjudged priorities mean important assets arrive late while trivial ones are gold-plated.", "Unreliable delivery makes the artist a planning risk the lead has to buffer around.", "A perception of low coachability stalls the path off the junior rung entirely."]}], "topConsequences": ["Seniors and leads spend their time fixing and re-reviewing instead of producing the high-value content only they can make.", "Scene quality quietly erodes as unscrutinized minor assets accumulate below the bar.", "Onboarding stays expensive and the artist remains net-negative to the pod longer than expected.", "A reputation for low coachability or hidden blockers blocks the move to independent ownership.", "Trust erodes to the point where the lead only assigns the smallest, lowest-risk tasks."], "bottomLine": "The Junior Artist job is maybe 50% making clean assets to spec and 50% being easy to grow: asking questions early, absorbing feedback without ego, and proving you can be trusted with bigger work. Raw talent matters, but coachability and reliability are what actually move you up. The fastest way to stall is to hide confusion and treat craft notes as personal."}, "artist-1": {"sections": [{"title": "1. Independent Asset Ownership", "label": "Issues if Ownership Isn't Real", "resp": ["Take an asset or feature area from brief to shippable quality without hand-holding, making sound craft decisions independently.", "Own the full lifecycle of your assets: blockout, high-poly, bake, texture, engine setup, and in-context review.", "Estimate your own work realistically and hit committed dates on moderately complex tasks.", "Solve common craft and technical problems yourself before escalating to a senior.", "Deliver work that passes review with minor notes rather than fundamental rework."], "issues": ["If a mid still needs constant supervision, the lead has effectively gained no capacity over a junior.", "Unreliable self-estimation throws off pod planning and milestone forecasts.", "Escalating routine problems upward keeps senior bandwidth tied up on solved questions.", "Assets that need fundamental rework at review erase the time savings independence was supposed to provide."]}, {"title": "2. Style-Guide Adherence & Consistency", "label": "Issues if Consistency Drifts", "resp": ["Apply the style guide consistently across an entire feature or area, not just on a single showcase asset.", "Hold material definitions, scale, silhouette language, and wear/edge treatment uniform across a set of assets.", "Reconcile your work against neighboring assets so a region reads as one cohesive environment.", "Internalize the art direction well enough to make on-the-fly calls that stay on-style.", "Flag genuine gaps or contradictions in the style guide rather than silently diverging from it."], "issues": ["Inconsistent quality across a feature makes a whole area read as patchy even when individual assets are decent.", "Style drift forces an AD or lead to do a cohesion pass that should never have been necessary.", "Mismatched materials and scale between adjacent assets break immersion and look amateurish in context.", "Silent divergence from the guide multiplies into a large, expensive correction across the set."]}, {"title": "3. Feedback & Continued Growth", "label": "Issues if Growth Plateaus", "resp": ["Keep taking feedback seriously even after reaching baseline competence, rather than coasting on 'knowing enough.'", "Apply notes across future work, not just the asset in front of you, so the same correction never recurs.", "Seek out feedback proactively on ambiguous calls instead of waiting for formal review.", "Expand your craft range deliberately into adjacent asset types or techniques.", "Reflect critically on your own work and self-correct before a reviewer has to."], "issues": ["An artist who resists feedback once comfortable stops growing and slowly falls behind the bar.", "Repeated identical notes signal stagnation and stall the case for promotion to senior.", "Plateaued range means the artist can only be assigned a narrow slice of the work.", "A 'know enough' attitude reads as arrogance and erodes the goodwill of reviewers."]}, {"title": "4. Early Mentorship of Juniors", "label": "Issues if Juniors Go Unsupported", "resp": ["Begin mentoring juniors on technique, tools, and pipeline through day-to-day guidance and over-the-shoulder help.", "Answer juniors' questions patiently and point them to the right reference or documentation.", "Give clear, craft-level feedback on junior work in a way that teaches rather than just corrects.", "Model good professional habits: clean files, honest status, and proportional effort.", "Escalate junior struggles to the lead when they exceed informal mentoring."], "issues": ["Without day-to-day craft guidance, juniors ramp slowly and lean entirely on overloaded seniors.", "Poorly taught technique propagates bad habits across the next cohort of artists.", "The lead becomes the only source of help, creating a bottleneck for the whole pod.", "Juniors plateau or churn when no one mid-level is invested in their growth."]}, {"title": "5. Pipeline Friction & Surfacing Problems", "label": "Issues if Friction Festers", "resp": ["Flag pipeline friction, tooling pain, and inefficient workflows to leads with concrete examples.", "Propose practical workarounds or improvements rather than just reporting that something is slow.", "Track recurring problems across your own work so the report carries evidence, not anecdote.", "Adopt new tools and pipeline changes quickly and give honest feedback on them."], "issues": ["Pipeline issues fester unaddressed because the people hitting them daily never surface them.", "Silent tolerance of friction normalizes slow workflows and bakes inefficiency into the schedule.", "Leads make tooling decisions blind without ground-truth from the artists in the trenches.", "Recurring problems compound across the team, costing far more than the early fix would have."]}, {"title": "6. Accountability & Project-First Mindset", "label": "Issues if Accountability Slips", "resp": ["Own outcomes fully rather than retreating to a 'still junior' framing to dodge accountability.", "Prioritize the project's needs over personal attachment to your own assets.", "Accept that assets may be cut, reworked, or reassigned for the good of the game.", "Hold a consistent quality bar across everything you ship, not just the pieces you enjoy."], "issues": ["Hiding behind a junior identity stalls trust and keeps the artist from being given real ownership.", "Getting protective of assets over the project's needs creates friction and slows necessary changes.", "Inconsistent quality between favored and unfavored tasks makes the artist unpredictable to staff.", "An ownership gap means someone more senior has to backstop the artist's commitments."]}], "topConsequences": ["The pod gains no real capacity if a mid still needs the supervision of a junior.", "Whole feature areas read as inconsistent, forcing leads and ADs into cohesion passes.", "Juniors ramp slowly and bottleneck on seniors because no one mid-level mentors them daily.", "Pipeline inefficiencies stay invisible and compound because the people hitting them never escalate.", "Stalled growth and weak accountability quietly close off the path to senior."], "bottomLine": "The Mid Artist job is 60% reliably owning shippable assets end to end and 40% making everyone around you a little better, surfacing friction, mentoring juniors, and holding consistency across a feature. The trap is treating competence as a finish line: the artists who stall are the ones who stop taking feedback and get protective of their own work once they 'know enough.' Real ownership means caring about the project's outcome, not just your asset."}, "staff-artist": {"sections": [{"title": "1. Defining the Quality Bar Across an Area", "label": "Issues if the Bar Isn't Coherent", "resp": ["Define explicit, durable quality benchmarks for a whole feature or area that span multiple pods doing similar work.", "Translate a fuzzy 'we know it when we see it' standard into concrete, teachable criteria and reference examples.", "Calibrate the bar across pods so quality is consistent regardless of which team produced an asset.", "Set acceptance criteria that reviewers and leads can apply without you in the room.", "Evolve the bar deliberately as the project, tools, and competitive landscape change."], "issues": ["Without a coherent bar, pods doing similar work ship visibly different quality levels.", "Quality becomes personality-dependent rather than a repeatable studio standard.", "Leads and reviewers waste cycles relitigating 'is this good enough' on every asset.", "The overall product reads as uneven because no one owns cross-pod consistency."]}, {"title": "2. Driving Technique Adoption Across Pods", "label": "Issues if Technique Stays Siloed", "resp": ["Identify superior techniques and drive their adoption across multiple pods, not just your own.", "Run workshops, breakdowns, and worked examples that move whole teams onto better methods.", "Win adoption through demonstrated results and persuasion rather than mandate.", "Retire outdated or inconsistent approaches in favor of a shared, validated standard.", "Follow through on adoption so techniques actually stick in production, not just in a slide deck."], "issues": ["Each pod reinvents techniques independently, producing inconsistent and inefficient results.", "Better methods stay trapped in one team while others toil with worse ones.", "Lack of follow-through means 'adopted' techniques quietly revert under deadline pressure.", "The studio loses the compounding efficiency that shared standards are supposed to create."]}, {"title": "3. Authoring Style Guides & Reference Libraries", "label": "Issues if Documentation Is Weak", "resp": ["Author style guides and reference libraries that artists across pods actually use in production.", "Document material standards, silhouette language, scale rules, and craft conventions clearly enough to act on.", "Build reusable reference: callout sheets, exemplar assets, do/don't comparisons, and benchmark renders.", "Keep documentation living and current as direction and tools evolve.", "Make the guide the single source of truth that resolves cross-pod disputes."], "issues": ["Without authoritative guides, every pod interprets the art direction slightly differently.", "Undocumented standards live only in senior heads and break the moment those people are unavailable.", "Stale guides actively mislead, and artists stop trusting documentation altogether.", "Onboarding and cross-pod transfers slow because there's no canonical reference to point to."]}, {"title": "4. Unblocking Complex Craft Problems", "label": "Issues if Hard Problems Stall", "resp": ["Serve as the go-to solver for the gnarliest craft and technical problems other artists can't crack.", "Dive into stuck assets, broken looks, or tricky pipeline interactions and find a workable path.", "Solve problems in a way that generalizes, so the fix becomes a reusable pattern, not a one-off rescue.", "Partner with tech art and engineering on issues that straddle craft and technology.", "Coach others through the solution so the same wall doesn't stop the next person."], "issues": ["Without a senior unblocker, complex problems stall pods for days and threaten milestones.", "One-off rescues that aren't generalized mean the same problem keeps recurring elsewhere.", "Hard looks get abandoned or compromised because no one could push them through.", "Cross-discipline issues fall through the cracks between art and engineering."]}, {"title": "5. Cross-Pod Influence & Standard-Setting", "label": "Issues if Influence Doesn't Land", "resp": ["Exercise influence across pods without formal authority, earning buy-in through credibility and results.", "Align multiple leads and seniors on shared standards through persuasion and worked demonstration.", "Spot inconsistency across the project early and drive convergence before it calcifies.", "Represent the craft perspective in cross-team planning and trade-off discussions.", "Build coalitions so standards are co-owned rather than imposed."], "issues": ["Influence that doesn't land leaves pods diverging despite a nominal standard existing.", "Standards imposed without buy-in get quietly ignored under production pressure.", "Cross-pod inconsistencies calcify and become expensive to unwind late in the project.", "The craft perspective loses a seat at the table in planning and scope decisions."]}, {"title": "6. Spreading Knowledge vs. Hoarding It", "label": "Issues if Knowledge Concentrates", "resp": ["Actively externalize expertise through docs, sessions, and pairing so capability scales beyond yourself.", "Treat your value as how much you raise others, not how indispensable you make yourself.", "Mentor seniors toward becoming the next staff-level talent.", "Make yourself replaceable on any single problem so the studio isn't fragile to your absence."], "issues": ["Becoming a 'guru' who hoards knowledge makes the studio dangerously dependent on one person.", "Capability fails to scale because expertise never leaves the expert's head.", "Seniors lack a model to grow toward and stall below staff level.", "Key-person risk concentrates, threatening continuity if the staff artist leaves or burns out."]}, {"title": "7. Staying Hands-On & Avoiding Role Drift", "label": "Issues if the Craft Edge Dulls", "resp": ["Stay hands-on enough on real production work to keep craft credibility and current technique.", "Guard against drifting into de facto management without the title, comp, or accountability that should come with it.", "Protect maker time against a meeting load that would erode the very expertise the role depends on.", "Keep validating standards against the realities of actual production, not theory."], "issues": ["Drifting into unofficial management means doing a manager's work without recognition or support.", "Losing the hands-on edge to meetings undermines the credibility the whole role rests on.", "Standards set from theory rather than practice stop matching what production can actually do.", "The studio gets neither a great IC nor a proper manager out of the role."]}], "topConsequences": ["Pods doing similar work ship visibly inconsistent quality because no coherent cross-pod bar exists.", "Techniques are reinvented independently per pod, wasting effort and producing uneven results.", "Standards live in one person's head, creating key-person risk and a fragile studio.", "Complex craft problems stall whole teams when the studio's senior unblocker isn't operating.", "The staff artist drifts into unrecognized management and loses the hands-on credibility the role requires."], "bottomLine": "The Staff Art
