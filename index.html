ure because nothing sustains them past a single milestone.", "The studio is repeatedly caught flat-footed by industry shifts it could have prepared for.", "Effort scatters across disconnected experiments with no compounding payoff."]}, {"title": "3. Advising Leadership on Art Strategy", "label": "Issues if Strategy Lacks a Craft Voice", "resp": ["Advise studio and executive leadership on long-term art strategy and craft investment.", "Translate craft realities into terms leadership can weigh against business and schedule.", "Inform decisions on technology bets, studio positioning, and quality ambition.", "Give leadership honest counsel even when it's unwelcome, as a trusted craft conscience.", "Connect art strategy to recruiting, reputation, and the studio's long-term competitiveness."], "issues": ["Without a craft voice at the strategy table, leadership makes art-shaping decisions blind.", "Technology and positioning bets misfire because no one frames their craft implications.", "Quality ambition gets set by schedule and budget alone, with no long-term craft counterweight.", "If honest feedback stops flowing because the fellow has become untouchable, the counsel loses its value."]}, {"title": "4. Anchoring Top-Tier Recruiting", "label": "Issues if Elite Talent Goes Elsewhere", "resp": ["Act as the named draw that attracts elite, generation-defining talent to the studio.", "Personally engage top-tier candidates and convert them where ordinary recruiting can't.", "Lend the studio's recruiting the gravity of a recognized industry name.", "Help position the studio as the place ambitious craftspeople want to build their careers.", "Mentor incoming elite talent so they choose to stay and compound."], "issues": ["Top-tier candidates choose competitors that have named heroes the field recognizes.", "The studio can't close the most senior, most impactful hires.", "The talent pipeline thins at the very top, where one great hire matters most.", "Elite hires who do come don't stay because there's no one of stature to grow under."]}, {"title": "5. Defining the Studio or Franchise Craft Legacy", "label": "Issues if the Legacy Isn't Stewarded", "resp": ["Steward the craft identity that defines a studio or a franchise across titles and years.", "Author the through-lines that make the studio's work unmistakably its own.", "Protect the legacy work and standards that earned the studio its reputation.", "Ensure the craft identity evolves rather than ossifies as the field moves.", "Embed the identity deeply enough that it survives the fellow's eventual absence."], "issues": ["Without stewardship, the studio's defining craft identity dilutes across projects and leadership changes.", "A franchise loses the through-line that made it recognizable and beloved.", "Legacy standards either ossify into irrelevance or get abandoned under pressure.", "The identity stays personal to the fellow and evaporates the moment they leave."]}, {"title": "6. Developing the Next Generation of Craft Leaders", "label": "Issues if Succession Isn't Built", "resp": ["Develop principals, staff artists, and leads into the studio's enduring craft leadership.", "Transfer hard-won judgment and standards so they outlive any one person.", "Build a deep bench so studio-wide craft authority isn't concentrated in a single name.", "Create the conditions for the next distinguished-level talent to emerge from within.", "Make the studio's craft excellence a system, not a dependency on one legend."], "issues": ["Without succession, the studio's craft leadership is one departure away from a crisis.", "Judgment and standards stay locked in one person and don't propagate.", "Concentrating authority in a single legend creates extreme key-person and burnout risk.", "No next-generation leader emerges, and the studio's craft ceiling falls when the fellow eventually steps back."]}, {"title": "7. Sustaining Influence Without Becoming Untouchable", "label": "Issues if Feedback Stops Flowing", "resp": ["Stay genuinely connected to the work and the people rather than floating above them as a figurehead.", "Actively invite honest feedback and challenge so blind spots don't calcify.", "Guard against burnout from being the perpetual public face of the studio's art.", "Keep contributing real craft and judgment, not just a name and a presence.", "Balance external commitments against the internal work that earned the standing in the first place."], "issues": ["Becoming untouchable cuts off honest feedback, and the fellow's judgment quietly drifts.", "Burnout from being the perpetual face of art degrades both output and well-being.", "A public profile that outgrows real contribution makes the role hollow and the studio resentful.", "Disconnection from the actual work erodes the credibility the entire role depends on."]}], "topConsequences": ["The studio loses external visibility and industry pull, ceding the conversation to competitors.", "Top-tier, generation-defining candidates choose rival studios with named heroes.", "No long-horizon craft strategy exists, so the studio stagnates and gets caught flat-footed by industry shifts.", "The defining craft legacy of the studio or franchise dilutes and fails to outlive the people who built it.", "If the fellow becomes untouchable or burns out, honest feedback stops, judgment drifts, and the role goes hollow."], "bottomLine": "The Distinguished / Fellow Artist job is barely about personal asset output at all; it's about being the studio's craft conscience to leadership, its named draw in the talent market, and the steward of a legacy that must outlive you. The role is earned, not appointed, and the gravest failures are quiet ones: letting the public profile outgrow the real contribution, or becoming so untouchable that honest feedback stops flowing. You succeed when the studio's craft excellence becomes a durable system rather than a dependency on your name."}, "lead-artist": {"sections": [{"title": "1. Pod Leadership & Task Ownership", "label": "Issues if Pod Leadership Is Weak", "resp": ["Own day-to-day task assignment for a pod of 3-6 artists in a single discipline, matching work to each person's strengths and growth needs rather than just availability.", "Break large feature or asset requests down into clear, estimable tasks with explicit acceptance criteria so artists know what 'done' looks like.", "Maintain a live picture of who is working on what, what is blocked, and what is at risk, and surface that picture daily to the pod and upward to production.", "Run lightweight pod rituals (standups, asset reviews, kickoffs) that keep the team aligned without drowning artists in meetings.", "Stay 30-50% hands-on, taking the hardest or most ambiguous assets yourself so you keep craft credibility and feel the real constraints the pod faces.", "Shield the pod from churn and unclear direction by absorbing and clarifying upstream changes before they hit individual artists."], "issues": ["Work is assigned by who is free rather than who is right, so artists grow unevenly and the hardest assets land on whoever happens to be idle.", "Without clear acceptance criteria, artists deliver work that gets bounced repeatedly, wasting days and eroding morale.", "Blockers stay invisible until a deadline slips, surprising production and damaging the pod's reputation.", "If the lead clings to 100% IC work, no one is actually steering the pod and it drifts into uncoordinated solo efforts."]}, {"title": "2. Quality & Consistency", "label": "Issues if Quality Ownership Slips", "resp": ["Own the quality bar and visual consistency within the pod's area, ensuring six artists' output reads as one coherent body of work.", "Give specific, craft-grounded feedback in reviews that teaches the artist why a change is needed, not just what to change.", "Codify recurring fixes into shared references, checklists, or style notes so the same feedback does not have to be given ten times.", "Calibrate the quality bar against the Art Director's intent and the project's technical budget, so 'good' means shippable, not just pretty.", "Catch consistency drift early by reviewing related assets side by side rather than in isolation."], "issues": ["The pod ships inconsistent work where quality visibly varies by individual, forcing expensive late-stage cleanup passes.", "Feedback that only points at problems without teaching means artists never internalize the bar and keep making the same mistakes.", "If the lead becomes the only acceptable reviewer, every asset funnels through them and they become the pod's bottleneck.", "An uncalibrated bar produces work that is either over-polished beyond budget or under-baked relative to the AD's vision."]}, {"title": "3. 1:1s & Performance Feedback", "label": "Issues if Performance Management Is Avoided", "resp": ["Hold regular 1:1s with every pod member, treating them as the artist's time to raise concerns, not just a status update.", "Give timely, direct feedback on both strengths and gaps, close to the moment, so small issues are corrected before they calcify.", "Name performance problems early, document them concretely, and partner with the artist on a concrete plan to improve.", "Recognize good work specifically and publicly so artists feel seen and understand what excellence looks like.", "Act as a two-way channel, carrying the artist's concerns about workload, direction, or friction upward and translating leadership context back down."], "issues": ["Performance issues go unaddressed until they become so severe the only remaining option is a firing that surprises everyone.", "Artists who never hear where they stand assume they are fine, then are blindsided at review time, destroying trust.", "Skipping or canceling 1:1s signals the pod does not matter, and disengagement quietly spreads.", "Hard conversations deferred for months turn routine coaching moments into crises and HR escalations."]}, {"title": "4. Estimation & Scheduling Input", "label": "Issues if Estimates Miss", "resp": ["Provide production with honest, defensible estimates for the pod's work, grounded in real velocity rather than optimism.", "Factor in review cycles, iteration, polish, and the experience level of who will actually do the work when sizing tasks.", "Flag risk and uncertainty explicitly, giving ranges and assumptions rather than single false-precision numbers.", "Track actuals against estimates over time so the pod's forecasts get more accurate each milestone.", "Negotiate scope or timeline early when the math does not work, instead of quietly accepting an impossible plan."], "issues": ["Estimates consistently miss, so production loses trust in the pod and starts padding or second-guessing every number.", "Optimistic sizing that ignores iteration leads to chronic crunch as the pod tries to absorb the gap with overtime.", "Hidden risk surfaces as last-minute slips that ripple into dependent teams' schedules.", "Without tracking actuals, the same estimation errors repeat milestone after milestone."]}, {"title": "5. Early Career Development", "label": "Issues if Growth Is Neglected", "resp": ["Hold growth conversations that go beyond the current task, helping each artist see a path forward in craft, scope, or eventual leadership.", "Match stretch assignments to development goals so artists build new skills on real production work.", "Advocate for your pod members' growth and recognition with your own manager and in calibration discussions.", "Pair less experienced artists with stronger ones to spread tacit craft knowledge across the pod.", "Recognize that not everyone should grow the way you did, and develop people toward their strengths rather than into copies of yourself."], "issues": ["Artists stagnate, see no future, and start looking elsewhere, costing the pod its strongest people.", "Promoting and championing only artists who work exactly like the lead narrows the pod and pushes out different but valuable styles.", "Stretch work given without support sets people up to fail rather than to grow.", "If growth is never discussed, your best people assume the path is blocked and quietly disengage."]}, {"title": "6. Maintaining Craft Credibility", "label": "Issues if Craft Credibility Erodes", "resp": ["Keep producing real production work at 30-50% so your feedback stays grounded in current tools, pipelines, and constraints.", "Stay current on the discipline's techniques so the pod sees you as a peer who can still do the work, not just delegate it.", "Take on the assets no one else can crack, demonstrating the standard you are asking the pod to hit.", "Translate AD vision into concrete, achievable craft direction the pod can actually execute."], "issues": ["A lead who stops doing the work loses the team's respect and gives feedback that feels disconnected from reality.", "Out-of-date craft knowledge produces direction that ignores current pipeline constraints, frustrating the pod.", "Without hands-on credibility, the lead cannot calibrate estimates or quality and becomes a pure scheduler.", "Refusing to ever stop being an IC turns the lead into a bottleneck reviewer who blocks the pod they are meant to enable."]}], "topConsequences": ["The pod ships inconsistent, uneven work that requires costly late cleanup and damages the discipline's reputation.", "Unaddressed performance issues fester until they become firings, attrition, or team-wide morale damage.", "Production stops trusting the pod's estimates, leading to padded schedules, second-guessing, and recurring crunch.", "Strong artists stagnate and leave because no one invested in their growth or championed them.", "The lead becomes a bottleneck reviewer who slows the pod instead of multiplying it, and never develops into a real people leader."], "bottomLine": "A Lead Artist is the first rung off pure IC work, owning one pod while still staying 30-50% hands-on. Success means the pod ships consistent work on credible estimates, every artist knows where they stand and where they are headed, and problems get named early. Failure looks like a lead who either refuses to stop being an IC and becomes a bottleneck, or avoids the hard conversations until small issues become firings."}, "senior-lead-supervising-artist": {"sections": [{"title": "1. Cross-Pod Coordination", "label": "Issues if Coordination Breaks Down", "resp": ["Coordinate the work of multiple pods within a discipline so they do not duplicate effort, conflict over shared assets, or diverge in approach.", "Maintain a discipline-wide view of dependencies, shared libraries, and handoffs so work flows cleanly between pods.", "Establish shared conventions and reference points so artists moving between pods do not have to relearn how things are done.", "Resolve cross-pod conflicts over ownership, priority, and direction before they escalate to production or leadership.", "Aggregate status and risk across pods into a single coherent picture for stakeholders."], "issues": ["Pods drift apart in style and process until the discipline's output no longer reads as one coherent whole.", "Duplicated or conflicting work surfaces late, wasting effort and forcing rework across multiple pods.", "Cross-pod conflicts left unresolved harden into political fragmentation within the discipline.", "Without a unified picture, leadership gets contradictory status from different pods and loses confidence in the discipline."]}, {"title": "2. Developing Leads", "label": "Issues if Leads Are Not Coached", "resp": ["Coach the leads reporting to you on people leadership, not just craft, helping them grow from strong ICs into effective pod owners.", "Hold regular 1:1s with your leads focused on their leadership challenges, blind spots, and development.", "Model and teach the hard skills of leadership, including difficult conversations, calibration, and delegation.", "Create stretch opportunities for leads to own cross-pod problems and build broader scope.", "Give leads room to make their own calls and learn from them rather than overriding every decision."], "issues": ["Leads stagnate without coaching, plateau at the pod level, and the discipline has no succession bench.", "Uncoached leads repeat the classic mistakes, avoiding hard conversations and promoting clones, with no one to catch it.", "If you make every decision for your leads, they never develop judgment and remain dependent on you.", "Strong potential leaders leave for places that will actually invest in growing them."]}, {"title": "3. Discipline Hiring Pipeline", "label": "Issues if the Hiring Pipeline Weakens", "resp": ["Own the discipline-level hiring pipeline, from sourcing and portfolio screening through interview design and offer recommendations.", "Build and maintain a consistent, fair interview process so hiring decisions are based on calibrated signal rather than gut feel.", "Develop a bench of candidates and relationships so the discipline can hire ahead of need rather than scrambling.", "Train your leads to interview well and calibrate their assessments so the bar stays consistent across pods.", "Balance hiring for immediate gaps against hiring for the discipline's longer-term skill mix."], "issues": ["The pipeline runs dry and hiring slows, leaving pods understaffed going into production.", "Inconsistent interviewing lets quality drop or admits people who do not fit the bar, creating downstream performance problems.", "Reactive, scramble hiring fills seats with whoever is available rather than the right skills.", "If leads are not calibrated, each pod hires to its own bar and the discipline fragments in quality."]}, {"title": "4. Throughput vs. Craft Growth", "label": "Issues if the Balance Tips", "resp": ["Balance the constant pressure for production throughput against the discipline's need to grow craft and capability over time.", "Protect time for learning, exploration, and skill-building even under delivery pressure, so the discipline does not hollow out.", "Decide where the discipline can run lean on craft and where it must invest, making those tradeoffs explicit.", "Spot when pods are surviving on overtime and intervene before throughput pressure burns out the team.", "Connect craft growth to business value so leadership funds it rather than treating it as a luxury."], "issues": ["Relentless throughput focus starves craft growth, and the discipline slowly loses its edge and its best people.", "Over-indexing on craft exploration without delivery erodes production's trust and the discipline's standing.", "Chronic overtime to hit throughput targets burns out artists and spikes attrition.", "Failing to make the tradeoff explicit means it gets made by default, usually against craft."]}, {"title": "5. Calibration & Fairness Across Pods", "label": "Issues if Calibration Drifts", "resp": ["Calibrate performance, leveling, and recognition across pods so an artist's outcome does not depend on which pod they landed in.", "Run cross-pod calibration discussions where leads defend ratings against a shared bar.", "Watch for and correct favoritism, ensuring opportunities and visibility are distributed fairly across pods.", "Ensure your leads apply consistent standards in feedback, promotion readiness, and stretch assignments."], "issues": ["Uncalibrated standards let one pod's strong performer be rated below another pod's average, breeding resentment.", "Playing favorites across pods, or letting leads do so, fractures trust and morale in the discipline.", "Inconsistent leveling makes cross-pod moves feel like demotions or unfair jumps.", "Perceived unfairness drives quiet attrition among people who feel overlooked."]}, {"title": "6. Leveling Up Scope (Not Just Volume)", "label": "Issues if Scope Does Not Grow", "resp": ["Operate at genuinely broader scope than a Lead, thinking in terms of the discipline's health rather than a single pod's deliverables.", "Run complex multi-pod initiatives end to end, coordinating people, schedule, and craft across boundaries.", "Delegate pod-level execution to your leads and resist pulling it back when things get hard.", "Stay close enough to the actual work to keep context without trying to personally do or review all of it.", "Spend coordination time deliberately, protecting enough connection to the craft to lead credibly."], "issues": ["Becoming a glorified Lead, doing the same job at a bigger title, leaves the real cross-pod problems unowned.", "Disappearing into coordination meetings means losing context on the actual work and credibility with artists.", "Refusing to delegate pod execution overloads the senior lead and stunts the leads beneath them.", "Without a genuine step up in scope, the discipline has no layer thinking about its longer-term health."]}], "topConsequences": ["The discipline fragments stylistically, politically, and in process as pods drift without coordination.", "Leads stagnate and there is no succession bench, leaving the discipline brittle and dependent.", "Hiring slows or drops in quality, leaving pods understaffed and uneven going into production.", "Throughput pressure unbalanced against craft burns out the team and erodes the discipline's edge.", "Perceived unfairness across pods drives resentment and quiet attrition of strong people."], "bottomLine": "A Senior Lead / Supervising Artist steps up from one pod to coordinating multiple pods within a discipline, developing the leads underneath them and owning the discipline's hiring pipeline. Success means pods stay coherent, leads grow, and the discipline scales its capability while still delivering. Failure looks like a glorified Lead who never grew their scope, lost in coordination meetings, with fragmenting pods and stagnating leads beneath them."}, "art-manager-discipline-manager": {"sections": [{"title": "1. Career Development Plans", "label": "Issues if Development Is Neglected", "resp": ["Maintain a real career development plan for every report, with concrete goals, milestones, and a credible path forward.", "Hold regular growth-focused conversations distinct from status and review, so development is continuous rather than annual.", "Match people to assignments, projects, and stretch opportunities that move them along their stated path.", "Help reports who want to lead transition into leadership, and help strong ICs deepen into senior craft, honoring both directions.", "Track each person's trajectory across cycles and adjust the plan as their goals and the org's needs evolve."], "issues": ["Attrition spikes as people conclude there is no future for them and leave for somewhere that offers a path.", "Development that happens only at review time leaves people feeling like cogs rather than growing professionals.", "Without deliberate growth, the discipline loses its strongest people and is left with a thinner bench.", "Plans that exist on paper but never inform real assignments become a hollow ritual no one trusts."]}, {"title": "2. Compensation, Leveling & Promotion Calibration", "label": "Issues if Comp & Leveling Are Mishandled", "resp": ["Own compensation, leveling, and promotion calibration for the discipline, ensuring outcomes are fair and defensible.", "Run rigorous calibration so leveling reflects a consistent bar rather than who advocates loudest.", "Manage comp within bands fairly, addressing inequities and compression before they become flight risks.", "Build clear, documented promotion criteria and hold the line on them so promotions are earned and credible.", "Advocate for your people's comp and level with leadership using evidence, while staying honest about the bar."], "issues": ["Inconsistent leveling and pay breed resentment and a sense that outcomes are political rather than earned.", "Pay compression and inequities left unaddressed turn into sudden resignations from your most underpaid strong performers.", "Promotions handed out softly devalue the level and demotivate those who actually met the bar.", "If calibration is weak, leadership stops trusting the discipline's leveling and takes the decisions away from you."]}, {"title": "3. Hiring Strategy & Offer Decisions", "label": "Issues if Hiring Strategy Falters", "resp": ["Set the discipline's hiring strategy, deciding what roles, levels, and skills to pursue and in what order.", "Own offer decisions, balancing the candidate's bar, the team's needs, internal equity, and budget.", "Build a fair, consistent interview process and keep interviewers calibrated to a shared standard.", "Cultivate sourcing channels and a candidate bench so hiring can happen ahead of need.", "Make the close, selling the role honestly and competing for talent without over-promising."], "issues": ["Hiring slows or quality drops, leaving the discipline understaffed or diluting its bar with weak hires.", "Offers that ignore internal equity create immediate pay inequities and resentment among existing staff.", "An inconsistent interview process produces noisy decisions and admits people who do not fit.", "Reactive hiring scrambles to fill seats rather than acquiring the skills the discipline actually needs."]}, {"title": "4. Performance Management", "label": "Issues if Performance Goes Unmanaged", "resp": ["Manage performance across all reports, naming issues early, documenting them, and partnering on concrete improvement.", "Distinguish skill gaps, will gaps, and fit problems, and respond to each with the right intervention.", "Run fair, well-documented performance processes, including formal plans, when coaching is not enough.", "Make timely exit decisions when improvement does not materialize, handling them with dignity and proper process.", "Recognize and reward strong performance as deliberately as you address weak performance."], "issues": ["Quiet performance issues left to fester become loud incidents that damage teams and pull in HR and leadership.", "Avoiding hard conversations protects no one and lets problems compound until they require drastic action.", "Inconsistent or undocumented performance handling exposes the studio to legal and fairness risk.", "Tolerating weak performance demoralizes strong performers who see the bar is not real."]}, {"title": "5. Conflict Resolution", "label": "Issues if Conflict Is Left to Fester", "resp": ["Resolve interpersonal and cross-functional conflicts within and around the discipline before they poison the team.", "Surface tension early, hear all sides, and mediate toward concrete agreements rather than papering over disputes.", "Address conflicts between artists and producers, ADs, or other disciplines as the discipline's representative.", "Set and enforce behavioral norms so the team stays psychologically safe and professional under pressure.", "Know when to mediate, when to escalate, and when to make a firm call and move on."], "issues": ["Unresolved conflict festers into factions, silence, and a toxic atmosphere that drives good people out.", "Avoided disputes resurface later, larger and harder to fix, often at the worst production moment.", "If the manager will not address cross-functional friction, the discipline gets steamrolled or isolated.", "Tolerated bad behavior signals that norms are optional, normalizing it across the team."]}, {"title": "6. Maintaining Art Advocacy & Craft Trust", "label": "Issues if Artist Trust Is Lost", "resp": ["Stay close enough to the craft and the work to retain the trust and respect of the artists you manage.", "Advocate for artists' interests, working conditions, and growth with leadership and HR, acting as their champion.", "Translate between art's needs and the organization's processes without simply becoming a policy enforcer.", "Be effective rather than merely liked, making the right calls even when they are unpopular.", "Keep enough craft literacy to make credible leveling, hiring, and performance judgments."], "issues": ["Drifting away from craft entirely loses artist trust, and the manager becomes a figure artists route around.", "Becoming HR's proxy instead of an art advocate makes artists feel unrepresented and exposed.", "Confusing being liked with being effective leads to soft calls that ultimately fail the team.", "Without craft credibility, the manager's leveling and hiring judgments are quietly disregarded."]}], "topConsequences": ["Attrition spikes across the discipline as people see no future, no fairness, and no advocate.", "Inconsistent leveling, comp, and promotions breed resentment and erode leadership's trust in the manager's calls.", "Hiring slows or drops in quality, leaving the discipline understaffed and diluted.", "Quiet performance and conflict issues compound into loud incidents, legal exposure, and team-wide morale damage.", "Losing craft credibility turns the manager into an HR proxy artists route around, hollowing out their actual authority."], "bottomLine": "An Art Manager / Discipline Manager makes the explicit choice to leave hands-on craft behind and own people: careers, comp, leveling, hiring, performance, and conflict. Success means people grow, leveling and pay are fair and trusted, hard conversations happen early, and artists still see the manager as their advocate. Failure looks like a manager who either drifts so far from craft that artists stop trusting them, or confuses being liked with being effective and lets problems fester until they explode."}, "department-manager-head-of-discipline": {"sections": [{"title": "1. Org Design & Headcount", "label": "Issues if Org Design Is Wrong", "resp": ["Design the structure of the whole discipline org, defining pods, leads, managers, and reporting lines that scale with the work.", "Own headcount planning for the discipline, deciding how many people at what levels are needed and when.", "Build a balanced management layer so spans of control are sustainable and leads are not overstretched.", "Adjust the org structure as projects ramp up and down, avoiding both bloat and brittleness.", "Justify headcount and structure to leadership with a clear link to production need and capability, not territory."], "issues": ["A poorly designed org leaves leads with unsustainable spans and people without clear ownership.", "Headcount that does not match the production curve leaves the discipline under- or over-staffed at critical moments.", "Building structure for prestige rather than need creates empires that cost money and slow decisions.", "Brittle org design shatters when a project shifts, forcing painful reorgs mid-production."]}, {"title": "2. Long-Term Skill Mix & Capability Planning", "label": "Issues if Capability Planning Lags", "resp": ["Plan the discipline's long-term skill mix, anticipating which capabilities upcoming projects and technologies will demand.", "Identify capability gaps years ahead and close them through hiring, training, or internal development.", "Balance senior depth against junior pipeline so the discipline is neither top-heavy nor inexperienced.", "Track emerging tools and techniques and ensure the discipline builds the skills before they are urgently needed.", "Develop internal experts and specialists rather than relying solely on external hiring for critical capabilities."], "issues": ["Capability gaps surface mid-production when it is too late and far more expensive to close them.", "A skill mix tuned to today's projects leaves the discipline unable to staff tomorrow's.", "Top-heavy or bottom-heavy staffing creates either cost problems or quality and mentorship gaps.", "Falling behind on emerging techniques makes the discipline uncompetitive and forces reactive scrambles."]}, {"title": "3. Vendor & Outsource Strategy", "label": "Issues if Outsourcing Is Mismanaged", "resp": ["Set the discipline's vendor and outsource strategy, deciding what to keep in-house and what to externalize.", "Select and manage outsourcing partners, defining quality bars, briefs, and review pipelines that keep external work on standard.", "Build the internal capacity needed to brief, review, and integrate outsourced work without overwhelming the team.", "Use outsourcing strategically for surge capacity and commodity work while protecting signature, identity-defining work in-house.", "Monitor vendor quality and cost over time and adjust the partner mix as needed."], "issues": ["Outsource quality drifts unmonitored and rework explodes, erasing the cost savings and blowing schedules.", "Externalizing signature work hollows out the discipline's identity and in-house expertise.", "Under-resourced review pipelines let bad external work slip through or bury the internal team in cleanup.", "Poor vendor selection locks the discipline into partners who cannot hit the bar."]}, {"title": "4. Cross-Project Resource Allocation", "label": "Issues if Allocation Is Mishandled", "resp": ["Allocate the discipline's people across multiple projects, balancing competing demands against finite headcount.", "Prioritize transparently when projects compete for the same scarce specialists, making the tradeoffs explicit.", "Plan ramp-ups and ramp-downs so people move between projects smoothly rather than being stranded or thrashed.", "Protect against any one project hoarding talent at the expense of the portfolio's overall health.", "Coordinate with producers and other discipline heads to align allocation with studio priorities."], "issues": ["Misallocation leaves one project starved of critical skills while another sits over-resourced.", "Opaque prioritization breeds inter-project conflict and the perception of favoritism.", "Poorly planned moves strand people between projects or thrash them across teams, hurting morale and output.", "Optimizing for one favored project at the portfolio's expense damages overall studio delivery."]}, {"title": "5. Leveling & Calibration at Discipline Scale", "label": "Issues if Discipline Calibration Fails", "resp": ["Own a consistent leveling and calibration standard across the entire discipline org, above individual managers.", "Run cross-manager calibration so a senior artist in one team means the same as a senior artist in another.", "Set and defend promotion criteria for the discipline and ensure managers apply them uniformly.", "Watch for systemic bias or drift in leveling and correct it before it entrenches.", "Connect discipline leveling to the studio-wide framework so cross-discipline comparisons hold up."], "issues": ["Inconsistent leveling across teams creates inequities that fuel resentment and attrition at scale.", "Drifting standards make the discipline's titles meaningless and undermine cross-team mobility.", "Uncorrected bias in leveling becomes a systemic fairness and legal exposure.", "Misalignment with the studio framework makes the discipline an outlier that leadership distrusts."]}, {"title": "6. Developing Managers", "label": "Issues if the Management Bench Is Thin", "resp": ["Develop the managers and senior leads reporting to you, building a strong leadership bench for the discipline.", "Coach managers on people leadership, calibration, hard conversations, and strategic thinking.", "Create succession plans so no single role is a critical point of failure.", "Delegate real authority to your managers and hold them accountable for outcomes, not activity.", "Identify high-potential leaders early and invest in their growth into bigger roles."], "issues": ["A thin management bench leaves the discipline fragile and unable to absorb growth or departures.", "Uncoached managers repeat avoidable mistakes that compound across their teams.", "Without succession, the loss of one leader throws part of the discipline into chaos.", "Hoarding authority instead of delegating stunts managers and overloads the department head."]}, {"title": "7. Process & Standards Across the Discipline", "label": "Issues if Standards Fragment", "resp": ["Establish and maintain craft, pipeline, and workflow standards across the whole discipline.", "Ensure tools, naming conventions, and review processes are consistent so people and assets move easily between teams.", "Balance standardization against team autonomy, mandating what must be shared and freeing the rest.", "Keep standards current as tools and techniques evolve, retiring outdated practices deliberately.", "Make standards enabling rather than bureaucratic, so they speed work rather than slow it."], "issues": ["Fragmented standards make cross-team collaboration and asset reuse painful and error-prone.", "Over-standardization smothers teams in process and slows the actual creative work.", "Stale standards force teams to work around official process, creating shadow workflows.", "Inconsistent pipelines multiply integration bugs and rework across the discipline."]}, {"title": "8. Discipline Advocacy & Strategic Partnership", "label": "Issues if Advocacy Falls Short", "resp": ["Represent the discipline's interests, needs, and constraints in studio-wide planning and leadership discussions.", "Partner with producers, other discipline heads, and the AD/CAO to align the discipline with the project and studio strategy.", "Advocate for the discipline's headcount, tools, and conditions while staying honest about tradeoffs.", "Balance discipline interests against project and studio needs, resisting the pull to optimize locally.", "Build the trust with senior leadership needed to be handed strategic discipline decisions."], "issues": ["Optimizing for the discipline at the project's expense damages the discipline's standing and the studio's output.", "Weak advocacy leaves the discipline under-resourced and overlooked in studio planning.", "Empire-building instead of capability-building wastes budget and breeds cross-discipline conflict.", "Without leadership trust, strategic decisions get made for the discipline rather than by its head."]}], "topConsequences": ["The discipline is mis-staffed for the production curve, with capability gaps surfacing mid-production at maximum cost.", "Outsource quality drifts and rework explodes, blowing schedules and erasing intended savings.", "Inconsistent leveling and fragmented standards create inequity, friction, and attrition across the whole discipline.", "A thin management bench leaves the discipline fragile, with single points of failure and uncoached leaders.", "Empire-building and local optimization damage the discipline's credibility and the studio's overall delivery."], "bottomLine": "A Department Manager / Head of Discipline owns a whole discipline org and plays a multi-year game: org design, headcount, skill mix, outsourcing, and cross-project allocation. Success means the discipline is staffed and capable ahead of need, fairly leveled, well-led down its chain, and trusted as a strategic partner. Failure looks like building an empire rather than capability, hiring to fill seats rather than gaps, and optimizing the discipline at the expense of the project it exists to serve."}, "director-of-art-operations": {"sections": [{"title": "1. Studio-Wide Leveling & Comp Bands", "label": "Issues if Leveling & Comp Are Inconsistent", "resp": ["Own a single, coherent leveling framework and set of comp bands spanning every art discipline in the studio.", "Run studio-wide calibration so a given level means the same thing whether someone is in environments, characters, or UI.", "Maintain comp bands that are competitive, internally equitable, and aligned with market data and HR partnership.", "Define cross-discipline promotion criteria so advancement is consistent and defensible across the whole studio.", "Audit for pay compression, inequity, and drift across disciplines and correct systemically rather than case by case."], "issues": ["Inconsistent leveling and pay across disciplines create internal resentment and a sense of unfairness at studio scale.", "Comp drift and compression spike flight risk among underpaid strong performers across multiple teams.", "Without a shared framework, every discipline grades on its own curve and titles lose meaning studio-wide.", "Unaddressed systemic inequity becomes a fairness, retention, and legal liability for the whole studio."]}, {"title": "2. Process Standards Across Disciplines", "label": "Issues if Process Fragments or Bloats", "resp": ["Establish shared people-and-production process standards across all art disciplines, from onboarding to reviews to promotions.", "Make cross-discipline and cross-project moves smooth by aligning leveling, expectations, and workflows.", "Standardize what genuinely benefits from consistency while leaving disciplines room to adapt the rest.", "Keep process lightweight and enabling, continuously pruning anything that slows creative work without adding value.", "Roll out process changes with real buy-in from ADs and producers rather than top-down mandate."], "issues": ["Process varies widely across disciplines, making cross-project moves painful and onboarding inconsistent.", "Process overload slows creative work and breeds resentment toward the operations function.", "Heavy-handed standardization turns art ops into a bureaucracy layer between artists and leadership.", "Process imposed without buy-in gets ignored or worked around, wasting the effort entirely."]}, {"title": "3. Talent Strategy & Pipeline", "label": "Issues if Talent Strategy Is Reactive", "resp": ["Own a studio-wide talent strategy that anticipates the people the studio's roadmap will need and builds the pipeline ahead of time.", "Develop sourcing channels, university and community relationships, and internal pipelines that feed every discipline.", "Plan for critical and scarce skills proactively rather than scrambling when a project ramps.", "Build internal mobility paths so talent can move between disciplines and projects to meet shifting need.", "Connect talent strategy to the studio's business and creative roadmap so it is funded and prioritized."], "issues": ["A reactive talent strategy leaves the studio scrambling to staff projects, paying premiums or slipping schedules.", "Thin pipelines for scarce skills become hard bottlenecks the moment a project needs them.", "Without internal mobility, the studio loses people it could have redeployed and over-hires externally.", "Talent strategy disconnected from the roadmap is consistently caught flat-footed by what the studio actually builds."]}, {"title": "4. Partnering with HR / People Ops", "label": "Issues if the HR Partnership Fails", "resp": ["Build a strong working partnership with HR / People Ops, translating between art's realities and the organization's people systems.", "Co-own comp cycles, performance processes, and policy so they fit how art actually works.", "Bring art-specific context to HR so policies are designed for creative work rather than imposed generically.", "Represent art's interests inside HR-led initiatives while respecting compliance and fairness requirements.", "Use the partnership to handle sensitive performance, exit, and ER matters with proper process and dignity."], "issues": ["A weak HR partnership leaves art subject to generic policies that fit its work poorly.", "Becoming HR's enforcement proxy rather than art's advocate erodes credibility with artists.", "Poorly handled sensitive matters create legal exposure and reputational damage.", "Without partnership, comp and performance cycles run on the org's terms with art reacting rather than shaping."]}, {"title": "5. Staying Connected to Production Reality", "label": "Issues if Disconnected from the Floor", "resp": ["Stay genuinely connected to production reality, regularly engaging with teams, ADs, and producers on the actual work.", "Ground every policy, process, and leveling decision in how production actually runs, not in abstract theory.", "Spot when a well-intentioned process is hurting on the floor and fix or kill it quickly.", "Maintain enough craft and production literacy to be credible with the people the ops function serves.", "Treat ADs and producers as customers of art ops whose trust must be earned continuously."], "issues": ["Losing connection to production reality produces policies that look good on paper but fail on the floor.", "Becoming a bureaucracy layer between artists and leadership makes art ops an obstacle rather than an enabler.", "Decisions disconnected from production lose the trust of ADs and producers alike.", "Without floor credibility, even good initiatives are resisted because they come from a distant function."]}, {"title": "6. Cross-Discipline Org Health", "label": "Issues if Org Health Is Neglected", "resp": ["Monitor and improve the health of the art org across disciplines, watching attrition, engagement, span of control, and pipeline metrics.", "Identify systemic people problems that cross discipline boundaries and drive coordinated fixes.", "Ensure the management layer studio-wide is strong, calibrated, and developing its own benches.", "Balance the needs of different disciplines fairly so none is chronically advantaged or starved.", "Lead studio-wide initiatives on culture, growth, and retention that no single discipline could drive alone."], "issues": ["Systemic, cross-discipline people problems go unowned because each discipline only sees its own slice.", "Uneven management quality across disciplines creates pockets of dysfunction and attrition.", "Chronic favoring of some disciplines over others breeds studio-wide resentment.", "Without an owner, org health quietly degrades until it shows up as a retention or delivery crisis."]}, {"title": "7. Developing Department Heads & Managers", "label": "Issues if the Leadership Pipeline Stalls", "resp": ["Develop the department heads and managers across the studio, building a strong, calibrated leadership layer.", "Coach senior managers on strategic org thinking, calibration discipline, and difficult decisions.", "Build succession depth so the studio is not dependent on any single leader.", "Hold the management layer to consistent standards in how they lead, level, and develop their people.", "Identify and grow the next generation of senior art leaders proactively."], "issues": ["A weak leadership layer means good policies are executed inconsistently or not at all.", "Thin succession leaves the studio exposed when a key leader departs.", "Uncalibrated department heads let standards drift back apart despite studio-wide frameworks.", "Without proactive development, the studio runs out of leaders capable of taking on bigger scope."]}, {"title": "8. Process Credibility & Stakeholder Trust", "label": "Issues if Operational Credibility Erodes", "resp": ["Earn and maintain deep process credibility so ADs, producers, and HR all trust art ops' judgment.", "Demonstrate that operations work produces measurable outcomes, not just policy documents.", "Build the studio-wide trust across multiple projects that lets the function lead rather than just administer.", "Communicate the why behind processes so stakeholders see them as enabling rather than imposed.", "Act as a respected neutral party in cross-discipline and cross-function disputes."], "issues": ["Without credibility, art ops is seen as overhead and its initiatives are resisted or ignored.", "Policy without measurable outcomes makes the function look like bureaucracy for its own sake.", "Losing the trust of ADs and producers reduces art ops to a compliance rubber stamp.", "A function no one trusts cannot lead the cross-discipline change it exists to drive."]}], "topConsequences": ["Inconsistent leveling and pay across disciplines create studio-wide resentment, inequity, and rising flight risk.", "Process overload turns art ops into a bureaucracy layer that slows creative work and loses the floor's trust.", "Reactive talent strategy leaves projects perpetually under-staffed, paying premiums and slipping schedules.", "A disconnected ops function loses credibility with ADs, producers, and HR, and its initiatives stall.", "Neglected cross-discipline org health degrades quietly until it surfaces as a retention or delivery crisis."], "bottomLine": "A Director of Art Operations owns the studio-wide art people-org: leveling, comp bands, process standards, talent strategy, and the partnership with HR. Success means consistent and fair leveling across disciplines, lightweight enabling process, a talent pipeline that anticipates need, and a function ADs and producers genuinely trust. Failure looks like a process-heavy bureaucracy layer that has lost touch with production reality and sits between artists and leadership rather than serving them."}, "vp-of-art-operations-vp-of-art-talent": {"sections": [{"title": "1. Multi-Studio Leveling & Compensation", "label": "Issues if Leveling & Comp Drift Across Studios", "resp": ["Own a coherent leveling and compensation framework spanning multiple studios or the whole company's art org.", "Govern comp bands and leveling so that level and pay mean the same thing across geographies, studios, and cost-of-living markets.", "Set company-wide promotion philosophy and calibration governance that local studios operate within.", "Partner with finance and total rewards to keep art comp competitive and sustainable across the portfolio.", "Detect and correct systemic comp drift and inequity across studios before it becomes a flight-risk pattern."], "issues": ["Compensation and leveling drift across studios, so equivalent artists are paid and titled inconsistently and flight risk rises.", "Without governance, each studio grades on its own curve and company-wide mobility and fairness break down.", "Comp that is uncompetitive in key markets bleeds senior talent to rivals.", "Unmanaged inequity across studios becomes a company-scale fairness, retention, and legal liability."]}, {"title": "2. Headcount Strategy & Long-Range Workforce Planning", "label": "Issues if Workforce Planning Is Absent", "resp": ["Own headcount strategy and long-range workforce planning for the entire art organization across studios and projects.", "Model the talent the multi-year product roadmap will require and build the workforce to meet it ahead of time.", "Plan capacity across the portfolio so studios can flex people between projects rather than over-hiring and laying off.", "Anticipate structural shifts in skills, technology, and labor markets and position the org years ahead.", "Tie workforce plans to financial planning so headcount is funded, justified, and aligned with the business."], "issues": ["Without long-range planning, the org is perpetually reactive, over-hiring into peaks and cutting in troughs.", "Failing to anticipate skill shifts leaves the org structurally unable to staff its future products.", "Poor cross-portfolio capacity planning forces costly layoffs in one studio while another hires the same skills.", "Workforce plans disconnected from finance get cut or overridden, leaving art without a credible people strategy."]}, {"title": "3. Org Design at Scale", "label": "Issues if Org Structure Cannot Scale", "resp": ["Design the overarching structure of the multi-studio art org, defining how disciplines, studios, and shared functions relate.", "Partner with the CAO / VP of Art on org design so people structure and creative structure reinforce each other.", "Evolve the org structure ahead of growth, acquisitions, and new studios so scaling does not descend into chaos.", "Balance studio autonomy against shared standards and shared services, deciding what is central and what is local.", "Build a structure that supports the line organization rather than a parallel empire competing with it."], "issues": ["The art org outgrows its structure and scaling turns into chaos, with unclear ownership and broken reporting lines.", "Org design misaligned with the creative structure pits people leadership against creative leadership.", "Over-centralization smothers studios; over-decentralization fragments standards and mobility.", "Empire-building a parallel org instead of supporting the line creates duplication, conflict, and cost."]}, {"title": "4. Diversity, Retention & Culture Metrics", "label": "Issues if Culture & Retention Metrics Slip", "resp": ["Own diversity, retention, and culture metrics for the art org and drive measurable improvement against them.", "Set company-wide goals and accountability for inclusive hiring, equitable advancement, and retention of underrepresented talent.", "Instrument the org with the data and feedback loops needed to see culture problems before they become crises.", "Drive culture and retention initiatives that span studios, which no single studio could lead alone.", "Hold studio and discipline leaders accountable for the health of their teams, not just their output."], "issues": ["Slipping retention and culture metrics signal an org bleeding talent and trust faster than it can rebuild.", "Without instrumentation, culture problems stay invisible until they erupt publicly or in mass attrition.", "Stalled diversity progress narrows the talent base and exposes the company reputationally.", "If leaders are accountable only for output, team health degrades and the human cost compounds across studios."]}, {"title": "5. Exec-Table Representation of Art Talent", "label": "Issues if Art Has No Executive Voice", "resp": ["Represent art talent and people strategy at the executive table with the authority and data to influence company decisions.", "Ensure art's people needs are weighed in headcount, budget, M&A, and restructuring decisions at the top.", "Translate art talent realities into business terms executives act on, and translate business strategy back into people plans.", "Advocate for the art org's interests in company-wide tradeoffs while owning the hard calls that come with the seat.", "Build the board- and exec-level credibility that lets art talent strategy shape rather than react to company direction."], "issues": ["Art has no executive voice on people and talent decisions, so they are made about art rather than with it.", "Without exec-level data and credibility, art's needs lose to louder functions in budget and headcount fights.", "Decisions like reorgs, acquisitions, and cuts hit the art org unprepared and unrepresented.", "A weak seat reduces the role to relaying decisions downward rather than shaping them."]}, {"title": "6. Talent Strategy & Pipeline at Company Scale", "label": "Issues if Company Talent Strategy Falters", "resp": ["Own the company-wide art talent strategy, from external brand and pipeline to internal mobility and succession.", "Build the employer brand and sourcing ecosystem that keeps the company competitive for scarce art talent globally.", "Develop cross-studio mobility and succession so critical roles have depth and talent can flow to where it is needed.", "Plan for scarce and emerging skills at portfolio scale, ahead of the projects that will demand them.", "Connect talent strategy to the company's creative ambitions so it is resourced as a strategic priority."], "issues": ["A weak company talent strategy leaves the whole portfolio scrambling and out-competed for key talent.", "Thin succession at senior levels makes the org fragile to departures of critical leaders.", "Without cross-studio mobility, the company over-hires externally and loses redeployable talent.", "Talent strategy disconnected from creative ambition is under-resourced and perpetually behind."]}, {"title": "7. Partnering with CAO / VP of Art & People Leadership", "label": "Issues if Strategic Partnerships Fail", "resp": ["Partner with the CAO / VP of Art so people strategy and creative strategy are designed together, not in tension.", "Partner with the CHRO and people-org leadership to shape company policy to fit creative work at scale.", "Align the art people function with finance, legal, and operations on comp, workforce, and compliance.", "Act as the bridge that keeps creative leadership, studio leadership, and people ops pulling in the same direction.", "Resolve the structural tensions between creative ambition, people health, and business constraints at the top."], "issues": ["Misaligned partnership with the CAO pits people strategy against creative strategy, confusing the whole org.", "Weak HR partnership leaves art subject to generic company policy that fits creative work poorly.", "Failure to align with finance and legal exposes the org to comp, workforce, and compliance risk.", "Without the bridging role, creative, studio, and people leadership drift apart and decisions stall."]}, {"title": "8. Maintaining Org & Craft Credibility", "label": "Issues if the Role Loses Credibility", "resp": ["Stay connected to actual production teams, visiting studios and engaging with the real work despite the strategic altitude.", "Retain enough art-org and craft literacy to make policy that fits how art actually works and to be credible with art leaders.", "Ensure the people function visibly supports the line organization rather than dictating to it from a distance.", "Balance the necessary policy and governance work with genuine presence on the floor across studios.", "Be effective at shaping the org rather than merely administering it, earning the trust of art leaders company-wide."], "issues": ["Becoming HR-adjacent and losing art-org credibility makes art leaders route around the role.", "A pure policy focus with no visits to production teams produces governance disconnected from reality.", "If the function is seen as dictating from a distance, the whole multi-studio org resists its initiatives.", "Empire-building a parallel org instead of supporting the line wastes resources and breeds company-wide friction."]}], "topConsequences": ["Compensation and leveling drift across studios, eroding fairness and mobility and driving flight risk at company scale.", "The art org outgrows its structure and scaling descends into chaos, with broken ownership and reporting lines.", "Reactive workforce planning forces over-hiring into peaks and layoffs into troughs across the portfolio.", "Retention, diversity, and culture metrics slip, bleeding talent and trust faster than the org can rebuild.", "Art loses its executive voice, so company-wide people decisions are made about the art org rather than with it.", "An HR-adjacent role that has lost art-org credibility builds a parallel empire the line organization resists and routes around."], "bottomLine": "A VP of Art Operations / VP of Art Talent is an executive-tier owner of the multi-studio art org's structure, talent, and people strategy, sitting at the exec table and partnering with the CAO on org design. Success means leveling and comp hold together across studios, the workforce is planned years ahead, culture and retention metrics improve, and art talent strategy genuinely shapes company decisions. Failure looks like becoming HR-adjacent, focusing purely on policy while never visiting production, and empire-building a parallel org instead of supporting the line it exists to serve."}, "art-production-coordinator": {"sections": [{"title": "1. Scheduling & Task Tracking", "label": "Issues if the Tracker Isn't Trusted", "resp": ["Maintain the pod's task tracker in Jira, ShotGrid, or Hansoft so every asset has a clear owner, status, and due date that reflects reality.", "Update task states daily as artists move work from in-progress to review to done, rather than letting boards rot between standups.", "Build and maintain dashboards that show the pod's current work-in-progress, blocked items, and what is due before the next checkpoint.", "Reconcile the tracker against what artists actually report verbally, flagging any gap between the board and the truth on the floor.", "Tag tasks with the correct discipline, asset type, and milestone so producers above you can roll the pod's data up cleanly.", "Archive completed work and groom stale tickets so the board stays a working tool, not a graveyard of dead tasks."], "issues": ["If statuses lag reality, the pod and its leads make decisions on stale data and get blindsided at review.", "Mis-tagged or orphaned tickets corrupt the roll-up, so the producer's burndown lies to everyone above the pod.", "When artists stop trusting the board, they track work in private spreadsheets and the tracker becomes theater.", "Untracked work hides true load, so the pod looks on-track right up until it visibly isn't."]}, {"title": "2. Standups & Decision Capture", "label": "Issues if Standups Don't Land", "resp": ["Run a focused daily standup that surfaces what each artist finished, what they are on, and what is blocking them.", "Capture decisions, action items, and owners in writing so nothing relies on someone's memory of a hallway conversation.", "Keep the meeting short and protect artists' focus time by taking deep-dive discussions offline with only the people involved.", "Distribute concise notes after each standup so leads and adjacent pods know what changed without having to attend.", "Track follow-ups to closure rather than letting the same blocker resurface unresolved day after day."], "issues": ["Decisions made verbally and never recorded get relitigated, wasting the pod's time and eroding trust.", "Standups that drift into design debate burn the team's morning and train artists to tune out.", "If action items aren't tracked to closure, blockers fester and the pod normalizes being stuck.", "Adjacent pods that don't get notes duplicate work or step on each other's in-flight assets."]}, {"title": "3. Dependency & Handoff Coordination", "label": "Issues if Handoffs Drop", "resp": ["Map which assets your pod owes to other pods and which it is waiting on, so handoffs are scheduled, not surprises.", "Coordinate the moment of handoff between disciplines so assets move cleanly from, for example, modeling to texturing to rigging.", "Confirm that handed-off assets meet the agreed checklist before they leave the pod, preventing bounce-backs.", "Flag upstream slips early so downstream artists can resequence their work instead of sitting idle.", "Keep a simple shared view of in-flight handoffs so no asset stalls unowned in the gap between two teams."], "issues": ["Assets stall in limbo when nobody owns the handoff, and the stall is invisible until a milestone exposes it.", "Incomplete handoffs bounce back and forth, doubling coordination cost and souring relations between pods.", "Idle downstream artists waste capacity the project is paying for while waiting on an unflagged upstream slip.", "Unmapped dependencies create circular waits where two pods each think the other is moving."]}, {"title": "4. Blocker Surfacing & Escalation", "label": "Issues if Real Problems Stay Hidden", "resp": ["Surface blockers and bottlenecks the same day they appear rather than batching bad news for a weekly summary.", "Distinguish a routine hiccup from a genuine threat to the schedule and escalate the latter to the producer promptly.", "Bring problems with enough context that the producer or lead can act, not just a vague flag that something is wrong.", "Follow each escalation through to resolution and close the loop with whoever raised it.", "Watch throughput trends so you can warn that a bottleneck is forming before it actually blocks the pod."], "issues": ["A blocker held quietly for days becomes a milestone miss that could have been a same-day fix.", "Escalating everything as a crisis trains leads to ignore you; escalating nothing leaves them blind.", "Without resolution follow-through, the same blocker recurs and the pod loses faith that raising it helps.", "Bottlenecks spotted only after they bite force expensive reactive resequencing instead of cheap prevention."]}, {"title": "5. Protecting Lead & Artist Focus", "label": "Issues if Admin Bleeds Onto the Team", "resp": ["Absorb the administrative load of status, scheduling, and reporting so leads spend their time on art and mentorship.", "Answer routine where-is-this and what's-the-status questions yourself instead of routing them to busy leads.", "Prepare clean status summaries for the producer so leads aren't pulled into reporting overhead.", "Shield artists' deep-focus time by batching coordination touches rather than interrupting throughout the day.", "Know enough about the pipeline to triage which questions truly need a lead and which you can resolve."], "issues": ["If admin work bleeds onto leads, senior art time meant for craft and mentorship is consumed by spreadsheets.", "Constant status interruptions fragment artists' focus and quietly drain the pod's real output.", "A coordinator who can't triage simple questions becomes a relay rather than a filter, adding overhead.", "Leads forced into reporting lose the floor time that keeps quality and morale high."]}], "topConsequences": ["The pod loses visibility into its own throughput and discovers it is behind only when a milestone exposes it.", "Dropped handoffs leave assets stalled unowned, so capacity the project pays for sits idle.", "Stale or mistrusted trackers corrupt every producer's roll-up built on top of the pod's data.", "Leads get sucked into administrative work, draining the senior time meant for craft and mentorship.", "Quiet, undated blockers compound into milestone misses that were each individually a same-day fix."], "bottomLine": "The Art Production Coordinator is the pod's nervous system: the person who keeps the tracker honest, the handoffs flowing, and the blockers visible so the team can see itself clearly. Success looks like a pod that always knows its own status and never loses an asset in the cracks; failure looks like green dashboards hiding stalled work, leads buried in admin, and milestone surprises that everyone could have seen coming."}, "art-producer": {"sections": [{"title": "1. Schedule Ownership for the Feature/Team", "label": "Issues if the Schedule Isn't Realistic", "resp": ["Build a realistic art schedule for your feature or team grounded in actual historical throughput, not optimistic guesses.", "Break the work into trackable tasks with owners, estimates, and sequencing that respects how art is actually produced.", "Maintain a living burndown so the team can see whether it is trending toward or away from its milestone dates.", "Re-baseline honestly when reality shifts rather than defending a schedule that no longer matches the work.", "Translate creative direction from the AD and leads into a sequence of deliverables with credible dates.", "Reserve buffer for iteration and review cycles instead of scheduling art as if first pass equals final."], "issues": ["Schedules built on optimism slip silently and surface as a crisis right at the milestone.", "A burndown nobody re-baselines becomes fiction, and the team steers by a map that no longer matches the terrain.", "Zero iteration buffer guarantees that any review feedback turns into a schedule overrun.", "Estimates divorced from real throughput set the team up to look like it's failing when it's just over-committed."]}, {"title": "2. Dependency Management Across Disciplines", "label": "Issues if Dependencies Aren't Tracked", "resp": ["Map dependencies across art, design, engineering, and audio so your feature's work is sequenced against what it needs.", "Identify critical-path items where a single slip cascades and protect them with extra attention and buffer.", "Negotiate handoff dates with adjacent teams and hold both sides accountable to them.", "Detect circular or hidden dependencies early and break them before they deadlock two teams.", "Keep a shared dependency view current so downstream owners can resequence the moment an upstream date moves.", "Coordinate cross-discipline needs like a feature that requires a new tool, a design lock, or an engineering hook."], "issues": ["Untracked dependencies let teams block each other, and the block is invisible until work visibly stops.", "A slip on an unprotected critical-path item cascades through every downstream task at once.", "Missed cross-discipline handoffs strand your artists waiting on a design lock or engineering feature that never lands.", "Hidden circular dependencies deadlock two teams who each believe the other is moving."]}, {"title": "3. Risk Forecasting & Mitigation", "label": "Issues if Risk Goes Unforecast", "resp": ["Maintain a risk register for your feature that names threats, likelihood, impact, and a concrete mitigation owner.", "Forecast where the schedule is most likely to break and propose mitigations before the break happens.", "Run lightweight what-if scenarios so leadership sees the cost of a slip before deciding whether to absorb it.", "Convert vague worries into tracked risks with triggers, so the team acts on the early-warning sign, not the impact.", "Bring risks to leads and the AD with options attached, not just alarms.", "Retire risks that have passed and add new ones as the feature evolves so the register stays live."], "issues": ["Unforecast risk turns predictable problems into milestone surprises that hit with no time to react.", "Raising alarms without mitigation options makes you a source of anxiety instead of a source of solutions.", "A stale risk register gives false comfort while the real threats sit untracked.", "Without triggers, the team reacts to impact rather than to the cheap early-warning sign."]}, {"title": "4. Scope vs. Capacity", "label": "Issues if Scope Outruns Capacity", "resp": ["Partner with leads to keep the feature's committed scope inside its real, sustainable capacity.", "Quantify the cost of new asks in artist-days so scope decisions are made with eyes open.", "Surface scope creep early and frame the tradeoff: what comes out if this goes in.", "Protect a realistic definition of done so the feature isn't quietly expanded by accretion.", "Model capacity against actual availability, accounting for leave, support load, and ramp time."], "issues": ["Unmanaged scope creep silently overloads the team until quality or the date gives way.", "Scope decisions made without a cost in artist-days are guesses dressed up as plans.", "Capacity modeled on headcount rather than real availability over-promises by a predictable margin.", "A definition of done that keeps expanding means the feature is never actually finishable."]}, {"title": "5. Status, Reporting & Honest Communication", "label": "Issues if Status Becomes Theater", "resp": ["Give leads and producers honest status even when it's bad, and earn the trust that comes from never sugarcoating.", "Report status with enough context and options that leadership can act on it.", "Resist green-dashboard pressure and let the data tell the truth about where the feature stands.", "Flag a slip the moment it's credible, not at the milestone when it's undeniable.", "Tailor reporting depth to the audience so leads get detail and producers get the roll-up."], "issues": ["Schedule theater, green dashboards over honest status, destroys your credibility the first time reality contradicts you.", "Hidden slips deny leadership the time when a problem is still cheap to fix.", "Reporting without options forces leadership to either ignore you or panic.", "Once leads catch one sugarcoated status, they discount every report you give thereafter."]}, {"title": "6. Working With Leads Without Becoming the Enemy", "label": "Issues if You Become a Scope-Policer", "resp": ["Partner with leads as a problem-solver who protects their team, not an enforcer who polices their artists.", "Bring tradeoffs and options to leads rather than dictating cuts from a spreadsheet.", "Earn artist trust by removing friction and blockers, so production is felt as help, not surveillance.", "Translate between the creative intent of leads and the schedule reality of production, advocating both ways.", "Default to honest conversation over tooling when something is genuinely off track."], "issues": ["Becoming a scope-policer artists resent gets you cut out of the real conversations where problems are solvable.", "Dictating cuts instead of offering tradeoffs makes leads defend scope rather than manage it with you.", "If production feels like surveillance, artists hide problems and you lose the early signal you depend on.", "Failing to advocate creative intent upward makes you production's voice only, and leads stop trusting you."]}], "topConsequences": ["The feature slips silently and the slip surfaces as a milestone crisis with no runway to recover.", "Untracked dependencies let teams block each other and strand paid capacity idle.", "Unforecast risk converts predictable problems into surprises that hit leadership without warning.", "Scope creep overloads the team until quality, the date, or the people give way.", "Schedule theater destroys credibility, and once trust is gone every honest report is discounted.", "Policing artists instead of partnering with them cuts production out of the conversations where slips are still fixable."], "bottomLine": "The Art Producer owns the schedule and the web of dependencies for a feature or team, turning creative direction into a credible, trackable plan and surfacing risk while it's still cheap to address. Success is a feature that hits its dates because problems were seen early and tradeoffs were made on purpose; failure is silent slippage, broken dependencies, and a producer reduced to either a scope-cop everyone resents or a green-dashboard apologist nobody believes."}, "senior-art-producer": {"sections": [{"title": "1. Project-Level Art Schedule & Planning", "label": "Issues if the Master Plan Doesn't Hold", "resp": ["Own the master art schedule for the entire project, integrating every feature, pod, and discipline into one coherent plan.", "Phase the art plan against pre-production, production, and polish so effort is sequenced to how a game actually matures.", "Sequence work so foundational systems and shared assets land before the content that depends on them.", "Maintain a project-wide burndown and re-baseline it honestly when scope, staffing, or schedule shifts.", "Roll up feature-level schedules from your art producers into a single truth leadership can plan against.", "Reconcile the art plan against the broader project plan so art isn't optimizing against a stale company target."], "issues": ["A master schedule that doesn't account for foundation-before-content forces expensive rework when shared systems land late.", "Feature plans that don't roll up cleanly leave leadership with conflicting versions of the truth.", "A burndown nobody re-baselines turns the whole project's plan into comfortable fiction.", "Art planning against a stale project target means art finishes to the wrong date."]}, {"title": "2. Risk, Scope & Quality Tradeoffs with Leadership", "label": "Issues if Tradeoffs Happen by Accident", "resp": ["Make scope, quality, and schedule tradeoffs deliberately with the AD and PM leadership, not as accidental fallout.", "Maintain a project-level risk register and bring the biggest risks to leadership with mitigation options.", "Frame every tradeoff as a choice with named costs so leadership can decide what gives.", "Protect a clear bar for quality so cuts are made against scope, not silently against craft.", "Run scenarios that show the project-wide impact of a slip or a scope change before it's committed.", "Be the person who says the hard thing in the room so the project's tradeoffs are chosen, not stumbled into."], "issues": ["Scope-versus-quality tradeoffs made by accident rather than design hollow out the game in ways nobody chose.", "A risk register that doesn't reach leadership leaves the biggest threats unowned until they detonate.", "Tradeoffs presented without named costs are decisions leadership can't actually make.", "When quality erodes silently instead of scope being cut openly, the project ships below its own bar."]}, {"title": "3. Outsource & Vendor Operations", "label": "Issues if Outsourcing Isn't Managed", "resp": ["Own the project's outsource strategy: what to send out, to which vendors, and against what quality bar.", "Negotiate and manage vendor SLAs, deliverable schedules, and acceptance criteria so external work arrives usable.", "Build the documentation, style guides, and feedback loops vendors need to hit the bar without endless revision.", "Track outsource cost against budget and forecast overruns before they balloon.", "Manage the review and integration pipeline so external assets don't pile up unmerged.", "Maintain vendor relationships and a bench so the project isn't hostage to a single supplier."], "issues": ["Outsource costs balloon when revisions aren't controlled and every batch comes back needing rework.", "Vendors without clear specs and feedback loops deliver off-bar work that costs more to fix than to make.", "Unmanaged acceptance criteria let bad batches through, and the quality problem surfaces downstream.", "Dependence on a single vendor with no bench leaves the project exposed if that supplier slips or folds."]}, {"title": "4. Budget & Cost Tracking", "label": "Issues if Cost Drifts Untracked", "resp": ["Own the art budget for the project, tracking internal labor and external spend against the plan.", "Forecast spend so leadership sees overruns coming with time to act, not after the money is gone.", "Tie cost to deliverables so the project knows what it is getting for its art dollars.", "Flag when scope growth implies budget growth and force that conversation early.", "Reconcile actuals against forecast regularly so the budget stays a live control, not a launch-day post-mortem."], "issues": ["Cost that drifts untracked turns into an overrun discovered only when the budget is already blown.", "Scope growth not tied to budget means the project quietly commits to spending it never approved.", "Without deliverable-linked cost, leadership can't tell whether art spend is buying value or waste.", "A budget reconciled only at the end is a post-mortem, not a control."]}, {"title": "5. Milestone Planning (Alpha/Beta/Content Complete)", "label": "Issues if Milestones Aren't Defined", "resp": ["Define what art must deliver at each milestone, Alpha, Beta, Content Complete, and Gold, in concrete, checkable terms.", "Back-plan from milestone dates so the art plan is anchored to the project's external commitments.", "Drive the project toward content-complete with a clear view of what's done, in-flight, and at risk.", "Stage polish and bug-fix capacity after content complete so the team isn't still building during stabilization.", "Communicate milestone health honestly so leadership isn't surprised at the gate."], "issues": ["Milestones without concrete art definitions get declared done while real work is still missing.", "Plans not back-planned from milestone dates discover too late that the runway was never there.", "No staged polish capacity means the team is still building content when it should be stabilizing.", "A milestone that surprises leadership at the gate signals the producer lost the plot weeks earlier."]}, {"title": "6. Crunch Prevention & Team Health", "label": "Issues if the Team Burns Out", "resp": ["Treat crunch prevention as a deliverable, planning capacity so the project doesn't default to overtime to make dates.", "Track team-health metrics like sustained overtime, leave balances, and morale signals, and act on them.", "Resequence and rescope early so the team doesn't pay for planning failures with their weekends.", "Protect realistic capacity assumptions so the plan isn't secretly built on heroics.", "Surface to leadership when the only way to hit a date is to damage the team, and force the real tradeoff.", "Plan recovery and decompression after intense phases so the team can sustain across a long project."], "issues": ["A project that burns out the team spikes attrition right after launch, taking institutional knowledge out the door.", "Optimizing for delivery at all costs while ignoring team damage borrows against the studio's future.", "Plans secretly built on heroics look fine until the heroics run out.", "No decompression after crunch turns one hard phase into
