iatives.", "Empire-building a parallel org instead of supporting the line wastes resources and breeds company-wide friction."]}], "topConsequences": ["Compensation and leveling drift across studios, eroding fairness and mobility and driving flight risk at company scale.", "The art org outgrows its structure and scaling descends into chaos, with broken ownership and reporting lines.", "Reactive workforce planning forces over-hiring into peaks and layoffs into troughs across the portfolio.", "Retention, diversity, and culture metrics slip, bleeding talent and trust faster than the org can rebuild.", "Art loses its executive voice, so company-wide people decisions are made about the art org rather than with it.", "An HR-adjacent role that has lost art-org credibility builds a parallel empire the line organization resists and routes around."], "bottomLine": "A VP of Art Operations / VP of Art Talent is an executive-tier owner of the multi-studio art org's structure, talent, and people strategy, sitting at the exec table and partnering with the CAO on org design. Success means leveling and comp hold together across studios, the workforce is planned years ahead, culture and retention metrics improve, and art talent strategy genuinely shapes company decisions. Failure looks like becoming HR-adjacent, focusing purely on policy while never visiting production, and empire-building a parallel org instead of supporting the line it exists to serve."}, "senior-lead": {"sections": [{"title": "1. Cross-Pod Coordination", "label": "Issues if Coordination Breaks Down", "resp": ["Coordinate the work of multiple pods within a discipline so they do not duplicate effort, conflict over shared assets, or diverge in approach.", "Maintain a discipline-wide view of dependencies, shared libraries, and handoffs so work flows cleanly between pods.", "Establish shared conventions and reference points so artists moving between pods do not have to relearn how things are done.", "Resolve cross-pod conflicts over ownership, priority, and direction before they escalate to production or leadership.", "Aggregate status and risk across pods into a single coherent picture for stakeholders."], "issues": ["Pods drift apart in style and process until the discipline's output no longer reads as one coherent whole.", "Duplicated or conflicting work surfaces late, wasting effort and forcing rework across multiple pods.", "Cross-pod conflicts left unresolved harden into political fragmentation within the discipline.", "Without a unified picture, leadership gets contradictory status from different pods and loses confidence in the discipline."]}, {"title": "2. Developing Leads", "label": "Issues if Leads Are Not Coached", "resp": ["Coach the leads reporting to you on people leadership, not just craft, helping them grow from strong ICs into effective pod owners.", "Hold regular 1:1s with your leads focused on their leadership challenges, blind spots, and development.", "Model and teach the hard skills of leadership, including difficult conversations, calibration, and delegation.", "Create stretch opportunities for leads to own cross-pod problems and build broader scope.", "Give leads room to make their own calls and learn from them rather than overriding every decision."], "issues": ["Leads stagnate without coaching, plateau at the pod level, and the discipline has no succession bench.", "Uncoached leads repeat the classic mistakes, avoiding hard conversations and promoting clones, with no one to catch it.", "If you make every decision for your leads, they never develop judgment and remain dependent on you.", "Strong potential leaders leave for places that will actually invest in growing them."]}, {"title": "3. Discipline Hiring Pipeline", "label": "Issues if the Hiring Pipeline Weakens", "resp": ["Own the discipline-level hiring pipeline, from sourcing and portfolio screening through interview design and offer recommendations.", "Build and maintain a consistent, fair interview process so hiring decisions are based on calibrated signal rather than gut feel.", "Develop a bench of candidates and relationships so the discipline can hire ahead of need rather than scrambling.", "Train your leads to interview well and calibrate their assessments so the bar stays consistent across pods.", "Balance hiring for immediate gaps against hiring for the discipline's longer-term skill mix."], "issues": ["The pipeline runs dry and hiring slows, leaving pods understaffed going into production.", "Inconsistent interviewing lets quality drop or admits people who do not fit the bar, creating downstream performance problems.", "Reactive, scramble hiring fills seats with whoever is available rather than the right skills.", "If leads are not calibrated, each pod hires to its own bar and the discipline fragments in quality."]}, {"title": "4. Throughput vs. Craft Growth", "label": "Issues if the Balance Tips", "resp": ["Balance the constant pressure for production throughput against the discipline's need to grow craft and capability over time.", "Protect time for learning, exploration, and skill-building even under delivery pressure, so the discipline does not hollow out.", "Decide where the discipline can run lean on craft and where it must invest, making those tradeoffs explicit.", "Spot when pods are surviving on overtime and intervene before throughput pressure burns out the team.", "Connect craft growth to business value so leadership funds it rather than treating it as a luxury."], "issues": ["Relentless throughput focus starves craft growth, and the discipline slowly loses its edge and its best people.", "Over-indexing on craft exploration without delivery erodes production's trust and the discipline's standing.", "Chronic overtime to hit throughput targets burns out artists and spikes attrition.", "Failing to make the tradeoff explicit means it gets made by default, usually against craft."]}, {"title": "5. Calibration & Fairness Across Pods", "label": "Issues if Calibration Drifts", "resp": ["Calibrate performance, leveling, and recognition across pods so an artist's outcome does not depend on which pod they landed in.", "Run cross-pod calibration discussions where leads defend ratings against a shared bar.", "Watch for and correct favoritism, ensuring opportunities and visibility are distributed fairly across pods.", "Ensure your leads apply consistent standards in feedback, promotion readiness, and stretch assignments."], "issues": ["Uncalibrated standards let one pod's strong performer be rated below another pod's average, breeding resentment.", "Playing favorites across pods, or letting leads do so, fractures trust and morale in the discipline.", "Inconsistent leveling makes cross-pod moves feel like demotions or unfair jumps.", "Perceived unfairness drives quiet attrition among people who feel overlooked."]}, {"title": "6. Leveling Up Scope (Not Just Volume)", "label": "Issues if Scope Does Not Grow", "resp": ["Operate at genuinely broader scope than a Lead, thinking in terms of the discipline's health rather than a single pod's deliverables.", "Run complex multi-pod initiatives end to end, coordinating people, schedule, and craft across boundaries.", "Delegate pod-level execution to your leads and resist pulling it back when things get hard.", "Stay close enough to the actual work to keep context without trying to personally do or review all of it.", "Spend coordination time deliberately, protecting enough connection to the craft to lead credibly."], "issues": ["Becoming a glorified Lead, doing the same job at a bigger title, leaves the real cross-pod problems unowned.", "Disappearing into coordination meetings means losing context on the actual work and credibility with artists.", "Refusing to delegate pod execution overloads the senior lead and stunts the leads beneath them.", "Without a genuine step up in scope, the discipline has no layer thinking about its longer-term health."]}], "topConsequences": ["The discipline fragments stylistically, politically, and in process as pods drift without coordination.", "Leads stagnate and there is no succession bench, leaving the discipline brittle and dependent.", "Hiring slows or drops in quality, leaving pods understaffed and uneven going into production.", "Throughput pressure unbalanced against craft burns out the team and erodes the discipline's edge.", "Perceived unfairness across pods drives resentment and quiet attrition of strong people."], "bottomLine": "A Senior Lead / Supervising Artist steps up from one pod to coordinating multiple pods within a discipline, developing the leads underneath them and owning the discipline's hiring pipeline. Success means pods stay coherent, leads grow, and the discipline scales its capability while still delivering. Failure looks like a glorified Lead who never grew their scope, lost in coordination meetings, with fragmenting pods and stagnating leads beneath them."}, "art-manager": {"sections": [{"title": "1. Career Development Plans", "label": "Issues if Development Is Neglected", "resp": ["Maintain a real career development plan for every report, with concrete goals, milestones, and a credible path forward.", "Hold regular growth-focused conversations distinct from status and review, so development is continuous rather than annual.", "Match people to assignments, projects, and stretch opportunities that move them along their stated path.", "Help reports who want to lead transition into leadership, and help strong ICs deepen into senior craft, honoring both directions.", "Track each person's trajectory across cycles and adjust the plan as their goals and the org's needs evolve."], "issues": ["Attrition spikes as people conclude there is no future for them and leave for somewhere that offers a path.", "Development that happens only at review time leaves people feeling like cogs rather than growing professionals.", "Without deliberate growth, the discipline loses its strongest people and is left with a thinner bench.", "Plans that exist on paper but never inform real assignments become a hollow ritual no one trusts."]}, {"title": "2. Compensation, Leveling & Promotion Calibration", "label": "Issues if Comp & Leveling Are Mishandled", "resp": ["Own compensation, leveling, and promotion calibration for the discipline, ensuring outcomes are fair and defensible.", "Run rigorous calibration so leveling reflects a consistent bar rather than who advocates loudest.", "Manage comp within bands fairly, addressing inequities and compression before they become flight risks.", "Build clear, documented promotion criteria and hold the line on them so promotions are earned and credible.", "Advocate for your people's comp and level with leadership using evidence, while staying honest about the bar."], "issues": ["Inconsistent leveling and pay breed resentment and a sense that outcomes are political rather than earned.", "Pay compression and inequities left unaddressed turn into sudden resignations from your most underpaid strong performers.", "Promotions handed out softly devalue the level and demotivate those who actually met the bar.", "If calibration is weak, leadership stops trusting the discipline's leveling and takes the decisions away from you."]}, {"title": "3. Hiring Strategy & Offer Decisions", "label": "Issues if Hiring Strategy Falters", "resp": ["Set the discipline's hiring strategy, deciding what roles, levels, and skills to pursue and in what order.", "Own offer decisions, balancing the candidate's bar, the team's needs, internal equity, and budget.", "Build a fair, consistent interview process and keep interviewers calibrated to a shared standard.", "Cultivate sourcing channels and a candidate bench so hiring can happen ahead of need.", "Make the close, selling the role honestly and competing for talent without over-promising."], "issues": ["Hiring slows or quality drops, leaving the discipline understaffed or diluting its bar with weak hires.", "Offers that ignore internal equity create immediate pay inequities and resentment among existing staff.", "An inconsistent interview process produces noisy decisions and admits people who do not fit.", "Reactive hiring scrambles to fill seats rather than acquiring the skills the discipline actually needs."]}, {"title": "4. Performance Management", "label": "Issues if Performance Goes Unmanaged", "resp": ["Manage performance across all reports, naming issues early, documenting them, and partnering on concrete improvement.", "Distinguish skill gaps, will gaps, and fit problems, and respond to each with the right intervention.", "Run fair, well-documented performance processes, including formal plans, when coaching is not enough.", "Make timely exit decisions when improvement does not materialize, handling them with dignity and proper process.", "Recognize and reward strong performance as deliberately as you address weak performance."], "issues": ["Quiet performance issues left to fester become loud incidents that damage teams and pull in HR and leadership.", "Avoiding hard conversations protects no one and lets problems compound until they require drastic action.", "Inconsistent or undocumented performance handling exposes the studio to legal and fairness risk.", "Tolerating weak performance demoralizes strong performers who see the bar is not real."]}, {"title": "5. Conflict Resolution", "label": "Issues if Conflict Is Left to Fester", "resp": ["Resolve interpersonal and cross-functional conflicts within and around the discipline before they poison the team.", "Surface tension early, hear all sides, and mediate toward concrete agreements rather than papering over disputes.", "Address conflicts between artists and producers, ADs, or other disciplines as the discipline's representative.", "Set and enforce behavioral norms so the team stays psychologically safe and professional under pressure.", "Know when to mediate, when to escalate, and when to make a firm call and move on."], "issues": ["Unresolved conflict festers into factions, silence, and a toxic atmosphere that drives good people out.", "Avoided disputes resurface later, larger and harder to fix, often at the worst production moment.", "If the manager will not address cross-functional friction, the discipline gets steamrolled or isolated.", "Tolerated bad behavior signals that norms are optional, normalizing it across the team."]}, {"title": "6. Maintaining Art Advocacy & Craft Trust", "label": "Issues if Artist Trust Is Lost", "resp": ["Stay close enough to the craft and the work to retain the trust and respect of the artists you manage.", "Advocate for artists' interests, working conditions, and growth with leadership and HR, acting as their champion.", "Translate between art's needs and the organization's processes without simply becoming a policy enforcer.", "Be effective rather than merely liked, making the right calls even when they are unpopular.", "Keep enough craft literacy to make credible leveling, hiring, and performance judgments."], "issues": ["Drifting away from craft entirely loses artist trust, and the manager becomes a figure artists route around.", "Becoming HR's proxy instead of an art advocate makes artists feel unrepresented and exposed.", "Confusing being liked with being effective leads to soft calls that ultimately fail the team.", "Without craft credibility, the manager's leveling and hiring judgments are quietly disregarded."]}], "topConsequences": ["Attrition spikes across the discipline as people see no future, no fairness, and no advocate.", "Inconsistent leveling, comp, and promotions breed resentment and erode leadership's trust in the manager's calls.", "Hiring slows or drops in quality, leaving the discipline understaffed and diluted.", "Quiet performance and conflict issues compound into loud incidents, legal exposure, and team-wide morale damage.", "Losing craft credibility turns the manager into an HR proxy artists route around, hollowing out their actual authority."], "bottomLine": "An Art Manager / Discipline Manager makes the explicit choice to leave hands-on craft behind and own people: careers, comp, leveling, hiring, performance, and conflict. Success means people grow, leveling and pay are fair and trusted, hard conversations happen early, and artists still see the manager as their advocate. Failure looks like a manager who either drifts so far from craft that artists stop trusting them, or confuses being liked with being effective and lets problems fester until they explode."}, "senior-art-manager": {"sections": [{"title": "1. Org Design & Headcount", "label": "Issues if Org Design Is Wrong", "resp": ["Design the structure of the whole discipline org, defining pods, leads, managers, and reporting lines that scale with the work.", "Own headcount planning for the discipline, deciding how many people at what levels are needed and when.", "Build a balanced management layer so spans of control are sustainable and leads are not overstretched.", "Adjust the org structure as projects ramp up and down, avoiding both bloat and brittleness.", "Justify headcount and structure to leadership with a clear link to production need and capability, not territory."], "issues": ["A poorly designed org leaves leads with unsustainable spans and people without clear ownership.", "Headcount that does not match the production curve leaves the discipline under- or over-staffed at critical moments.", "Building structure for prestige rather than need creates empires that cost money and slow decisions.", "Brittle org design shatters when a project shifts, forcing painful reorgs mid-production."]}, {"title": "2. Long-Term Skill Mix & Capability Planning", "label": "Issues if Capability Planning Lags", "resp": ["Plan the discipline's long-term skill mix, anticipating which capabilities upcoming projects and technologies will demand.", "Identify capability gaps years ahead and close them through hiring, training, or internal development.", "Balance senior depth against junior pipeline so the discipline is neither top-heavy nor inexperienced.", "Track emerging tools and techniques and ensure the discipline builds the skills before they are urgently needed.", "Develop internal experts and specialists rather than relying solely on external hiring for critical capabilities."], "issues": ["Capability gaps surface mid-production when it is too late and far more expensive to close them.", "A skill mix tuned to today's projects leaves the discipline unable to staff tomorrow's.", "Top-heavy or bottom-heavy staffing creates either cost problems or quality and mentorship gaps.", "Falling behind on emerging techniques makes the discipline uncompetitive and forces reactive scrambles."]}, {"title": "3. Vendor & Outsource Strategy", "label": "Issues if Outsourcing Is Mismanaged", "resp": ["Set the discipline's vendor and outsource strategy, deciding what to keep in-house and what to externalize.", "Select and manage outsourcing partners, defining quality bars, briefs, and review pipelines that keep external work on standard.", "Build the internal capacity needed to brief, review, and integrate outsourced work without overwhelming the team.", "Use outsourcing strategically for surge capacity and commodity work while protecting signature, identity-defining work in-house.", "Monitor vendor quality and cost over time and adjust the partner mix as needed."], "issues": ["Outsource quality drifts unmonitored and rework explodes, erasing the cost savings and blowing schedules.", "Externalizing signature work hollows out the discipline's identity and in-house expertise.", "Under-resourced review pipelines let bad external work slip through or bury the internal team in cleanup.", "Poor vendor selection locks the discipline into partners who cannot hit the bar."]}, {"title": "4. Cross-Project Resource Allocation", "label": "Issues if Allocation Is Mishandled", "resp": ["Allocate the discipline's people across multiple projects, balancing competing demands against finite headcount.", "Prioritize transparently when projects compete for the same scarce specialists, making the tradeoffs explicit.", "Plan ramp-ups and ramp-downs so people move between projects smoothly rather than being stranded or thrashed.", "Protect against any one project hoarding talent at the expense of the portfolio's overall health.", "Coordinate with producers and other discipline heads to align allocation with studio priorities."], "issues": ["Misallocation leaves one project starved of critical skills while another sits over-resourced.", "Opaque prioritization breeds inter-project conflict and the perception of favoritism.", "Poorly planned moves strand people between projects or thrash them across teams, hurting morale and output.", "Optimizing for one favored project at the portfolio's expense damages overall studio delivery."]}, {"title": "5. Leveling & Calibration at Discipline Scale", "label": "Issues if Discipline Calibration Fails", "resp": ["Own a consistent leveling and calibration standard across the entire discipline org, above individual managers.", "Run cross-manager calibration so a senior artist in one team means the same as a senior artist in another.", "Set and defend promotion criteria for the discipline and ensure managers apply them uniformly.", "Watch for systemic bias or drift in leveling and correct it before it entrenches.", "Connect discipline leveling to the studio-wide framework so cross-discipline comparisons hold up."], "issues": ["Inconsistent leveling across teams creates inequities that fuel resentment and attrition at scale.", "Drifting standards make the discipline's titles meaningless and undermine cross-team mobility.", "Uncorrected bias in leveling becomes a systemic fairness and legal exposure.", "Misalignment with the studio framework makes the discipline an outlier that leadership distrusts."]}, {"title": "6. Developing Managers", "label": "Issues if the Management Bench Is Thin", "resp": ["Develop the managers and senior leads reporting to you, building a strong leadership bench for the discipline.", "Coach managers on people leadership, calibration, hard conversations, and strategic thinking.", "Create succession plans so no single role is a critical point of failure.", "Delegate real authority to your managers and hold them accountable for outcomes, not activity.", "Identify high-potential leaders early and invest in their growth into bigger roles."], "issues": ["A thin management bench leaves the discipline fragile and unable to absorb growth or departures.", "Uncoached managers repeat avoidable mistakes that compound across their teams.", "Without succession, the loss of one leader throws part of the discipline into chaos.", "Hoarding authority instead of delegating stunts managers and overloads the department head."]}, {"title": "7. Process & Standards Across the Discipline", "label": "Issues if Standards Fragment", "resp": ["Establish and maintain craft, pipeline, and workflow standards across the whole discipline.", "Ensure tools, naming conventions, and review processes are consistent so people and assets move easily between teams.", "Balance standardization against team autonomy, mandating what must be shared and freeing the rest.", "Keep standards current as tools and techniques evolve, retiring outdated practices deliberately.", "Make standards enabling rather than bureaucratic, so they speed work rather than slow it."], "issues": ["Fragmented standards make cross-team collaboration and asset reuse painful and error-prone.", "Over-standardization smothers teams in process and slows the actual creative work.", "Stale standards force teams to work around official process, creating shadow workflows.", "Inconsistent pipelines multiply integration bugs and rework across the discipline."]}, {"title": "8. Discipline Advocacy & Strategic Partnership", "label": "Issues if Advocacy Falls Short", "resp": ["Represent the discipline's interests, needs, and constraints in studio-wide planning and leadership discussions.", "Partner with producers, other discipline heads, and the AD/CAO to align the discipline with the project and studio strategy.", "Advocate for the discipline's headcount, tools, and conditions while staying honest about tradeoffs.", "Balance discipline interests against project and studio needs, resisting the pull to optimize locally.", "Build the trust with senior leadership needed to be handed strategic discipline decisions."], "issues": ["Optimizing for the discipline at the project's expense damages the discipline's standing and the studio's output.", "Weak advocacy leaves the discipline under-resourced and overlooked in studio planning.", "Empire-building instead of capability-building wastes budget and breeds cross-discipline conflict.", "Without leadership trust, strategic decisions get made for the discipline rather than by its head."]}], "topConsequences": ["The discipline is mis-staffed for the production curve, with capability gaps surfacing mid-production at maximum cost.", "Outsource quality drifts and rework explodes, blowing schedules and erasing intended savings.", "Inconsistent leveling and fragmented standards create inequity, friction, and attrition across the whole discipline.", "A thin management bench leaves the discipline fragile, with single points of failure and uncoached leaders.", "Empire-building and local optimization damage the discipline's credibility and the studio's overall delivery."], "bottomLine": "A Department Manager / Head of Discipline owns a whole discipline org and plays a multi-year game: org design, headcount, skill mix, outsourcing, and cross-project allocation. Success means the discipline is staffed and capable ahead of need, fairly leveled, well-led down its chain, and trusted as a strategic partner. Failure looks like building an empire rather than capability, hiring to fill seats rather than gaps, and optimizing the discipline at the expense of the project it exists to serve."}, "art-production-coordinator": {"sections": [{"title": "1. Scheduling & Task Tracking", "label": "Issues if the Tracker Isn't Trusted", "resp": ["Maintain the pod's task tracker in Jira, ShotGrid, or Hansoft so every asset has a clear owner, status, and due date that reflects reality.", "Update task states daily as artists move work from in-progress to review to done, rather than letting boards rot between standups.", "Build and maintain dashboards that show the pod's current work-in-progress, blocked items, and what is due before the next checkpoint.", "Reconcile the tracker against what artists actually report verbally, flagging any gap between the board and the truth on the floor.", "Tag tasks with the correct discipline, asset type, and milestone so producers above you can roll the pod's data up cleanly.", "Archive completed work and groom stale tickets so the board stays a working tool, not a graveyard of dead tasks."], "issues": ["If statuses lag reality, the pod and its leads make decisions on stale data and get blindsided at review.", "Mis-tagged or orphaned tickets corrupt the roll-up, so the producer's burndown lies to everyone above the pod.", "When artists stop trusting the board, they track work in private spreadsheets and the tracker becomes theater.", "Untracked work hides true load, so the pod looks on-track right up until it visibly isn't."]}, {"title": "2. Standups & Decision Capture", "label": "Issues if Standups Don't Land", "resp": ["Run a focused daily standup that surfaces what each artist finished, what they are on, and what is blocking them.", "Capture decisions, action items, and owners in writing so nothing relies on someone's memory of a hallway conversation.", "Keep the meeting short and protect artists' focus time by taking deep-dive discussions offline with only the people involved.", "Distribute concise notes after each standup so leads and adjacent pods know what changed without having to attend.", "Track follow-ups to closure rather than letting the same blocker resurface unresolved day after day."], "issues": ["Decisions made verbally and never recorded get relitigated, wasting the pod's time and eroding trust.", "Standups that drift into design debate burn the team's morning and train artists to tune out.", "If action items aren't tracked to closure, blockers fester and the pod normalizes being stuck.", "Adjacent pods that don't get notes duplicate work or step on each other's in-flight assets."]}, {"title": "3. Dependency & Handoff Coordination", "label": "Issues if Handoffs Drop", "resp": ["Map which assets your pod owes to other pods and which it is waiting on, so handoffs are scheduled, not surprises.", "Coordinate the moment of handoff between disciplines so assets move cleanly from, for example, modeling to texturing to rigging.", "Confirm that handed-off assets meet the agreed checklist before they leave the pod, preventing bounce-backs.", "Flag upstream slips early so downstream artists can resequence their work instead of sitting idle.", "Keep a simple shared view of in-flight handoffs so no asset stalls unowned in the gap between two teams."], "issues": ["Assets stall in limbo when nobody owns the handoff, and the stall is invisible until a milestone exposes it.", "Incomplete handoffs bounce back and forth, doubling coordination cost and souring relations between pods.", "Idle downstream artists waste capacity the project is paying for while waiting on an unflagged upstream slip.", "Unmapped dependencies create circular waits where two pods each think the other is moving."]}, {"title": "4. Blocker Surfacing & Escalation", "label": "Issues if Real Problems Stay Hidden", "resp": ["Surface blockers and bottlenecks the same day they appear rather than batching bad news for a weekly summary.", "Distinguish a routine hiccup from a genuine threat to the schedule and escalate the latter to the producer promptly.", "Bring problems with enough context that the producer or lead can act, not just a vague flag that something is wrong.", "Follow each escalation through to resolution and close the loop with whoever raised it.", "Watch throughput trends so you can warn that a bottleneck is forming before it actually blocks the pod."], "issues": ["A blocker held quietly for days becomes a milestone miss that could have been a same-day fix.", "Escalating everything as a crisis trains leads to ignore you; escalating nothing leaves them blind.", "Without resolution follow-through, the same blocker recurs and the pod loses faith that raising it helps.", "Bottlenecks spotted only after they bite force expensive reactive resequencing instead of cheap prevention."]}, {"title": "5. Protecting Lead & Artist Focus", "label": "Issues if Admin Bleeds Onto the Team", "resp": ["Absorb the administrative load of status, scheduling, and reporting so leads spend their time on art and mentorship.", "Answer routine where-is-this and what's-the-status questions yourself instead of routing them to busy leads.", "Prepare clean status summaries for the producer so leads aren't pulled into reporting overhead.", "Shield artists' deep-focus time by batching coordination touches rather than interrupting throughout the day.", "Know enough about the pipeline to triage which questions truly need a lead and which you can resolve."], "issues": ["If admin work bleeds onto leads, senior art time meant for craft and mentorship is consumed by spreadsheets.", "Constant status interruptions fragment artists' focus and quietly drain the pod's real output.", "A coordinator who can't triage simple questions becomes a relay rather than a filter, adding overhead.", "Leads forced into reporting lose the floor time that keeps quality and morale high."]}], "topConsequences": ["The pod loses visibility into its own throughput and discovers it is behind only when a milestone exposes it.", "Dropped handoffs leave assets stalled unowned, so capacity the project pays for sits idle.", "Stale or mistrusted trackers corrupt every producer's roll-up built on top of the pod's data.", "Leads get sucked into administrative work, draining the senior time meant for craft and mentorship.", "Quiet, undated blockers compound into milestone misses that were each individually a same-day fix."], "bottomLine": "The Art Production Coordinator is the pod's nervous system: the person who keeps the tracker honest, the handoffs flowing, and the blockers visible so the team can see itself clearly. Success looks like a pod that always knows its own status and never loses an asset in the cracks; failure looks like green dashboards hiding stalled work, leads buried in admin, and milestone surprises that everyone could have seen coming."}, "senior-art-producer": {"sections": [{"title": "1. Project-Level Art Schedule & Planning", "label": "Issues if the Master Plan Doesn't Hold", "resp": ["Own the master art schedule for the entire project, integrating every feature, pod, and discipline into one coherent plan.", "Phase the art plan against pre-production, production, and polish so effort is sequenced to how a game actually matures.", "Sequence work so foundational systems and shared assets land before the content that depends on them.", "Maintain a project-wide burndown and re-baseline it honestly when scope, staffing, or schedule shifts.", "Roll up feature-level schedules from your art producers into a single truth leadership can plan against.", "Reconcile the art plan against the broader project plan so art isn't optimizing against a stale company target."], "issues": ["A master schedule that doesn't account for foundation-before-content forces expensive rework when shared systems land late.", "Feature plans that don't roll up cleanly leave leadership with conflicting versions of the truth.", "A burndown nobody re-baselines turns the whole project's plan into comfortable fiction.", "Art planning against a stale project target means art finishes to the wrong date."]}, {"title": "2. Risk, Scope & Quality Tradeoffs with Leadership", "label": "Issues if Tradeoffs Happen by Accident", "resp": ["Make scope, quality, and schedule tradeoffs deliberately with the AD and PM leadership, not as accidental fallout.", "Maintain a project-level risk register and bring the biggest risks to leadership with mitigation options.", "Frame every tradeoff as a choice with named costs so leadership can decide what gives.", "Protect a clear bar for quality so cuts are made against scope, not silently against craft.", "Run scenarios that show the project-wide impact of a slip or a scope change before it's committed.", "Be the person who says the hard thing in the room so the project's tradeoffs are chosen, not stumbled into."], "issues": ["Scope-versus-quality tradeoffs made by accident rather than design hollow out the game in ways nobody chose.", "A risk register that doesn't reach leadership leaves the biggest threats unowned until they detonate.", "Tradeoffs presented without named costs are decisions leadership can't actually make.", "When quality erodes silently instead of scope being cut openly, the project ships below its own bar."]}, {"title": "3. Outsource & Vendor Operations", "label": "Issues if Outsourcing Isn't Managed", "resp": ["Own the project's outsource strategy: what to send out, to which vendors, and against what quality bar.", "Negotiate and manage vendor SLAs, deliverable schedules, and acceptance criteria so external work arrives usable.", "Build the documentation, style guides, and feedback loops vendors need to hit the bar without endless revision.", "Track outsource cost against budget and forecast overruns before they balloon.", "Manage the review and integration pipeline so external assets don't pile up unmerged.", "Maintain vendor relationships and a bench so the project isn't hostage to a single supplier."], "issues": ["Outsource costs balloon when revisions aren't controlled and every batch comes back needing rework.", "Vendors without clear specs and feedback loops deliver off-bar work that costs more to fix than to make.", "Unmanaged acceptance criteria let bad batches through, and the quality problem surfaces downstream.", "Dependence on a single vendor with no bench leaves the project exposed if that supplier slips or folds."]}, {"title": "4. Budget & Cost Tracking", "label": "Issues if Cost Drifts Untracked", "resp": ["Own the art budget for the project, tracking internal labor and external spend against the plan.", "Forecast spend so leadership sees overruns coming with time to act, not after the money is gone.", "Tie cost to deliverables so the project knows what it is getting for its art dollars.", "Flag when scope growth implies budget growth and force that conversation early.", "Reconcile actuals against forecast regularly so the budget stays a live control, not a launch-day post-mortem."], "issues": ["Cost that drifts untracked turns into an overrun discovered only when the budget is already blown.", "Scope growth not tied to budget means the project quietly commits to spending it never approved.", "Without deliverable-linked cost, leadership can't tell whether art spend is buying value or waste.", "A budget reconciled only at the end is a post-mortem, not a control."]}, {"title": "5. Milestone Planning (Alpha/Beta/Content Complete)", "label": "Issues if Milestones Aren't Defined", "resp": ["Define what art must deliver at each milestone, Alpha, Beta, Content Complete, and Gold, in concrete, checkable terms.", "Back-plan from milestone dates so the art plan is anchored to the project's external commitments.", "Drive the project toward content-complete with a clear view of what's done, in-flight, and at risk.", "Stage polish and bug-fix capacity after content complete so the team isn't still building during stabilization.", "Communicate milestone health honestly so leadership isn't surprised at the gate."], "issues": ["Milestones without concrete art definitions get declared done while real work is still missing.", "Plans not back-planned from milestone dates discover too late that the runway was never there.", "No staged polish capacity means the team is still building content when it should be stabilizing.", "A milestone that surprises leadership at the gate signals the producer lost the plot weeks earlier."]}, {"title": "6. Crunch Prevention & Team Health", "label": "Issues if the Team Burns Out", "resp": ["Treat crunch prevention as a deliverable, planning capacity so the project doesn't default to overtime to make dates.", "Track team-health metrics like sustained overtime, leave balances, and morale signals, and act on them.", "Resequence and rescope early so the team doesn't pay for planning failures with their weekends.", "Protect realistic capacity assumptions so the plan isn't secretly built on heroics.", "Surface to leadership when the only way to hit a date is to damage the team, and force the real tradeoff.", "Plan recovery and decompression after intense phases so the team can sustain across a long project."], "issues": ["A project that burns out the team spikes attrition right after launch, taking institutional knowledge out the door.", "Optimizing for delivery at all costs while ignoring team damage borrows against the studio's future.", "Plans secretly built on heroics look fine until the heroics run out.", "No decompression after crunch turns one hard phase into chronic burnout across the project."]}, {"title": "7. Partnering With the Art Director & PM Leadership", "label": "Issues if Production and Art Become Adversaries", "resp": ["Partner with the AD as an ally who protects the vision by making it deliverable, not as a scope-cutting adversary.", "Translate the AD's quality ambitions into a plan, and translate plan constraints back into honest creative tradeoffs.", "Align with PM leadership so art's plan, risks, and milestones integrate with the whole project's.", "Carry bad news upward early and with options so leadership is never blindsided.", "Hold the line on honesty in both directions, advocating the team to leadership and reality to the team."], "issues": ["Becoming the AD's adversary instead of partner means scope fights replace problem-solving and both lose.", "Hiding bad news from leadership until it's too late removes the one window when the problem was still fixable.", "Misalignment with PM leadership leaves art planning in its own bubble, out of step with the project.", "If you only carry the schedule's voice, the AD stops trusting you and routes around production."]}], "topConsequences": ["The project burns out the team and attrition spikes after launch, draining institutional knowledge.", "Scope-versus-quality tradeoffs made by accident hollow out the game in ways nobody chose.", "Outsource costs balloon and off-bar external work piles up needing rework the budget didn't plan for.", "Milestones get declared met while real art work is still missing, deferring the reckoning to Gold.", "Hidden bad news denies leadership the one window when the problem was still cheap to fix.", "Adversarial relations with the AD turn every decision into a scope fight instead of a shared solution."], "bottomLine": "The Senior Art Producer owns the entire project's art production, the master schedule, the budget, the outsource pipeline, the milestone plan, and the team's sustainability, making the AD's vision deliverable without breaking the people who build it. Success is a project that hits content-complete on a plan everyone trusted, with tradeoffs chosen deliberately and a team intact at launch; failure is accidental quality erosion, ballooning vendor cost, and a post-launch attrition wave that proves the dates were bought on the team's health."}, "development-director-art": {"sections": [{"title": "1. Owning How Art Gets Made (Process & Pipeline)", "label": "Issues if the Production System Is Broken", "resp": ["Own the end-to-end system by which art is made on the project: the process, the tools, the gates, and the workflow.", "Define how an asset moves from request through production, review, integration, and bug-fix so the path is clear to everyone.", "Ensure the pipeline and tooling support the project's throughput needs and fix friction that taxes every artist daily.", "Standardize naming, versioning, and handoff conventions so the project's art doesn't fragment into incompatible practices.", "Partner with tech-art and engineering to keep the art pipeline healthy as the project scales.", "Continuously improve process based on where work actually stalls, treating the production system as a product you own."], "issues": ["A broken or undefined production system taxes every artist with friction that compounds across the whole team.", "Without a clear asset path, work stalls in undefined gaps and nobody owns the handoff.", "Fragmented conventions make assets incompatible and turn integration into constant firefighting.", "Pipeline debt left unaddressed slows throughput more every month as the project grows."]}, {"title": "2. Quality Gates & Review Cadence", "label": "Issues if Quality Gates Are Inconsistent", "resp": ["Define and run the project's quality gates so assets are checked against the bar at the right points, not just at the end.", "Establish a predictable review cadence so feedback is timely and artists aren't blocked waiting on sign-off.", "Make gate criteria explicit and consistent so an asset's pass or fail doesn't depend on who happens to review it.", "Catch quality problems early in the gate sequence, when fixing them is cheap, rather than late when it's rework.", "Track rework rates and gate failures to find systemic quality problems, not just individual misses.", "Balance gate rigor against throughput so quality control protects the bar without becoming a bottleneck."], "issues": ["Inconsistent quality gates let rework explode late, when fixes are most expensive and the schedule has least slack.", "Reviews without a predictable cadence block artists waiting on sign-off and stall the whole flow.", "Gate criteria that depend on the reviewer produce arbitrary pass/fail and erode trust in the process.", "Gates too heavy become a bottleneck; too light and off-bar work floods downstream undetected."]}, {"title": "3. Capacity Planning & Team Health", "label": "Issues if Capacity Is Mis-Modeled", "resp": ["Model the project's art capacity against real availability, ramp time, support load, and the true shape of the work.", "Match committed scope to modeled capacity and surface the gap when the two don't reconcile.", "Own team-health metrics at the project level and intervene before sustained overload becomes attrition.", "Plan capacity so the project's default mode is steady delivery, not perpetual firefighting.", "Forecast capacity needs across phases so staffing arrives ahead of the work, not after the crunch.", "Protect realistic assumptions so the project's plan isn't quietly underwritten by overtime."], "issues": ["Mis-modeled capacity makes firefighting the default mode, where the team only ever reacts and never gets ahead.", "Scope committed beyond real capacity guarantees the team pays the difference in crunch.", "Ignored team-health signals compound into attrition that pulls capacity out exactly when it's scarcest.", "Staffing that arrives after the work, not before, means new hires ramp during the crisis they were meant to prevent."]}, {"title": "4. Hiring Partnership & Onboarding", "label": "Issues if Staffing Lags the Work", "resp": ["Partner with leads and the AD to define hiring needs by discipline and seniority against the project's forecast.", "Sequence hiring so capacity lands ahead of the phases that need it, accounting for time-to-hire and ramp.", "Own onboarding so new artists become productive on the project's pipeline and conventions quickly.", "Balance internal hiring, contract, and outsource as levers against the same capacity gap.", "Track ramp curves so capacity forecasts reflect that a new hire is not a full artist on day one."], "issues": ["Staffing that lags the work means the project is always short exactly when it's busiest.", "Weak onboarding leaves new hires unproductive for months and drags down the seniors who must cover them.", "Treating a new hire as instant full capacity overstates the plan and sets up a predictable miss.", "Pulling only one staffing lever leaves the project rigid when the capacity gap shifts shape."]}, {"title": "5. Cross-Discipline Coordination at Project Scale", "label": "Issues if Disciplines Drift Out of Sync", "resp": ["Coordinate art's production against design, engineering, audio, and QA at the project level so disciplines stay in lockstep.", "Own the cross-discipline dependency map so art isn't blindsided by a design lock or engineering feature slipping.", "Represent art's production reality in project-wide planning so commitments are made with art's constraints visible.", "Resolve cross-discipline conflicts over sequencing and shared dependencies before they deadlock teams.", "Keep a shared project-level view so every discipline can resequence when another's date moves."], "issues": ["Disciplines that drift out of sync block each other, and the blocks surface only when integration breaks.", "An unowned cross-discipline dependency map lets a slipped design lock blindside the whole art team.", "If art's constraints aren't represented in planning, the project commits to dates art can't actually hit.", "Unresolved sequencing conflicts deadlock teams who each wait on the other."]}, {"title": "6. Partnering With the Art Director", "label": "Issues if You Drift Into Shadow-AD Territory", "resp": ["Operate as a true peer to the AD on the clear split: the AD owns vision and craft, you own execution and delivery.", "Free the AD from operational load so vision work gets the focus it needs.", "Translate the AD's quality ambition into a process and plan that can actually produce it.", "Bring execution reality back to the AD as honest tradeoffs, never as unilateral creative decisions.", "Defend the division of labor so production decisions are yours and creative decisions stay the AD's.", "Build the trust that lets the AD rely on you to run the machine so they can steer the vision."], "issues": ["Drifting into shadow-AD territory creates conflict with the AD and confuses the team about who owns the vision.", "If the AD stays buried in ops, vision work suffers and the project loses creative leadership.", "Making creative calls under the cover of execution erodes the AD's authority and the division of labor.", "Without trust between AD and DD, the two leadership roles work against each other instead of in tandem."]}, {"title": "7. Keeping Artist Trust While Owning Process", "label": "Issues if You Become Pure Process", "resp": ["Own process in service of artists' ability to do great work, not as bureaucracy imposed on them.", "Justify every gate and standard by the friction it removes or the quality it protects, and retire ones that don't.", "Stay close enough to the floor to know where process actually helps and where it just adds overhead.", "Be the art partner who removes obstacles, so production is experienced as enablement, not surveillance.", "Listen to artists about where the system fails them and fix it, building the credibility the role depends on."], "issues": ["Pure process focus loses artist trust, and once lost, the team routes around the system you own.", "Standards that can't justify themselves are felt as bureaucracy and breed quiet noncompliance.", "A DD too far from the floor optimizes a process that doesn't match how the work really happens.", "If production feels like surveillance, artists hide problems and the early signal disappears."]}, {"title": "8. Milestone & Throughput Ownership", "label": "Issues if Throughput Isn't Owned", "resp": ["Own the project's art throughput, knowing the real production rate and whether it will hit content-complete on time.", "Drive the project through Alpha, Beta, and Content Complete with a clear view of what's done, in-flight, and at risk.", "Stage polish and stabilization capacity so the team isn't building content during bug-fix phases.", "Use throughput data to forecast the landing date and intervene early when the trend points the wrong way.", "Report milestone health honestly so leadership and the AD are never surprised at the gate."], "issues": ["Throughput nobody owns means the project discovers its real production rate only when it misses content-complete.", "No staged stabilization capacity leaves the team building content when it should be fixing bugs.", "Forecasting only on gut, not throughput data, blinds the project to a slip it could have corrected.", "A milestone that surprises leadership at the gate proves throughput went untracked for weeks."]}], "topConsequences": ["Inconsistent quality gates let rework explode late, blowing the schedule when it has the least slack.", "Mis-modeled capacity makes firefighting the project's permanent default mode instead of steady delivery.", "A broken production system taxes every artist with friction that compounds across the whole team.", "Drifting into shadow-AD territory fractures art leadership and confuses who owns vision versus execution.", "Lost artist trust means the team routes around the very system the DD is responsible for.", "Untracked throughput surfaces a content-complete miss too late to recover, taking the milestone with it."], "bottomLine": "The Development Director, Art is the execution counterpart to the Art Director, owning how art actually gets made on the project, the process, the tools, the quality gates, the capacity, while the AD owns what gets made. Success is a project where art is produced on a healthy, predictable system that the team trusts and that hits its milestones without firefighting; failure is exploding late rework, perpetual crisis mode, and a DD who either drowns in process or drifts into a turf war with the AD."}, "head-of-art-production": {"sections": [{"title": "1. Studio-Wide Art Process Standards", "label": "Issues if Every Project Reinvents Process", "resp": ["Set studio-wide art production standards so projects share a common language for process, gates, and reporting.", "Define what is standardized across the studio versus what each project tailors to its own needs.", "Capture and propagate what works from one project so the next doesn't relearn it from scratch.", "Maintain a baseline of production practice that new projects inherit instead of inventing.", "Balance consistency against project autonomy so standards enable rather than constrain.", "Drive continuous improvement of studio practice based on patterns seen across the portfolio."], "issues": ["When every project reinvents process inconsistently, the studio pays the learning cost over and over.", "Without shared standards, talent and data can't move between projects without friction and retraining.", "Lessons that don't propagate mean each project repeats the last one's avoidable mistakes.", "No inherited baseline forces every new project to spend its first months building production scaffolding."]}, {"title": "2. Multi-Project Capacity & Resource Shifting", "label": "Issues if Resource Conflicts Go Unresolved", "resp": ["Maintain a studio-wide view of art capacity and demand across all active projects.", "Shift resources between projects to match where capacity is most needed against the portfolio's priorities.", "Resolve cross-project resource conflicts deliberately rather than letting the loudest or weakest project decide by default.", "Forecast aggregate capacity so the studio doesn't over-commit across projects in parallel.", "Plan the ramp and wind-down of projects so artists flow smoothly between them rather than being stranded.", "Balance short-term project needs against long-term studio capability when allocating people."], "issues": ["Unresolved resource conflicts mean the weakest or quietest project loses by default, regardless of strategic value.", "No aggregate capacity view lets the studio over-commit across parallel projects and fail several at once.", "Poorly planned ramp and wind-down strand artists between projects, wasting capacity in the gaps.", "Reactive shifting that ignores priority sends people to whoever shouts loudest, not where they matter most."]}, {"title": "3. Tool & Pipeline Investment", "label": "Issues if Pipeline Debt Accumulates", "resp": ["Own studio-level decisions on tool and pipeline investment so production capability scales across projects.", "Prioritize pipeline investment by its leverage across the portfolio, not just one project's pain.", "Fund and steer shared tooling so projects build on common infrastructure instead of bespoke one-offs.", "Track pipeline debt across the studio and invest to pay it down before it throttles throughput.", "Partner with tech-art and engineering leadership to align pipeline roadmaps with production needs.", "Justify pipeline investment to leadership in terms of throughput, quality, and cost across the portfolio."], "issues": ["Pipeline debt left to accumulate studio-wide slows every project's throughput more each year.", "Investment driven by one project's pain over portfolio leverage spends scarce budget on the wrong fix.", "Bespoke per-project tooling fragments the studio and multiplies maintenance cost.", "Pipeline investment that can't be justified in throughput and cost terms loses the budget fight to features."]}, {"title": "4. Vendor & Outsource Strategy", "label": "Issues if Vendor Strategy Is Fragmented", "resp": ["Set the studio's vendor and outsource strategy so projects draw on a coordinated, vetted partner network.", "Negotiate studio-level vendor relationships and rates so the portfolio's combined volume earns pricing power.", "Maintain a vetted vendor bench by capability so projects can scale external capacity quickly and safely.", "Standardize vendor onboarding, specs, and quality bars so external work is consistent across projects.", "Track vendor performance across the studio so good partners get more work and weak ones are managed out.", "Balance the build-versus-buy decision at the studio level against capability and cost."], "issues": ["Fragmented vendor strategy erodes pricing power as each project negotiates alone against the same suppliers.", "No vetted bench leaves projects scrambling for unknown vendors under deadline pressure.", "Inconsistent specs and bars across projects produce uneven external quality and repeated onboarding cost.", "Without studio-wide performance tracking, weak vendors keep getting work that should go to strong ones."]}, {"title": "5. Portfolio Risk & Forecasting", "label": "Issues if There's No Cross-Project Risk View", "resp": ["Maintain a studio-level view of art production risk across all projects, not just per-project registers.", "Identify correlated risks where one event, a vendor failure or a tool migration, threatens multiple projects at once.", "Forecast where projects will collide for the same scarce capacity and resolve it before the collision.", "Surface portfolio-level art risk to studio and art leadership with mitigation options.", "Track leading indicators across projects so studio leadership sees trouble forming before it's a crisis."], "issues": ["No cross-project risk view lets correlated failures hit several projects simultaneously with no warning.", "Capacity collisions between projects discovered late force a scramble that damages all sides.", "Risk surfaced only per-project hides the portfolio-level threats that are the studio's real exposure.", "Without leading indicators, studio leadership reacts to crises instead of preventing them."]}, {"title": "6. Studio-Wide Team Health & Sustainability", "label": "Issues if Crunch Becomes Cultural", "resp": ["Own art team-health and crunch-prevention standards across the studio, not just on one project.", "Track sustainability metrics across all projects and intervene where overload is becoming chronic.", "Sequence projects' demanding phases so the studio isn't crunching everything at once.", "Plan decompression and rotation so artists recover between intense phases across their project arc.", "Hold project leadership accountable for team health, making it a studio standard rather than a project's option.", "Protect long-term studio capability against short-term delivery pressure on any single project."], "issues": ["If crunch becomes cultural, attrition spikes studio-wide and takes institutional knowledge with it.", "Overlapping demanding phases across projects crunch the whole studio at once with no relief valve.", "No rotation or decompression turns a series of hard phases into chronic, compounding burnout.", "Team health left optional per-project means the worst-managed project sets the studio's reputation."]}, {"title": "7. Scaling Production Through Major Phases", "label": "Issues if Scale-Up Isn't Managed", "resp": ["Lead the scale-up of art production as projects move from pre-production into full production and toward launch.", "Ensure process, pipeline, and capacity scale together so growth doesn't outrun the system that supports it.", "Onboard large waves of internal and external capacity without diluting quality or conventions.", "Stage the studio's investment so scaling capacity is matched by scaling the infrastructure to manage it.", "Apply lessons from prior scale-ups so each project's ramp is smoother than the last."], "issues": ["Scale-up where headcount outruns process produces chaos that more people only amplify.", "Large capacity waves onboarded without conventions dilute quality faster than they add throughput.", "Pipeline that doesn't scale with the team becomes the bottleneck that chokes the whole ramp.", "Repeating prior scale-up mistakes wastes the studio's hardest-won operational lessons."]}, {"title": "8. Partnering With the VP of Art", "label": "Issues if Ops and Art Leadership Drift Apart", "resp": ["Partner with the VP of Art as the operational counterpart, owning delivery while they own creative direction studio-wide.", "Align studio production standards with the art organization's quality ambitions and career structures.", "Translate art leadership's vision into the production capacity and pipeline that can deliver it.", "Bring portfolio-level production reality to art leadership as honest, options-based tradeoffs.", "Keep ops and art leadership moving in lockstep so the studio doesn't fracture along an ops-versus-art line."], "issues": ["If ops and art leadership drift apart, the studio fractures into competing process and creative agendas.", "Production standards misaligned with the art org's ambitions deliver throughput at the cost of the bar.", "Carrying only the delivery voice loses the art organization's trust in the production function.", "Without lockstep partnership, every studio-wide decision becomes an ops-versus-art negotiation."]}], "topConsequences": ["Projects reinvent process inconsistently and the studio pays the same learning cost over and over.", "Unresolved cross-project resource conflicts let the weakest project lose by default regardless of strategic value.", "Pipeline debt accumulates studio-wide and throttles throughput on every project a little more each year.", "A fragmented vendor strategy erodes the studio's pricing power and leaves projects scrambling for capacity.", "No portfolio risk view lets correlated failures hit several projects at once with no warning to leadership.", "Cultural crunch spikes studio-wide attrition and hollows out long-term capability for short-term dates."], "bottomLine": "The Head of Art Production / EP (Art) runs art operations at the studio level, setting the standards, shifting capacity between projects, investing in pipeline and vendors, and protecting team health across the whole portfolio. Success is a studio where projects share a strong production backbone, capacity flows to where it matters, and pipeline and partners scale ahead of need; failure is reinvented process, unresolved resource fights, accumulating pipeline debt, and a crunch culture that bleeds talent out the door."}, "vp-of-art-production": {"sections": [{"title": "1. Multi-Studio Art Delivery Strategy", "label": "Issues if There's No Unified Delivery Strategy", "resp": ["Own the strategy for how art is delivered across all studios and projects in the portfolio.", "Set the operating model for art production so every studio plugs into a coherent, comparable system.", "Align art delivery strategy with the company's portfolio plan, slate timing, and platform commitments.", "Define which capabilities are built centrally versus owned by each studio across the portfolio.", "Drive the long arc of how the company's art-production capability grows over multiple years and titles.", "Set the metrics and operating rhythm by which art delivery is measured and steered company-wide."], "issues": ["Without a unified delivery strategy, each studio optimizes locally and the portfolio has no comparable view of art delivery.", "Art delivery misaligned with the slate means titles compete for the same capacity at the worst possible time.", "Unclear central-versus-studio ownership duplicates capability in some places and leaves gaps in others.", "No company-wide operating rhythm means art delivery problems surface as board-level surprises."]}, {"title": "2. Portfolio Capacity & Resource Allocation", "label": "Issues if Capacity Is Managed Reactively", "resp": ["Maintain a portfolio-wide model of art capacity and demand across every studio and title.", "Allocate and rebalance capacity across studios against portfolio priorities and strategic value.", "Forecast aggregate art capacity years out so the company staffs to the slate rather than to last quarter's crisis.", "Resolve cross-studio capacity collisions at the executive level before they force value-destroying scrambles.", "Plan the macro flow of talent across the project lifecycle so studios ramp and wind down without stranding people.", "Balance flexing capacity through hiring, internal mobility, and outsource against cost and capability."], "issues": ["Studios that over- or under-staff art reactively drive cost overruns the portfolio absorbs.", "Capacity managed quarter-to-quarter can't staff to a multi-year slate and is always fighting the last fire.", "Cross-studio collisions resolved late force scrambles that destroy value across multiple titles at once.", "Poorly planned macro talent flow strands experienced artists between projects, wasting the portfolio's scarcest asset."]}, {"title": "3. Art P&L Partnership With CFO & CAO", "label": "Issues if Art Economics Aren't Owned", "resp": ["Partner with the CFO and CAO to own the economics of art delivery across the portfolio as a managed P&L.", "Build art-cost models that tie spend to deliverables and let the company forecast art cost per title credibly.", "Bring the executive table a clear view of where art dollars go and what return they buy in quality and throughput.", "Defend art investment in capability and pipeline against pure cost-cutting with a long-term economic case.", "Forecast art cost across the slate so finance can plan, and flag overruns at the portfolio level early.", "Translate fluently between creative ambition and financial reality so neither side dominates by default."], "issues": ["If art economics aren't owned, art cost is the line item finance cuts blindly because nobody can defend its value.", "Without deliverable-linked cost models, the company can't forecast art spend and is repeatedly surprised by it.", "Failing to make the long-term capability case lets cost-cutting hollow out the very ability to deliver.", "An exec who can't translate creative value into financial terms loses every budget argument to those who can."]}, {"title": "4. Portfolio Risk Visibility & Board Reporting", "label": "Issues if Risk Doesn't Reach the Board", "resp": ["Maintain a portfolio-level view of art delivery risk so leadership and the board see it before it becomes a surprise.", "Identify systemic and correlated risks that threaten multiple titles, such as a key vendor or a platform shift.", "Forecast which titles are most likely to miss on art and surface it with mitigation options early.", "Report art delivery health to the executive team and board in terms they can act on, not just status.", "Establish leading indicators across the portfolio so risk is managed proactively, not narrated after the fact."], "issues": ["With no portfolio view of art risk, surprises hit the board, the worst possible place for a problem to first appear.", "Correlated risks unseen at the portfolio level can take down several titles in the slate at once.", "Risk reported as status rather than action leaves leadership informed but unable to intervene.", "Without leading indicators, the company is always reacting to art delivery crises instead of preventing them."]}, {"title": "5. External Partner & Outsource Strategy", "label": "Issues if Vendor Strategy Is Fragmented", "resp": ["Set the company's external partner and outsource strategy across all studios as a single coordinated function.", "Consolidate vendor relationships and negotiate at portfolio scale so combined volume builds real pricing power.", "Build a strategic partner network with vetted, scalable suppliers across capabilities and regions.", "Set portfolio-wide standards for vendor quality, security, and IP protection that every studio applies.", "Make the strategic build-versus-buy and onshore-versus-offshore decisions at the company level.", "Manage concentration risk so the portfolio isn't hostage to any single partner or region."], "issues": ["Fragmented vendor strategy across studios erodes pricing power as the company negotiates against itself.", "No portfolio partner network leaves studios sourcing external capacity reactively at premium rates.", "Inconsistent vendor standards expose the company to quality, security, and IP risk across the slate.", "Unmanaged concentration risk makes the portfolio hostage to one partner or region's failure."]}, {"title": "6. Crunch Prevention & Sustainability Across Art", "label": "Issues if Sustainability Is Sacrificed for Dates", "resp": ["Own crunch-prevention and sustainability metrics across all of art as a company-level commitment, not a project option.", "Track sustainability across the portfolio and hold studio leadership accountable for art team health.", "Sequence the slate so studios aren't all in punishing phases simultaneously with no relief.", "Protect long-term studio capability and reputation against short-term delivery pressure on any single title.", "Set the cultural expectation, backed by metrics and accountability, that the company delivers without burning people.", "Tie sustainability outcomes to leadership accountability so team health is treated as a delivery metric."], "issues": ["Sacrificing sustainability for dates drives portfolio-wide attrition that erodes the company's ability to ship at all.", "A slate that crunches every studio at once has no relief valve and compounds burnout across the company.", "Team health treated as optional per-studio lets the worst case define the company's industry reputation.", "Hollowing out long-term capability for short-term dates mortgages the company's future slate."]}, {"title": "7. Keeping Creative Trust as a Delivery Exec", "label": "Issues if You Become Pure Finance/Ops", "resp": ["Lead art delivery as a partner to creative leadership, not as a finance function imposed on the art organization.", "Keep throughput and cost KPIs in service of shipping great art, never as ends that override the creative bar.", "Maintain deep creative literacy so delivery decisions respect what makes the art good, not just cheap or fast.", "Earn the trust of the CAO and creative directors so art delivery is seen as enabling the vision, not constraining it.", "Resist reducing every decision to a throughput number, weighing capability and quality alongside cost.", "Be the executive who can hold both the financial and the creative case in the same conversation."], "issues": ["Becoming pure finance/ops loses creative trust, and the art organization routes around delivery to protect its work.", "Reducing every decision to throughput KPIs optimizes for numbers while the art quietly gets worse.", "Letting cost-cutting hollow out long-term capability trades the company's future for this quarter's margin.", "An exec without creative literacy makes delivery calls that damage the very thing the company sells."]}, {"title": "8. Pipeline & Tooling Investment at Portfolio Scale", "label": "Issues if Capability Investment Is Underfunded", "resp": ["Own portfolio-level investment in the pipeline and tooling that scales art delivery across all studios.", "Prioritize capability investment by its leverage across the whole portfolio, not any single title's pain.", "Fund shared infrastructure so studios build on common platforms rather than fragmenting into bespoke tools.", "Make the multi-year case for capability investment to the executive table against near-term feature pressure.", "Track aggregate pipeline debt and fund paying it down before it throttles delivery across the slate.", "Align tooling investment with the company's long-term technology and platform strategy."], "issues": ["Underfunded capability investment leaves the whole portfolio's delivery throttled by aging, fragmented pipelines.", "Investment driven by one title's pain over portfolio leverage spends scarce capital on the wrong problem.", "Bespoke per-studio tooling multiplies cost and prevents talent and assets from moving across the company.", "Pipeline debt left unfunded compounds until it becomes the binding constraint on the entire slate."]}], "topConsequences": ["Studios over- or under-staff art reactively and the resulting cost overruns hit the portfolio's bottom line.", "No portfolio view of art risk means problems first appear as surprises at the board, where they're costliest.", "A fragmented vendor strategy erodes the company's pricing power as studios negotiate against themselves.", "Sacrificing sustainability for dates drives portfolio-wide attrition that erodes the ability to ship at all.", "Becoming pure finance and ops loses creative trust, and the art organization routes around delivery.", "Cost-cutting that hollows out capability and pipeline trades the company's future slate for this quarter's margin."], "bottomLine": "The VP of Production (Art) / SVP Art Delivery is the executive owner of art delivery across every studio, partnering with the CFO and CAO to run art as a managed P&L while protecting capability, sustainability, and the creative bar at portfolio scale. Success is a company that staffs to its slate, sees its art risk before the board does, wields real vendor pricing power, and ships great art without burning its people; failure is reactive staffing, surprise overruns, eroded creative trust, and a hollowed-out capability that mortgages the future for the current quarter."}, "associate-art-producer": {"sections": [{"title": "1. Schedule Ownership for the Feature/Team", "label": "Issues if the Schedule Isn't Realistic", "resp": ["Build a realistic art schedule for your feature or team grounded in actual historical throughput, not optimistic guesses.", "Break the work into trackable tasks with owners, estimates, and sequencing that respects how art is actually produced.", "Maintain a living burndown so the team can see whether it is trending toward or away from its milestone dates.", "Re-baseline honestly when reality shifts rather than defending a schedule that no longer matches the work.", "Translate creative direction from the AD and leads into a sequence of deliverables with credible dates.", "Reserve buffer for iteration and review cycles instead of scheduling art as if first pass equals final."], "issues": ["Schedules built on optimism slip silently and surface as a crisis right at the milestone.", "A burndown nobody re-baselines becomes fiction, and the team steers by a map that no longer matches the terrain.", "Zero iteration buffer guarantees that any review feedback turns into a schedule overrun.", "Estimates divorced from real throughput set the team up to look like it's failing when it's just over-committed."]}, {"title": "2. Dependency Management Across Disciplines", "label": "Issues if Dependencies Aren't Tracked", "resp": ["Map dependencies across art, design, engineering, and audio so your feature's work is sequenced against what it needs.", "Identify critical-path items where a single slip cascades and protect them with extra attention and buffer.", "Negotiate handoff dates with adjacent teams and hold both sides accountable to them.", "Detect circular or hidden dependencies early and break them before they deadlock two teams.", "Keep a shared dependency view current so downstream owners can resequence the moment an upstream date moves.", "Coordinate cross-discipline needs like a feature that requires a new tool, a design lock, or an engineering hook."], "issues": ["Untracked dependencies let teams block each other, and the block is invisible until work visibly stops.", "A slip on an unprotected critical-path item cascades through every downstream task at once.", "Missed cross-discipline handoffs strand your artists waiting on a design lock or engineering feature that never lands.", "Hidden circular dependencies deadlock two teams who each believe the other is moving."]}, {"title": "3. Risk Forecasting & Mitigation", "label": "Issues if Risk Goes Unforecast", "resp": ["Maintain a risk register for your feature that names threats, likelihood, impact, and a concrete mitigation owner.", "Forecast where the schedule is most likely to break and propose mitigations before the break happens.", "Run lightweight what-if scenarios so leadership sees the cost of a slip before deciding whether to absorb it.", "Convert vague worries into tracked risks with triggers, so the team acts on the early-warning sign, not the impact.", "Bring risks to leads and the AD with options attached, not just alarms.", "Retire risks that have passed and add new ones as the feature evolves so the register stays live."], "issues": ["Unforecast risk turns predictable problems into milestone surprises that hit with no time to react.", "Raising alarms without mitigation options makes you a source of anxiety instead of a source of solutions.", "A stale risk register gives false comfort while the real threats sit untracked.", "Without triggers, the team reacts to impact rather than to the cheap early-warning sign."]}, {"title": "4. Scope vs. Capacity", "label": "Issues if Scope Outruns Capacity", "resp": ["Partner with leads to keep the feature's committed scope inside its real, sustainable capacity.", "Quantify the cost of new asks in artist-days so scope decisions are made with eyes open.", "Surface scope creep early and frame the tradeoff: what comes out if this goes in.", "Protect a realistic definition of done so the feature isn't quietly expanded by accretion.", "Model capacity against actual availability, accounting for leave, support load, and ramp time."], "issues": ["Unmanaged scope creep silently overloads the team until quality or the date gives way.", "Scope decisions made without a cost in artist-days are guesses dressed up as plans.", "Capacity modeled on headcount rather than real availability over-promises by a predictable margin.", "A definition of done that keeps expanding means the feature is never actually finishable."]}, {"title": "5. Status, Reporting & Honest Communication", "label": "Issues if Status Becomes Theater", "resp": ["Give leads and producers honest status even when it's bad, and earn the trust that comes from never sugarcoating.", "Report status with enough context and options that leadership can act on it.", "Resist green-dashboard pressure and let the data tell the truth about where the feature stands.", "Flag a slip the moment it's credible, not at the milestone when it's undeniable.", "Tailor reporting depth to the audience so leads get detail and producers get the roll-up."], "issues": ["Schedule theater, green dashboards over honest status, destroys your credibility the first time reality contradicts you.", "Hidden slips deny leadership the time when a problem is still cheap to fix.", "Reporting without options forces leadership to either ignore you or panic.", "Once leads catch one sugarcoated status, they discount every report you give thereafter."]}, {"title": "6. Working With Leads Without Becoming the Enemy", "label": "Issues if You Become a Scope-Policer", "resp": ["Partner with leads as a problem-solver who protects their team, not an enforcer who polices their artists.", "Bring tradeoffs and options to leads rather than dictating cuts from a spreadsheet.", "Earn artist trust by removing friction and blockers, so production is felt as help, not surveillance.", "Translate between the creative intent of leads and the schedule reality of production, advocating both ways.", "Default to honest conversation over tooling when something is genuinely off track."], "issues": ["Becoming a scope-policer artists resent gets you cut out of the real conversations where problems are solvable.", "Dictating cuts instead of offering tradeoffs makes leads defend scope rather than manage it with you.", "If production feels like surveillance, artists hide problems and you lose the early signal you depend on.", "Failing to advocate creative intent upward makes you production's voice only, and leads stop trusting you."]}], "topConsequences": ["The feature slips silently and the slip surfaces as a milestone crisis with no runway to recover.", "Untracked dependencies let teams block each other a
