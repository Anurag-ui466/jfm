ist job is maybe 30% solving the problems no one else can and 70% making your judgment scale: codifying the bar, spreading technique across pods, and writing the guides that let the studio be good without you in the room. The two failure modes are opposite and equally fatal: becoming a knowledge-hoarding guru, or drifting into shadow management until your craft edge dulls. You succeed when other teams get better whether or not you're touching their assets."}, "senior-artist": {"sections": [{"title": "1. Hero & High-Complexity Asset Delivery", "label": "Issues if Hero Work Misses the Bar", "resp": ["Deliver the most complex and visually critical assets: heroes, key characters, signature environments, and showpiece moments.", "Solve hard craft and technical problems independently, from challenging silhouettes to tricky shaders and material setups.", "Make confident art-direction-aligned decisions on ambiguous briefs without needing them fully resolved first.", "Own assets that carry marketing, key art, or first-impression weight, knowing they define perception of the game.", "Balance fidelity against performance budgets so hero assets are both beautiful and shippable."], "issues": ["Hero assets that miss the quality bar mean the game's visual showpieces underperform where it matters most.", "Marketing and key-art moments fall flat, weakening the title's first impression with players and press.", "Unsolved complex problems get punted to the lead or AD, eroding the senior's reason to exist at this level.", "Compromised performance on hero content forces painful late-stage optimization or visible quality cuts."]}, {"title": "2. Setting the Quality Bar in the Pod", "label": "Issues if the Bar Isn't Held", "resp": ["Define and embody the quality bar for craft within your area so others have a concrete target to match.", "Be the reference point peers measure their own work against when judging whether something is good enough.", "Catch sub-bar work in review and explain specifically why it doesn't meet the standard.", "Keep the bar consistent across the pod so quality doesn't depend on who happened to make an asset.", "Raise the bar over time as tools and skills improve rather than letting it ossify."], "issues": ["Without a visible benchmark, quality becomes subjective and drifts asset to asset across the pod.", "The lead becomes the sole arbiter of quality, creating a bottleneck and single point of failure.", "Sub-bar work slips through because no one with craft authority is holding the line.", "Newer artists have no clear standard to calibrate against and plateau below their potential."]}, {"title": "3. Mentorship of Mids & Juniors", "label": "Issues if the Pod Doesn't Grow", "resp": ["Actively mentor mid and junior artists, deliberately upskilling them toward harder work.", "Give teaching-oriented feedback that builds judgment, not just one-off corrections.", "Delegate appropriately complex assets to growing artists with support rather than hoarding all the interesting work.", "Run informal craft sessions, breakdowns, or paint-overs that spread technique across the pod.", "Identify which artists are ready to stretch and advocate for them with the lead."], "issues": ["Hoarding hero assets keeps the pod dependent and prevents less senior artists from ever leveling up.", "Mids and juniors plateau without guidance, capping the whole pod's ceiling.", "Knowledge stays locked in one person's head, creating fragility if that person leaves or is reassigned.", "The pod's growth stalls, and the senior becomes an irreplaceable bottleneck rather than a force multiplier."]}, {"title": "4. Planning, Estimation & Lead Partnership", "label": "Issues if Planning Partnership Breaks Down", "resp": ["Partner with the lead on planning, breaking down features into realistic asset lists and effort estimates.", "Provide credible time estimates for complex work that planning can actually trust.", "Surface technical and scope risks early so they can be designed around, not discovered late.", "Help sequence work so dependencies between art, design, and engineering resolve in the right order.", "Act as a sounding board for the lead on craft trade-offs and scope decisions."], "issues": ["Unrealistic estimates from the most experienced artist poison the whole pod's schedule.", "Unflagged risks surface late as milestone-threatening surprises.", "The lead loses a critical craft partner and has to make scope calls without ground truth.", "Poor sequencing creates avoidable blocking dependencies between disciplines."]}, {"title": "5. Pipeline & Technique Improvement", "label": "Issues if the Craft Stagnates", "resp": ["Identify pipeline pain points and propose concrete, workable improvements to leads and tech art.", "Pilot new techniques on real production assets and share what works back to the pod.", "Push for tooling or workflow changes that raise the whole pod's throughput or quality.", "Document repeatable approaches so hard-won technique becomes shared, not personal."], "issues": ["Stagnant technique lets the pod fall behind on quality and efficiency relative to peers.", "Pain points persist because the person credible enough to fix them never pushes.", "Each artist solves the same problem differently, producing inconsistent and unmaintainable results.", "Improvements stay trapped as personal tricks instead of becoming pod-wide capability."]}, {"title": "6. Growing Beyond Pure Execution", "label": "Issues if Influence Doesn't Develop", "resp": ["Begin converting craft mastery into influence: shaping how others work, not just what you personally make.", "Take informal craft authority seriously while staying accountable for outcomes, not just opinions.", "Choose deliberately between deepening as an IC or moving toward lead, rather than drifting.", "Influence decisions through demonstrated judgment and respect rather than title."], "issues": ["Refusing to grow past pure execution caps the senior's impact and stalls their progression.", "Becoming an 'unofficial lead' without accountability creates confusion about who actually owns decisions.", "Craft authority without responsibility breeds resentment and undermines the real lead.", "Drifting instead of choosing a path leaves the artist stuck and frustrated at the senior plateau."]}], "topConsequences": ["The game's visual showpieces underperform when the person meant to nail hero content misses the bar.", "The lead becomes the only point of craft authority, creating a bottleneck and single point of failure.", "Mids and juniors plateau because hero work and knowledge are hoarded rather than shared.", "Planning loses its most credible craft partner, and risks surface as late milestone surprises.", "The pod falls behind on technique while the senior stalls by refusing to grow into influence."], "bottomLine": "The Senior Artist job is 40% personally nailing the hardest hero assets and 60% being the pod's craft anchor: holding the quality bar, leveling up everyone below you, and giving the lead a partner they can trust. The classic failure is hoarding the fun hero work and the knowledge that comes with it, which makes you a bottleneck instead of a force multiplier. Seniority is the point where craft has to start turning into influence."}, "senior-principal-artist": {"sections": [{"title": "1. Owning Cross-Studio Craft Standards", "label": "Issues if the Org's Craft Ceiling Fragments", "resp": ["Own craft standards and technique direction that hold across multiple studios or teams in the organization, not just one studio's output.", "Reconcile the differing standards of separate studios into a coherent, escalating organizational craft ceiling where it actually matters.", "Define the through-lines of quality that make the organization's work recognizably world-class regardless of which studio shipped it.", "Set standards durable enough to survive leadership churn, project transitions, and the autonomy each studio wants to keep.", "Judge where one shared standard genuinely helps and where forcing uniformity would smother a studio's identity.", "Keep the bar a living, defensible thing rather than a personal house style other studios resent."], "issues": ["Without cross-studio authority, separate studios drift apart on technique and the organization loses a shared craft ceiling.", "Quality becomes a lottery depending on which studio a player or candidate encounters.", "Each studio relitigates fundamentals the organization already solved somewhere else.", "Standards imposed as a house style get quietly ignored, and the role's reach evaporates."]}, {"title": "2. Multi-Year Technique & Direction", "label": "Issues if the Long Horizon Goes Unowned", "resp": ["Set the multi-year technical and visual direction for a discipline across the organization, aimed at where the field is heading.", "Steer the biggest craft and pipeline bets so they compound across studios rather than scatter as disconnected experiments.", "Decide a hardware or tooling generation ahead what the discipline's craft needs to become, and position for it now.", "Sustain long-horizon direction across the churn of projects, priorities, and people in multiple studios.", "Hold the line on bets whose payoff is years out against short-term, single-project pressure."], "issues": ["Without owned long-horizon direction, the organization optimizes only for current projects and stagnates.", "Big craft bets never mature because nothing sustains them across studios past a single milestone.", "The organization is repeatedly caught flat-footed by industry shifts it could have prepared for.", "Effort scatters across disconnected studio experiments with no compounding payoff."]}, {"title": "3. Solving the Hardest Problems", "label": "Issues if the Toughest Problems Stall", "resp": ["Personally crack the most ambiguous, highest-difficulty craft and tech-art problems no one else in the organization can.", "Dive into stuck hero looks, broken pipelines, and tricky cross-discipline interactions and find a workable path.", "Solve in a way that generalizes, turning each rescue into a reusable, documented pattern available to every studio.", "Partner first-hand with tech art and engineering on problems that straddle craft and technology.", "Coach others through the solution so the same wall doesn't stop the next team.", "Keep enough hands-on depth that the credibility behind the authority stays real."], "issues": ["Without an org-level unblocker, the gnarliest problems stall multiple teams for weeks and threaten milestones.", "One-off rescues that aren't generalized mean the same problem recurs in the next studio.", "Ambitious looks get abandoned or compromised because no one could push them through.", "Cross-discipline issues fall through the cracks between art and engineering at scale."]}, {"title": "4. High-Stakes R&D & Tooling Bets", "label": "Issues if R&D Misfires or Stalls", "resp": ["Scout, prototype, and validate new tools, engine features, and workflows before they reach production across studios.", "Run real proofs of concept that de-risk new approaches with evidence rather than enthusiasm.", "Kill promising-but-wrong directions early so multiple studios aren't betting on unproven tech.", "Translate research into adoptable, documented practice instead of leaving it as a demo.", "Champion the investment case for high-stakes tooling and R&D to leadership when it is worth it.", "Co-design workflows with tech art that scale across studios rather than one-off pipelines per team."], "issues": ["The organization falls behind on technique relative to competitors who invest seriously in R&D.", "Production teams across studios gamble on unvalidated approaches that blow up mid-project.", "Promising research dies on the vine because it never becomes usable, cross-studio practice.", "Per-studio pipelines proliferate, fragmenting tooling and multiplying maintenance cost."]}, {"title": "5. Continuous Learning & Emerging Tech", "label": "Issues if the Role Falls Behind the Field", "resp": ["Stay genuinely current on evolving tools, engines, and emerging production methods, including AI-assisted workflows.", "Judge clear-eyed what to adopt, build, or ignore so the organization gains durable craft advantage rather than chasing hype.", "Pressure-test new methods on real content and report honestly on where they help and where they break.", "Translate fast-moving technique shifts into concrete, lasting advantages for the organization's pipelines.", "Model continuous learning so the most senior ICs below you keep growing instead of coasting on past mastery."], "issues": ["Standing still on technique lets competitors who move faster pull ahead on quality and efficiency.", "Adopting new methods uncritically wastes effort and bakes fragile approaches into production.", "Refusing to evaluate emerging tooling leaves the organization reacting late to shifts it could have led.", "If the most senior IC stops learning, everyone below takes that as permission to stop too."]}, {"title": "6. Raising the Wider Org's Craft Fluency", "label": "Issues if Technique Stays Siloed", "resp": ["Spread named techniques and standards across studios so capability compounds at organization scale.", "Run breakdowns, workshops, and worked examples that move whole studios onto better methods.", "Win adoption through demonstrated results and persuasion rather than mandate.", "Author reference libraries and technique docs clear enough that artists in other studios produce on-bar work from them unaided.", "Follow through so adopted techniques actually stick in production rather than reverting under deadline pressure.", "Externalize your own expertise deliberately so the organization gets better whether or not you are in the room."], "issues": ["Technique stays trapped in one studio while others toil with worse methods, wasting the leverage of scale.", "Better methods never compound because nothing carries them across studio boundaries.", "Lack of follow-through means cross-studio 'adoption' quietly reverts the moment a deadline hits.", "Capability stays personal to you, making the organization fragile to your absence."]}, {"title": "7. Mentoring the Next Layer of Authority", "label": "Issues if the Senior IC Bench Stays Thin", "resp": ["Mentor principals, staff artists, and leads into the organization's next layer of craft authority.", "Coach senior ICs on converting deep mastery into cross-studio influence.", "Model how to set standards, run R&D, and exercise authority across teams without formal reports.", "Provide a credible IC North Star above Principal so top craft talent sees a path that isn't management.", "Sponsor and grow the people who could eventually carry the senior-principal-level load.", "Transfer hard-won judgment so it propagates rather than staying locked in one person."], "issues": ["The most senior IC talent caps out below Distinguished with nowhere credible to grow and leaves.", "The senior IC bench stays thin, concentrating cross-org authority dangerously in one person.", "Principals and staff lack a model to grow toward and stall.", "Succession risk mounts: if you step back, the cross-studio craft leadership vacuum is severe."]}, {"title": "8. Emerging External Influence & Recruiting Pull", "label": "Issues if Influence Stays Invisible", "resp": ["Begin representing the studio's craft outward through selective talks, breakdowns, and peer engagement.", "Convert genuine cross-org contribution into emerging external recognition that reinforces internal authority.", "Lend the organization's senior and specialist recruiting the gravity of a name people are starting to know.", "Choose external commitments that advance the organization's standing rather than just a personal brand.", "Build enough early industry presence to draw strong candidates without letting it outrun the real work."], "issues": ["Recruiting pull plateaus at the org level and strong candidates pick competitors with visible craft leaders.", "The organization's cross-studio craft achievements stay invisible outside its own walls.", "Chasing visibility before the contribution is real hollows out the authority the role depends on.", "Without an emerging draw at the top, the senior talent pipeline thins from the most important end."]}], "topConsequences": ["Separate studios drift apart on technique because no authority above Principal owns a shared, escalating craft ceiling.", "The biggest multi-year craft and pipeline bets get made blind, and the organization is caught flat-footed by industry shifts.", "The gnarliest cross-studio craft problems stall multiple teams because no one has both the mastery and the reach to solve and generalize them.", "Hard-won technique stays siloed in one studio instead of compounding across the organization, wasting the leverage of scale.", "The most senior IC talent caps out below Distinguished with no credible rung to grow into and leaves.", "Recruiting pull plateaus because the organization's craft leaders aren't yet visible outside their own walls.", "Spreading too thin or chasing early visibility erodes the hands-on depth that earned the authority in the first place."], "bottomLine": "The Senior Principal Artist job is roughly 20% personal craft and 80% leverage at a scale a Principal doesn't reach: owning standards and technique direction across multiple studios, steering the biggest multi-year R&D bets, cracking the problems no one else can, and growing the next layer of craft authority so the whole organization gets better. It sits clearly above Principal because the reach is cross-studio and the horizon is multi-year, and clearly below Distinguished because the external recognition is only beginning rather than field-defining. The role works only if the high bar stays grounded in shipping reality and the cross-org reach never outruns the hands-on depth that earned it; spread too thin, calcify into a house style, or chase visibility before the contribution is real, and the multiplier becomes a brake. You succeed when the organization's craft excellence compounds across studios as a durable system rather than a dependency on your name."}, "lead-artist": {"sections": [{"title": "1. Pod Leadership & Task Ownership", "label": "Issues if Pod Leadership Is Weak", "resp": ["Own day-to-day task assignment for a pod of 3-6 artists in a single discipline, matching work to each person's strengths and growth needs rather than just availability.", "Break large feature or asset requests down into clear, estimable tasks with explicit acceptance criteria so artists know what 'done' looks like.", "Maintain a live picture of who is working on what, what is blocked, and what is at risk, and surface that picture daily to the pod and upward to production.", "Run lightweight pod rituals (standups, asset reviews, kickoffs) that keep the team aligned without drowning artists in meetings.", "Stay 30-50% hands-on, taking the hardest or most ambiguous assets yourself so you keep craft credibility and feel the real constraints the pod faces.", "Shield the pod from churn and unclear direction by absorbing and clarifying upstream changes before they hit individual artists."], "issues": ["Work is assigned by who is free rather than who is right, so artists grow unevenly and the hardest assets land on whoever happens to be idle.", "Without clear acceptance criteria, artists deliver work that gets bounced repeatedly, wasting days and eroding morale.", "Blockers stay invisible until a deadline slips, surprising production and damaging the pod's reputation.", "If the lead clings to 100% IC work, no one is actually steering the pod and it drifts into uncoordinated solo efforts."]}, {"title": "2. Quality & Consistency", "label": "Issues if Quality Ownership Slips", "resp": ["Own the quality bar and visual consistency within the pod's area, ensuring six artists' output reads as one coherent body of work.", "Give specific, craft-grounded feedback in reviews that teaches the artist why a change is needed, not just what to change.", "Codify recurring fixes into shared references, checklists, or style notes so the same feedback does not have to be given ten times.", "Calibrate the quality bar against the Art Director's intent and the project's technical budget, so 'good' means shippable, not just pretty.", "Catch consistency drift early by reviewing related assets side by side rather than in isolation."], "issues": ["The pod ships inconsistent work where quality visibly varies by individual, forcing expensive late-stage cleanup passes.", "Feedback that only points at problems without teaching means artists never internalize the bar and keep making the same mistakes.", "If the lead becomes the only acceptable reviewer, every asset funnels through them and they become the pod's bottleneck.", "An uncalibrated bar produces work that is either over-polished beyond budget or under-baked relative to the AD's vision."]}, {"title": "3. 1:1s & Performance Feedback", "label": "Issues if Performance Management Is Avoided", "resp": ["Hold regular 1:1s with every pod member, treating them as the artist's time to raise concerns, not just a status update.", "Give timely, direct feedback on both strengths and gaps, close to the moment, so small issues are corrected before they calcify.", "Name performance problems early, document them concretely, and partner with the artist on a concrete plan to improve.", "Recognize good work specifically and publicly so artists feel seen and understand what excellence looks like.", "Act as a two-way channel, carrying the artist's concerns about workload, direction, or friction upward and translating leadership context back down."], "issues": ["Performance issues go unaddressed until they become so severe the only remaining option is a firing that surprises everyone.", "Artists who never hear where they stand assume they are fine, then are blindsided at review time, destroying trust.", "Skipping or canceling 1:1s signals the pod does not matter, and disengagement quietly spreads.", "Hard conversations deferred for months turn routine coaching moments into crises and HR escalations."]}, {"title": "4. Estimation & Scheduling Input", "label": "Issues if Estimates Miss", "resp": ["Provide production with honest, defensible estimates for the pod's work, grounded in real velocity rather than optimism.", "Factor in review cycles, iteration, polish, and the experience level of who will actually do the work when sizing tasks.", "Flag risk and uncertainty explicitly, giving ranges and assumptions rather than single false-precision numbers.", "Track actuals against estimates over time so the pod's forecasts get more accurate each milestone.", "Negotiate scope or timeline early when the math does not work, instead of quietly accepting an impossible plan."], "issues": ["Estimates consistently miss, so production loses trust in the pod and starts padding or second-guessing every number.", "Optimistic sizing that ignores iteration leads to chronic crunch as the pod tries to absorb the gap with overtime.", "Hidden risk surfaces as last-minute slips that ripple into dependent teams' schedules.", "Without tracking actuals, the same estimation errors repeat milestone after milestone."]}, {"title": "5. Early Career Development", "label": "Issues if Growth Is Neglected", "resp": ["Hold growth conversations that go beyond the current task, helping each artist see a path forward in craft, scope, or eventual leadership.", "Match stretch assignments to development goals so artists build new skills on real production work.", "Advocate for your pod members' growth and recognition with your own manager and in calibration discussions.", "Pair less experienced artists with stronger ones to spread tacit craft knowledge across the pod.", "Recognize that not everyone should grow the way you did, and develop people toward their strengths rather than into copies of yourself."], "issues": ["Artists stagnate, see no future, and start looking elsewhere, costing the pod its strongest people.", "Promoting and championing only artists who work exactly like the lead narrows the pod and pushes out different but valuable styles.", "Stretch work given without support sets people up to fail rather than to grow.", "If growth is never discussed, your best people assume the path is blocked and quietly disengage."]}, {"title": "6. Maintaining Craft Credibility", "label": "Issues if Craft Credibility Erodes", "resp": ["Keep producing real production work at 30-50% so your feedback stays grounded in current tools, pipelines, and constraints.", "Stay current on the discipline's techniques so the pod sees you as a peer who can still do the work, not just delegate it.", "Take on the assets no one else can crack, demonstrating the standard you are asking the pod to hit.", "Translate AD vision into concrete, achievable craft direction the pod can actually execute."], "issues": ["A lead who stops doing the work loses the team's respect and gives feedback that feels disconnected from reality.", "Out-of-date craft knowledge produces direction that ignores current pipeline constraints, frustrating the pod.", "Without hands-on credibility, the lead cannot calibrate estimates or quality and becomes a pure scheduler.", "Refusing to ever stop being an IC turns the lead into a bottleneck reviewer who blocks the pod they are meant to enable."]}], "topConsequences": ["The pod ships inconsistent, uneven work that requires costly late cleanup and damages the discipline's reputation.", "Unaddressed performance issues fester until they become firings, attrition, or team-wide morale damage.", "Production stops trusting the pod's estimates, leading to padded schedules, second-guessing, and recurring crunch.", "Strong artists stagnate and leave because no one invested in their growth or championed them.", "The lead becomes a bottleneck reviewer who slows the pod instead of multiplying it, and never develops into a real people leader."], "bottomLine": "A Lead Artist is the first rung off pure IC work, owning one pod while still staying 30-50% hands-on. Success means the pod ships consistent work on credible estimates, every artist knows where they stand and where they are headed, and problems get named early. Failure looks like a lead who either refuses to stop being an IC and becomes a bottleneck, or avoids the hard conversations until small issues become firings."}, "director-of-art-operations": {"sections": [{"title": "1. Studio-Wide Leveling & Comp Bands", "label": "Issues if Leveling & Comp Are Inconsistent", "resp": ["Own a single, coherent leveling framework and set of comp bands spanning every art discipline in the studio.", "Run studio-wide calibration so a given level means the same thing whether someone is in environments, characters, or UI.", "Maintain comp bands that are competitive, internally equitable, and aligned with market data and HR partnership.", "Define cross-discipline promotion criteria so advancement is consistent and defensible across the whole studio.", "Audit for pay compression, inequity, and drift across disciplines and correct systemically rather than case by case."], "issues": ["Inconsistent leveling and pay across disciplines create internal resentment and a sense of unfairness at studio scale.", "Comp drift and compression spike flight risk among underpaid strong performers across multiple teams.", "Without a shared framework, every discipline grades on its own curve and titles lose meaning studio-wide.", "Unaddressed systemic inequity becomes a fairness, retention, and legal liability for the whole studio."]}, {"title": "2. Process Standards Across Disciplines", "label": "Issues if Process Fragments or Bloats", "resp": ["Establish shared people-and-production process standards across all art disciplines, from onboarding to reviews to promotions.", "Make cross-discipline and cross-project moves smooth by aligning leveling, expectations, and workflows.", "Standardize what genuinely benefits from consistency while leaving disciplines room to adapt the rest.", "Keep process lightweight and enabling, continuously pruning anything that slows creative work without adding value.", "Roll out process changes with real buy-in from ADs and producers rather than top-down mandate."], "issues": ["Process varies widely across disciplines, making cross-project moves painful and onboarding inconsistent.", "Process overload slows creative work and breeds resentment toward the operations function.", "Heavy-handed standardization turns art ops into a bureaucracy layer between artists and leadership.", "Process imposed without buy-in gets ignored or worked around, wasting the effort entirely."]}, {"title": "3. Talent Strategy & Pipeline", "label": "Issues if Talent Strategy Is Reactive", "resp": ["Own a studio-wide talent strategy that anticipates the people the studio's roadmap will need and builds the pipeline ahead of time.", "Develop sourcing channels, university and community relationships, and internal pipelines that feed every discipline.", "Plan for critical and scarce skills proactively rather than scrambling when a project ramps.", "Build internal mobility paths so talent can move between disciplines and projects to meet shifting need.", "Connect talent strategy to the studio's business and creative roadmap so it is funded and prioritized."], "issues": ["A reactive talent strategy leaves the studio scrambling to staff projects, paying premiums or slipping schedules.", "Thin pipelines for scarce skills become hard bottlenecks the moment a project needs them.", "Without internal mobility, the studio loses people it could have redeployed and over-hires externally.", "Talent strategy disconnected from the roadmap is consistently caught flat-footed by what the studio actually builds."]}, {"title": "4. Partnering with HR / People Ops", "label": "Issues if the HR Partnership Fails", "resp": ["Build a strong working partnership with HR / People Ops, translating between art's realities and the organization's people systems.", "Co-own comp cycles, performance processes, and policy so they fit how art actually works.", "Bring art-specific context to HR so policies are designed for creative work rather than imposed generically.", "Represent art's interests inside HR-led initiatives while respecting compliance and fairness requirements.", "Use the partnership to handle sensitive performance, exit, and ER matters with proper process and dignity."], "issues": ["A weak HR partnership leaves art subject to generic policies that fit its work poorly.", "Becoming HR's enforcement proxy rather than art's advocate erodes credibility with artists.", "Poorly handled sensitive matters create legal exposure and reputational damage.", "Without partnership, comp and performance cycles run on the org's terms with art reacting rather than shaping."]}, {"title": "5. Staying Connected to Production Reality", "label": "Issues if Disconnected from the Floor", "resp": ["Stay genuinely connected to production reality, regularly engaging with teams, ADs, and producers on the actual work.", "Ground every policy, process, and leveling decision in how production actually runs, not in abstract theory.", "Spot when a well-intentioned process is hurting on the floor and fix or kill it quickly.", "Maintain enough craft and production literacy to be credible with the people the ops function serves.", "Treat ADs and producers as customers of art ops whose trust must be earned continuously."], "issues": ["Losing connection to production reality produces policies that look good on paper but fail on the floor.", "Becoming a bureaucracy layer between artists and leadership makes art ops an obstacle rather than an enabler.", "Decisions disconnected from production lose the trust of ADs and producers alike.", "Without floor credibility, even good initiatives are resisted because they come from a distant function."]}, {"title": "6. Cross-Discipline Org Health", "label": "Issues if Org Health Is Neglected", "resp": ["Monitor and improve the health of the art org across disciplines, watching attrition, engagement, span of control, and pipeline metrics.", "Identify systemic people problems that cross discipline boundaries and drive coordinated fixes.", "Ensure the management layer studio-wide is strong, calibrated, and developing its own benches.", "Balance the needs of different disciplines fairly so none is chronically advantaged or starved.", "Lead studio-wide initiatives on culture, growth, and retention that no single discipline could drive alone."], "issues": ["Systemic, cross-discipline people problems go unowned because each discipline only sees its own slice.", "Uneven management quality across disciplines creates pockets of dysfunction and attrition.", "Chronic favoring of some disciplines over others breeds studio-wide resentment.", "Without an owner, org health quietly degrades until it shows up as a retention or delivery crisis."]}, {"title": "7. Developing Department Heads & Managers", "label": "Issues if the Leadership Pipeline Stalls", "resp": ["Develop the department heads and managers across the studio, building a strong, calibrated leadership layer.", "Coach senior managers on strategic org thinking, calibration discipline, and difficult decisions.", "Build succession depth so the studio is not dependent on any single leader.", "Hold the management layer to consistent standards in how they lead, level, and develop their people.", "Identify and grow the next generation of senior art leaders proactively."], "issues": ["A weak leadership layer means good policies are executed inconsistently or not at all.", "Thin succession leaves the studio exposed when a key leader departs.", "Uncalibrated department heads let standards drift back apart despite studio-wide frameworks.", "Without proactive development, the studio runs out of leaders capable of taking on bigger scope."]}, {"title": "8. Process Credibility & Stakeholder Trust", "label": "Issues if Operational Credibility Erodes", "resp": ["Earn and maintain deep process credibility so ADs, producers, and HR all trust art ops' judgment.", "Demonstrate that operations work produces measurable outcomes, not just policy documents.", "Build the studio-wide trust across multiple projects that lets the function lead rather than just administer.", "Communicate the why behind processes so stakeholders see them as enabling rather than imposed.", "Act as a respected neutral party in cross-discipline and cross-function disputes."], "issues": ["Without credibility, art ops is seen as overhead and its initiatives are resisted or ignored.", "Policy without measurable outcomes makes the function look like bureaucracy for its own sake.", "Losing the trust of ADs and producers reduces art ops to a compliance rubber stamp.", "A function no one trusts cannot lead the cross-discipline change it exists to drive."]}], "topConsequences": ["Inconsistent leveling and pay across disciplines create studio-wide resentment, inequity, and rising flight risk.", "Process overload turns art ops into a bureaucracy layer that slows creative work and loses the floor's trust.", "Reactive talent strategy leaves projects perpetually under-staffed, paying premiums and slipping schedules.", "A disconnected ops function loses credibility with ADs, producers, and HR, and its initiatives stall.", "Neglected cross-discipline org health degrades quietly until it surfaces as a retention or delivery crisis."], "bottomLine": "A Director of Art Operations owns the studio-wide art people-org: leveling, comp bands, process standards, talent strategy, and the partnership with HR. Success means consistent and fair leveling across disciplines, lightweight enabling process, a talent pipeline that anticipates need, and a function ADs and producers genuinely trust. Failure looks like a process-heavy bureaucracy layer that has lost touch with production reality and sits between artists and leadership rather than serving them."}, "vp-of-art": {"sections": [{"title": "1. Studio Art Org Design", "label": "Issues if Org Design Is Wrong", "resp": ["Own the structure of the entire studio art org, defining how disciplines, directors, managers, and pods fit together and report.", "Size the management layer so spans of control are sustainable and no director or lead is structurally overloaded.", "Evolve the org ahead of the slate, scaling up for production peaks and reshaping cleanly as projects ramp down.", "Decide what is centralized (shared tech art, central review, pipeline) versus owned inside each discipline or project.", "Justify the org structure to studio leadership by tying it to the slate's quality bar and production need, not to territory.", "Build redundancy and succession into the structure so the loss of one senior leader does not throw the org into chaos."], "issues": ["A poorly designed org leaves directors with unsustainable spans and whole areas of the work without clear ownership.", "Structure that does not track the slate leaves the art org under- or over-built at the worst possible moments.", "Over-centralization smothers disciplines while over-fragmentation lets the bar and pipelines drift apart.", "Designing for prestige rather than need creates expensive layers that slow decisions and dilute accountability."]}, {"title": "2. Cross-Discipline Quality & Vision Bar", "label": "Issues if the Bar Is Not Owned", "resp": ["Own a single, coherent quality and vision bar across every art discipline so the studio's output reads as one world-class whole.", "Translate the creative director's and art directors' intent into a bar the whole org understands and can be held to.", "Run or sponsor the cross-discipline reviews that catch drift between characters, environments, VFX, UI, and lighting.", "Calibrate the bar against the technical budget and schedule so quality means shippable excellence, not unfunded perfection.", "Protect signature, identity-defining work from being eroded by throughput pressure or careless outsourcing.", "Make the bar explicit and teachable so it survives as the org grows rather than living only in the VP's head."], "issues": ["Without an owned bar, each discipline grades on its own curve and the game looks like several games stitched together.", "A bar set above what the budget and schedule can fund guarantees a late-stage quality crisis and crunch.", "If the bar lives only in the VP's head, it collapses the moment the org scales or the VP is unavailable.", "Unprotected signature work gets diluted by outsourcing or volume pressure, hollowing out the studio's visual identity."]}, {"title": "3. Senior Art Hiring & Closing", "label": "Issues if Senior Hiring Falters", "resp": ["Own the top of the art hiring funnel - art directors, discipline heads, and principal-level specialists.", "Build relationships and a bench of senior candidates so the studio can recruit ahead of need rather than scrambling.", "Personally run the close on the hires that move the needle, selling the role and studio honestly without over-promising.", "Set and hold the bar for senior art hires so the org gets stronger, not just bigger, with each addition.", "Balance external senior hires against developing and promoting internal leaders into the same roles.", "Partner with recruiting on employer brand and pipeline so the studio is competitive for scarce senior art talent."], "issues": ["If no one owns senior hiring, key leadership roles sit open or get filled reactively with whoever is available.", "A weak close loses the candidates who would have raised the bar to competitors who courted them better.", "Lowering the senior bar to fill a seat plants a weak leader whose problems compound across a whole discipline.", "Never developing internal successors makes the org permanently dependent on expensive, slow external hiring."]}, {"title": "4. Art Budget & Headcount", "label": "Issues if the Budget Is Mismanaged", "resp": ["Own the studio-wide art budget, including internal headcount, outsourcing, tools, contractors, and R and D.", "Tie every budget request to the slate's quality bar and production need so spend is justified and defensible.", "Trade internal hiring against outsourcing and tooling deliberately, protecting signature work in-house.", "Forecast spend across the production curve so the org is funded for peaks without carrying dead cost in troughs.", "Defend the art budget in studio leadership against competing functions with evidence, not just advocacy.", "Track actuals against plan so future budgets get more accurate and credible each cycle."], "issues": ["A budget set without art's input funds a quality bar the headcount and tools cannot actually deliver.", "Treating outsourcing as a pure cost lever erodes the in-house craft and identity the studio depends on.", "Headcount misaligned with the production curve forces either crunch or layoffs at the worst times.", "Without tracking actuals, the art budget loses credibility and gets cut by leadership that does not trust the numbers."]}, {"title": "5. Art Voice in Studio Leadership", "label": "Issues if Art Has No Executive Seat", "resp": ["Represent the art org at the studio leadership table with the authority and data to shape decisions.", "Ensure art's needs are weighed in slate, budget, schedule, and staffing decisions before they are finalized.", "Translate art realities into business and production terms the studio head, GM, and producers act on.", "Make the hard tradeoff calls that come with the seat rather than only advocating for more.", "Build the cross-functional trust with production, tech, and design leadership that lets art shape rather than react.", "Carry leadership context back to the art org so decisions are understood rather than resented."], "issues": ["Without an executive voice, org, budget, and schedule decisions get made about art rather than with it.", "If art only ever asks for more, it loses credibility in the tradeoff conversations that actually decide the slate.", "Poor translation between art and the business means real art risks never register with leadership until they bite.", "A weak seat reduces the VP to relaying leadership decisions downward instead of shaping them."]}, {"title": "6. Developing Art Directors & Discipline Heads", "label": "Issues if the Leadership Bench Is Thin", "resp": ["Develop the art directors and discipline heads reporting to the VP into stronger, more autonomous leaders.", "Coach senior leaders on org thinking, calibration, hard conversations, and holding the bar across their areas.", "Build succession so no art-director or discipline-head seat is a single point of failure.", "Delegate real authority and hold leaders accountable for outcomes and team health, not activity.", "Identify high-potential leaders early and invest in growing them into bigger scope.", "Hold the senior layer to a consistent standard in how they lead, level, and develop their people."], "issues": ["A thin bench leaves the studio fragile and unable to absorb growth, a new project, or a key departure.", "Uncoached senior leaders repeat avoidable mistakes that compound across whole disciplines.", "Without succession, the loss of one art director throws a major part of the slate into crisis.", "Hoarding authority stunts the senior leaders and turns the VP into a bottleneck on every important call."]}, {"title": "7. Vision-to-Production Alignment", "label": "Issues if Vision & Production Diverge", "resp": ["Keep the art org's output aligned to the creative vision while staying honest about what production can deliver.", "Reconcile the creative director's ambition with the schedule, budget, and headcount the studio actually has.", "Spot early when the vision and the plan have diverged and force the conversation before it becomes a crisis.", "Translate a moving creative target into stable enough direction that the teams can execute against it.", "Defend the parts of the vision that are non-negotiable and concede the parts that are not, explicitly.", "Keep production and creative leadership aligned on what 'done' and 'good enough' mean for the art."], "issues": ["If vision and production drift apart unowned, the gap surfaces as a late, expensive art crisis.", "Chasing an unconstrained creative target burns the org out trying to hit a bar nothing was funded for.", "A vision that never stabilizes into direction leaves teams churning on rework instead of progressing.", "Without explicit non-negotiables, the vision erodes one compromise at a time until the identity is gone."]}, {"title": "8. Outsourcing & External Capacity at Studio Scale", "label": "Issues if External Strategy Fails", "resp": ["Set the studio's art outsourcing strategy, deciding what scales externally and what stays in-house.", "Ensure the internal capacity exists to brief, review, and integrate external work without burying the teams.", "Govern vendor quality against the studio bar so external capacity expands output without exploding rework.", "Protect signature, identity-defining art in-house while using vendors for surge and commodity work.", "Build vendor relationships deep enough that partners can ramp reliably when the slate demands it.", "Monitor cost and quality over time and adjust the partner mix before problems compound."], "issues": ["Unmonitored outsource quality drifts and rework explodes, erasing savings and blowing the schedule.", "Externalizing signature work hollows out the studio's in-house expertise and visual identity.", "Under-resourced review pipelines let weak external work through or drown the internal team in cleanup.", "Shallow vendor relationships fail to ramp when the slate needs them, leaving the studio exposed."]}, {"title": "9. Maintaining Craft Credibility at the Executive Altitude", "label": "Issues if Craft Authority Erodes", "resp": ["Stay close enough to the actual work that art leaders trust the VP's quality and direction calls.", "Retain enough current craft and pipeline literacy to calibrate the bar and the budget credibly.", "Engage with real reviews and real assets, not just dashboards and status decks.", "Be present on the floor across disciplines despite the pull of executive and budget work.", "Earn authority by judgment and credibility rather than by title alone.", "Resist drifting into pure administration that leaves the art bar unowned by anyone with real craft authority."], "issues": ["A VP who loses craft credibility has quality calls quietly disregarded by the art leaders.", "Out-of-date literacy produces a bar and a budget disconnected from what the pipeline can actually do.", "Leading only from dashboards misses the real quality drift happening in the work itself.", "Becoming a pure administrator leaves the cross-discipline bar with no credible owner at all."]}], "topConsequences": ["The studio ships art that is competent but incoherent, because no one owned a single quality bar across disciplines.", "The art org is mis-built and mis-funded for the slate, surfacing as a late art crisis, crunch, or forced layoffs.", "Top art talent is lost or never recruited because no one owned the senior hiring funnel and close.", "Art has no real executive seat, so org, budget, and schedule decisions are made about it rather than with it.", "A thin senior bench leaves the studio fragile, with single points of failure beneath every critical art seat.", "A VP who became a glorified art director or a pure administrator leaves the org, bar, and budget effectively unowned."], "bottomLine": "A VP of Art is the executive head of a single studio's entire art organization, owning the org structure, the cross-discipline quality and vision bar, the senior hiring funnel, and the art budget. Success means the studio ships coherent, world-class art on a plan that was actually funded, with a strong senior bench and art shaping decisions at the leadership table. Failure looks like a VP who slid back into being an art director or drifted into pure administration, leaving the bar uncalibrated, the budget set by others, and the org mis-built for the slate it exists to deliver."}, "svp-of-art": {"sections": [{"title": "1. Developing VPs of Art", "label": "Issues if the Executive Bench Is Weak", "resp": ["Develop the VPs of Art across studios into stronger, more autonomous executives who own their orgs end to end.", "Coach studio art executives on org design, budget ownership, the quality bar, and executive influence in their own leadership tables.", "Calibrate VPs against each other so 'world-class' and 'senior' mean the same thing across studios.", "Build succession beneath every VP seat so the loss of a studio art executive is not a portfolio crisis.", "Delegate real authority to VPs and hold them accountable for org health and shipped quality, not activity.", "Identify high-potential studio leaders and grow them toward the VP and multi-studio scope."], "issues": ["A weak VP layer means standards and quality are executed inconsistently or not at all across studios.", "Uncalibrated VPs let each studio drift to its own bar despite shared frameworks.", "Thin succession leaves the portfolio exposed when a studio art executive departs.", "Hoarding decisions instead of developing VPs makes the SVP a bottleneck and stunts the executive bench."]}, {"title": "2. Cross-Studio Art Standards", "label": "Issues if Standards Fragment", "resp": ["Set the company's cross-studio art standards - quality bar philosophy, leveling, and pipeline expectations - that studios operate within.", "Distinguish what must be shared across studios from what each studio adapts to its genre and identity.", "Run cross-studio calibration so leveling and quality bars stay comparable without being identical.", "Keep standards current as tools and techniques evolve, retiring stale practice deliberately across studios.", "Make standards enabling rather than bureaucratic so studios adopt them as help, not overhead.", "Roll out standards with real buy-in from VPs and art directors rather than top-down decree."], "issues": ["Without shared standards, studios drift apart and the company's art has no comparable bar or mobility.", "Imposing one studio's standards on all flattens identities and breeds resistance.", "Stale standards force studios into shadow workflows that undermine the shared framework.", "Standards mandated without buy-in get ignored or worked around, wasting the effort."]}, {"title": "3. Senior Talent Allocation Across Studios", "label": "Issues if Allocation Is Mishandled", "resp": ["Allocate senior art talent - directors, principals, scarce specialists - across studios to match portfolio priority.", "Make allocation tradeoffs transparent when studios compete for the same scarce senior people.", "Plan ramps so senior people move between studios and projects cleanly rather than being stranded or thrashed.", "Protect against any one studio hoarding senior talent at the portfolio's expense.", "Build cross-studio mobility paths so senior careers can grow across the company, not just within one studio.", "Coordinate with VPs so allocation aligns with each studio's real need and the company's priorities."], "issues": ["Misallocation starves one project of critical senior skill while another sits over-resourced.", "Opaque allocation breeds cross-studio conflict and the perception of favoritism.", "Talent hoarding by a strong studio leaves the rest of the portfolio chronically short.", "Poorly planned moves thrash senior people across studios, hurting morale and output."]}, {"title": "4. Multi-Studio Art Strategy", "label": "Issues if Strategy Is Absent", "resp": ["Own a multi-studio art strategy that ties capability, tooling, and investment to the company's multi-project roadmap.", "Decide where art capability is built once and shared versus owned locally by each studio.", "Anticipate the skills, tools, and pipelines the portfolio will need years ahead and position the studios for them.", "Avoid redundant rebuilding of the same capability studio by studio.", "Connect art strategy to the company's creative and commercial roadmap so it is funded as a priority.", "Sequence investment across studios so the portfolio's capability grows coherently rather than in silos."], "issues": ["Without strategy, each studio optimizes locally and the portfolio's art capability grows incoherently.", "Capability rebuilt redundantly studio by studio wastes budget and fragments quality.", "Failing to anticipate portfolio-wide skill shifts leaves multiple studios unable to staff future products.", "Strategy disconnected from the roadmap is under-funded and perpetually behind."]}, {"title": "5. Multi-Studio Budget & Investment", "label": "Issues if Investment Is Uncoordinated", "resp": ["Own the aggregate art budget and headcount strategy across studios, balancing investment against competing slates.", "Allocate art investment to portfolio priority rather than to the studio that lobbies hardest.", "Fund shared capability - tooling, R and D, central functions - that strengthens multiple studios at once.", "Forecast spend across the portfolio's production curves so studios flex rather than over-hire and lay off.", "Defend the multi-studio art budget in company leadership with portfolio-level evidence.", "Track investment outcomes across studios so future allocation gets sharper each cycle."], "issues": ["Uncoordinated investment lets one studio over-build while another starves for the same money.", "Politically driven allocation funds the loudest studio rather than the highest portfolio return.", "Failing to fund shared capability forces every studio to rebuild it expensively alone.", "A budget disconnected from portfolio outcomes loses credibility and gets cut by company leadership."]}, {"title": "6. Cross-Studio Org Design & Shared Services", "label": "Issues if Structure Cannot Scale", "resp": ["Design how studios, shared art services, and central functions relate across the company.", "Decide what is central (shared tech art, tooling, R and D) versus owned by each studio.", "Evolve the cross-studio structure ahead of growth, new studios, and acquisitions.", "Balance studio autonomy against shared standards and shared services deliberately.", "Build a structure that strengthens the line studios rather than a parallel competing empire.", "Integrate acquired studios' art orgs into the company structure without destroying what made them work."], "issues": ["The cross-studio structure outgrows its design and scaling descends into unclear ownership.", "Over-centralization smothers studios while over-decentralization fragments standards and mobility.", "Acquisitions integrated badly destroy the acquired studio's strengths and breed resentment.", "A parallel central empire competing with the studios creates duplication, cost, and conflict."]}, {"title": "7. Resolving Cross-Studio Tensions", "label": "Issues if Tensions Are Left to Fester", "resp": ["Surface and resolve cross-studio tensions - standards drift, talent disputes, inconsistent bars - before they fragment the company's art.", "Mediate fairly between studios competing for talent, budget, or central support.", "Hold studios to shared standards while respecting their genre and identity differences.", "Address inter-studio friction as a neutral senior party rather than favoring a home studio.", "Set norms for how studios collaborate, share, and escalate across the company.", "Know when to mediate, when to set a firm standard, and when to let studios differ."], "issues": ["Unresolved cross-studio tension hardens into silos that refuse to share talent or standards.", "Perceived favoritism toward one studio fractures trust across the portfolio.", "Letting bars drift unchallenged makes company-wide titles and mobility meaningless.", "Avoided disputes resurface larger, usually at the worst portfolio moment."]}, {"title": "8. Company-Leadership Representation", "label": "Issues if Art Has No Senior Voice", "resp": ["Represent multi-studio art capability and strategy to company leadership with the data to shape decisions.", "Ensure art is weighed in portfolio, investment, M and A, and restructuring decisions before they are set.", "Translate multi-studio art realities into business terms company leadership acts on.", "Make the hard portfolio-level tradeoffs that come with the seat rather than only advocating.", "Build the company-leadership credibility that lets art strategy shape rather than react to company direction.", "Carry company context back to the VPs so cross-studio decisions are understood, not resented."], "issues": ["Without a senior voice, portfolio and M and A decisions hit the art orgs unprepared and unrepresented.", "If art only asks for more, it loses the tradeoff conversations that decide the portfolio.", "Poor translation means real cross-studio art risks never register with company leadership.", "A weak seat reduces the SVP to relaying company decisions downward instead of shaping them."]}, {"title": "9. Maintaining Craft & Org Credibility Across Studios", "label": "Issues if Credibility Erodes", "resp": ["Stay connected to the actual work across studios so VPs and art directors trust the SVP's standards and calls.", "Retain enough craft and org literacy to set standards that fit how art actually works at each studio.", "Visit studios and engage with real reviews and real teams despite the strategic altitude.", "Ensure cross-studio standards and shared services visibly support the studios rather than dictate from a distance.", "Be effective at shaping the portfolio's art rather than merely administering it.", "Earn the trust of art leaders company-wide through judgment and presence, not title."], "issues": ["An SVP who loses craft and org credibility has standards quietly ignored across studios.", "Standards set from a distance with no floor contact fit no studio's reality well.", "If shared services are seen as dictating, every studio resists them.", "A pure strategy figure with no presence builds a central function the studios route around."]}], "topConsequences": ["Studios drift apart in bar, leveling, and pipeline until the company's art has no shared standard or mobility.", "A weak VP-of-Art layer executes quality and standards inconsistently or not at all across the portfolio.", "Senior talent is hoarded or misallocated, starving priority projects while others sit over-resourced.", "Uncoordinated investment rebuilds the same capability redundantly studio by studio and wastes portfolio budget.", "Art has no senior voice, so portfolio, investment, and M and A decisions are made about the art orgs rather than with them.", "An SVP who centralized too hard or drifted into pure strategy builds a parallel empire the studios resist and route around."], "bottomLine": "An SVP of Art leads art across multiple studios and projects: developing the VPs of Art, setting cross-studio standards, allocating senior talent, and owning multi-studio art strategy and budget. Success means studios share a coherent bar without losing their identities, the executive art bench is strong and calibrated, talent flows to portfolio priority, and art shapes company-level decisions. Failure looks like an SVP who either micromanaged studios and flattened their identities, or drifted into pure strategy and built a central empire the line studios resist instead of the support they need."}, "evp-of-art": {"sections": [{"title": "1. Long-Horizon Art Capability Strategy", "label": "Issues if Capability Strategy Is Absent", "resp": ["Own the multi-year view of what art the company must be world-class at, and where, ahead of the products that will need it.", "Anticipate the craft, technology, and pipeline shifts the next generation of products will demand and position the company for them.", "Decide which capabilities to build, buy, or partner for, and sequence those bets across years.", "Build capability that outlasts any single title, so the company's art strength compounds rather than resets each project.", "Connect capability strategy to the company's creative and commercial ambitions so it is funded as a long-term priority.", "Retire capabilities the company no longer needs deliberately rather than carrying dead cost."], "issues": ["Without a capability horizon, the company invests reactively and is structurally unable to be world-class at what its future demands.", "Failing to anticipate craft and technology shifts leaves the company a cycle behind its rivals.", "Capability that resets every project means the company never compounds a durable art advantage.", "Strategy disconnected from the company's ambitions is under-funded and perpetually behind."]}, {"title": "2. Capital Allocation for Art", "label": "Issues if Capital Is Misallocated", "resp": ["Own art capital allocation across the company - tools, R and D, talent, and acquisitions - as one strategic portfolio.", "Allocate to the capability the company's future needs rather than to prestige projects or pet bets.", "Treat tooling and R and D investment as compounding assets with measured strategic return, not as cost centers.", "Sequence investment so the company builds durable advantage rather than scattering money thinly.", "Defend art capital at the executive and board level against competing company priorities with evidence.", "Track the strategic return on art investment over years so allocation gets sharper each cycle."], "issues": ["Capital allocated by politics rather than strategy funds the loudest bet, not the highest-return capability.", "Treating tools and R and D as pure cost starves the compounding investments that build durable advantage.", "Scattering capital thinly across pet projects builds no real capability anywhere.", "Investment with no measured return loses board credibility and gets cut in the first downturn."]}, {"title": "3. Industry Positioning & Art Identity", "label": "Issues if the Company Has No Art Standing", "resp": ["Set and steward the company's art identity and craft reputation in the industry.", "Make the company a place the best art talent in the world actively wants to work.", "Represent the company's art externally - at conferences, in press, and in the craft community - to build standing.", "Position the company as a recognized leader in the craft areas it has chosen to own.", "Use industry standing deliberately as a talent-attraction and retention lever, not as personal vanity.", "Protect the reputation of the art org through public moments, controversies, and crises."], "issues": ["Without an art identity, the company cannot attract or keep the best talent against rivals that have one.", "No industry standing means the company is invisible to the senior talent it most needs.", "Treating positioning as personal brand builds the EVP's reputation rather than the company's.", "An unprotected reputation erodes in public moments, costing talent and standing for years."]}, {"title": "4. Developing SVPs & VPs of Art", "label": "Issues if the Apex Bench Is Thin", "resp": ["Develop the SVPs and VPs of Art into stronger executives who own their multi-studio and studio orgs end to end.", "Coach the company's most senior art leaders on strategy, capital thinking, and executive influence.", "Build credible succession for the apex art seats, including the EVP's own.", "Calibrate the senior leadership layer so standards and judgment hold across the whole company.", "Delegate real strategic authority and hold senior leaders accountable for capability and org health.", "Identify and grow the next generation of company-level art executives proactively."], "issues": ["A thin apex bench leaves the company fragile and dependent on a single most-senior art leader.", "Without succession for the EVP seat, the company faces a leadership cliff when this person leaves.", "Uncalibrated senior leaders let company-wide standards and judgment drift apart.", "Hoarding strategic authority stunts the SVPs and VPs and concentrates risk in one person."]}, {"title": "5. Board & Executive Representation", "label": "Issues if Art Has No Apex Voice", "resp": ["Be the most senior art voice at the executive and board level, with the authority and data to shape company-defining decisions.", "Ensure art is weighed in portfolio, M and A, platform, and major investment decisions before they are set.", "Translate long-horizon art strategy into the business and financial terms boards and executives act on.", "Make the company-level tradeoffs that come with the apex seat rather than only advocating for art.", "Build the board credibility that lets art strategy shape rather than react to company direction.", "Carry company and board context back to the art org so the most senior decisions are understood."], "issues": ["Without an apex voice, company-defining decisions are made with no strategic art input.", "If art only ever asks for more, it loses the board-level tradeoffs that decide the company.", "Poor translation means real long-horizon art risks never register at the board level.", "A weak apex seat reduces the EVP to relaying board decisions downward instead of shaping them."]}, {"title": "6. Company-Wide Standards & Bar Philosophy", "label": "Issues if the Company Bar Has No Owner", "resp": ["Set the company-wide art-quality philosophy and bar that all studios and SVPs operate within.", "Define what world-class means for the company and ensure it is understood and teachable across studios.", "Govern how standards adapt to genre and studio identity without fragmenting into incoherence.", "Keep the bar philosophy current as craft and technology evolve.", "Hold SVPs accountable for translating the company bar into their multi-studio orgs.", "Make the philosophy durable enough to survive leadership changes and growth."], "issues": ["Without an owned philosophy, the company's idea of world-class fragments studio by studio.", "A bar that lives only in the EVP's head collapses when they are unavailable or leave.", "Standards that cannot flex to genre get ignored; standards with no spine fragment.", "A stale bar philosophy leaves the whole company a craft generation behind."]}, {"title": "7. Org Stewardship Across Cycles", "label": "Issues if Long-Term Health Is Neglected", "resp": ["Steward the long-term health, culture, and capability of the entire art organization across economic and technology cycles.", "Protect the org's core capability and key talent through downturns rather than gutting the future to save the quarter.", "Anticipate technology shifts that threaten or obsolete current craft and lead the org through them.", "Balance short-term delivery pressure against the long-term health the company depends on.", "Watch company-wide art-org health signals and act on systemic problems before they become crises.", "Build institutional resilience so the art org survives leadership transitions and reorganizations intact."], "issues": ["Neglected long-term health erodes unowned across cycles until it surfaces as a talent or quality crisis.", "Gutting core capability in a downturn destroys the future to protect a single quarter.", "Missing a technology shift leaves the whole art org obsolete and scrambling.", "An org dependent on one leader rather than a system shatters at the first major transition."]}, {"title": "8. M & A and Capability Acquisition", "label": "Issues if Acquisitions Are Mishandled", "resp": ["Evaluate art capability and studios as acquisition targets and advise the company on the art case for M and A.", "Integrate acquired art orgs into the company without destroying the capability and culture that made them valuable.", "Decide what acquired capability to centralize, share, or leave autonomous.", "Retain the key acquired talent through the integration that usually scatters it.", "Build the company's capability through acquisition where building organically is too slow.", "Walk away from acquisitions whose art capability will not survive integration."], "issues": ["Acquisitions integrated badly destroy the capability and talent the company paid for.", "Over-centralizing an acquired studio strips the autonomy that made it valuable.", "Failing to retain key acquired talent scatters the very capability that justified the deal.", "Acquiring without an art integration plan leaves the capability stranded and wasted."]}, {"title": "9. Maintaining Strategic Craft Credibility", "label": "Issues if the Apex Seat Loses Credibility", "resp": ["Retain enough craft and org judgment that the most senior art leaders trust the EVP's strategic calls.", "Stay connected to the company's real art - through reviews, studios, and the work - despite the apex altitude.", "Build institutional capability and systems rather than personal brand, so the org does not depend on the EVP.", "Be effective at shaping the company's art future rather than serving as a figurehead.", "Earn trust over a long, proven career through judgment, not title or external fame.", "Resist becoming a pure ambassador while the org's real health and bench decay."], "issues": ["An EVP who loses craft and org credibility holds the apex seat by title alone.", "A figurehead who is all industry talks and awards lets the org's real health rot.", "Building personal brand over institutional capability makes the org dependent on one person.", "Disconnected from the real work, even good strategy lands as out-of-touch decree."]}], "topConsequences": ["The company invests in art reactively and is structurally unable to be world-class at the craft its future demands.", "Art capital is allocated by politics rather than long-horizon strategy, building no durable advantage anywhere.", "The company has no art identity or industry standing and cannot attract or keep the best art talent.", "The apex art bench is thin, with no credible succession for the most senior art seats, including the EVP's own.", "Art has no board-level voice, so company-defining portfolio, M and A, and platform decisions are made without it.", "An EVP who became a figurehead or operated as a glorified SVP leaves the company's long-term art future effectively unowned."], "bottomLine": "An EVP of Art is the company-wide apex of the art-leadership ladder, owning long-horizon capability strategy, capital allocation for art, industry positioning, and the development of SVPs and VPs. Success means the company is building world-class art capability years ahead of need, allocating art capital as a compounding strategic portfolio, standing out as a craft leader that the best talent wants to join, with a deep senior bench and art shaping decisions at the board. Failure looks like an EVP who operated as a glorified SVP on this year's slate, allocated capital by politics, or became a pure figurehead while the institutional capability and bench they were meant to build quietly decayed."}, "head-of-art-operations-talent": {"sections": [{"title": "1. Multi-Studio Leveling & Compensation", "label": "Issues if Leveling & Comp Drift Across Studios", "resp": ["Own a coherent leveling and compensation framework spanning multiple studios or the whole company's art org.", "Govern comp bands and leveling so that level and pay mean the same thing across geographies, studios, and cost-of-living markets.", "Set company-wide promotion philosophy and calibration governance that local studios operate within.", "Partner with finance and total rewards to keep art comp competitive and sustainable across the portfolio.", "Detect and correct systemic comp drift and inequity across studios before it becomes a flight-risk pattern."], "issues": ["Compensation and leveling drift across studios, so equivalent artists are paid and titled inconsistently and flight risk rises.", "Without governance, each studio grades on its own curve and company-wide mobility and fairness break down.", "Comp that is uncompetitive in key markets bleeds senior talent to rivals.", "Unmanaged inequity across studios becomes a company-scale fairness, retention, and legal liability."]}, {"title": "2. Headcount Strategy & Long-Range Workforce Planning", "label": "Issues if Workforce Planning Is Absent", "resp": ["Own headcount strategy and long-range workforce planning for the entire art organization across studios and projects.", "Model the talent the multi-year product roadmap will require and build the workforce to meet it ahead of time.", "Plan capacity across the portfolio so studios can flex people between projects rather than over-hiring and laying off.", "Anticipate structural shifts in skills, technology, and labor markets and position the org years ahead.", "Tie workforce plans to financial planning so headcount is funded, justified, and aligned with the business."], "issues": ["Without long-range planning, the org is perpetually reactive, over-hiring into peaks and cutting in troughs.", "Failing to anticipate skill shifts leaves the org structurally unable to staff its future products.", "Poor cross-portfolio capacity planning forces costly layoffs in one studio while another hires the same skills.", "Workforce plans disconnected from finance get cut or overridden, leaving art without a credible people strategy."]}, {"title": "3. Org Design at Scale", "label": "Issues if Org Structure Cannot Scale", "resp": ["Design the overarching structure of the multi-studio art org, defining how disciplines, studios, and shared functions relate.", "Partner with the CAO / VP of Art on org design so people structure and creative structure reinforce each other.", "Evolve the org structure ahead of growth, acquisitions, and new studios so scaling does not descend into chaos.", "Balance studio autonomy against shared standards and shared services, deciding what is central and what is local.", "Build a structure that supports the line organization rather than a parallel empire competing with it."], "issues": ["The art org outgrows its structure and scaling turns into chaos, with unclear ownership and broken reporting lines.", "Org design misaligned with the creative structure pits people leadership against creative leadership.", "Over-centralization smothers studios; over-decentralization fragments standards and mobility.", "Empire-building a parallel org instead of supporting the line creates duplication, conflict, and cost."]}, {"title": "4. Diversity, Retention & Culture Metrics", "label": "Issues if Culture & Retention Metrics Slip", "resp": ["Own diversity, retention, and culture metrics for the art org and drive measurable improvement against them.", "Set company-wide goals and accountability for inclusive hiring, equitable advancement, and retention of underrepresented talent.", "Instrument the org with the data and feedback loops needed to see culture problems before they become crises.", "Drive culture and retention initiatives that span studios, which no single studio could lead alone.", "Hold studio and discipline leaders accountable for the health of their teams, not just their output."], "issues": ["Slipping retention and culture metrics signal an org bleeding talent and trust faster than it can rebuild.", "Without instrumentation, culture problems stay invisible until they erupt publicly or in mass attrition.", "Stalled diversity progress narrows the talent base and exposes the company reputationally.", "If leaders are accountable only for output, team health degrades and the human cost compounds across studios."]}, {"title": "5. Exec-Table Representation of Art Talent", "label": "Issues if Art Has No Executive Voice", "resp": ["Represent art talent and people strategy at the executive table with the authority and data to influence company decisions.", "Ensure art's people needs are weighed in headcount, budget, M&A, and restructuring decisions at the top.", "Translate art talent realities into business terms executives act on, and translate business strategy back into people plans.", "Advocate for the art org's interests in company-wide tradeoffs while owning the hard calls that come with the seat.", "Build the board- and exec-level credibility that lets art talent strategy shape rather than react to company direction."], "issues": ["Art has no executive voice on people and talent decisions, so they are made about art rather than with it.", "Without exec-level data and credibility, art's needs lose to louder functions in budget and headcount fights.", "Decisions like reorgs, acquisitions, and cuts hit the art org unprepared and unrepresented.", "A weak seat reduces the role to relaying decisions downward rather than shaping them."]}, {"title": "6. Talent Strategy & Pipeline at Company Scale", "label": "Issues if Company Talent Strategy Falters", "resp": ["Own the company-wide art talent strategy, from external brand and pipeline to internal mobility and succession.", "Build the employer brand and sourcing ecosystem that keeps the company competitive for scarce art talent globally.", "Develop cross-studio mobility and succession so critical roles have depth and talent can flow to where it is needed.", "Plan for scarce and emerging skills at portfolio scale, ahead of the projects that will demand them.", "Connect talent strategy to the company's creative ambitions so it is resourced as a strategic priority."], "issues": ["A weak company talent strategy leaves the whole portfolio scrambling and out-competed for key talent.", "Thin succession at senior levels makes the org fragile to departures of critical leaders.", "Without cross-studio mobility, the company over-hires externally and loses redeployable talent.", "Talent strategy disconnected from creative ambition is under-resourced and perpetually behind."]}, {"title": "7. Partnering with CAO / VP of Art & People Leadership", "label": "Issues if Strategic Partnerships Fail", "resp": ["Partner with the CAO / VP of Art so people strategy and creative strategy are designed together, not in tension.", "Partner with the CHRO and people-org leadership to shape company policy to fit creative work at scale.", "Align the art people function with finance, legal, and operations on comp, workforce, and compliance.", "Act as the bridge that keeps creative leadership, studio leadership, and people ops pulling in the same direction.", "Resolve the structural tensions between creative ambition, people health, and business constraints at the top."], "issues": ["Misaligned partnership with the CAO pits people strategy against creative strategy, confusing the whole org.", "Weak HR partnership leaves art subject to generic company policy that fits creative work poorly.", "Failure to align with finance and legal exposes the org to comp, workforce, and compliance risk.", "Without the bridging role, creative, studio, and people leadership drift apart and decisions stall."]}, {"title": "8. Maintaining Org & Craft Credibility", "label": "Issues if the Role Loses Credibility", "resp": ["Stay connected to actual production teams, visiting studios and engaging with the real work despite the strategic altitude.", "Retain enough art-org and craft literacy to make policy that fits how art actually works and to be credible with art leaders.", "Ensure the people function visibly supports the line organization rather than dictating to it from a distance.", "Balance the necessary policy and governance work with genuine presence on the floor across studios.", "Be effective at shaping the org rather than merely administering it, earning the trust of art leaders company-wide."], "issues": ["Becoming HR-adjacent and losing art-org credibility makes art leaders route around the role.", "A pure policy focus with no visits to production teams produces governance disconnected from reality.", "If the function is seen as dictating from a distance, the whole multi-studio org resists its init
